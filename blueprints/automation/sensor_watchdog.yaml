@register
def s46_post_restart_blocked_by_restart_guard():
    """HA starts during a restart-guard active window. The post-restart
    evaluation runs but the guard blocks the cycle."""
    sim = build_sim_custom(
        monitored_entities=["sensor.fp2_lux"],
        recovery_switch="switch.fp2_plug",
        detection_mode="lighter",
        restart_guard_sensor="sensor.restarting_status",
        unavailable_timeout_seconds=30,
        recovery_off_seconds=10,
        post_restart_settle_seconds=60,
    )
    sim.entities["sensor.fp2_lux"].value = "unavailable"
    # Add the restart guard entity directly
    from copy import copy
    guard = type(sim.entities["sensor.fp2_lux"])()
    guard.value = "on"
    sim.entities["sensor.restarting_status"] = guard
    sim.ha_start()
    sim.advance(65)
    cycles = filter_actions(sim, "post_restart.cycle_starts")
    assert_eq(len(cycles), 0, "post-restart should be blocked by restart guard")
    return "PASS"



def run_all():
    print("=" * 70)
    print("Sensor Watchdog Blueprint Simulator")
    print("=" * 70)
    passed, failed = 0, 0
    for fn in SCENARIOS:
        name = fn.__name__
        try:
            result = fn()
            status = "PASS"
            print(f"  {name}: {status} ({result})")
            passed += 1
        except AssertionError as e:
            print(f"  {name}: FAIL - {e}")
            failed += 1
        except Exception as e:
            print(f"  {name}: ERROR - {type(e).__name__}: {e}")
            failed += 1
    print("=" * 70)
    print(f"Total: {passed} passed, {failed} failed")
    print("=" * 70)
    return failed == 0


if __name__ == "__main__":
    import sys
    sys.exit(0 if run_all() else 1)
