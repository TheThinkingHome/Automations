@register
def s40_failure_notification_fires_on_persistent_failure():
    """Failure notification ENABLED. Recovery cycle runs but the entity stays
    unavailable past the settle period. on_failure_action fires."""
    sim = build_sim_custom(
        monitored_entities=["sensor.fp2_lux"],
        recovery_switch="switch.fp2_plug",
        detection_mode="responsive",
        unavailable_timeout_seconds=30,
        recovery_off_seconds=10,
        failure_notification_enabled=True,
        recovery_settle_seconds=60,
    )
    sim.report("sensor.fp2_lux", "200")
    sim.advance(60)
    sim.report("sensor.fp2_lux", "unavailable")
    # Past tolerance, cycle runs, switch goes off, then back on, then settle delay
    sim.advance(35)  # at this point cycle is starting; switch off
    sim.advance(15)  # cycle's turn_on fires at +10; switch back on
    sim.advance(70)  # past the 60s settle delay
    # Entity is still unavailable -> on_failure_action fires
    fires = filter_actions(sim, "on_failure_action.fired")
    assert_eq(len(fires), 1, f"on_failure_action should fire once on persistent failure, got {len(fires)}")
    return "PASS"


@register
def s41_failure_notification_does_not_fire_on_successful_recovery():
    """Failure notification ENABLED. Recovery cycle runs and the entity comes
