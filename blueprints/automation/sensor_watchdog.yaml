@register
def s22_fp2_10zone_lux_healthy_daytime():
    """11-entity FP2 (10 presence zones + 1 lux) in lighter mode during the day.
    Lux changes constantly (light shifting through windows), zones fire intermittently
    as people move. Timer should be reset frequently by either source."""
    entities = [f"binary_sensor.fp2_living_room_zone_{i}" for i in range(1, 11)]
    entities.append("sensor.fp2_living_room_illuminance")
    sim = build_sim_custom(
        monitored_entities=entities,
        recovery_switch="switch.fp2_living_room_plug",
        detection_mode="lighter",
        stale_threshold_minutes=30,
    )
    # Initial state for all 11 entities
    for e in entities:
        if "illuminance" in e:
            sim.report(e, "200")
        else:
            sim.report(e, "off")
    # Simulate 4 hours of daytime. Lux changes every 2 minutes; one zone toggles every 5.
    for minute in range(240):
        sim.advance(60)
        if minute % 2 == 0:
            sim.report("sensor.fp2_living_room_illuminance", str(200 + (minute * 3) % 800))
        if minute % 5 == 0:
            zone = entities[minute % 10]
            current = sim.entities[zone].value
            sim.report(zone, "on" if current == "off" else "off")
    timer_resets = len(filter_actions(sim, "timer.start"))
    print(f"  s22: 4-hour daytime simulation produced {timer_resets} timer resets")
    assert_eq(len(filter_actions(sim, "switch.turn_off")), 0, "no recovery in healthy daytime")
    return "PASS"


