@register
def s29_ping_sensor_with_treat_off_as_offline():
    """A WiFi router monitored via HA's ping integration. The ping binary_sensor
    goes 'off' (not 'unavailable') when the target is unreachable. With the
    'Treat off as Offline' input enabled, the blueprint treats the 'off' state
    as offline and triggers recovery."""
    # Case A: default behavior, treat_off_as_offline=False, 'off' does NOT trigger recovery
    sim_a = build_sim_custom(
        monitored_entities=["binary_sensor.router_ping"],
        recovery_switch="switch.router_plug",
        detection_mode="minimal",
        unavailable_timeout_seconds=60,
        treat_off_as_offline=False,
    )
    sim_a.report("binary_sensor.router_ping", "on")
    sim_a.advance(60 * 5)
    sim_a.report("binary_sensor.router_ping", "off")
    sim_a.advance(120)
    assert_eq(len(filter_actions(sim_a, "switch.turn_off")), 0,
              "default behaviour: 'off' does not trigger recovery")

    # Case B: with treat_off_as_offline=True, 'off' DOES trigger recovery
    sim_b = build_sim_custom(
        monitored_entities=["binary_sensor.router_ping"],
        recovery_switch="switch.router_plug",
        detection_mode="minimal",
        unavailable_timeout_seconds=60,
        treat_off_as_offline=True,
    )
    sim_b.report("binary_sensor.router_ping", "on")
    sim_b.advance(60 * 5)
    sim_b.report("binary_sensor.router_ping", "off")
    sim_b.advance(65)
    assert_eq(len(filter_actions(sim_b, "switch.turn_off")), 1,
              "with treat_off_as_offline: 'off' triggers recovery after timeout")

    # Case C: ping comes back online within the tolerance window. No recovery.
    sim_c = build_sim_custom(
        monitored_entities=["binary_sensor.router_ping"],
        recovery_switch="switch.router_plug",
        detection_mode="minimal",
        unavailable_timeout_seconds=60,
        treat_off_as_offline=True,
    )
    sim_c.report("binary_sensor.router_ping", "on")
    sim_c.advance(60 * 5)
    sim_c.report("binary_sensor.router_ping", "off")
    sim_c.advance(30)  # 30 seconds below the 60s tolerance
    sim_c.report("binary_sensor.router_ping", "on")  # came back
    sim_c.advance(60)
    assert_eq(len(filter_actions(sim_c, "switch.turn_off")), 0,
              "ping transient under tolerance does not trigger recovery")

    return "PASS (default + ping mode + transient under tolerance all verified)"


