    sim.advance(65)  # past the 60s tolerance
    assert_eq(len(filter_actions(sim, "switch.turn_off")), 1, "router cycle fires on internet outage")
    # Recovery cycle completes, internet comes back online
    sim.advance(15)  # let the cycle complete
    sim.report("binary_sensor.internet_up", "on")  # internet restored
    assert_eq(len(filter_actions(sim, "switch.turn_on")), 1, "router cycle completes")
    return "PASS"


