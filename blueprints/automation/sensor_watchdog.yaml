@register
def s43_failure_notification_with_self_recovery_no_check():
    """Self-recovery branch should NOT have failure notification (it's just
    turning the switch back on after an external off). Verify by triggering
    an external switch_off + waiting past any potential settle delay."""
    sim = build_sim_custom(
        monitored_entities=["sensor.fp2_lux"],
        recovery_switch="switch.fp2_plug",
        recovery_off_seconds=10,
        failure_notification_enabled=True,
        recovery_settle_seconds=60,
    )
    sim.report("sensor.fp2_lux", "200")
    sim.advance(60)
    # External off (e.g., dashboard click); self-recovery for: delay starts
    sim.switch_off()
    sim.advance(45)  # past the for: delay (recovery_off_seconds + 30 = 40)
    # Self-recovery fires; switch back on. No settle, no failure check.
    sim.advance(120)  # any settle window would have elapsed
    fires = filter_actions(sim, "on_failure_action.fired")
    assert_eq(len(fires), 0, "self-recovery does not run failure notification path")
    return "PASS"


@register
def s44_post_restart_cycles_already_dead_entity():
    """Home Assistant starts. A monitored entity is already 'unavailable'
    because the device was dead before HA loaded. The HA-start branch waits
    the post-restart settle, evaluates, and fires the recovery cycle."""
    sim = build_sim_custom(
        monitored_entities=["sensor.fp2_lux"],
        recovery_switch="switch.fp2_plug",
        detection_mode="lighter",
        unavailable_timeout_seconds=30,
        recovery_off_seconds=10,
        post_restart_settle_seconds=180,
    )
    # Set the entity to 'unavailable' before HA start; no transition observed
    sim.entities["sensor.fp2_lux"].value = "unavailable"
    sim.ha_start()
    sim.advance(185)  # past the 180s settle
    # The post-restart branch should have evaluated and fired the cycle
    cycles = filter_actions(sim, "post_restart.cycle_starts")
    assert_eq(len(cycles), 1, f"post-restart cycle should fire once on dead entity, got {len(cycles)}")
    turn_offs = filter_actions(sim, "switch.turn_off")
    assert_eq(len(turn_offs), 1, "switch should have been cycled once")
    return "PASS"


