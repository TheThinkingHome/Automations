@register
def s34_presence_sensor_off_state_is_not_a_failure():
    """Critical case: a monitored binary_sensor (presence) cycles between 'on'
    and 'off' as people enter and leave the room. With treat_off_as_offline at
    its DEFAULT of false, the presence going 'off' is normal operation, not a
    failure. No recovery should fire.

    This is the protection mechanism that keeps the blueprint safe to use on
    FP2 presence sensors, motion sensors, door contacts, and every other
    binary_sensor whose 'off' state is meaningful in its own right."""
    sim = build_sim_custom(
        monitored_entities=["binary_sensor.fp2_living_room_presence", "sensor.fp2_living_room_illuminance"],
        recovery_switch="switch.fp2_living_room_plug",
        detection_mode="lighter",
        stale_threshold_minutes=30,
        unavailable_timeout_seconds=60,
        # treat_off_as_offline NOT set; defaults to False
    )
    sim.report("binary_sensor.fp2_living_room_presence", "off")
    sim.report("sensor.fp2_living_room_illuminance", "200")
    # Simulate 2 hours of normal room activity. Presence cycles every 10 minutes
    # as people come and go. Lux changes every 5 minutes with daylight.
    for minute in range(120):
        sim.advance(60)
        if minute % 10 == 0:
            current = sim.entities["binary_sensor.fp2_living_room_presence"].value
            sim.report("binary_sensor.fp2_living_room_presence", "on" if current == "off" else "off")
        if minute % 5 == 0:
            sim.report("sensor.fp2_living_room_illuminance", str(200 + minute * 4))
    # Count how many off-transitions happened
    off_transitions = sum(
        1 for a in sim.actions if a.name == "timer.start"
    )
    print(f"  s34: 2 hours of normal presence cycling produced {off_transitions} timer resets and no recovery")
    assert_eq(len(filter_actions(sim, "switch.turn_off")), 0,
              "presence going 'off' as normal operation must not trigger recovery (treat_off_as_offline default false)")
    return "PASS (default-false setting protects normal binary_sensors from false recovery)"


@register
def s35_treat_off_as_offline_would_falsely_fire_on_presence():
    """The contrapositive of s34: if treat_off_as_offline is mistakenly enabled
    on an FP2 instance, the next time the room empties (presence goes 'off' for
    longer than the timeout), recovery will fire. Confirms the warning in the
    README's Small Note on What Counts as Offline."""
    sim = build_sim_custom(
        monitored_entities=["binary_sensor.fp2_living_room_presence"],
        recovery_switch="switch.fp2_living_room_plug",
        detection_mode="minimal",
        unavailable_timeout_seconds=60,
        treat_off_as_offline=True,  # WRONG for a presence sensor
    )
    sim.report("binary_sensor.fp2_living_room_presence", "on")  # someone in the room
    sim.advance(60)
    sim.report("binary_sensor.fp2_living_room_presence", "off")  # room emptied
    sim.advance(70)  # past the 60s tolerance
    # With treat_off_as_offline mistakenly on, this DOES fire recovery (the bad case).
    # This proves why the README warns against enabling this setting for normal binary_sensors.
    assert_eq(len(filter_actions(sim, "switch.turn_off")), 1,
              "treat_off_as_offline + a normal presence sensor falsely fires recovery (this is why the default is false)")
    return "PASS (confirms the misconfiguration danger the README warns about)"



@register
def s36_unavailable_transient_flap():
    """Entity goes unavailable, comes back briefly (under tolerance), goes
    unavailable again, comes back, then a real outage. Verifies that the
    'for:' delay restarts fresh for each transient and that the real outage
    after the flapping still fires recovery correctly."""
    sim = build_sim_custom(
        monitored_entities=["sensor.fp2_lux"],
        recovery_switch="switch.fp2_plug",
        detection_mode="responsive",
        unavailable_timeout_seconds=60,
        stale_threshold_minutes=30,
    )
    sim.report("sensor.fp2_lux", "200")
    sim.advance(120)
    # First transient: unavailable for 30 seconds (under 60s tolerance)
    sim.report("sensor.fp2_lux", "unavailable")
    sim.advance(30)
    sim.report("sensor.fp2_lux", "200")  # recovered
    sim.advance(30)
    # Second transient: unavailable for 45 seconds (still under tolerance)
    sim.report("sensor.fp2_lux", "unavailable")
    sim.advance(45)
    sim.report("sensor.fp2_lux", "200")  # recovered
    sim.advance(30)
    assert_eq(len(filter_actions(sim, "switch.turn_off")), 0,
              "transients under tolerance must not fire recovery")
    # Now a real outage: unavailable for longer than the tolerance
    sim.report("sensor.fp2_lux", "unavailable")
    sim.advance(70)
    assert_eq(len(filter_actions(sim, "switch.turn_off")), 1,
              "outage past tolerance fires recovery after the flapping")
    return "PASS"


@register
def s37_entity_stays_unavailable_through_and_after_cycle():
    """A monitored entity goes unavailable. The recovery cycle fires and
    completes. The entity is STILL unavailable afterward (the cycle didn't
    fix it). No second cycle should fire for the same wedge — the trigger
    has already fired once for this unavailable transition, and the entity
    has not transitioned back out and in again. This is the one-attempt-per-
    wedge protection for the unavailable case."""
    sim = build_sim_custom(
        monitored_entities=["sensor.fp2_lux"],
        recovery_switch="switch.fp2_plug",
        detection_mode="responsive",
        unavailable_timeout_seconds=30,
        recovery_off_seconds=10,
    )
    sim.report("sensor.fp2_lux", "200")
    sim.advance(60)
    sim.report("sensor.fp2_lux", "unavailable")
    sim.advance(35)  # past tolerance; recovery fires
    assert_eq(len(filter_actions(sim, "switch.turn_off")), 1, "first cycle fires")
    sim.advance(15)  # cycle completes
    assert_eq(len(filter_actions(sim, "switch.turn_on")), 1, "cycle completes")
    # Now sit here with the entity still unavailable for another five minutes
    sim.advance(60 * 5)
    # No second cycle should fire — same wedge, same uninterrupted unavailable state
    assert_eq(len(filter_actions(sim, "switch.turn_off")), 1,
              "no second cycle for the same continuous wedge")
    return "PASS (one attempt per wedge confirmed for unavailable case)"


@register
def s38_entity_self_heals_during_recovery_cycle():
    """Edge case: the monitored entity recovers on its own DURING the cycle's
    off-period. By the time the cycle completes, the device is already healthy.
    The cycle should still finish cleanly (turn the switch back on) without
    interference."""
    sim = build_sim_custom(
        monitored_entities=["sensor.fp2_lux"],
        recovery_switch="switch.fp2_plug",
        detection_mode="responsive",
        unavailable_timeout_seconds=30,
        recovery_off_seconds=15,
    )
    sim.report("sensor.fp2_lux", "200")
    sim.advance(60)
    sim.report("sensor.fp2_lux", "unavailable")
    sim.advance(35)  # past tolerance; recovery fires (switch goes off)
    # Now mid-cycle: 5 seconds into the 15-second off period
    sim.advance(5)
    # Device self-heals during the cycle's off period (powered or not, it reports)
    sim.report("sensor.fp2_lux", "210")
    # The recovery cycle should still complete cleanly
    sim.advance(15)
    assert_eq(len(filter_actions(sim, "switch.turn_on")), 1,
              "cycle still completes the turn_on even if device self-healed")
    # Switch should be on at the end
    assert_eq(sim.switch_state, "on", "switch is on at cycle end")
    return "PASS (recovery cycle robust to mid-cycle entity recovery)"



@register
def s39_failure_notification_disabled_default():
    """Default behaviour: failure_notification_enabled is false. After a
    recovery cycle, no settle delay or on_failure_action runs, even if the
