"""
Sensor Watchdog Blueprint Simulator
====================================

Discrete-event model of the HA automation logic in sensor_watchdog.yaml.

Models:
- A simulated wall clock (advance() moves time forward)
- Entity states (value, last_reported timestamp)
- The heartbeat timer (idle/active/finished, remaining duration)
- The recovery switch state (on/off)
- HA's trigger evaluation (state, event, state_reported, timer.finished, time)
- The automation's action choose: block evaluation
- The recovery cycle (delayed sequence)

The simulator does NOT model:
- HA's full state machine
- Network/integration latency
- True concurrency (events are processed serially)

It is enough to validate the logical correctness of the blueprint's
trigger gating, branch routing, condition evaluation, and action effects.
"""

from dataclasses import dataclass, field
from typing import Optional, Callable
from enum import Enum


class TimerState(Enum):
    IDLE = "idle"
    ACTIVE = "active"


@dataclass
class EntityState:
    value: str = "off"
    last_reported: float = 0.0
    last_changed: float = 0.0

    def report(self, t: float, new_value: Optional[str] = None):
        """Simulate a state_reported event. Updates last_reported always.
        If new_value differs from current, also updates last_changed."""
        self.last_reported = t
        if new_value is not None and new_value != self.value:
            self.value = new_value
            self.last_changed = t


@dataclass
class WatchdogConfig:
    # Required
    monitored_entities: list[str]
    recovery_switch: str
    # Timing
    recovery_off_seconds: int = 10
    unavailable_timeout_seconds: int = 30
    # Advanced
    detection_mode: str = "responsive"  # responsive | lighter | minimal
    stale_threshold_minutes: int = 5
    heartbeat_timer: Optional[str] = "timer.test_heartbeat"
    active_window_enabled: bool = False
    active_after: str = "06:00:00"
    active_before: str = "23:00:00"
    scheduled_reboot_enabled: bool = False
    scheduled_reboot_time: str = "04:30:00"
    restart_guard_sensor: Optional[str] = None
    debug_enabled: bool = False
    treat_off_as_offline: bool = False
    failure_notification_enabled: bool = False
    recovery_settle_seconds: int = 60
    post_restart_settle_seconds: int = 180
    # The on_failure_action is modelled as a flag that the simulator can
    # check; in real HA this is a user-defined action sequence.
    on_failure_action_configured: bool = False


@dataclass
class Action:
    """A record of an action the automation took."""
    name: str
    payload: dict = field(default_factory=dict)
    at_time: float = 0.0

    def __repr__(self):
        return f"[{self.at_time:.1f}s] {self.name} {self.payload}"


class WatchdogSim:
    """Simulator of the sensor_watchdog blueprint."""

    def __init__(self, config: WatchdogConfig):
        self.config = config
        self.now: float = 0.0  # seconds since simulation start
        self.entities: dict[str, EntityState] = {}
        # Heartbeat timer state
        self.timer_state = TimerState.IDLE
        self.timer_finishes_at: Optional[float] = None
        # Recovery switch
        self.switch_state = "on"
        # Pending recovery cycle (when in the off-delay-on sequence)
        self.recovery_in_progress = False
        self.recovery_cycle_steps: list[tuple[float, Callable]] = []
        # State-trigger 'for:' bookkeeping. Map entity -> time when the
        # unavailable/unknown 'for:' delay would complete.
        self.unavailable_since: dict[str, float] = {}
        # When the switch_off 'for:' delay would fire (None if not pending)
        self.switch_off_pending_at: Optional[float] = None
        # Recent unavailable already triggered (debouncing)
        self.unavailable_triggered_at: dict[str, float] = {}
        # Action log
        self.actions: list[Action] = []
        # Restart guard external state
        self.restart_guard_active = False
        # Hour-of-day for active window (simulated as a property of now)
        self.simulated_hour = 12  # default to noon (inside any normal window)
        # State-of-system flag
        self.restart_guard_was_on = False
        # Initialize entities
        for e in config.monitored_entities:
            self.entities[e] = EntityState(value="off", last_reported=0.0, last_changed=0.0)
        self.entities[config.recovery_switch] = EntityState(value="on")

    # ------------------------------------------------------------------
    # Helpers
    # ------------------------------------------------------------------

    def _log_action(self, name: str, **payload):
        self.actions.append(Action(name=name, payload=payload, at_time=self.now))

    def _restart_guard_blocks(self) -> bool:
        if self.config.restart_guard_sensor is None:
            return False
        return self.restart_guard_active

    def _in_active_window(self) -> bool:
        if not self.config.active_window_enabled:
            return True
        # Compare simulated hour-of-day to window bounds.
        after_h = int(self.config.active_after.split(":")[0])
        before_h = int(self.config.active_before.split(":")[0])
        return after_h <= self.simulated_hour < before_h

    # ------------------------------------------------------------------
    # Time advancement
    # ------------------------------------------------------------------

    def advance(self, seconds: float):
        """Advance simulated time, processing scheduled callbacks."""
        target = self.now + seconds
        # Process recovery cycle steps that fire within this advancement
        while True:
            next_event_time = None
            next_event_kind = None

            # Timer finished?
            if self.timer_state == TimerState.ACTIVE and self.timer_finishes_at is not None:
                if self.timer_finishes_at <= target:
                    if next_event_time is None or self.timer_finishes_at < next_event_time:
                        next_event_time = self.timer_finishes_at
                        next_event_kind = "timer_finished"

            # Recovery cycle step?
            if self.recovery_cycle_steps:
                step_time, _ = self.recovery_cycle_steps[0]
                if step_time <= target:
                    if next_event_time is None or step_time < next_event_time:
                        next_event_time = step_time
                        next_event_kind = "recovery_step"

            # 'for:' delay expiry on unavailable entities?
            for entity, fire_at in list(self.unavailable_since.items()):
                if fire_at <= target:
                    if next_event_time is None or fire_at < next_event_time:
                        next_event_time = fire_at
                        next_event_kind = ("unavailable_for_expired", entity)

            # Switch_off 'for:' delay expired?
            if self.switch_off_pending_at is not None:
                if self.switch_off_pending_at <= target:
                    if next_event_time is None or self.switch_off_pending_at < next_event_time:
                        next_event_time = self.switch_off_pending_at
                        next_event_kind = "switch_off_fired"

            if next_event_time is None:
                break

            # Fast-forward to event time
            self.now = next_event_time

            if next_event_kind == "timer_finished":
                self._on_timer_finished()
            elif next_event_kind == "recovery_step":
                step_time, callback = self.recovery_cycle_steps.pop(0)
                callback()
            elif next_event_kind == "switch_off_fired":
                self.switch_off_pending_at = None
                # Verify switch is still off
                if self.switch_state == "off":
                    self._on_switch_off_branch()
            elif isinstance(next_event_kind, tuple) and next_event_kind[0] == "unavailable_for_expired":
                entity = next_event_kind[1]
                # Verify the entity is still in an offline state
                state = self.entities[entity].value
                is_offline = state in ["unavailable", "unknown"]
                if not is_offline and self.config.treat_off_as_offline and state == "off":
                    is_offline = True
                if is_offline:
                    self._on_unavailable_branch(entity)
                # Clear bookkeeping
                self.unavailable_since.pop(entity, None)

        self.now = target

    # ------------------------------------------------------------------
    # Event sources (call these from scenarios)
    # ------------------------------------------------------------------

    def report(self, entity_id: str, new_value: Optional[str] = None):
        """Simulate a device reporting state. Fires state_reported event.
        If new_value is different from current, also fires state_changed."""
        if entity_id not in self.entities:
            self.entities[entity_id] = EntityState()
        old_value = self.entities[entity_id].value
        self.entities[entity_id].report(self.now, new_value)
        # Fire blueprint triggers
        self._on_state_reported(entity_id)
        if new_value is not None and new_value != old_value:
            self._on_state_changed(entity_id, old_value, new_value)

    def fire_scheduled_reboot(self):
        """Simulate the scheduled time trigger firing."""
        if not self.config.scheduled_reboot_enabled:
            return  # Trigger is disabled
        self._on_scheduled_branch()

    def switch_off(self):
        """Simulate the recovery switch unexpectedly turning off (manual or external).
        Triggers the 'for:' delay on the switch_off trigger."""
        if self.switch_state != "off":
            self.switch_state = "off"
            self.entities[self.config.recovery_switch].report(self.now, "off")
            # Start the 'for:' delay; if switch goes back to on within
            # recovery_off_seconds + 30, the delay cancels.
            self.switch_off_pending_at = self.now + self.config.recovery_off_seconds + 30

    def ha_start(self):
        """Simulate Home Assistant starting up. Schedules the post-restart
        evaluation to fire after post_restart_settle_seconds, at which time
        the branch checks monitored entity states and cycles if needed."""
        settle_at = self.now + self.config.post_restart_settle_seconds
        self.recovery_cycle_steps.append((settle_at, self._evaluate_post_restart))
        if self.config.debug_enabled:
            self._log_action("debug.ha_start_scheduled", settle_at=settle_at)

    def _evaluate_post_restart(self):
        """Run after post_restart_settle_seconds. Check monitored entities and
        cycle the recovery switch if any are in a failure state."""
        bad_states = ["unavailable", "unknown"]
        if self.config.treat_off_as_offline:
            bad_states = bad_states + ["off"]
        failed = [
            e for e in self.config.monitored_entities
            if self.entities[e].value in bad_states
        ]
        if self.config.debug_enabled:
            self._log_action("debug.post_restart_evaluated", failed=failed)
        if not failed:
            return
        # Apply same gates as the other recovery branches
        if self.switch_state != "on":
            return
        if self.config.restart_guard_sensor:
            guard_state = self.entities.get(self.config.restart_guard_sensor)
            if guard_state and guard_state.value in ("on", "true", "True"):
                return
        # Cancel any pending freshness timer
        if self.config.detection_mode != "minimal":
            self._timer_cancel()
        self._log_action("post_restart.cycle_starts", failed=failed)
        self._start_recovery_cycle("post_restart")

    # ------------------------------------------------------------------
    # Blueprint trigger handlers
    # ------------------------------------------------------------------

    def _on_state_reported(self, entity_id: str):
        """Branch 1: Heartbeat reset (responsive mode)."""
        if self.config.detection_mode != "responsive":
            return
        if entity_id not in self.config.monitored_entities:
            return
        # Reset heartbeat timer
        self._timer_start(self.config.stale_threshold_minutes * 60)
        if self.config.debug_enabled:
            self._log_action("debug.heartbeat_responsive", entity=entity_id)

    def _on_state_changed(self, entity_id: str, old_value: str, new_value: str):
        """Could be heartbeat_lighter trigger, or could start the 'for:' delay
        on the unavailable trigger if transitioning to unavailable/unknown."""
        # Heartbeat (lighter mode)
        if self.config.detection_mode == "lighter":
            if entity_id in self.config.monitored_entities:
                self._timer_start(self.config.stale_threshold_minutes * 60)
                if self.config.debug_enabled:
                    self._log_action("debug.heartbeat_lighter", entity=entity_id)

        # Unavailable trigger (always-on for unavailable/unknown; also fires
        # on 'off' when treat_off_as_offline is enabled): starts 'for:' delay
        if entity_id in self.config.monitored_entities:
            is_offline = new_value in ["unavailable", "unknown"]
            if not is_offline and self.config.treat_off_as_offline and new_value == "off":
                is_offline = True
            if is_offline:
                fire_at = self.now + self.config.unavailable_timeout_seconds
                self.unavailable_since[entity_id] = fire_at
            else:
                # No longer offline, cancel pending 'for:' delay
                self.unavailable_since.pop(entity_id, None)

    def _on_timer_finished(self):
        """Branch 3: Stale recovery."""
        self.timer_state = TimerState.IDLE
        self.timer_finishes_at = None
        # The trigger is enabled if mode != minimal
        if self.config.detection_mode == "minimal":
            return
        # Apply restart guard condition
        if self._restart_guard_blocks():
            if self.config.debug_enabled:
                self._log_action("debug.stale_blocked_restart_guard")
            return
        # Apply active window condition
        if not self._in_active_window():
            if self.config.debug_enabled:
                self._log_action("debug.stale_blocked_active_window")
            return
        if self.config.debug_enabled:
            self._log_action("debug.stale_fired")
        self._start_recovery_cycle(reason="stale")

    def _on_unavailable_branch(self, entity_id: str):
        """Branch 4: Unavailable recovery."""
        # Apply recovery_switch state guard (prevents duplicate cycles)
        if self.switch_state != "on":
            return
        # Apply restart guard condition
        if self._restart_guard_blocks():
            if self.config.debug_enabled:
                self._log_action("debug.unavailable_blocked_restart_guard", entity=entity_id)
            return
        if self.config.debug_enabled:
            self._log_action("debug.unavailable_fired", entity=entity_id)
        # Cancel the heartbeat timer so a stale event does not fire for the
        # same wedge. Only relevant in responsive/lighter mode (minimal mode
        # has no timer).
        if self.config.detection_mode != "minimal":
            self._timer_cancel()
        self._start_recovery_cycle(reason="unavailable", entity=entity_id)

    def _on_scheduled_branch(self):
        """Branch 5: Scheduled recovery."""
        # Apply recovery_switch state guard
        if self.switch_state != "on":
            return
        # Apply restart guard
        if self._restart_guard_blocks():
            if self.config.debug_enabled:
                self._log_action("debug.scheduled_blocked_restart_guard")
            return
        if self.config.debug_enabled:
            self._log_action("debug.scheduled_fired")
        # Cancel timer for the same reason as the unavailable branch
        if self.config.detection_mode != "minimal":
            self._timer_cancel()
        self._start_recovery_cycle(reason="scheduled")

    def _on_switch_off_branch(self):
        """Branch 6: Self-recovery."""
        if self.config.debug_enabled:
            self._log_action("debug.switch_off_fired")
        # Turn switch back on; bypass any guards
        self.switch_state = "on"
        self.entities[self.config.recovery_switch].value = "on"
        self._log_action("switch.turn_on", entity=self.config.recovery_switch, reason="self_recovery")

    # ------------------------------------------------------------------
    # Recovery cycle (off, delay, on)
    # ------------------------------------------------------------------

    def _start_recovery_cycle(self, reason: str, entity: Optional[str] = None):
        # Schedule: turn off NOW, delay, turn on
        # The off action fires a state change on the switch, which starts
        # the 'for:' delay on the switch_off trigger. If the cycle's own
        # turn_on happens before the for: delay completes, the trigger is
        # cancelled and self-recovery does NOT fire. This is the design.
        def turn_off():
            if self.switch_state == "on":
                self.switch_state = "off"
                self.entities[self.config.recovery_switch].value = "off"
                self.entities[self.config.recovery_switch].last_changed = self.now
                self._log_action("switch.turn_off", entity=self.config.recovery_switch, reason=reason, source_entity=entity)
                # The state change starts the 'for:' delay on switch_off trigger
                self.switch_off_pending_at = self.now + self.config.recovery_off_seconds + 30

        def turn_on():
            if self.switch_state == "off":
                self.switch_state = "on"
                self.entities[self.config.recovery_switch].value = "on"
                self.entities[self.config.recovery_switch].last_changed = self.now
                self._log_action("switch.turn_on", entity=self.config.recovery_switch, reason=reason, source_entity=entity)
                # State changed back to on, cancel the 'for:' delay
                self.switch_off_pending_at = None
                # If failure notification is enabled, schedule the settle+check
                if self.config.failure_notification_enabled:
                    settle_at = self.now + self.config.recovery_settle_seconds
                    self.recovery_cycle_steps.append((settle_at, lambda: self._check_failure_and_notify(reason)))

        # Run turn_off immediately (synchronously)
        turn_off()
        # Schedule turn_on after recovery_off_seconds
        self.recovery_cycle_steps.append((self.now + self.config.recovery_off_seconds, turn_on))

    def _check_failure_and_notify(self, reason: str):
        """After the settle delay, check if any monitored entity is still in
        a failure state and run the on_failure_action if so."""
        bad_states = ["unavailable", "unknown"]
        if self.config.treat_off_as_offline:
            bad_states = bad_states + ["off"]
        failed = [
            e for e in self.config.monitored_entities
            if self.entities[e].value in bad_states
        ]
        if failed:
            if self.config.debug_enabled:
                self._log_action("debug.failure_detected", reason=reason, failed=failed)
            self._log_action("on_failure_action.fired", reason=reason, failed=failed)
        else:
            if self.config.debug_enabled:
                self._log_action("debug.recovery_succeeded", reason=reason)

    # ------------------------------------------------------------------
    # Timer helpers
    # ------------------------------------------------------------------

    def _timer_start(self, duration_seconds: int):
        self.timer_state = TimerState.ACTIVE
        self.timer_finishes_at = self.now + duration_seconds
        self._log_action("timer.start", duration=duration_seconds)

    def _timer_cancel(self):
        """Cancel the heartbeat timer. Safe to call when timer is idle (no-op)."""
        if self.timer_state == TimerState.ACTIVE:
            self.timer_state = TimerState.IDLE
            self.timer_finishes_at = None
            self._log_action("timer.cancel")


# ====================================================================
# Test scenarios
# ====================================================================

def scenario(name: str):
    """Decorator to register and label scenarios."""
    def wrap(fn):
        fn._scenario_name = name
        return fn
    return wrap


SCENARIOS = []


def register(fn):
    SCENARIOS.append(fn)
    return fn


def assert_eq(actual, expected, msg=""):
    if actual != expected:
        raise AssertionError(f"{msg}: expected {expected!r}, got {actual!r}")


def assert_in(item, container, msg=""):
    if item not in container:
        raise AssertionError(f"{msg}: {item!r} not in {container!r}")


def assert_not_in(item, container, msg=""):
    if item in container:
        raise AssertionError(f"{msg}: {item!r} was in {container!r} but should not be")


def action_names(sim: WatchdogSim) -> list[str]:
    return [a.name for a in sim.actions]


def filter_actions(sim: WatchdogSim, name: str) -> list[Action]:
    return [a for a in sim.actions if a.name == name]


# ----------------------------------------------------------------------
# Helper: build a sim with sensible defaults
# ----------------------------------------------------------------------

def build_sim(**overrides) -> WatchdogSim:
    cfg = WatchdogConfig(
        monitored_entities=["sensor.lux_fp2", "binary_sensor.presence_fp2"],
        recovery_switch="switch.fp2_plug",
        **overrides,
    )
    return WatchdogSim(cfg)


def build_sim_custom(monitored_entities: list[str], recovery_switch: str, **overrides) -> WatchdogSim:
    """Build a sim with custom entity configuration."""
    cfg = WatchdogConfig(
        monitored_entities=monitored_entities,
        recovery_switch=recovery_switch,
        **overrides,
    )
    return WatchdogSim(cfg)


# ----------------------------------------------------------------------
# Scenarios
# ----------------------------------------------------------------------

@register
def s01_healthy_responsive():
    """Healthy operation in responsive mode: heartbeats reset timer, no recovery fires."""
    sim = build_sim(detection_mode="responsive", stale_threshold_minutes=5)
    # Initial heartbeat to start the timer
    sim.report("sensor.lux_fp2", "100")
    # Heartbeats every 30 seconds for an hour
    for i in range(120):
        sim.advance(30)
        sim.report("sensor.lux_fp2", "100")  # same value
    assert_eq(len(filter_actions(sim, "switch.turn_off")), 0, "no recovery should have fired")
    return "PASS"


@register
def s02_unavailable_detection():
    """Sensor goes unavailable for 30s. Unavailable branch fires."""
    sim = build_sim(detection_mode="responsive", unavailable_timeout_seconds=30)
    sim.report("sensor.lux_fp2", "100")  # healthy first
    sim.advance(60)
    # Now go unavailable
    sim.report("sensor.lux_fp2", "unavailable")
    sim.advance(35)  # wait past the 30s for: delay
    assert_eq(len(filter_actions(sim, "switch.turn_off")), 1, "recovery should fire once")
    return "PASS"


@register
def s03_stale_detection_responsive():
    """Responsive mode: device stops reporting. Timer expires. Stale branch fires."""
    sim = build_sim(detection_mode="responsive", stale_threshold_minutes=5)
    sim.report("sensor.lux_fp2", "100")  # start timer
    sim.advance(60)  # 1 minute passes, no reports
    sim.advance(60 * 5)  # 5 more minutes; total 6 minutes since last report
    assert_eq(len(filter_actions(sim, "switch.turn_off")), 1, "stale should fire")
    return "PASS"


@register
def s04_stale_detection_lighter():
    """Lighter mode: device reports continuously but value never changes for stale_threshold. Timer expires."""
    sim = build_sim(detection_mode="lighter", stale_threshold_minutes=5)
    sim.report("sensor.lux_fp2", "100")  # initial change starts timer
    # Now report same value many times — no state changes
    for i in range(20):
        sim.advance(30)
        sim.report("sensor.lux_fp2", "100")  # same value, no state change
    # 10 minutes elapsed without value change
    # Timer should have expired at 5 minutes
    assert_eq(len(filter_actions(sim, "switch.turn_off")), 1, "stale should fire in lighter mode")
    return "PASS"


@register
def s05_minimal_no_stale():
    """Minimal mode: no stale detection. Only unavailable and scheduled fire."""
    sim = build_sim(detection_mode="minimal", stale_threshold_minutes=5)
    sim.report("sensor.lux_fp2", "100")
    # Stop reporting for 60 minutes
    sim.advance(60 * 60)
    assert_eq(len(filter_actions(sim, "switch.turn_off")), 0, "stale should not fire in minimal mode")
    # But unavailable should still fire if entity goes unavailable
    sim.report("sensor.lux_fp2", "unavailable")
    sim.advance(35)
    assert_eq(len(filter_actions(sim, "switch.turn_off")), 1, "unavailable should still fire in minimal mode")
    return "PASS"


@register
def s06_active_window_blocks_stale():
    """Active window enabled, currently outside window. Stale should not fire."""
    sim = build_sim(
        detection_mode="responsive",
        stale_threshold_minutes=5,
        active_window_enabled=True,
        active_after="06:00:00",
        active_before="23:00:00",
    )
    sim.simulated_hour = 3  # 3 AM - outside window
    sim.report("sensor.lux_fp2", "100")
    sim.advance(60 * 10)  # 10 minutes pass without reports
    assert_eq(len(filter_actions(sim, "switch.turn_off")), 0, "stale should be blocked by active window")
    return "PASS"


@register
def s07_active_window_allows_stale():
    """Active window enabled, currently INSIDE window. Stale fires normally."""
    sim = build_sim(
        detection_mode="responsive",
        stale_threshold_minutes=5,
        active_window_enabled=True,
        active_after="06:00:00",
        active_before="23:00:00",
    )
    sim.simulated_hour = 14  # 2 PM - inside window
    sim.report("sensor.lux_fp2", "100")
    sim.advance(60 * 10)  # 10 minutes pass without reports
    assert_eq(len(filter_actions(sim, "switch.turn_off")), 1, "stale should fire inside active window")
    return "PASS"


@register
def s08_scheduled_reboot():
    """Scheduled reboot fires. Recovery cycle runs."""
    sim = build_sim(scheduled_reboot_enabled=True, scheduled_reboot_time="04:30:00")
    sim.fire_scheduled_reboot()
    assert_eq(len(filter_actions(sim, "switch.turn_off")), 1, "scheduled reboot should fire recovery")
    sim.advance(15)  # let cycle complete
    assert_eq(len(filter_actions(sim, "switch.turn_on")), 1, "switch should come back on")
    return "PASS"


@register
def s09_scheduled_reboot_disabled():
    """Scheduled reboot trigger disabled. Firing event does nothing."""
    sim = build_sim(scheduled_reboot_enabled=False)
    sim.fire_scheduled_reboot()
    assert_eq(len(filter_actions(sim, "switch.turn_off")), 0, "scheduled trigger disabled, no recovery")
    return "PASS"


@register
def s10_restart_guard_blocks_unavailable():
    """Restart guard active. Unavailable branch should skip recovery."""
    sim = build_sim(
        detection_mode="responsive",
        unavailable_timeout_seconds=30,
        restart_guard_sensor="sensor.restarting_status",
    )
    sim.restart_guard_active = True
    sim.report("sensor.lux_fp2", "unavailable")
    sim.advance(35)
    assert_eq(len(filter_actions(sim, "switch.turn_off")), 0, "unavailable should be blocked by restart guard")
    return "PASS"


@register
def s11_self_recovery():
    """Recovery switch goes off externally. Self-recovery fires after for: delay."""
    sim = build_sim(recovery_off_seconds=10)
    sim.switch_off()
    # Immediately after switch_off, no recovery action yet (for: delay running)
    immediate_ons = filter_actions(sim, "switch.turn_on")
    assert_eq(len(immediate_ons), 0, "self-recovery should NOT fire immediately")
    # After recovery_off_seconds + 30 = 40 seconds, the for: delay fires
    sim.advance(45)
    on_actions = filter_actions(sim, "switch.turn_on")
    assert_eq(len(on_actions), 1, "self-recovery should fire after for: delay")
    assert_eq(on_actions[0].payload.get("reason"), "self_recovery", "reason should be self_recovery")
    return "PASS"


@register
def s15_cycle_own_turn_off_no_self_recovery():
    """The recovery cycle's own turn_off must NOT trigger self-recovery.
    The for: delay on switch_off (recovery_off_seconds + 30) protects against this."""
    sim = build_sim(detection_mode="responsive", recovery_off_seconds=10)
    sim.report("sensor.lux_fp2", "unavailable")
    sim.advance(35)  # unavailable + recovery cycle starts; switch off
    # At this moment, switch is off due to cycle. The for: delay on switch_off
    # is ticking but recovery_off_seconds (10) is shorter than for: delay (40).
    sim.advance(15)  # complete the recovery cycle (turn on at +10)
    offs = filter_actions(sim, "switch.turn_off")
    ons = filter_actions(sim, "switch.turn_on")
    assert_eq(len(offs), 1, "exactly one turn_off from the cycle")
    assert_eq(len(ons), 1, "exactly one turn_on from the cycle (not self-recovery)")
    # Verify the turn_on was from the recovery cycle, not self-recovery
    assert_eq(ons[0].payload.get("reason") in ["unavailable", "stale", "scheduled"], True,
              "turn_on reason should be from recovery cycle")
    return "PASS"


@register
def s16_simultaneous_unavailable_no_duplicate_cycles():
    """Two monitored entities both go unavailable. Only ONE recovery cycle should run.
    Protected by the 'state of switch is on' condition on the recovery branches."""
    sim = build_sim(detection_mode="responsive", recovery_off_seconds=10)
    # Both entities go unavailable at the same moment
    sim.report("sensor.lux_fp2", "unavailable")
    sim.report("binary_sensor.presence_fp2", "unavailable")
    sim.advance(35)
    # The first unavailable trigger fires and starts the cycle (switch goes off).
    # The second unavailable trigger fires too, but the branch's
    # 'state: on' condition fails (switch is now off), skipping the second cycle.
    offs = filter_actions(sim, "switch.turn_off")
    assert_eq(len(offs), 1, f"expected 1 turn_off, got {len(offs)} (simultaneous-trigger debounce failed)")
    return "PASS"


@register
def s17_external_switch_off_during_cycle():
    """External switch-off during the recovery cycle's on-period.
    After cycle completes, switch is on. If user then turns it off, self-recovery should fire."""
    sim = build_sim(detection_mode="responsive", recovery_off_seconds=10)
    sim.report("sensor.lux_fp2", "unavailable")
    sim.advance(45)  # complete recovery cycle (off at 30, on at 40)
    # Switch is now on. User manually turns it off.
    sim.switch_off()
    sim.advance(45)  # let for: delay expire
    # Self-recovery should fire ONCE for the external off event
    ons = filter_actions(sim, "switch.turn_on")
    self_recovery_ons = [a for a in ons if a.payload.get("reason") == "self_recovery"]
    assert_eq(len(self_recovery_ons), 1, "external off should trigger self-recovery")
    return "PASS"


