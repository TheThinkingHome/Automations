# Sentinel Notify - a Home Assistant automation blueprint from The Thinking Home (xeazy.com)
#   Article: https://xeazy.com/battery-entity-sentinel-blueprints/
#
# Sentinel Notify is the notification companion to the Sentinel sensors. It does
# nothing on its own: it reads a Battery Sentinel or an Entity Sentinel and turns
# its rich output into change-aware notifications, by two independent streams:
#
#   THE ALERT (normal). Reads the source sensors' "devices" list and reports what is
#       flagged, low batteries with percentage, type, and area in Battery mode, or
#       entities gone quiet with reason and age in Entity mode. It fires only when
#       the flagged SET changes, judged by a sorted, md5-hashed fingerprint, so it
#       does not notify every cycle. Several sensors of one family combine into one
#       report, and a device reached by two overlapping sensors is de-duped to one
#       entry (offline wins over low, a genuinely-gone reason wins over frozen).
#   THE BROKEN-SENTINEL ALERT. A second, independent stream on its own card and its
#       own memory slot. It fires when a source Sentinel is itself not working,
#       setup_error, ok:false, or the sensor gone unavailable/unknown, so a silently
#       dead Sentinel cannot leave you thinking all is well. It rides alongside the
#       normal alert rather than suppressing it, so the healthy sensors still report.
#
# Scope: one Sentinel FAMILY per instance. Set the mode to Battery or Entity and
#   point it at sensors of that family; pointing at the wrong family is a setup
#   error. Several sensors of the chosen family combine into a single report. To
#   cover both families, build two copies, one in each mode, each with its OWN
#   memory helper (a shared helper cross-fires endless notifications).
#
# Triggering: event-driven, no polling. It re-evaluates at Home Assistant start, when
#   a watched sensor changes, at an optional daily reminder time, and at the optional
#   quiet-hours end time. The normal alert fires on a CHANGE; the daily reminder and
#   the quiet-hours end re-send whatever currently persists rather than a diff.
#
# DESIGN CHOICE (one family per instance): the change-detection engine works across
# families, but the wording, item shape, and sensible defaults differ enough between
# batteries (sparse, slow) and entities (dense, twitchy) that one instance per family
# keeps each configuration and its notifications clean.
#
# DESIGN CHOICE (memory): change-detection has to remember what was last reported
# across restarts. The only UI-creatable, restart-surviving store is an input_text
# (capped at 255 characters). That cap is not a constraint: the companion stores two
# md5 fingerprints (one for the alert, one for the broken-Sentinel state) plus a
# timestamp, as b={hash}|u={hash}|t={iso}. Hashing both before storage keeps the
# value short regardless of fleet size and means no device name or error text (and no
# stray delimiter) can land in the stored value and corrupt the parse. Persistent
# notifications cannot be read back from templates since HA 2023.6, and a shell or
# file store is too much to ask of a non-advanced user, so input_text is the store.
#
# DESIGN CHOICE (quiet hours and per-device priority): priority is set per device by
# which list it is in, high_priority_targets or normal_priority_targets. A HIGH target
# pierces quiet hours (pushed whenever something is flagged, day or night); a NORMAL
# target respects quiet hours (held during the window, then delivered at the end). The
# gate is one per-entry test, push if the entry is high OR we are outside quiet hours,
# so the two rules fall out of a single expression. Quiet hours never gates the
# persistent card or the memory write, so state tracking survives the night and the
# only thing held back is the sound on a normal-priority phone. The quiet-hours END
# time re-sends whatever currently persists to BOTH lists, sharing the daily reminder's
# "send the current set, not a diff" path: a high phone sees a refreshed card under the
# same tag, a normal phone gets the held report for the first time. The in_quiet_hours
# test compares the wall clock as a zero-padded HH:MM:SS string (which sorts
# chronologically), start-inclusive and end-exclusive, and treats a window whose start
# is later than its end as crossing midnight. A target in both lists is deduped to high.
#
# THE ACTION FLOW: documented here, in the header. Unlike the Sentinel sensors there
# is no single result: engine; the work is the variables block plus the action steps,
# which run top to bottom in this order:
#
#   1. Compute. The variables block builds setup_error/ok, the upstream (broken)
#      state, the flagged list, the de-duped list, the fingerprints, the previous
#      values read back from the memory helper, and in_quiet_hours.
#   2. Log the check (debug only), then stop if setup_error.
#   3. Decide. Work out battery_should_notify and upstream_should_notify (a change,
#      or a daily-reminder/quiet-end re-send), and whether memory needs writing.
#   4. Persist. Write both memory slots together when the content actually changed.
#      Not gated by quiet hours, so state tracking survives the night.
#   5. Broken-Sentinel stream. Raise its card and push it to the plan: high targets
#      always, normal targets only outside quiet hours. Dismiss the card once every
#      source is healthy again.
#   6. Normal stream. Dismiss the card when nothing is flagged (unless the optional
#      daily all-clear should show, in which case post the persistent "all clear" card
#      instead); otherwise raise the card and push it to the plan: high targets always,
#      normal targets only outside quiet hours.
#   7. Log the result (debug only).
#
# Changelog:
#   1.0.0-alpha.5 - Three features in one release.
#           (1) QUIET HOURS. An optional daily window during which NORMAL-priority pushes
#           are held; HIGH-priority pushes pierce the window and go through immediately.
#           Persistent notifications and the change-detection memory still update through
#           the window, so the UI card stays accurate and no state is lost. At the
#           quiet-hours END time the automation wakes and re-sends the CURRENT persisting
#           condition to BOTH lists (the same "what is flagged now" logic the daily reminder
#           uses, not a diff): a high target that already got the alert live sees a refreshed
#           card under the same tag, a normal target that was held gets it for the first time.
#           A problem raised overnight is delivered in the morning, one that self-cleared is
#           not, and a partially-cleared list reports only what remains. The window is
#           start-inclusive and end-exclusive and handles a window that crosses midnight.
#           Independent of the daily reminder; both can run. Off by default.
#           (2) PER-DEVICE PRIORITY. The single push-target list and the global priority
#           selector are replaced by two lists, high_priority_targets and
#           normal_priority_targets. Priority is now per device: a phone on the high list
#           gets high-priority pushes that pierce quiet hours, a phone on the normal list
#           gets normal-priority pushes that respect quiet hours. A target in both lists is
#           treated as high (pushed once). Both lists feed both alert streams (the normal
#           alert and the broken-Sentinel alert) at the device's own priority. The "low"
#           (silent) option is removed; the floor is now normal. This is a breaking input
#           change, acceptable because the blueprint is pre-release alpha. The
#           change-detection engine, memory format, dedup, and message builders are untouched.
#           (3) DAILY ALL-CLEAR. An optional persistent-only all-clear, off by default. On
#           the daily reminder, when nothing is flagged, it posts an "all clear" card under
#           the same tag, so a clean fleet shows reassurance rather than no card, and a card
#           left from an overnight alert is overwritten by the all-clear once things recover.
#           It never pushes to a phone, so there is no quiet-hours interaction and it cannot
#           wake anyone. It fires only on the daily reminder (not on a change, not at
#           quiet-hours end), requires the daily reminder and a persistent notification to be
#           on, and is worded per family.
#   1.0.0-alpha.4 - Cleanup, no behavior change. Removed two redundant if-true wrappers
#           that guarded each push action inside the repeat loops; continue_on_error on
#           the action already makes a dead target non-fatal, so the action is now called
#           directly. Fixed a stray double apostrophe in the memory-helper description
#           (other''s rendered literally in the folded description block; now reads other's).
#   1.0.0-alpha.3 - Fixed push targets. The selector previously offered the new notify
#           ENTITY (notify.your_phone), which cannot be called as an action and triggered
#           an "unknown action" error on real systems. It now takes the mobile_app notify
#           ACTION name (notify.mobile_app_your_phone) as text, the form that carries the
#           full priority/sound/Do-Not-Disturb payload this companion sends. The modern
#           notify.send_message action cannot carry that payload (message and title only),
#           so the per-action call is correct until Home Assistant's entity schema gains
#           rich-data support. Also dropped a now-meaningless per-target availability check
#           (a service name has no state); continue_on_error already makes a dead target
#           non-fatal. Found on live hardware; the simulation suite never exercised real
#           action dispatch.
#   1.0.0-alpha.2 - Added the ENTITY family. Entity mode reads one or more Entity Sentinel
#           sensors and reports the entities that have gone quiet, by name, with the reason
#           (unavailable, frozen, missing, never_reported) and how long since each last
#           reported, and the area. Title reads "Entity Sentinel: N entities gone quiet".
#           When two overlapping Entity Sentinels flag the same entity, a genuinely-gone
#           reason (unavailable, unknown, missing, never_reported) wins over frozen. The
#           change-detection engine, memory, dedup, and delivery are shared with Battery.
#           Also in this release: removed the minute-based check interval and the
#           elapsed-time re-remind; change-detection is now purely event-driven (re-evaluates
#           when a watched sensor changes, and at Home Assistant start, with no idle polling),
#           and an OPTIONAL daily reminder at a configurable time of day re-sends the current
#           report if anything is still flagged (and re-raises the broken-Sentinel card if a
#           source is still broken), reusing the same tag so it replaces any existing card in
#           place. Off by default.
#   1.0.0-alpha.1 - Initial build. Battery mode: reads one or more Battery Sentinel
#           sensors and reports low batteries (and optionally offline ones) by name
#           with percentage, battery type, and area; a binary low-battery sensor, which
#           has no percentage, is reported without one. Notifies ONLY when the flagged
#           set changes, using a sorted, md5-hashed fingerprint stored in one input_text
#           helper, so it does not notify every cycle; the sort makes it order
#           independent. A device reported by two overlapping-scope sensors is
#           de-duplicated to one entry, offline winning over low. A second, independent
#           change-detected stream raises a separate "Sentinel not working" alert (its
#           own tag) when a source Sentinel is in setup_error, reports ok:false, or goes
#           unavailable or unknown, without suppressing the battery alerts from the
#           healthy sensors. Memory is two hashed slots in one helper, stored as
#           b={hash}|u={hash}|t={iso}, so no error text or stray delimiter can corrupt
#           the stored value. Push to any number of mobile devices and/or a persistent
#           notification, tag-replaced in place; priority scales iOS interruption-level
#           and Android channel/importance/ttl. Loud setup errors for a wrong-family
#           sensor or a missing helper. (Entity mode was added in alpha.2.) Versioning from here: patch
#           alpha.N while iterating before any live testing; it graduates to 1.0.0-beta
#           once proven on hardware, then 1.0.0 stable.
blueprint:
  name: Sentinel Notify (Alpha)
  description: |
    # Sentinel Notify (Alpha)

    *Turns a Battery Sentinel or Entity Sentinel into smart, change-aware notifications.*

    A free blueprint from **The Thinking Home** at [xeazy.com](https://xeazy.com).

    - 📖 [Read the article](https://xeazy.com/battery-entity-sentinel-blueprints/) - the design and worked examples.
    - 📄 [Read the README](https://github.com/TheThinkingHome/Automations/blob/main/blueprints/automation/sentinel_notify.md) - setup, parameters, and the change-detection behavior.
    - 🔋 [Battery Sentinel](https://github.com/TheThinkingHome/Automations/blob/main/blueprints/template/battery_sentinel.md) - the sensor that counts low batteries.
    - 📡 [Entity Sentinel](https://github.com/TheThinkingHome/Automations/blob/main/blueprints/template/entity_sentinel.md) - the sensor that catches entities gone quiet.
    - 💬 [Discuss in the community](https://xeazy.com/logbook/) - the forum thread for these blueprints.
    - ⭐ [More blueprints](https://github.com/TheThinkingHome/Automations) - on GitHub.

    ---

    This is a COMPANION to the Sentinel sensor blueprints. It does nothing on its own: build a **Battery Sentinel** or **Entity Sentinel** first (each makes a sensor), then build this to notify from it. The two source blueprints are linked above.

    Reads the rich attributes a Sentinel exposes and notifies you about what is actually wrong, by name, with the detail, not just a count. It notifies only when the situation changes, so it does not flood you every cycle.

    ## How it works

    Set the mode to Battery or Entity and point it at sensors of that family. When a watched sensor changes, it builds a sorted fingerprint of what the Sentinel is flagging and compares it to what it last reported, stored in a required input_text helper. If the set changed, it sends a notification listing everything currently flagged; if not, it stays quiet. There is no polling; it reacts to the sensor. Several sensors of one family combine into a single report. The notification uses a tag, so even when it fires it replaces the previous one in place rather than stacking.

    An optional daily reminder, off by default, re-sends the current report at a time of day you set, but only if something is still flagged. It reuses the same tag, so it refreshes the existing card rather than stacking a new one. Use it as a once-a-day "this is still not fixed" nudge. An optional daily all-clear, also off by default, posts a persistent "all clear" card on that same daily run when nothing is flagged, so a clean fleet shows reassurance rather than no card. The all-clear is persistent only and never pushes to a phone.

    Optional quiet hours, off by default, hold phone pushes during a window you set, for example overnight. The persistent card still updates silently, so nothing is lost; only the push waits. At the end of the window the companion re-sends whatever is still flagged, so a problem raised overnight reaches you in the morning and one that already cleared does not.

    Send by push to two lists of mobile devices, a high-priority list and a normal-priority list, and/or as a persistent notification in the Home Assistant UI. Priority is per device: high-priority devices get an attention-grabbing alert that pierces quiet hours, normal-priority devices get standard delivery that respects quiet hours. A device in both lists is treated as high.

    This companion watches ONE family per instance. If you run both Sentinels, build two copies, one in each mode.

    An optional debug switch, off by default, writes one diagnostic line to the system log on each check, for use while setting it up.

    This is an alpha, under active development and not yet hardware-tested. It requires one input_text helper, which you create first and select below. See the README.

    License: GPL-3.0-or-later. Copyright (C) 2026 James Lander, The Thinking Home ([xeazy.com](https://xeazy.com)).

    1.0.0-alpha.5
  author: James Lander (xeazy.com)
  domain: automation
  homeassistant:
    min_version: 2024.10.0
  source_url: https://github.com/TheThinkingHome/Automations/blob/main/blueprints/automation/sentinel_notify.yaml
  input:
    mode_section:
      name: Mode
      icon: mdi:shape-outline
      description: Choose which Sentinel family this companion watches. One family per instance.
      input:
        family_mode:
          name: Sentinel family
          description: >-
            Battery watches Battery Sentinel sensors and reports low batteries.
            Entity watches Entity Sentinel sensors and reports entities that have
            gone quiet. Pick one. If you run both Sentinels, build two copies of
            this companion.
          default: battery
          selector:
            select:
              options:
                - label: Battery (report low batteries)
                  value: battery
                - label: Entity (report entities gone quiet)
                  value: entity

    source_section:
      name: Sensors to Watch
      icon: mdi:radar
      description: The Sentinel sensors this companion reads. Pick sensors of the family you chose above.
      input:
        source_sensors:
          name: Sentinel sensors
          description: >-
            One or more Sentinel sensors of the chosen family. Their flagged
            devices are combined into one list, so a single notification covers
            all of them. Pointing at the wrong family yields a setup error.
          selector:
            entity:
              filter:
                - domain: sensor
              multiple: true
        memory_helper:
          name: Memory helper (input_text)
          description: >-
            REQUIRED. An input_text helper this companion uses to remember what it
            last reported, so it only notifies on a change. Create one first
            (Settings, Devices & Services, Helpers, Create Helper, Text) and select
            it here. CRITICAL: every copy of this companion must have its OWN
            dedicated helper. Two copies sharing one helper will overwrite each
            other's memory and cross-fire endless notifications. One helper per copy.
          selector:
            entity:
              filter:
                - domain: input_text
              multiple: false

    battery_section:
      name: Battery Settings
      icon: mdi:battery-alert
      description: Fill this in only if the mode above is Battery. Ignored for Entity.
      collapsed: true
      input:
        battery_report_offline:
          name: Also report offline batteries
          description: >-
            When on, batteries that are currently unavailable or unknown (the
            sensor's unavailable_entities) are reported alongside the low ones. Off
            by default, so you hear only about low batteries.
          default: false
          selector:
            boolean: {}

    notify_section:
      name: Notification Targets and Style
      icon: mdi:bell-ring
      description: How and where to send. Shared by both families.
      input:
        high_priority_targets:
          name: High-priority push targets
          description: >-
            The mobile_app notify ACTIONS that should receive HIGH-priority pushes,
            one per line, each in the form notify.mobile_app_your_phone. High
            priority bypasses Do Not Disturb (an alarm sound on Android, a
            time-sensitive alert on iOS) AND pierces quiet hours: a high-priority
            target is pushed the moment something is flagged, day or night. Use the
            ACTION name (notify.mobile_app_...), NOT the notify entity
            (notify.your_phone): only the action carries the priority and sound
            options. Find the exact name in Settings, Developer tools, Actions,
            search mobile_app. Leave empty for no high-priority pushes.
          default: []
          selector:
            text:
              multiple: true
              multiline: false
        normal_priority_targets:
          name: Normal-priority push targets
          description: >-
            The mobile_app notify ACTIONS that should receive NORMAL-priority pushes,
            one per line, same notify.mobile_app_your_phone form. Normal priority is
            standard delivery AND respects quiet hours: a normal-priority target is
            held during the quiet window and receives whatever is still flagged when
            the window ends. A target listed in both lists is treated as high
            (pushed once, at high priority). Leave empty for no normal-priority pushes.
          default: []
          selector:
            text:
              multiple: true
              multiline: false
        persistent_enabled:
          name: Create a persistent notification
          description: >-
            When on, also creates or updates a persistent notification in the Home
            Assistant UI, replaced in place each time so it never stacks.
          default: true
          selector:
            boolean: {}
        notification_tag:
          name: Notification tag
          description: >-
            The tag used to replace this companion's push in place rather than
            stacking new ones. Leave the default unless you run several copies
            pushing to the same device, in which case give each a distinct tag.
          default: sentinel_notify
          selector:
            text: {}

    quiet_hours_section:
      name: Quiet Hours
      icon: mdi:sleep
      description: An optional daily window during which phone pushes are held back. The persistent card still updates, and at the end of the window anything still flagged is pushed. Off by default.
      collapsed: true
      input:
        quiet_hours_enabled:
          name: Enable quiet hours
          description: >-
            When on, phone pushes (both the normal alert and the broken-Sentinel
            alert) are held during the window below. The persistent notification
            still updates silently and the change-detection memory still tracks, so
            nothing is lost; only the push waits. At the end time the companion
            re-sends whatever is still flagged. When off, pushes go out as soon as
            something changes, at any hour.
          default: false
          selector:
            boolean: {}
        quiet_hours_start:
          name: Quiet hours start
          description: >-
            When the quiet window begins. For example 22:00:00 for 10 in the
            evening. A window whose start is later than its end is treated as
            crossing midnight.
          default: "22:00:00"
          selector:
            time: {}
        quiet_hours_end:
          name: Quiet hours end
          description: >-
            When the quiet window ends. At this time the companion wakes, re-checks,
            and pushes anything still flagged. For example 08:00:00 for 8 in the
            morning.
          default: "08:00:00"
          selector:
            time: {}

    reminder_section:
      name: Daily Reminder
      icon: mdi:calendar-clock
      description: An optional once-a-day nudge if something is still flagged. Off by default.
      collapsed: true
      input:
        daily_reminder_enabled:
          name: Enable the daily reminder
          description: >-
            When on, once a day at the time below the companion re-sends the
            current report if anything is still flagged (and re-raises the
            broken-Sentinel card if a source is still broken). It reuses the same
            tag, so it refreshes the existing card rather than stacking. When off,
            the companion only ever notifies on a change.
          default: false
          selector:
            boolean: {}
        daily_reminder_time:
          name: Reminder time
          description: >-
            The time of day the daily reminder fires, if enabled. For example
            08:00:00 for 8 in the morning.
          default: "08:00:00"
          selector:
            time: {}
        all_clear_enabled:
          name: Send a daily all-clear
          description: >-
            When on, the daily reminder also posts a persistent all-clear card when
            nothing is flagged, so a clean fleet shows "all clear" rather than no
            card at all. It is persistent only and never pushes to a phone, so it
            cannot wake you. It uses the same card as the alert, so an alert from
            overnight is overwritten by the all-clear when the fleet is clean again.
            Requires the daily reminder above to be on, and a persistent notification
            to be enabled. Off by default.
          default: false
          selector:
            boolean: {}

    advanced_section:
      name: Advanced
      icon: mdi:tune
      description: Diagnostics. Leave off for normal use.
      collapsed: true
      input:
        debug_enabled:
          name: Debug logging
          description: >-
            When on, writes one diagnostic line to the system log each check,
            carrying the version, mode, current fingerprint, and whether it
            notified. Requires a logger entry at info level to appear.
          default: false
          selector:
            boolean: {}

mode: single
max_exceeded: silent

variables:
  version: 1.0.0-alpha.5
  family_mode: !input family_mode
  source_sensors: !input source_sensors
  memory_helper: !input memory_helper
  battery_report_offline: !input battery_report_offline
  high_priority_targets: !input high_priority_targets
  normal_priority_targets: !input normal_priority_targets
  persistent_enabled: !input persistent_enabled
  notification_tag: !input notification_tag
  quiet_hours_enabled: !input quiet_hours_enabled
  quiet_hours_start: !input quiet_hours_start
  quiet_hours_end: !input quiet_hours_end
  daily_reminder_enabled: !input daily_reminder_enabled
  all_clear_enabled: !input all_clear_enabled
  debug_enabled: !input debug_enabled

  in_quiet_hours: >-
    {% if not quiet_hours_enabled %}
      {{ false }}
    {% else %}
      {% set n = now().strftime('%H:%M:%S') %}
      {% set s = quiet_hours_start %}
      {% set e = quiet_hours_end %}
      {% if s == e %}
        {{ false }}
      {% elif s < e %}
        {{ s <= n and n < e }}
      {% else %}
        {{ n >= s or n < e }}
      {% endif %}
    {% endif %}

  push_plan: >-
    {%- set ns = namespace(plan=[], seen=[]) -%}
    {%- for t in high_priority_targets -%}
      {%- if t not in ns.seen -%}
        {%- set ns.plan = ns.plan + [{'target': t, 'priority': 'high'}] -%}
        {%- set ns.seen = ns.seen + [t] -%}
      {%- endif -%}
    {%- endfor -%}
    {%- for t in normal_priority_targets -%}
      {%- if t not in ns.seen -%}
        {%- set ns.plan = ns.plan + [{'target': t, 'priority': 'normal'}] -%}
        {%- set ns.seen = ns.seen + [t] -%}
      {%- endif -%}
    {%- endfor -%}
    {{ ns.plan }}

  setup_error: >-
    {% set ns = namespace(err='') %}
    {% if source_sensors | length == 0 %}
      {% set ns.err = 'No source sensors selected. Pick one or more Sentinel sensors of the chosen family.' %}
    {% elif memory_helper in [none, ''] %}
      {% set ns.err = 'No memory helper selected. Create an input_text helper and select it.' %}
    {% else %}
      {% for s in source_sensors %}
        {% if states(s) not in ['unavailable', 'unknown'] and state_attr(s, 'devices') is none and state_attr(s, 'total_monitored') is none %}
          {% set ns.err = 'Sensor ' ~ s ~ ' does not look like a Sentinel sensor (no devices or total_monitored attribute). Check the sensor and the chosen family.' %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ ns.err }}

  ok: "{{ setup_error == '' }}"

  upstream_error: >-
    {% set ns = namespace(bad=[]) %}
    {% if ok %}
      {% for s in source_sensors %}
        {% if states(s) in ['unavailable', 'unknown'] %}
          {% set ns.bad = ns.bad + [s ~ ' is ' ~ states(s)] %}
        {% elif states(s) == 'setup_error' or state_attr(s, 'ok') == false %}
          {% set msg = state_attr(s, 'error') | default('') %}
          {% set ns.bad = ns.bad + [s ~ (': ' ~ msg if msg else ' reports a setup error')] %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ ns.bad | join(', ') }}

  upstream_broken: "{{ ok and upstream_error != '' }}"

  flagged_items: >-
    {% set ns = namespace(items=[]) %}
    {% if ok and family_mode == 'battery' %}
      {% for s in source_sensors %}
        {% for d in (state_attr(s, 'devices') or []) %}
          {% set ns.items = ns.items + [{
            'entity_id': d.entity_id,
            'name': d.name,
            'area': d.area,
            'level': d.level,
            'battery_type': d.battery_type | default(''),
            'reason': '',
            'age': '',
            'kind': 'low'
          }] %}
        {% endfor %}
        {% if battery_report_offline %}
          {% for u in (state_attr(s, 'unavailable_entities') or []) %}
            {% set ns.items = ns.items + [{
              'entity_id': u.entity_id,
              'name': u.name,
              'area': u.area,
              'level': none,
              'battery_type': '',
              'reason': '',
              'age': '',
              'kind': 'offline'
            }] %}
          {% endfor %}
        {% endif %}
      {% endfor %}
    {% elif ok and family_mode == 'entity' %}
      {% for s in source_sensors %}
        {% for d in (state_attr(s, 'devices') or []) %}
          {% set ns.items = ns.items + [{
            'entity_id': d.entity_id,
            'name': d.name,
            'area': d.area,
            'level': none,
            'battery_type': '',
            'reason': d.reason | default('unavailable'),
            'age': d.age | default(''),
            'kind': d.reason | default('unavailable')
          }] %}
        {% endfor %}
      {% endfor %}
    {% endif %}
    {{ ns.items }}

  flagged_items_unique: >-
    {% if family_mode == 'entity' %}
      {% set severe_reasons = ['unavailable', 'unknown', 'missing', 'never_reported'] %}
      {% set severe_ids = flagged_items | selectattr('kind', 'in', severe_reasons)
                          | map(attribute='entity_id') | list %}
    {% else %}
      {% set severe_ids = flagged_items | selectattr('kind', 'eq', 'offline')
                          | map(attribute='entity_id') | list %}
    {% endif %}
    {% set ns = namespace(items=[], seen=[]) %}
    {% for d in flagged_items %}
      {% if d.entity_id not in ns.seen %}
        {% set ns.seen = ns.seen + [d.entity_id] %}
        {% if family_mode == 'entity' %}
          {% if d.entity_id in severe_ids and d.kind not in ['unavailable', 'unknown', 'missing', 'never_reported'] %}
            {% set sev = (flagged_items | selectattr('entity_id', 'eq', d.entity_id)
                          | selectattr('kind', 'in', ['unavailable', 'unknown', 'missing', 'never_reported'])
                          | list | first) %}
            {% set ns.items = ns.items + [sev] %}
          {% else %}
            {% set ns.items = ns.items + [d] %}
          {% endif %}
        {% else %}
          {% if d.entity_id in severe_ids and d.kind != 'offline' %}
            {% set ns.items = ns.items + [{
              'entity_id': d.entity_id,
              'name': d.name,
              'area': d.area,
              'level': none,
              'battery_type': '',
              'reason': '',
              'age': '',
              'kind': 'offline'
            }] %}
          {% else %}
            {% set ns.items = ns.items + [d] %}
          {% endif %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ ns.items }}

  fingerprint_keys: >-
    {% set ns = namespace(keys=[]) %}
    {% for d in flagged_items_unique %}
      {% set ns.keys = ns.keys + [d.entity_id ~ '|' ~ d.kind] %}
    {% endfor %}
    {{ ns.keys | sort }}

  fingerprint_plain: "{{ fingerprint_keys | join(',') }}"

  fingerprint: "{{ fingerprint_plain | md5 if fingerprint_plain != '' else '' }}"
  upstream_fingerprint: "{{ upstream_error | md5 if upstream_error != '' else '' }}"

  stored_raw: "{{ states(memory_helper) }}"
  stored_parts: >-
    {% set ns = namespace(b='', u='', t='') %}
    {% for seg in stored_raw.split('|') %}
      {% if seg.startswith('b=') %}{% set ns.b = seg[2:] %}
      {% elif seg.startswith('u=') %}{% set ns.u = seg[2:] %}
      {% elif seg.startswith('t=') %}{% set ns.t = seg[2:] %}
      {% endif %}
    {% endfor %}
    {{ {'b': ns.b, 'u': ns.u, 't': ns.t} }}
  previous_fingerprint: "{{ stored_parts.b }}"
  previous_upstream: "{{ stored_parts.u }}"
  previous_notified_iso: "{{ stored_parts.t }}"

  stored_value: >-
    b={{ fingerprint }}|u={{ upstream_fingerprint }}|t={{ now().isoformat() }}

  changed: "{{ ok and (fingerprint | trim) != (previous_fingerprint | trim) }}"
  upstream_changed: "{{ ok and (upstream_fingerprint | trim) != (previous_upstream | trim) }}"

  flagged_count: "{{ flagged_items_unique | length }}"

  title: >-
    {% if family_mode == 'battery' %}
      Battery Sentinel: {{ flagged_count }} {{ 'battery' if flagged_count | int == 1 else 'batteries' }} to check
    {% elif family_mode == 'entity' %}
      Entity Sentinel: {{ flagged_count }} {{ 'entity' if flagged_count | int == 1 else 'entities' }} gone quiet
    {% else %}
      Sentinel report
    {% endif %}

  body: >-
    {% set lines = namespace(items=[]) %}
    {% for d in flagged_items_unique | sort(attribute='name') %}
      {% set nm = d.name | default('Unknown') %}
      {% set ar = d.area | default('') %}
      {% set suffix = (' - ' ~ ar) if ar not in [none, '', 'Unassigned'] else '' %}
      {% if family_mode == 'entity' %}
        {% set rs = d.reason | default('unavailable') %}
        {% set ag = d.age | default('') %}
        {% set detail = rs ~ ((', ' ~ ag) if ag not in [none, ''] else '') %}
        {% set line = nm ~ ' (' ~ detail ~ ')' ~ suffix %}
      {% else %}
        {% set lvl = d.level | default(none) %}
        {% set has_pct = lvl is not none and lvl not in ['unknown', 'unavailable', ''] and (lvl | string | float(none)) is not none %}
        {% if d.kind == 'offline' %}
          {% set line = nm ~ ' (offline)' ~ suffix %}
        {% elif not has_pct %}
          {% set line = nm ~ ' (low)' ~ suffix %}
        {% else %}
          {% set bt = d.battery_type | default('') %}
          {% set line = nm ~ ' (' ~ (lvl | float | round(0) | int) ~ '%' ~ ((', ' ~ bt) if bt else '') ~ ')' ~ suffix %}
        {% endif %}
      {% endif %}
      {% set lines.items = lines.items + [line] %}
    {% endfor %}
    {{ lines.items | join('\n') }}

trigger:
  - trigger: homeassistant
    event: start
    id: ha_start
    alias: Re-evaluate when Home Assistant starts
  - trigger: state
    entity_id: !input source_sensors
    id: source_change
    alias: Re-evaluate when a watched sensor changes
  - trigger: time
    at: !input daily_reminder_time
    id: daily_reminder
    alias: Daily reminder at the configured time
  - trigger: time
    at: !input quiet_hours_end
    id: quiet_hours_end
    alias: Quiet hours end, re-send anything still flagged

condition:
  - alias: For a source-sensor trigger, run only if the monitored content actually changed (ignore attribute-only churn like a refreshed evaluation timestamp). Other triggers always pass.
    condition: template
    value_template: >-
      {% if trigger.id != 'source_change'
            or trigger.from_state is none
            or trigger.to_state is none %}
        {{ true }}
      {% else %}
        {% set f = trigger.from_state %}
        {% set t = trigger.to_state %}
        {% set f_dev = f.attributes.get('devices', none) %}
        {% set t_dev = t.attributes.get('devices', none) %}
        {% set f_un = f.attributes.get('unavailable_entities', none) if battery_report_offline else none %}
        {% set t_un = t.attributes.get('unavailable_entities', none) if battery_report_offline else none %}
        {{ f.state != t.state or f_dev != t_dev or f_un != t_un }}
      {% endif %}

action:
  - alias: Log the check
    if:
      - condition: template
        value_template: "{{ debug_enabled }}"
    then:
      - action: system_log.write
        continue_on_error: true
        data:
          level: info
          logger: sentinel_notify
          message: >-
            Sentinel Notify v{{ version }} | mode: {{ family_mode }} | trigger: {{ trigger.id }} | ok: {{ ok }}{% if not ok %} | ERROR: {{ setup_error }}{% endif %} | flagged: {{ flagged_count }} | changed: {{ changed }} | quiet: {{ in_quiet_hours }} | fingerprint: {{ fingerprint | trim }} | previous: {{ previous_fingerprint | trim }}

  - alias: Stop if setup error
    if:
      - condition: template
        value_template: "{{ not ok }}"
    then:
      - stop: Setup error, see the debug log and the README.

  - alias: Work out what to notify this run
    variables:
      is_reminder: "{{ trigger.id == 'daily_reminder' and daily_reminder_enabled }}"
      is_quiet_end: "{{ trigger.id == 'quiet_hours_end' and quiet_hours_enabled }}"
      is_all_clear: "{{ trigger.id == 'daily_reminder' and daily_reminder_enabled and all_clear_enabled and flagged_count | int == 0 }}"
      battery_should_notify: "{{ changed or (is_reminder and flagged_count | int > 0) or (is_quiet_end and flagged_count | int > 0) }}"
      upstream_should_notify: "{{ upstream_changed or (is_reminder and upstream_broken) or (is_quiet_end and upstream_broken) }}"
      memory_needs_write: "{{ changed or upstream_changed }}"

  - alias: Persist both memory slots together when content actually changed
    if:
      - condition: template
        value_template: "{{ memory_needs_write }}"
    then:
      - action: input_text.set_value
        continue_on_error: true
        data:
          value: "{{ stored_value | trim }}"
        target:
          entity_id: !input memory_helper

  - alias: Broken-Sentinel notification, its own card, change-detected, does not block batteries
    if:
      - condition: template
        value_template: "{{ upstream_broken }}"
    then:
      - alias: Notify that a source Sentinel is not working
        if:
          - condition: template
            value_template: "{{ upstream_should_notify }}"
        then:
          - alias: Persistent card for the broken Sentinel
            if:
              - condition: template
                value_template: "{{ persistent_enabled }}"
            then:
              - action: persistent_notification.create
                continue_on_error: true
                data:
                  notification_id: "{{ notification_tag }}_upstream"
                  title: Sentinel not working
                  message: >-
                    A source Sentinel is reporting a problem and is not monitoring. Fix it, then this clears. Detail: {{ upstream_error }}
          - alias: Push for the broken Sentinel; high pierces quiet hours, normal waits
            if:
              - condition: template
                value_template: "{{ push_plan | length > 0 }}"
            then:
              - repeat:
                  for_each: "{{ push_plan }}"
                  sequence:
                    - alias: Push to this target only if high priority or outside quiet hours; continue_on_error makes a dead target non-fatal
                      if:
                        - condition: template
                          value_template: "{{ repeat.item.priority == 'high' or not in_quiet_hours }}"
                      then:
                        - action: "{{ repeat.item.target }}"
                          continue_on_error: true
                          data:
                            title: Sentinel not working
                            message: >-
                              A source Sentinel is reporting a problem and is not monitoring. Detail: {{ upstream_error }}
                            data:
                              tag: "{{ notification_tag }}_upstream"
                              priority: >-
                                {{ 'high' if repeat.item.priority == 'high' else 'normal' }}
                              ttl: >-
                                {{ 0 if repeat.item.priority == 'high' else 3600 }}
                              channel: >-
                                {{ 'alarm_stream' if repeat.item.priority == 'high' else 'default' }}
                              importance: >-
                                {{ 'high' if repeat.item.priority == 'high' else 'default' }}
                              push:
                                interruption-level: >-
                                  {{ 'time-sensitive' if repeat.item.priority == 'high' else 'active' }}

  - alias: Dismiss the broken-Sentinel card once all source Sentinels are healthy again
    if:
      - condition: template
        value_template: "{{ persistent_enabled and not upstream_broken }}"
    then:
      - action: persistent_notification.dismiss
        continue_on_error: true
        data:
          notification_id: "{{ notification_tag }}_upstream"

  - alias: Dismiss the battery card whenever nothing is flagged, unless the all-clear should show
    if:
      - condition: template
        value_template: "{{ persistent_enabled and flagged_count | int == 0 and not is_all_clear }}"
    then:
      - action: persistent_notification.dismiss
        continue_on_error: true
        data:
          notification_id: "{{ notification_tag }}"

  - alias: All-clear card on the daily reminder when the fleet is clean; persistent only, never pushes
    if:
      - condition: template
        value_template: "{{ persistent_enabled and is_all_clear }}"
    then:
      - action: persistent_notification.create
        continue_on_error: true
        data:
          notification_id: "{{ notification_tag }}"
          title: >-
            {% if family_mode == 'battery' %}Battery Sentinel: all clear{% elif family_mode == 'entity' %}Entity Sentinel: all clear{% else %}Sentinel: all clear{% endif %}
          message: >-
            {% if family_mode == 'battery' %}All monitored batteries OK.{% elif family_mode == 'entity' %}All monitored entities reporting.{% else %}All monitored entities OK.{% endif %}

  - alias: Battery notification, runs independently of any broken Sentinel
    if:
      - condition: template
        value_template: "{{ battery_should_notify }}"
    then:
      - alias: Create or update the persistent notification
        if:
          - condition: template
            value_template: "{{ persistent_enabled and flagged_count | int > 0 }}"
        then:
          - action: persistent_notification.create
            continue_on_error: true
            data:
              notification_id: "{{ notification_tag }}"
              title: "{{ title | trim }}"
              message: "{{ body }}"

      - alias: Push notifications; high pierces quiet hours, normal waits
        if:
          - condition: template
            value_template: "{{ push_plan | length > 0 and flagged_count | int > 0 }}"
        then:
          - repeat:
              for_each: "{{ push_plan }}"
              sequence:
                - alias: Push to this target only if high priority or outside quiet hours; continue_on_error makes a dead target non-fatal
                  if:
                    - condition: template
                      value_template: "{{ repeat.item.priority == 'high' or not in_quiet_hours }}"
                  then:
                    - action: "{{ repeat.item.target }}"
                      continue_on_error: true
                      data:
                        title: "{{ title | trim }}"
                        message: "{{ body }}"
                        data:
                          tag: "{{ notification_tag }}"
                          priority: >-
                            {{ 'high' if repeat.item.priority == 'high' else 'normal' }}
                          ttl: >-
                            {{ 0 if repeat.item.priority == 'high' else 3600 }}
                          channel: >-
                            {{ 'alarm_stream' if repeat.item.priority == 'high' else 'default' }}
                          importance: >-
                            {{ 'high' if repeat.item.priority == 'high' else 'default' }}
                          push:
                            interruption-level: >-
                              {{ 'time-sensitive' if repeat.item.priority == 'high' else 'active' }}

  - alias: Log the result
    if:
      - condition: template
        value_template: "{{ debug_enabled }}"
    then:
      - action: system_log.write
        continue_on_error: true
        data:
          level: info
          logger: sentinel_notify
          message: >-
            Sentinel Notify v{{ version }} | mode: {{ family_mode }} | trigger: {{ trigger.id }} | flagged: {{ flagged_count }} | battery_notify: {{ battery_should_notify }} | upstream_broken: {{ upstream_broken }} | upstream_notify: {{ upstream_should_notify }} | quiet: {{ in_quiet_hours }} | targets: {{ push_plan | length }} (high {{ high_priority_targets | length }}, normal {{ normal_priority_targets | length }})
