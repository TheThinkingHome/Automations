# Sentinel Notify - a Home Assistant automation blueprint from The Thinking Home (xeazy.com)
#   Article: https://xeazy.com/battery-entity-sentinel-blueprints/
#
# Changelog:
#   1.0.0-alpha.2 - Added the ENTITY family. Entity mode reads one or more Entity Sentinel
#           sensors and reports the entities that have gone quiet, by name, with the reason
#           (unavailable, frozen, missing, never_reported) and how long since each last
#           reported, and the area. Title reads "Entity Sentinel: N entities gone quiet".
#           When two overlapping Entity Sentinels flag the same entity, a genuinely-gone
#           reason (unavailable, unknown, missing, never_reported) wins over frozen. The
#           change-detection engine, memory, dedup, and delivery are shared with Battery.
#           Also in this release: removed the minute-based check interval and the
#           elapsed-time re-remind; change-detection is now purely event-driven (re-evaluates
#           when a watched sensor changes, and at Home Assistant start, with no idle polling),
#           and an OPTIONAL daily reminder at a configurable time of day re-sends the current
#           report if anything is still flagged (and re-raises the broken-Sentinel card if a
#           source is still broken), reusing the same tag so it replaces any existing card in
#           place. Off by default.
#   1.0.0-alpha.1 - Initial build. Battery mode: reads one or more Battery Sentinel
#           sensors and reports low batteries (and optionally offline ones) by name
#           with percentage, battery type, and area; a binary low-battery sensor, which
#           has no percentage, is reported without one. Notifies ONLY when the flagged
#           set changes, using a sorted, md5-hashed fingerprint stored in one input_text
#           helper, so it does not notify every cycle; the sort makes it order
#           independent. A device reported by two overlapping-scope sensors is
#           de-duplicated to one entry, offline winning over low. A second, independent
#           change-detected stream raises a separate "Sentinel not working" alert (its
#           own tag) when a source Sentinel is in setup_error, reports ok:false, or goes
#           unavailable or unknown, without suppressing the battery alerts from the
#           healthy sensors. Memory is two hashed slots in one helper, stored as
#           b={hash}|u={hash}|t={iso}, so no error text or stray delimiter can corrupt
#           the stored value. Push to any number of mobile devices and/or a persistent
#           notification, tag-replaced in place; priority scales iOS interruption-level
#           and Android channel/importance/ttl. Loud setup errors for a wrong-family
#           sensor or a missing helper. (Entity mode was added in alpha.2.) Versioning from here: patch
#           alpha.N while iterating before any live testing; it graduates to 1.0.0-beta
#           once proven on hardware, then 1.0.0 stable.
#
# Design note: this companion watches ONE Sentinel family per instance (a Battery
# or Entity mode). The change-detection engine works across families, but the
# wording, item shape, and sensible defaults differ enough between batteries
# (sparse, slow) and entities (dense, twitchy) that one instance per family keeps
# each configuration and its notifications clean. The Battery mode ships in this
# alpha; both the Battery and Entity modes are built and under test.
#
# Memory note: change-detection needs to remember what was last reported across
# restarts. The only UI-creatable, restart-surviving store is an input_text (capped
# at 255 characters). That cap is not a constraint: the companion stores two md5
# fingerprints, one for the battery report and one for the broken-Sentinel state,
# plus a timestamp, as b={hash}|u={hash}|t={iso}. Hashing both before storage keeps
# the value short regardless of fleet size and means no device name or error text
# (and no stray delimiter) can ever land in the stored value and corrupt the parse.
# Persistent notifications cannot be read back from templates since HA 2023.6, and a
# shell or file store is too much to ask of a non-advanced user, so input_text is
# the store.

blueprint:
  name: Sentinel Notify (Alpha)
  description: |
    # Sentinel Notify (Alpha)

    *Turns a Battery Sentinel or Entity Sentinel into smart, change-aware notifications.*

    A free blueprint from **The Thinking Home** at [xeazy.com](https://xeazy.com).

    - 📖 [Read the article](https://xeazy.com/battery-entity-sentinel-blueprints/) - the design and worked examples.
    - 📄 [Read the README](https://github.com/TheThinkingHome/Automations/blob/main/blueprints/automation/sentinel_notify.md) - setup, parameters, and the change-detection behavior.
    - 🔋 [Battery Sentinel](https://github.com/TheThinkingHome/Automations/blob/main/blueprints/template/battery_sentinel.md) - the sensor that counts low batteries.
    - 📡 [Entity Sentinel](https://github.com/TheThinkingHome/Automations/blob/main/blueprints/template/entity_sentinel.md) - the sensor that catches entities gone quiet.
    - 💬 [Discuss in the community](https://xeazy.com/logbook/) - the forum thread for these blueprints.
    - ⭐ [More blueprints](https://github.com/TheThinkingHome/Automations) - on GitHub.

    ---

    This is a COMPANION to the Sentinel sensor blueprints. It does nothing on its own: build a **Battery Sentinel** or **Entity Sentinel** first (each makes a sensor), then build this to notify from it. The two source blueprints are linked above.

    Reads the rich attributes a Sentinel exposes and notifies you about what is actually wrong, by name, with the detail, not just a count. It notifies only when the situation changes, so it does not flood you every cycle.

    ## How it works

    Set the mode to Battery or Entity and point it at sensors of that family. When a watched sensor changes, it builds a sorted fingerprint of what the Sentinel is flagging and compares it to what it last reported, stored in a required input_text helper. If the set changed, it sends a notification listing everything currently flagged; if not, it stays quiet. There is no polling; it reacts to the sensor. Several sensors of one family combine into a single report. The notification uses a tag, so even when it fires it replaces the previous one in place rather than stacking.

    An optional daily reminder, off by default, re-sends the current report at a time of day you set, but only if something is still flagged. It reuses the same tag, so it refreshes the existing card rather than stacking a new one. Use it as a once-a-day "this is still not fixed" nudge.

    Send by push to any number of mobile devices, and/or as a persistent notification in the Home Assistant UI. Priority controls sound and Do Not Disturb on push.

    This companion watches ONE family per instance. If you run both Sentinels, build two copies, one in each mode.

    An optional debug switch, off by default, writes one diagnostic line to the system log on each check, for use while setting it up.

    This is an alpha, under active development and not yet hardware-tested. It requires one input_text helper, which you create first and select below. See the README.

    License: GPL-3.0-or-later. Copyright (C) 2026 James Lander, The Thinking Home ([xeazy.com](https://xeazy.com)).

    1.0.0-alpha.2
  author: James Lander (xeazy.com)
  domain: automation
  homeassistant:
    min_version: 2024.10.0
  source_url: https://github.com/TheThinkingHome/Automations/blob/main/blueprints/automation/sentinel_notify.yaml
  input:
    mode_section:
      name: Mode
      icon: mdi:shape-outline
      description: Choose which Sentinel family this companion watches. One family per instance.
      input:
        family_mode:
          name: Sentinel family
          description: >-
            Battery watches Battery Sentinel sensors and reports low batteries.
            Entity watches Entity Sentinel sensors and reports entities that have
            gone quiet. Pick one. If you run both Sentinels, build two copies of
            this companion.
          default: battery
          selector:
            select:
              options:
                - label: Battery (report low batteries)
                  value: battery
                - label: Entity (report entities gone quiet)
                  value: entity

    source_section:
      name: Sensors to Watch
      icon: mdi:radar
      description: The Sentinel sensors this companion reads. Pick sensors of the family you chose above.
      input:
        source_sensors:
          name: Sentinel sensors
          description: >-
            One or more Sentinel sensors of the chosen family. Their flagged
            devices are combined into one list, so a single notification covers
            all of them. Pointing at the wrong family yields a setup error.
          selector:
            entity:
              filter:
                - domain: sensor
              multiple: true
        memory_helper:
          name: Memory helper (input_text)
          description: >-
            REQUIRED. An input_text helper this companion uses to remember what it
            last reported, so it only notifies on a change. Create one first
            (Settings, Devices & Services, Helpers, Create Helper, Text) and select
            it here. CRITICAL: every copy of this companion must have its OWN
            dedicated helper. Two copies sharing one helper will overwrite each
            other''s memory and cross-fire endless notifications. One helper per copy.
          selector:
            entity:
              filter:
                - domain: input_text
              multiple: false

    battery_section:
      name: Battery Settings
      icon: mdi:battery-alert
      description: Fill this in only if the mode above is Battery. Ignored for Entity.
      collapsed: true
      input:
        battery_report_offline:
          name: Also report offline batteries
          description: >-
            When on, batteries that are currently unavailable or unknown (the
            sensor's unavailable_entities) are reported alongside the low ones. Off
            by default, so you hear only about low batteries.
          default: false
          selector:
            boolean: {}

    notify_section:
      name: Notification Targets and Style
      icon: mdi:bell-ring
      description: How and where to send. Shared by both families.
      input:
        push_targets:
          name: Push notification targets
          description: >-
            The mobile_app notify targets to push to, as notify entities (for
            example notify.mobile_app_your_phone). Leave empty to send no push and
            rely on the persistent notification only.
          default: []
          selector:
            entity:
              filter:
                - integration: mobile_app
                  domain: notify
              multiple: true
        persistent_enabled:
          name: Create a persistent notification
          description: >-
            When on, also creates or updates a persistent notification in the Home
            Assistant UI, replaced in place each time so it never stacks.
          default: true
          selector:
            boolean: {}
        priority_level:
          name: Priority
          description: >-
            Controls sound and Do Not Disturb behavior on push. Normal is standard
            delivery. High bypasses DND with an alarm sound on Android and a
            time-sensitive alert on iOS. Low is silent.
          default: normal
          selector:
            select:
              options:
                - normal
                - high
                - low
        notification_tag:
          name: Notification tag
          description: >-
            The tag used to replace this companion's push in place rather than
            stacking new ones. Leave the default unless you run several copies
            pushing to the same device, in which case give each a distinct tag.
          default: sentinel_notify
          selector:
            text: {}

    reminder_section:
      name: Daily Reminder
      icon: mdi:calendar-clock
      description: An optional once-a-day nudge if something is still flagged. Off by default.
      collapsed: true
      input:
        daily_reminder_enabled:
          name: Enable the daily reminder
          description: >-
            When on, once a day at the time below the companion re-sends the
            current report if anything is still flagged (and re-raises the
            broken-Sentinel card if a source is still broken). It reuses the same
            tag, so it refreshes the existing card rather than stacking. When off,
            the companion only ever notifies on a change.
          default: false
          selector:
            boolean: {}
        daily_reminder_time:
          name: Reminder time
          description: >-
            The time of day the daily reminder fires, if enabled. For example
            08:00:00 for 8 in the morning.
          default: "08:00:00"
          selector:
            time: {}

    advanced_section:
      name: Advanced
      icon: mdi:tune
      description: Diagnostics. Leave off for normal use.
      collapsed: true
      input:
        debug_enabled:
          name: Debug logging
          description: >-
            When on, writes one diagnostic line to the system log each check,
            carrying the version, mode, current fingerprint, and whether it
            notified. Requires a logger entry at info level to appear.
          default: false
          selector:
            boolean: {}

mode: single
max_exceeded: silent

variables:
  version: 1.0.0-alpha.2
  family_mode: !input family_mode
  source_sensors: !input source_sensors
  memory_helper: !input memory_helper
  battery_report_offline: !input battery_report_offline
  push_targets: !input push_targets
  persistent_enabled: !input persistent_enabled
  priority_level: !input priority_level
  notification_tag: !input notification_tag
  daily_reminder_enabled: !input daily_reminder_enabled
  debug_enabled: !input debug_enabled

  setup_error: >-
    {% set ns = namespace(err='') %}
    {% if source_sensors | length == 0 %}
      {% set ns.err = 'No source sensors selected. Pick one or more Sentinel sensors of the chosen family.' %}
    {% elif memory_helper in [none, ''] %}
      {% set ns.err = 'No memory helper selected. Create an input_text helper and select it.' %}
    {% else %}
      {% for s in source_sensors %}
        {% if states(s) not in ['unavailable', 'unknown'] and state_attr(s, 'devices') is none and state_attr(s, 'total_monitored') is none %}
          {% set ns.err = 'Sensor ' ~ s ~ ' does not look like a Sentinel sensor (no devices or total_monitored attribute). Check the sensor and the chosen family.' %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ ns.err }}

  ok: "{{ setup_error == '' }}"

  upstream_error: >-
    {% set ns = namespace(bad=[]) %}
    {% if ok %}
      {% for s in source_sensors %}
        {% if states(s) in ['unavailable', 'unknown'] %}
          {% set ns.bad = ns.bad + [s ~ ' is ' ~ states(s)] %}
        {% elif states(s) == 'setup_error' or state_attr(s, 'ok') == false %}
          {% set msg = state_attr(s, 'error') | default('') %}
          {% set ns.bad = ns.bad + [s ~ (': ' ~ msg if msg else ' reports a setup error')] %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ ns.bad | join(', ') }}

  upstream_broken: "{{ ok and upstream_error != '' }}"

  flagged_items: >-
    {% set ns = namespace(items=[]) %}
    {% if ok and family_mode == 'battery' %}
      {% for s in source_sensors %}
        {% for d in (state_attr(s, 'devices') or []) %}
          {% set ns.items = ns.items + [{
            'entity_id': d.entity_id,
            'name': d.name,
            'area': d.area,
            'level': d.level,
            'battery_type': d.battery_type | default(''),
            'reason': '',
            'age': '',
            'kind': 'low'
          }] %}
        {% endfor %}
        {% if battery_report_offline %}
          {% for u in (state_attr(s, 'unavailable_entities') or []) %}
            {% set ns.items = ns.items + [{
              'entity_id': u.entity_id,
              'name': u.name,
              'area': u.area,
              'level': none,
              'battery_type': '',
              'reason': '',
              'age': '',
              'kind': 'offline'
            }] %}
          {% endfor %}
        {% endif %}
      {% endfor %}
    {% elif ok and family_mode == 'entity' %}
      {% for s in source_sensors %}
        {% for d in (state_attr(s, 'devices') or []) %}
          {% set ns.items = ns.items + [{
            'entity_id': d.entity_id,
            'name': d.name,
            'area': d.area,
            'level': none,
            'battery_type': '',
            'reason': d.reason | default('unavailable'),
            'age': d.age | default(''),
            'kind': d.reason | default('unavailable')
          }] %}
        {% endfor %}
      {% endfor %}
    {% endif %}
    {{ ns.items }}

  flagged_items_unique: >-
    {% if family_mode == 'entity' %}
      {% set severe_reasons = ['unavailable', 'unknown', 'missing', 'never_reported'] %}
      {% set severe_ids = flagged_items | selectattr('kind', 'in', severe_reasons)
                          | map(attribute='entity_id') | list %}
    {% else %}
      {% set severe_ids = flagged_items | selectattr('kind', 'eq', 'offline')
                          | map(attribute='entity_id') | list %}
    {% endif %}
    {% set ns = namespace(items=[], seen=[]) %}
    {% for d in flagged_items %}
      {% if d.entity_id not in ns.seen %}
        {% set ns.seen = ns.seen + [d.entity_id] %}
        {% if family_mode == 'entity' %}
          {% if d.entity_id in severe_ids and d.kind not in ['unavailable', 'unknown', 'missing', 'never_reported'] %}
            {% set sev = (flagged_items | selectattr('entity_id', 'eq', d.entity_id)
                          | selectattr('kind', 'in', ['unavailable', 'unknown', 'missing', 'never_reported'])
                          | list | first) %}
            {% set ns.items = ns.items + [sev] %}
          {% else %}
            {% set ns.items = ns.items + [d] %}
          {% endif %}
        {% else %}
          {% if d.entity_id in severe_ids and d.kind != 'offline' %}
            {% set ns.items = ns.items + [{
              'entity_id': d.entity_id,
              'name': d.name,
              'area': d.area,
              'level': none,
              'battery_type': '',
              'reason': '',
              'age': '',
              'kind': 'offline'
            }] %}
          {% else %}
            {% set ns.items = ns.items + [d] %}
          {% endif %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ ns.items }}

  fingerprint_keys: >-
    {% set ns = namespace(keys=[]) %}
    {% for d in flagged_items_unique %}
      {% set ns.keys = ns.keys + [d.entity_id ~ '|' ~ d.kind] %}
    {% endfor %}
    {{ ns.keys | sort }}

  fingerprint_plain: "{{ fingerprint_keys | join(',') }}"

  fingerprint: "{{ fingerprint_plain | md5 if fingerprint_plain != '' else '' }}"
  upstream_fingerprint: "{{ upstream_error | md5 if upstream_error != '' else '' }}"

  stored_raw: "{{ states(memory_helper) }}"
  stored_parts: >-
    {% set ns = namespace(b='', u='', t='') %}
    {% for seg in stored_raw.split('|') %}
      {% if seg.startswith('b=') %}{% set ns.b = seg[2:] %}
      {% elif seg.startswith('u=') %}{% set ns.u = seg[2:] %}
      {% elif seg.startswith('t=') %}{% set ns.t = seg[2:] %}
      {% endif %}
    {% endfor %}
    {{ {'b': ns.b, 'u': ns.u, 't': ns.t} }}
  previous_fingerprint: "{{ stored_parts.b }}"
  previous_upstream: "{{ stored_parts.u }}"
  previous_notified_iso: "{{ stored_parts.t }}"

  stored_value: >-
    b={{ fingerprint }}|u={{ upstream_fingerprint }}|t={{ now().isoformat() }}

  changed: "{{ ok and (fingerprint | trim) != (previous_fingerprint | trim) }}"
  upstream_changed: "{{ ok and (upstream_fingerprint | trim) != (previous_upstream | trim) }}"

  flagged_count: "{{ flagged_items_unique | length }}"

  title: >-
    {% if family_mode == 'battery' %}
      Battery Sentinel: {{ flagged_count }} {{ 'battery' if flagged_count | int == 1 else 'batteries' }} to check
    {% elif family_mode == 'entity' %}
      Entity Sentinel: {{ flagged_count }} {{ 'entity' if flagged_count | int == 1 else 'entities' }} gone quiet
    {% else %}
      Sentinel report
    {% endif %}

  body: >-
    {% set lines = namespace(items=[]) %}
    {% for d in flagged_items_unique | sort(attribute='name') %}
      {% set nm = d.name | default('Unknown') %}
      {% set ar = d.area | default('') %}
      {% set suffix = (' - ' ~ ar) if ar not in [none, '', 'Unassigned'] else '' %}
      {% if family_mode == 'entity' %}
        {% set rs = d.reason | default('unavailable') %}
        {% set ag = d.age | default('') %}
        {% set detail = rs ~ ((', ' ~ ag) if ag not in [none, ''] else '') %}
        {% set line = nm ~ ' (' ~ detail ~ ')' ~ suffix %}
      {% else %}
        {% set lvl = d.level | default(none) %}
        {% set has_pct = lvl is not none and lvl not in ['unknown', 'unavailable', ''] and (lvl | string | float(none)) is not none %}
        {% if d.kind == 'offline' %}
          {% set line = nm ~ ' (offline)' ~ suffix %}
        {% elif not has_pct %}
          {% set line = nm ~ ' (low)' ~ suffix %}
        {% else %}
          {% set bt = d.battery_type | default('') %}
          {% set line = nm ~ ' (' ~ (lvl | float | round(0) | int) ~ '%' ~ ((', ' ~ bt) if bt else '') ~ ')' ~ suffix %}
        {% endif %}
      {% endif %}
      {% set lines.items = lines.items + [line] %}
    {% endfor %}
    {{ lines.items | join('\n') }}

trigger:
  - trigger: homeassistant
    event: start
    id: ha_start
    alias: Re-evaluate when Home Assistant starts
  - trigger: state
    entity_id: !input source_sensors
    id: source_change
    alias: Re-evaluate when a watched sensor changes
  - trigger: time
    at: !input daily_reminder_time
    id: daily_reminder
    alias: Daily reminder at the configured time

condition:
  - alias: For a source-sensor trigger, run only if the monitored content actually changed (ignore attribute-only churn like a refreshed evaluation timestamp). Other triggers always pass.
    condition: template
    value_template: >-
      {% if trigger.id != 'source_change'
            or trigger.from_state is none
            or trigger.to_state is none %}
        {{ true }}
      {% else %}
        {% set f = trigger.from_state %}
        {% set t = trigger.to_state %}
        {% set f_dev = f.attributes.get('devices', none) %}
        {% set t_dev = t.attributes.get('devices', none) %}
        {% set f_un = f.attributes.get('unavailable_entities', none) if battery_report_offline else none %}
        {% set t_un = t.attributes.get('unavailable_entities', none) if battery_report_offline else none %}
        {{ f.state != t.state or f_dev != t_dev or f_un != t_un }}
      {% endif %}

action:
  - alias: Log the check
    if:
      - condition: template
        value_template: "{{ debug_enabled }}"
    then:
      - action: system_log.write
        continue_on_error: true
        data:
          level: info
          logger: sentinel_notify
          message: >-
            Sentinel Notify v{{ version }} | mode: {{ family_mode }} | trigger: {{ trigger.id }} | ok: {{ ok }}{% if not ok %} | ERROR: {{ setup_error }}{% endif %} | flagged: {{ flagged_count }} | changed: {{ changed }} | fingerprint: {{ fingerprint | trim }} | previous: {{ previous_fingerprint | trim }}

  - alias: Stop if setup error
    if:
      - condition: template
        value_template: "{{ not ok }}"
    then:
      - stop: Setup error, see the debug log and the README.

  - alias: Work out what to notify this run
    variables:
      is_reminder: "{{ trigger.id == 'daily_reminder' and daily_reminder_enabled }}"
      battery_should_notify: "{{ changed or (is_reminder and flagged_count | int > 0) }}"
      upstream_should_notify: "{{ upstream_changed or (is_reminder and upstream_broken) }}"
      memory_needs_write: "{{ changed or upstream_changed }}"

  - alias: Persist both memory slots together when content actually changed
    if:
      - condition: template
        value_template: "{{ memory_needs_write }}"
    then:
      - action: input_text.set_value
        continue_on_error: true
        data:
          value: "{{ stored_value | trim }}"
        target:
          entity_id: !input memory_helper

  - alias: Broken-Sentinel notification, its own card, change-detected, does not block batteries
    if:
      - condition: template
        value_template: "{{ upstream_broken }}"
    then:
      - alias: Notify that a source Sentinel is not working
        if:
          - condition: template
            value_template: "{{ upstream_should_notify }}"
        then:
          - alias: Persistent card for the broken Sentinel
            if:
              - condition: template
                value_template: "{{ persistent_enabled }}"
            then:
              - action: persistent_notification.create
                continue_on_error: true
                data:
                  notification_id: "{{ notification_tag }}_upstream"
                  title: Sentinel not working
                  message: >-
                    A source Sentinel is reporting a problem and is not monitoring. Fix it, then this clears. Detail: {{ upstream_error }}
          - alias: Push for the broken Sentinel
            if:
              - condition: template
                value_template: "{{ push_targets | length > 0 }}"
            then:
              - repeat:
                  for_each: "{{ push_targets }}"
                  sequence:
                    - alias: Push to this target unless it is unavailable
                      if:
                        - condition: template
                          value_template: "{{ states(repeat.item) != 'unavailable' }}"
                      then:
                        - action: "{{ repeat.item }}"
                          continue_on_error: true
                          data:
                            title: Sentinel not working
                            message: >-
                              A source Sentinel is reporting a problem and is not monitoring. Detail: {{ upstream_error }}
                            data:
                              tag: "{{ notification_tag }}_upstream"
                              priority: >-
                                {{ 'high' if priority_level == 'high' else 'normal' }}
                              ttl: >-
                                {{ 0 if priority_level == 'high' else 3600 }}
                              channel: >-
                                {{ 'alarm_stream' if priority_level == 'high' else ('low_priority' if priority_level == 'low' else 'default') }}
                              importance: >-
                                {{ 'high' if priority_level == 'high' else ('min' if priority_level == 'low' else 'default') }}
                              push:
                                interruption-level: >-
                                  {{ 'time-sensitive' if priority_level == 'high' else ('passive' if priority_level == 'low' else 'active') }}

  - alias: Dismiss the broken-Sentinel card once all source Sentinels are healthy again
    if:
      - condition: template
        value_template: "{{ persistent_enabled and not upstream_broken }}"
    then:
      - action: persistent_notification.dismiss
        continue_on_error: true
        data:
          notification_id: "{{ notification_tag }}_upstream"

  - alias: Dismiss the battery card whenever nothing is flagged
    if:
      - condition: template
        value_template: "{{ persistent_enabled and flagged_count | int == 0 }}"
    then:
      - action: persistent_notification.dismiss
        continue_on_error: true
        data:
          notification_id: "{{ notification_tag }}"

  - alias: Battery notification, runs independently of any broken Sentinel
    if:
      - condition: template
        value_template: "{{ battery_should_notify }}"
    then:
      - alias: Create or update the persistent notification
        if:
          - condition: template
            value_template: "{{ persistent_enabled and flagged_count | int > 0 }}"
        then:
          - action: persistent_notification.create
            continue_on_error: true
            data:
              notification_id: "{{ notification_tag }}"
              title: "{{ title | trim }}"
              message: "{{ body }}"

      - alias: Push notifications
        if:
          - condition: template
            value_template: "{{ push_targets | length > 0 and flagged_count | int > 0 }}"
        then:
          - repeat:
              for_each: "{{ push_targets }}"
              sequence:
                - alias: Push to this target unless it is unavailable
                  if:
                    - condition: template
                      value_template: "{{ states(repeat.item) != 'unavailable' }}"
                  then:
                    - action: "{{ repeat.item }}"
                      continue_on_error: true
                      data:
                        title: "{{ title | trim }}"
                        message: "{{ body }}"
                        data:
                          tag: "{{ notification_tag }}"
                          priority: >-
                            {{ 'high' if priority_level == 'high' else 'normal' }}
                          ttl: >-
                            {{ 0 if priority_level == 'high' else 3600 }}
                          channel: >-
                            {{ 'alarm_stream' if priority_level == 'high' else ('low_priority' if priority_level == 'low' else 'default') }}
                          importance: >-
                            {{ 'high' if priority_level == 'high' else ('min' if priority_level == 'low' else 'default') }}
                          push:
                            interruption-level: >-
                              {{ 'time-sensitive' if priority_level == 'high' else ('passive' if priority_level == 'low' else 'active') }}

  - alias: Log the result
    if:
      - condition: template
        value_template: "{{ debug_enabled }}"
    then:
      - action: system_log.write
        continue_on_error: true
        data:
          level: info
          logger: sentinel_notify
          message: >-
            Sentinel Notify v{{ version }} | mode: {{ family_mode }} | trigger: {{ trigger.id }} | flagged: {{ flagged_count }} | battery_notify: {{ battery_should_notify }} | upstream_broken: {{ upstream_broken }} | upstream_notify: {{ upstream_should_notify }} | pushed: {{ push_targets | length }}
