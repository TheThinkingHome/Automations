# Sentinel Notify - a Home Assistant automation blueprint from The Thinking Home (xeazy.com)
#   Article: https://xeazy.com/battery-entity-sentinel-blueprints/
#
# THIS IS THE 2.0 DEVELOPMENT LINE. The stable 1.x release is frozen at
#   sentinel_notify_1.0.0a7.2.yaml / .md in this folder. Use that one for daily
#   operation until this line graduates.
#
# Sentinel Notify is the notification companion to the Sentinel sensors. It does
# nothing on its own: it reads a Battery Sentinel or an Entity Sentinel and turns
# its rich output into change-aware notifications, by two independent streams:
#
#   THE ALERT (normal). Reads the source sensors' "devices" list, keeps one to-do
#       item per flagged entity on a dedicated Local To-do list, and notifies about
#       what is NEW: an entity or battery just added, or an existing incident whose
#       reason changed. Known items stay quiet. Several sensors of one family
#       combine into one list, and a device reached by two overlapping sensors is
#       de-duped to one entry (offline wins over low, a genuinely-gone reason wins
#       over frozen).
#   THE BROKEN-SENTINEL ALERT. A second, independent stream on its own card and its
#       own memory slot. It fires when a source Sentinel is itself not working,
#       setup_error, ok:false, or the sensor gone unavailable/unknown, so a silently
#       dead Sentinel cannot leave you thinking all is well. It rides alongside the
#       normal alert rather than suppressing it, so the healthy sensors still report.
#
# Scope: one Sentinel FAMILY per instance. Set the mode to Battery or Entity and
#   point it at sensors of that family; pointing at the wrong family is a setup
#   error. Several sensors of the chosen family combine into a single list. To
#   cover both families, build two copies, one in each mode, each with its OWN
#   to-do list and its OWN input_text helper (shared stores cross-fire).
#
# Triggering: event-driven, no polling. It re-evaluates at Home Assistant start, when
#   a watched sensor changes, when a watched sensor has been unavailable for the full
#   debounce (a dedicated for: trigger, so a dead source is reported on time rather
#   than at the next unrelated event), and at the optional daily reminder time. The
#   normal alert fires on an ADDITION; the daily reminder sends the current open set,
#   not a diff, according to its mode.
#
# DESIGN CHOICE (to-do list as memory, the 2.0 rebuild): the 1.x engine remembered
# what it last reported as an md5 hash in an input_text helper, forced there by the
# helper's 255-character cap. A hash answers one question, did the set change, and
# nothing else. 2.0 stores the actual items: one to-do item per flagged entity on a
# dedicated Local To-do list. The list survives restarts, has no practical size
# limit, and doubles as the report itself, a shopping list for batteries, an outage
# board for entities, visible in any to-do card and in the companion app. Its state
# is the count of open items, so a badge can key on it directly. Templates cannot
# read to-do items, so the memory read is a todo.get_items service call with a
# response variable, and the whole diff runs in action-level variables after it. The
# item schema: the SUMMARY is the human line ("Front Door (14%, CR2450) - Entry");
# the DESCRIPTION carries the machine identity as sn:{entity_id}|{kind}|{iso}, so
# matching survives a user editing the summary; the DUE date is the detection time,
# so the list shows age natively. Items whose description does not start with sn:
# are not the companion's and are never touched, so a user may keep their own notes
# on the same list, though a dedicated list is strongly recommended. The input_text
# helper REMAINS, smaller: it holds only the broken-Sentinel fingerprint and the
# quiet-hours held flag, and the last reminder-delivery date, as
# u={hash}|h={0|1}|r={date}|t={iso}. A 1.x helper value with a
# leading b= segment parses cleanly; the b= slot is simply ignored.
#
# DESIGN CHOICE (addition-only gate): the 1.x engine notified when the SET changed,
# which meant a shrink (a recovery, or a source refill during startup) re-announced
# everything that remained. 2.0 notifies only when something is ADDED: a brand-new
# entity, or a known open item whose reason changed (frozen escalating to
# unavailable is new information about an existing incident). A recovery deletes
# the item silently; the list and the persistent card tell that story, and the
# daily summary confirms the clean state. This single rule neutralizes the
# staggered-refill false alarms around reboots at the engine level, on top of the
# settle and blip holds inherited from 1.x, and it is what the raw memory makes
# possible: the engine does true subset math instead of comparing opaque hashes.
#
# DESIGN CHOICE (the checkbox is an acknowledgment): the companion never completes
# an item itself, so a completed sn: item can mean only one thing, the user checked
# it off. An acknowledged item: still counts as KNOWN to change detection, so it
# never re-notifies; is excluded from the daily summary and the persistent card's
# open list; has its text kept current silently (a reason or percentage change
# updates the item without a notification); and re-arms by itself, because when the
# entity recovers its item is deleted like any other, so a LATER failure is a
# brand-new addition that notifies, a genuinely new incident. Deleting an item by
# hand while the problem persists un-acknowledges it: the next run re-adds it and
# notifies. The companion owns the text of its items; a hand-edited summary is
# rewritten on the item's next update.
#
# DESIGN CHOICE (recovery deletes, never completes): the checkmark belongs to the
# user, so the machine must not also use it to mean recovered, one symbol, one
# meaning. A recovered entity's item is removed outright and the list stays a clean
# picture of what is wrong right now. ACCEPTED LIMIT, carried from 1.x: a source
# outage LONGER than the debounce drops that source's items as recoveries, so its
# return re-adds and re-notifies them; distinguishing that needs per-source
# bookkeeping and is deferred.
#
# DESIGN CHOICE (broken-Sentinel debounce): a source Sentinel goes unavailable for a
# minute or two during any Home Assistant restart, as the template entity is unloaded
# and reloaded. A source is reported broken solely when it has been unavailable for at
# least upstream_debounce_seconds (default 240), measured from the source's own
# last_changed. A restart recovers well inside that window and never fires; a
# genuinely dead source stays unavailable past it and fires correctly, ON TIME,
# because a dedicated state trigger (to unavailable/unknown, for: the same debounce)
# wakes the run at the exact expiry. setup_error and ok:false are NOT debounced, they
# are persistent misconfigurations a reboot neither causes nor cures, and fire at
# once. A truly missing source (states[s] is none) is long-gone and flags immediately.
#
# DESIGN CHOICE (settle hold and blip hold): inside their startup grace after a
# reboot, the source Sentinels report an empty flagged list; trusting it would
# delete every item as a recovery and re-add the lot minutes later as new,
# notifying. So a run is HELD, no list change, no memory write, no notification,
# while any source's boot_time is within upstream_debounce_seconds of now (the
# settle hold), and likewise while any source is unavailable/unknown but still
# INSIDE the debounce (the blip hold, judged live after the optional refresh, for
# mid-day outages that do not move boot_time). Past the debounce a source is
# declared broken and the run proceeds with the healthy sources, so a dead monitor
# never silences the working ones.
#
# DESIGN CHOICE (optional active source refresh): when a source reads unavailable
# INSIDE the debounce (a blip, a recovery candidate), the companion can press that
# source's own refresh button (the same input_button the Sentinel sensors expose) to
# make the sources re-evaluate at once, then wait, bounded by source_refresh_timeout
# (default 15), ending the instant every source is healthy. A source already broken
# past the debounce is never pressed or waited for, so a permanently dead source
# cannot tax every future run. Left unset, nothing is pressed and the debounce alone
# handles restarts. After the wait the broken-Sentinel decision and the blip state
# are recomputed LIVE, since top-level variables are frozen at trigger time.
#
# DESIGN CHOICE (quiet hours and per-device priority): priority is per device by
# list, high_priority_targets or normal_priority_targets. A HIGH target pierces
# quiet hours; a NORMAL target is held during the window. The gate is one per-entry
# test, push if the entry is high OR outside quiet hours OR this run is the daily
# reminder. Quiet hours never gates the list maintenance, the persistent card, or
# the helper write, so state tracking survives the night; only the normal-priority
# push waits. Delivery of a change held overnight is the daily reminder's OVERNIGHT
# mode, driven by the held flag: h=1 written when an addition fires inside quiet
# hours, h=0 when one is delivered live, cleared by the overnight reminder run. All
# held-flag comparisons pass through | string (HA renders 0/1 natively as integers).
# The in_quiet_hours test compares the wall clock as a zero-padded HH:MM:SS string,
# start-inclusive, end-exclusive, midnight-crossing when start > end.
#
# DESIGN CHOICE (the reminder is a DUTY, not a trigger): the scheduled time trigger
# is only a wake-up. Whether the daily send is owed is computed on EVERY run: the
# mode is active, the configured time has passed today, and the helper's r= slot
# shows no delivery today. Whichever run first finds the duty owed performs it and
# records the date. This exists because the reminder time can land on the same
# instant as a sensor's scan tick (the 08:00 default sits exactly on the common
# /30 scan grid); under mode: single one of the two colliding triggers is silently
# dropped, and in the trigger-identity design a dropped reminder trigger LOST the
# delivery (seen live 2026-07-04). Under the duty design the colliding run itself
# carries the send in the same instant, any reminder time is valid, and a reminder
# missed because Home Assistant was rebooting at that moment is caught up by the
# next run instead of lost. A run held by the settle or blip hold does not record
# the date, so the duty survives holds too. Delivery is exactly once per day.
#
# DESIGN CHOICE (daily reminder modes): one scheduled send, three modes. NONE
# (default): nothing scheduled fires. OVERNIGHT CHANGES: a true summary of the
# quiet window. It fires only when an addition occurred during the window (the
# held flag) and lists ONLY the open items whose own detection time, read from
# each item's description, falls inside the just-ended window, so a week-old
# known problem never rides along in a morning summary. Silent after a quiet
# night, and silent when the overnight arrivals self-cleared or were acknowledged
# before morning; degrades to none when quiet hours is off. If the duty run also
# carries a brand-new addition of its own, the two merge into ONE push (the
# overnight body plus the new arrivals, deduped) rather than racing for the tag.
# DAILY SUMMARY: fires every day; the open set when something needs attention, or
# an all-clear when nothing is flagged at all, as a persistent card plus a push to
# HIGH-priority targets only at normal delivery settings. When every remaining
# item is acknowledged, the daily run stays silent rather than claiming all
# clear: acknowledged is not fixed. In every mode the reminder is exempt from the
# quiet-hours gate and re-raises the broken-Sentinel alert if a source is still
# broken.
#
# THE ACTION FLOW, top to bottom:
#   1. Compute. Top-level variables: setup_error/ok (sources, helper, to-do list),
#      the debounced upstream state, the blip state, the flagged list, the de-duped
#      list, the rendered report lines, the helper parse (u, h), in_quiet_hours.
#   2. Log the check (debug only), then stop if setup_error.
#   3. Settle hold (reboot) if a source's boot_time is inside the debounce.
#   4. Active refresh (optional), only for a blipping source with a button set.
#   5. Recompute the upstream decision and blip state LIVE; blip hold if a source is
#      still blipping.
#   6. Read the to-do memory: todo.get_items, both open and completed.
#   7. Diff. Parse sn: items; compute additions, reason changes (notify), silent
#      updates (acknowledged changes, stale text), recoveries, the open report, and
#      the notification titles and bodies.
#   8. Apply. Add new items, update changed ones, remove recovered ones. Foreign
#      items untouched. Not gated by quiet hours.
#   9. Decide. Whether the daily-send duty is owed (computed every run, recorded
#      in the helper once performed), the overnight window diff, the all-clear,
#      what to push (a duty run with live additions merges into one push), the
#      new held flag, and whether the helper needs writing. Persist the helper.
#  10. Broken-Sentinel stream: card and pushes, change-detected, then dismiss when
#      healthy.
#  11. Normal stream: dismiss the card when nothing is open (unless the all-clear
#      shows), post the all-clear on the clean daily run, update the report card,
#      push what step 9 decided: high always, normal outside quiet hours or on a
#      reminder run.
#  12. Log the result (debug only).
#
# Changelog:
#   2.0.0-alpha.9.2 - THE RELOAD GUARD, from a live failure on 2026-07-04: during
#           an HA Core restart plus template reload, the source sensors passed
#           through an attribute-less instant; the settle gate, reading boot_time
#           and finding nothing, concluded no reboot was in progress, the blip
#           path's own refresh press then woke the freshly recreated sensors into
#           their startup grace, and their honest grace-empty answers deleted
#           every item as a recovery. Three holds close the hole independently:
#           (1) CONSERVATIVE SETTLE EVIDENCE, a listed source that looks alive but
#           whose boot_time cannot be read counts as settling (unknown means
#           assume rebooting); sources that are unavailable, in setup_error, or
#           ok:false are exempt so the blip and broken-Sentinel paths still own
#           them and a broken source still alerts. (2) LIVE SETTLE RECHECK, the
#           post-refresh live recompute now re-judges the settle state alongside
#           the blip state, so a run that pressed the refresh button and woke
#           grace-fresh sensors holds instead of trusting their empty answers.
#           (3) POST-UNAVAILABLE HOLD, a run fired by a source transitioning FROM
#           unavailable or unknown is held outright; the source's next contentful
#           evaluation on its own settled cycle acts instead. Net effect: after
#           any reload, restart, or blip, the engine waits out the sources' grace,
#           at most one debounce, before believing anything. A recovery that
#           arrives as a from-unavailable transition is now acted on one
#           evaluation later than before, a deliberate trade. No input changes.
#   2.0.0-alpha.9.1 - Form reorganization only; the engine is untouched and no
#           input keys changed, so existing automations are unaffected. The
#           one-input Mode section and the collapsed Battery Settings section
#           (which existed to hold a single battery-only toggle, hidden from
#           Battery users and dead weight for Entity users) are dissolved: Mode,
#           the sensors, the to-do list, the helper, and the battery-only
#           offline toggle now form one section, "Mode, Sensors, and Memory",
#           the complete "what this copy is" in one card. The notification tag
#           moved to Advanced, where its only real audience (multi-copy users
#           pushing to one device) lives. Heavy input descriptions trimmed
#           roughly a third with no load-bearing fact removed; the
#           action-name-versus-entity rule is stated once and referenced.
#   2.0.0-alpha.9 - THE RELIABLE REMINDER. Two fixes from the first live morning.
#           (1) REMINDER AS A DUTY. The reminder was identified by its time
#           trigger; when that trigger landed on the same instant as a sensor scan
#           tick (the 08:00 default sits exactly on the common /30 grid), mode:
#           single silently dropped it and the delivery was lost (seen live
#           2026-07-04, survived only because nothing was held that night). The
#           duty is now computed on every run: mode active, time passed today, no
#           delivery recorded today in the helper's new r= slot; whichever run
#           first finds it owed performs it and records the date. Collisions
#           deliver in the same instant, any reminder time is valid on or off the
#           scan grid, and a reminder missed during a reboot is caught up by the
#           next run. Helper format is now u={hash}|h={0|1}|r={date}|t={iso}; an
#           older value parses as never-delivered, no manual reset needed.
#           (2) TRUE OVERNIGHT SUMMARY. The overnight mode previously sent the
#           full current open set, a compromise from the 1.x hash memory that
#           could not know which items were new; a week-old known problem rode
#           along in every morning delivery. The raw item memory now makes the
#           honest body possible: only the open items whose own detection time
#           falls inside the just-ended quiet window are listed, with the window
#           computed from the quiet-hours inputs and midnight crossing handled.
#           Overnight arrivals that self-cleared or were acknowledged before
#           morning stay silent. A duty run that also carries a live addition
#           merges into ONE push, the overnight items plus the new arrivals,
#           deduped, under a dedicated overnight title ("N entities went quiet
#           overnight"). No input changes; existing automations upgrade in place.
#   2.0.0-alpha.8 - THE TO-DO REBUILD. The item memory moves from a hashed
#           fingerprint in an input_text to a dedicated Local To-do list, one item
#           per flagged entity: summary is the human line, description carries the
#           machine identity (sn:{entity_id}|{kind}|{iso}), due date is the
#           detection time. Change detection becomes true set arithmetic with an
#           ADDITION-ONLY gate: a notification names what is new (a new entity, or
#           a known incident whose reason changed) instead of re-listing the set; a
#           recovery deletes its item silently; a shrink or staggered refill never
#           re-announces known items. The checkbox is an acknowledgment: a checked
#           item stays known (never re-notifies), leaves the daily summary and the
#           card's open list, is kept textually current in silence, and re-arms
#           automatically when its entity recovers and later fails again. Recovery
#           always deletes, never completes; the checkmark belongs to the user. The
#           input_text helper remains for the broken-Sentinel fingerprint and the
#           quiet-hours held flag (u=|h=|t=; a 1.x value with a b= segment parses
#           cleanly). New required input: the dedicated to-do list; every copy needs
#           its own. Items without the sn: description prefix are never touched.
#           All 1.x behaviors carry over: the two streams, the debounce with its
#           on-time source_broken trigger, the settle and blip holds, the
#           blipping-only refresh, quiet hours with per-device priority, the
#           three-mode daily reminder, the loud setup errors (now covering a
#           deleted to-do list as well). BREAKING: this is a new engine; existing
#           1.x automations should stay on the frozen 1.0.0-alpha.7.2 file until
#           this line graduates. Versioning: alpha.N while iterating, beta on
#           hardware proof, then 2.0.0 stable.
#
#   The full 1.x history lives in the frozen stable file, sentinel_notify_1.0.0a7.2.yaml,
#   and its README. Summary: alpha.1 Battery mode and the hashed change detection;
#   alpha.2 Entity mode and the daily reminder; alpha.3 push target fix; alpha.4
#   cleanup; alpha.5 quiet hours, per-device priority, daily all-clear; alpha.6/.6.1
#   broken-Sentinel debounce and optional source refresh; alpha.7 settle hold;
#   alpha.7.1 the three-mode reminder replacing the quiet-end re-send; alpha.7.2
#   the on-time source_broken trigger, blip hold, blipping-only refresh, deleted
#   helper setup error, and the held-flag typing fix.
blueprint:
  name: Sentinel Notify (2.0 Development)
  description: |
    # Sentinel Notify (2.0 Development)

    *Turns a Battery Sentinel or Entity Sentinel into a live to-do list and addition-only notifications.*

    A free blueprint from **The Thinking Home** at [xeazy.com](https://xeazy.com).

    **DEVELOPMENT BUILD.** This is the 2.0 line, under active development: inputs and behavior may change between commits. For daily operation use the frozen stable release, [1.0.0-alpha.7.2](https://github.com/TheThinkingHome/Automations/blob/main/blueprints/automation/sentinel_notify_1.0.0a7.2.md).

    - 📖 [Read the article](https://xeazy.com/battery-entity-sentinel-blueprints/) - the design and worked examples.
    - 📄 [Read the README](https://github.com/TheThinkingHome/Automations/blob/main/blueprints/automation/sentinel_notify.md) - this branch's status and the 2.0 design.
    - 🔋 [Battery Sentinel](https://github.com/TheThinkingHome/Automations/blob/main/blueprints/template/battery_sentinel.md) - the sensor that counts low batteries.
    - 📡 [Entity Sentinel](https://github.com/TheThinkingHome/Automations/blob/main/blueprints/template/entity_sentinel.md) - the sensor that catches entities gone quiet.
    - 💬 [Discuss in the community](https://xeazy.com/logbook/) - the forum thread for these blueprints.
    - ⭐ [More blueprints](https://github.com/TheThinkingHome/Automations) - on GitHub.

    ---

    This is a COMPANION to the Sentinel sensor blueprints. It does nothing on its own: build a **Battery Sentinel** or **Entity Sentinel** first (each makes a sensor), then build this to notify from it.

    ## How 2.0 works

    Every flagged battery or entity becomes one item on a dedicated **Local To-do list** you create first: the Battery list reads as a shopping list (name, percentage, battery type, area), the Entity list as an outage board, both visible in any to-do card and in the companion app. The engine diffs what the Sentinels flag now against the items on the list and notifies only about what is NEW, by name. Known items stay quiet, a recovery removes its item silently, and a restart or staggered device refill cannot re-announce things you already know.

    **The checkbox acknowledges.** Check an item off and it stays known (it will not re-notify), drops out of the daily summary, and re-arms by itself if the device recovers and later fails again. The companion never checks items itself and never touches items it did not create.

    Everything else carries over from 1.x: two independent alert streams (the report, and a "Sentinel not working" alert when a source is itself broken, debounced to ride out restarts and reported on time when real), optional quiet hours with per-device high/normal priority, and a three-mode daily reminder (none, overnight changes, daily summary with all-clear). The overnight mode is a true summary of the quiet window: it lists only the items that appeared during it, judged by each item's own detection time. The daily send is delivery-guaranteed: the scheduled time is only a wake-up, the duty itself is checked on every run, so a send can never be lost to a busy instant or a reboot at the wrong moment, and it is delivered exactly once per day.

    Setup needs two stores, created first: a dedicated **Local To-do list** (Settings, Devices & Services, Add Integration, Local To-do) and a dedicated **input_text helper** for internal state. One of each per copy; two copies must never share.

    An optional debug switch writes one diagnostic line per check.

    License: GPL-3.0-or-later. Copyright (C) 2026 James Lander, The Thinking Home ([xeazy.com](https://xeazy.com)).

    2.0.0-alpha.9.2
  author: James Lander (xeazy.com)
  domain: automation
  homeassistant:
    min_version: 2024.10.0
  source_url: https://github.com/TheThinkingHome/Automations/blob/main/blueprints/automation/sentinel_notify.yaml
  input:
    setup_section:
      name: Mode, Sensors, and Memory
      icon: mdi:radar
      description: What this copy is and what it reads. One family, one to-do list, and one helper per copy.
      input:
        family_mode:
          name: Sentinel family
          description: >-
            Battery watches Battery Sentinel sensors and reports low batteries.
            Entity watches Entity Sentinel sensors and reports entities that have
            gone quiet. Pick one; to cover both families, build two copies of
            this companion.
          default: battery
          selector:
            select:
              options:
                - label: Battery (report low batteries)
                  value: battery
                - label: Entity (report entities gone quiet)
                  value: entity
        source_sensors:
          name: Sentinel sensors
          description: >-
            One or more Sentinel sensors of the chosen family. Their flagged
            devices are combined into one list, so a single report covers all of
            them. Pointing at the wrong family yields a setup error.
          selector:
            entity:
              filter:
                - domain: sensor
              multiple: true
        todo_list:
          name: To-do list
          description: >-
            REQUIRED. Holds one item per flagged device, the companion's memory
            and your live report. Create a dedicated Local To-do list first
            (Settings, Devices & Services, Add Integration, Local To-do) and
            select it here. One list per copy, never shared, and do not rename
            it after selecting. The companion only touches items it created,
            but a dedicated list is strongly recommended.
          selector:
            entity:
              filter:
                - domain: todo
              multiple: false
        memory_helper:
          name: Memory helper (input_text)
          description: >-
            REQUIRED. An input_text holding the companion's internal state (the
            broken-Sentinel record, the quiet-hours held flag, and the last
            daily-send date). Create one first (Settings, Devices & Services,
            Helpers, Create Helper, Text); the defaults are fine. One dedicated
            helper per copy. A helper carried over from the 1.x release works
            as-is.
          selector:
            entity:
              filter:
                - domain: input_text
              multiple: false
        battery_report_offline:
          name: Also report offline batteries
          description: >-
            (Battery mode only.) When on, batteries that are currently
            unavailable or unknown are tracked alongside the low ones, shown as
            (offline). Off by default, so you hear only about low batteries.
            Ignored in Entity mode.
          default: false
          selector:
            boolean: {}

    notify_section:
      name: Notification Targets and Style
      icon: mdi:bell-ring
      description: How and where to send. Shared by both families.
      input:
        high_priority_targets:
          name: High-priority push targets
          description: >-
            The mobile_app notify ACTIONS to receive HIGH-priority pushes, one
            per line, in the form notify.mobile_app_your_phone. Use the ACTION
            name, not the notify entity; only the action carries the priority
            and sound payload (find it in Developer Tools, Actions, search
            mobile_app). High priority bypasses Do Not Disturb and pierces
            quiet hours. Leave empty for none.
          default: []
          selector:
            text:
              multiple: true
              multiline: false
        normal_priority_targets:
          name: Normal-priority push targets
          description: >-
            The mobile_app notify ACTIONS that should receive NORMAL-priority pushes,
            one per line, same notify.mobile_app_your_phone form. Normal priority is
            standard delivery AND respects quiet hours; use the Daily Reminder's
            overnight mode to be told in the morning about an addition that was
            held. A target listed in both lists is treated as high. Leave empty
            for no normal-priority pushes.
          default: []
          selector:
            text:
              multiple: true
              multiline: false
        persistent_enabled:
          name: Create a persistent notification
          description: >-
            When on, also maintains a persistent notification in the Home
            Assistant UI showing the current open items, replaced in place each
            time so it never stacks.
          default: true
          selector:
            boolean: {}
    quiet_hours_section:
      name: Quiet Hours
      icon: mdi:sleep
      description: An optional daily window that holds phone pushes to normal-priority targets. Off by default.
      collapsed: true
      input:
        quiet_hours_enabled:
          name: Enable quiet hours
          description: >-
            When on, phone pushes to normal-priority targets (both the report and
            the broken-Sentinel alert) are held during the window below;
            high-priority targets are still pushed. The to-do list, the persistent
            notification, and the internal state all keep updating, so nothing is
            lost; only the push waits. Nothing fires when the window ends: to hear
            in the morning about an addition held overnight, set the Daily
            Reminder below to its overnight mode, with a time at or after the
            quiet-hours end. When off, pushes go out as soon as something new is
            flagged, at any hour.
          default: false
          selector:
            boolean: {}
        quiet_hours_start:
          name: Quiet hours start
          description: >-
            When the quiet window begins. For example 22:00:00 for 10 in the
            evening. A window whose start is later than its end is treated as
            crossing midnight.
          default: "22:00:00"
          selector:
            time: {}
        quiet_hours_end:
          name: Quiet hours end
          description: >-
            When the quiet window ends. Nothing fires at this time; it only defines
            the window. For example 08:00:00 for 8 in the morning.
          default: "08:00:00"
          selector:
            time: {}

    reminder_section:
      name: Daily Reminder
      icon: mdi:calendar-clock
      description: An optional once-a-day scheduled send at a time you set. Off by default.
      collapsed: true
      input:
        daily_reminder_mode:
          name: Daily reminder mode
          description: >-
            What the once-a-day send at the time below does. NONE: nothing
            scheduled fires; you are notified only when something new is
            flagged. OVERNIGHT CHANGES: fires only when something appeared
            during your quiet hours, and lists only those items, judged by each
            item's own detection time; a quiet night stays silent. Requires
            quiet hours (with it off, this behaves as none), and the time below
            should be at or after the quiet-hours end. DAILY SUMMARY: fires
            every day; the open items, or an all-clear when nothing is flagged
            at all (persistent card plus high-priority targets only). When
            every remaining item is acknowledged, the daily run stays silent.
            The send is delivered exactly once per day and cannot be lost to a
            busy instant or a reboot.
          default: none
          selector:
            select:
              options:
                - label: None (notify only on new items)
                  value: none
                - label: Overnight changes (only if something was added during quiet hours)
                  value: overnight
                - label: Daily summary (every day, all-clear when nothing is flagged)
                  value: daily
        daily_reminder_time:
          name: Reminder time
          description: >-
            When the daily send is owed, when the mode above is not none. The
            time is only a wake-up; the send is computed on every run and a
            send missed during a reboot is caught up by the next run. For the
            overnight mode, set it at or after the quiet-hours end. For example
            08:00:00 for 8 in the morning.
          default: "08:00:00"
          selector:
            time: {}

    advanced_section:
      name: Advanced
      icon: mdi:tune
      description: Broken-Sentinel timing, optional active refresh, and diagnostics. The defaults suit most systems.
      collapsed: true
      input:
        notification_tag:
          name: Notification tag
          description: >-
            The tag that replaces this companion's push in place rather than
            stacking. It only matters when several copies push to the same
            device; give each copy a distinct tag then. Otherwise leave the
            default.
          default: sentinel_notify
          selector:
            text: {}
        upstream_debounce_seconds:
          name: Source debounce and settle window (seconds)
          description: >-
            One window, three jobs. How long a source must stay unavailable
            before it is reported broken (a dedicated trigger fires the report
            on time). How long runs are held while sources settle after a
            reboot or reload, judged live, with a source lacking a readable
            boot_time treated as still settling. And how long a brief source
            blip holds the run instead of disturbing the list. 240 clears a
            normal restart and matches the Sentinels' startup grace. A
            setup_error, ok:false, or missing source is reported immediately.
          default: 240
          selector:
            number:
              min: 0
              max: 3600
              step: 10
              unit_of_measurement: seconds
              mode: box
        source_refresh_button:
          name: Source refresh button (optional)
          description: >-
            Optional. An input_button that re-evaluates your source Sentinels, the
            same button you set as the refresh_button on Battery or Entity Sentinel
            (one shared button refreshes a whole family). When set and a source is
            briefly unavailable (inside the debounce), this companion presses it
            and waits for recovery, so a source that had only gone stale is
            confirmed healthy in seconds. A source already down past the debounce
            is never pressed or waited for. Leave it unset and nothing is pressed.
          default: ""
          selector:
            entity:
              filter:
                - domain: input_button
              multiple: false
        source_refresh_timeout:
          name: Source refresh timeout (seconds)
          description: >-
            The most time to wait for sources to recover after pressing the refresh
            button above. The wait ends the instant every source is healthy. Raise
            it if your sources take longer to report back after a refresh. Ignored
            when no refresh button is set.
          default: 15
          selector:
            number:
              min: 1
              max: 120
              step: 1
              unit_of_measurement: seconds
              mode: box
        debug_enabled:
          name: Debug logging
          description: >-
            When on, writes one diagnostic line to the system log each check,
            carrying the version, mode, the diff counts, and whether it notified.
            Requires a logger entry at info level to appear.
          default: false
          selector:
            boolean: {}

mode: single
max_exceeded: silent

variables:
  version: 2.0.0-alpha.9.2
  family_mode: !input family_mode
  source_sensors: !input source_sensors
  todo_list: !input todo_list
  memory_helper: !input memory_helper
  battery_report_offline: !input battery_report_offline
  high_priority_targets: !input high_priority_targets
  normal_priority_targets: !input normal_priority_targets
  persistent_enabled: !input persistent_enabled
  notification_tag: !input notification_tag
  quiet_hours_enabled: !input quiet_hours_enabled
  quiet_hours_start: !input quiet_hours_start
  quiet_hours_end: !input quiet_hours_end
  daily_reminder_mode: !input daily_reminder_mode
  daily_reminder_time: !input daily_reminder_time
  upstream_debounce_seconds: !input upstream_debounce_seconds
  source_refresh_button: !input source_refresh_button
  source_refresh_timeout: !input source_refresh_timeout
  debug_enabled: !input debug_enabled

  in_quiet_hours: >-
    {% if not quiet_hours_enabled %}
      {{ false }}
    {% else %}
      {% set n = now().strftime('%H:%M:%S') %}
      {% set s = quiet_hours_start %}
      {% set e = quiet_hours_end %}
      {% if s == e %}
        {{ false }}
      {% elif s < e %}
        {{ s <= n and n < e }}
      {% else %}
        {{ n >= s or n < e }}
      {% endif %}
    {% endif %}

  push_plan: >-
    {%- set ns = namespace(plan=[], seen=[]) -%}
    {%- for t in high_priority_targets -%}
      {%- if t not in ns.seen -%}
        {%- set ns.plan = ns.plan + [{'target': t, 'priority': 'high'}] -%}
        {%- set ns.seen = ns.seen + [t] -%}
      {%- endif -%}
    {%- endfor -%}
    {%- for t in normal_priority_targets -%}
      {%- if t not in ns.seen -%}
        {%- set ns.plan = ns.plan + [{'target': t, 'priority': 'normal'}] -%}
        {%- set ns.seen = ns.seen + [t] -%}
      {%- endif -%}
    {%- endfor -%}
    {{ ns.plan }}

  refresh_button_set: >-
    {{ source_refresh_button not in [none, ''] }}

  sources_settling: >-
    {% set ns = namespace(latest=none, blind=false) %}
    {% for s in source_sensors %}
      {% set st = states(s) %}
      {% set bt = state_attr(s, 'boot_time') | as_datetime(none) %}
      {% if bt is not none and (ns.latest is none or bt > ns.latest) %}
        {% set ns.latest = bt %}
      {% elif bt is none and states[s] is not none and st not in ['unavailable', 'unknown', 'setup_error'] and state_attr(s, 'ok') != false %}
        {% set ns.blind = true %}
      {% endif %}
    {% endfor %}
    {{ ns.blind or (ns.latest is not none and (now() - ns.latest).total_seconds() < upstream_debounce_seconds) }}

  any_source_unavailable: >-
    {% set ns = namespace(any=false) %}
    {% for s in source_sensors %}
      {% if states(s) in ['unavailable', 'unknown'] %}
        {% set ns.any = true %}
      {% endif %}
    {% endfor %}
    {{ ns.any }}

  any_source_blipping: >-
    {% set ns = namespace(any=false) %}
    {% for s in source_sensors %}
      {% if states(s) in ['unavailable', 'unknown'] and states[s] is not none %}
        {% if (now() - states[s].last_changed).total_seconds() < upstream_debounce_seconds %}
          {% set ns.any = true %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ ns.any }}

  setup_error: >-
    {% set ns = namespace(err='') %}
    {% if source_sensors | length == 0 %}
      {% set ns.err = 'No source sensors selected. Pick one or more Sentinel sensors of the chosen family.' %}
    {% elif memory_helper in [none, ''] %}
      {% set ns.err = 'No memory helper selected. Create an input_text helper and select it.' %}
    {% elif states[memory_helper] is none %}
      {% set ns.err = 'Memory helper ' ~ memory_helper ~ ' does not exist. It may have been deleted or renamed. Re-create it (or select another) and re-save this automation.' %}
    {% elif todo_list in [none, ''] %}
      {% set ns.err = 'No to-do list selected. Create a dedicated Local To-do list and select it.' %}
    {% elif states[todo_list] is none %}
      {% set ns.err = 'To-do list ' ~ todo_list ~ ' does not exist. It may have been deleted or renamed. Re-create it (or select another) and re-save this automation.' %}
    {% else %}
      {% for s in source_sensors %}
        {% if states(s) not in ['unavailable', 'unknown'] and state_attr(s, 'devices') is none and state_attr(s, 'total_monitored') is none %}
          {% set ns.err = 'Sensor ' ~ s ~ ' does not look like a Sentinel sensor (no devices or total_monitored attribute). Check the sensor and the chosen family.' %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ ns.err }}

  ok: "{{ setup_error == '' }}"

  upstream_error: >-
    {% set ns = namespace(bad=[]) %}
    {% if ok %}
      {% for s in source_sensors %}
        {% if states(s) in ['unavailable', 'unknown'] %}
          {% set elapsed = (now() - states[s].last_changed).total_seconds() if states[s] is not none else 999999 %}
          {% if elapsed >= upstream_debounce_seconds %}
            {% set ns.bad = ns.bad + [s ~ ' is ' ~ states(s)] %}
          {% endif %}
        {% elif states(s) == 'setup_error' or state_attr(s, 'ok') == false %}
          {% set msg = state_attr(s, 'error') | default('') %}
          {% set ns.bad = ns.bad + [s ~ (': ' ~ msg if msg else ' reports a setup error')] %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ ns.bad | join(', ') }}

  upstream_broken: "{{ ok and upstream_error != '' }}"

  flagged_items: >-
    {% set ns = namespace(items=[]) %}
    {% if ok and family_mode == 'battery' %}
      {% for s in source_sensors %}
        {% for d in (state_attr(s, 'devices') or []) %}
          {% set ns.items = ns.items + [{
            'entity_id': d.entity_id,
            'name': d.name,
            'area': d.area,
            'level': d.level,
            'battery_type': d.battery_type | default(''),
            'reason': '',
            'age': '',
            'kind': 'low'
          }] %}
        {% endfor %}
        {% if battery_report_offline %}
          {% for u in (state_attr(s, 'unavailable_entities') or []) %}
            {% set ns.items = ns.items + [{
              'entity_id': u.entity_id,
              'name': u.name,
              'area': u.area,
              'level': none,
              'battery_type': '',
              'reason': '',
              'age': '',
              'kind': 'offline'
            }] %}
          {% endfor %}
        {% endif %}
      {% endfor %}
    {% elif ok and family_mode == 'entity' %}
      {% for s in source_sensors %}
        {% for d in (state_attr(s, 'devices') or []) %}
          {% set ns.items = ns.items + [{
            'entity_id': d.entity_id,
            'name': d.name,
            'area': d.area,
            'level': none,
            'battery_type': '',
            'reason': d.reason | default('unavailable'),
            'age': d.age | default(''),
            'kind': d.reason | default('unavailable')
          }] %}
        {% endfor %}
      {% endfor %}
    {% endif %}
    {{ ns.items }}

  flagged_items_unique: >-
    {% if family_mode == 'entity' %}
      {% set severe_reasons = ['unavailable', 'unknown', 'missing', 'never_reported'] %}
      {% set severe_ids = flagged_items | selectattr('kind', 'in', severe_reasons)
                          | map(attribute='entity_id') | list %}
    {% else %}
      {% set severe_ids = flagged_items | selectattr('kind', 'eq', 'offline')
                          | map(attribute='entity_id') | list %}
    {% endif %}
    {% set ns = namespace(items=[], seen=[]) %}
    {% for d in flagged_items %}
      {% if d.entity_id not in ns.seen %}
        {% set ns.seen = ns.seen + [d.entity_id] %}
        {% if family_mode == 'entity' %}
          {% if d.entity_id in severe_ids and d.kind not in ['unavailable', 'unknown', 'missing', 'never_reported'] %}
            {% set sev = (flagged_items | selectattr('entity_id', 'eq', d.entity_id)
                          | selectattr('kind', 'in', ['unavailable', 'unknown', 'missing', 'never_reported'])
                          | list | first) %}
            {% set ns.items = ns.items + [sev] %}
          {% else %}
            {% set ns.items = ns.items + [d] %}
          {% endif %}
        {% else %}
          {% if d.entity_id in severe_ids and d.kind != 'offline' %}
            {% set ns.items = ns.items + [{
              'entity_id': d.entity_id,
              'name': d.name,
              'area': d.area,
              'level': none,
              'battery_type': '',
              'reason': '',
              'age': '',
              'kind': 'offline'
            }] %}
          {% else %}
            {% set ns.items = ns.items + [d] %}
          {% endif %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ ns.items }}

  flagged_render: >-
    {% set out = namespace(items=[]) %}
    {% for d in flagged_items_unique | sort(attribute='name') %}
      {% set nm = d.name | default('Unknown') %}
      {% set ar = d.area | default('') %}
      {% set suffix = (' - ' ~ ar) if ar not in [none, '', 'Unassigned'] else '' %}
      {% if family_mode == 'entity' %}
        {% set rs = d.reason | default('unavailable') %}
        {% set line = nm ~ ' (' ~ rs ~ ')' ~ suffix %}
      {% else %}
        {% set lvl = d.level | default(none) %}
        {% set has_pct = lvl is not none and lvl not in ['unknown', 'unavailable', ''] and (lvl | string | float(none)) is not none %}
        {% if d.kind == 'offline' %}
          {% set line = nm ~ ' (offline)' ~ suffix %}
        {% elif not has_pct %}
          {% set line = nm ~ ' (low)' ~ suffix %}
        {% else %}
          {% set bt = d.battery_type | default('') %}
          {% set line = nm ~ ' (' ~ (lvl | float | round(0) | int) ~ '%' ~ ((', ' ~ bt) if bt else '') ~ ')' ~ suffix %}
        {% endif %}
      {% endif %}
      {% set out.items = out.items + [{'entity_id': d.entity_id, 'kind': d.kind, 'name': nm, 'line': line}] %}
    {% endfor %}
    {{ out.items }}

  flagged_count: "{{ flagged_items_unique | length }}"

  stored_raw: "{{ states(memory_helper) }}"
  stored_parts: >-
    {% set ns = namespace(u='', h='', r='', t='') %}
    {% for seg in stored_raw.split('|') %}
      {% if seg.startswith('u=') %}{% set ns.u = seg[2:] %}
      {% elif seg.startswith('h=') %}{% set ns.h = seg[2:] %}
      {% elif seg.startswith('r=') %}{% set ns.r = seg[2:] %}
      {% elif seg.startswith('t=') %}{% set ns.t = seg[2:] %}
      {% endif %}
    {% endfor %}
    {{ {'u': ns.u, 'h': ns.h, 'r': ns.r, 't': ns.t} }}
  previous_upstream: "{{ stored_parts.u }}"
  previous_held: "{{ '1' if stored_parts.h == '1' else '0' }}"
  previous_reminder_date: "{{ stored_parts.r }}"
  previous_notified_iso: "{{ stored_parts.t }}"

trigger:
  - trigger: homeassistant
    event: start
    id: ha_start
    alias: Re-evaluate when Home Assistant starts
  - trigger: state
    entity_id: !input source_sensors
    id: source_change
    alias: Re-evaluate when a watched sensor changes
  - trigger: state
    entity_id: !input source_sensors
    to:
      - unavailable
      - unknown
    for:
      seconds: !input upstream_debounce_seconds
    id: source_broken
    alias: A source has stayed unavailable for the full debounce, wake up and report it broken
  - trigger: time
    at: !input daily_reminder_time
    id: daily_reminder
    alias: Scheduled wake-up for the daily send; the duty itself is computed on every run, so a dropped or missed trigger cannot lose a delivery

condition:
  - alias: For a source-sensor trigger, run only if the monitored content actually changed (ignore attribute-only churn like a refreshed evaluation timestamp). Other triggers always pass.
    condition: template
    value_template: >-
      {% if trigger.id != 'source_change'
            or trigger.from_state is none
            or trigger.to_state is none %}
        {{ true }}
      {% else %}
        {% set f = trigger.from_state %}
        {% set t = trigger.to_state %}
        {% set f_dev = f.attributes.get('devices', none) %}
        {% set t_dev = t.attributes.get('devices', none) %}
        {% set f_un = f.attributes.get('unavailable_entities', none) if battery_report_offline else none %}
        {% set t_un = t.attributes.get('unavailable_entities', none) if battery_report_offline else none %}
        {{ f.state != t.state or f_dev != t_dev or f_un != t_un }}
      {% endif %}

action:
  - alias: Log the check
    if:
      - condition: template
        value_template: "{{ debug_enabled }}"
    then:
      - action: system_log.write
        continue_on_error: true
        data:
          level: info
          logger: sentinel_notify
          message: >-
            Sentinel Notify v{{ version }} | mode: {{ family_mode }} | trigger: {{ trigger.id }} | ok: {{ ok }}{% if not ok %} | ERROR: {{ setup_error }}{% endif %} | flagged: {{ flagged_count }} | quiet: {{ in_quiet_hours }} | reminder_mode: {{ daily_reminder_mode }} | held: {{ previous_held }} | last_reminder: {{ previous_reminder_date if previous_reminder_date else 'never' }} | settling: {{ sources_settling }} | any_unavail: {{ any_source_unavailable }} | blipping: {{ any_source_blipping }} | refresh_set: {{ refresh_button_set }} | debounce: {{ upstream_debounce_seconds }}s | upstream(frozen): {{ upstream_error if upstream_error else 'none' }}

  - alias: Stop if setup error
    if:
      - condition: template
        value_template: "{{ not ok }}"
    then:
      - stop: Setup error, see the debug log and the README.

  - alias: Hold a run fired by a source returning from unavailable or unknown, its fresh answers are not trusted until it reports on its own settled cycle
    if:
      - condition: template
        value_template: >-
          {{ trigger.id == 'source_change' and trigger.from_state is not none
             and trigger.from_state.state in ['unavailable', 'unknown'] }}
    then:
      - alias: Log that this run is held for a post-unavailable transition
        if:
          - condition: template
            value_template: "{{ debug_enabled }}"
        then:
          - action: system_log.write
            continue_on_error: true
            data:
              level: info
              logger: sentinel_notify
              message: >-
                Sentinel Notify v{{ version }} | mode: {{ family_mode }} | trigger: {{ trigger.id }} | post-unavailable hold: the source just returned from {{ trigger.from_state.state }}, its answers are not trusted until it reports on its own settled cycle | flagged now: {{ flagged_count }}
      - stop: The triggering source just returned from unavailable; this run is held, and the source's next contentful evaluation acts instead.

  - alias: Ride out the restart, hold the list, the helper, and notifications while the source Sentinels settle after a reboot
    if:
      - condition: template
        value_template: "{{ sources_settling }}"
    then:
      - alias: Log that this run is held for settling
        if:
          - condition: template
            value_template: "{{ debug_enabled }}"
        then:
          - action: system_log.write
            continue_on_error: true
            data:
              level: info
              logger: sentinel_notify
              message: >-
                Sentinel Notify v{{ version }} | mode: {{ family_mode }} | trigger: {{ trigger.id }} | settling: sources rebooted within the last {{ upstream_debounce_seconds }}s, holding the list and notifications until they settle | flagged now: {{ flagged_count }}
      - stop: Sources settling after a restart; the list and notifications are held so the pre-restart state survives the reboot.

  - alias: Active refresh, press the source refresh button and wait for recovery, only when a source is blipping (unavailable inside the debounce, a recovery candidate) and a button is configured; a source already broken past the debounce is never pressed or waited for
    if:
      - condition: template
        value_template: "{{ any_source_blipping and refresh_button_set }}"
    then:
      - alias: Log that we are refreshing
        if:
          - condition: template
            value_template: "{{ debug_enabled }}"
        then:
          - action: system_log.write
            continue_on_error: true
            data:
              level: info
              logger: sentinel_notify
              message: >-
                Sentinel Notify v{{ version }} | mode: {{ family_mode }} | refresh: pressing {{ source_refresh_button }}, waiting up to {{ source_refresh_timeout }}s for sources to recover
      - alias: Press the source refresh button (only reached when refresh_button_set is true, so the target is always a real button)
        action: input_button.press
        continue_on_error: true
        target:
          entity_id: "{{ source_refresh_button }}"
      - alias: Wait for every source to leave the unavailable/unknown state, bounded by the timeout
        wait_template: >-
          {% set ns = namespace(any=false) %}
          {% for s in source_sensors %}
            {% if states(s) in ['unavailable', 'unknown'] %}
              {% set ns.any = true %}
            {% endif %}
          {% endfor %}
          {{ not ns.any }}
        timeout:
          seconds: !input source_refresh_timeout
        continue_on_timeout: true
      - alias: Log the refresh outcome
        if:
          - condition: template
            value_template: "{{ debug_enabled }}"
        then:
          - action: system_log.write
            continue_on_error: true
            data:
              level: info
              logger: sentinel_notify
              message: >-
                Sentinel Notify v{{ version }} | mode: {{ family_mode }} | refresh: {{ 'sources recovered' if wait.completed else 'timed out, sources still unavailable' }} | waited: {{ (source_refresh_timeout - wait.remaining) | round(1) }}s

  - alias: Recompute the broken-Sentinel decision and the blip state live, so they reflect any recovery from the refresh above (top-level variables were frozen at trigger time)
    variables:
      upstream_error_live: >-
        {% set ns = namespace(bad=[]) %}
        {% if ok %}
          {% for s in source_sensors %}
            {% if states(s) in ['unavailable', 'unknown'] %}
              {% set elapsed = (now() - states[s].last_changed).total_seconds() if states[s] is not none else 999999 %}
              {% if elapsed >= upstream_debounce_seconds %}
                {% set ns.bad = ns.bad + [s ~ ' is ' ~ states(s)] %}
              {% endif %}
            {% elif states(s) == 'setup_error' or state_attr(s, 'ok') == false %}
              {% set msg = state_attr(s, 'error') | default('') %}
              {% set ns.bad = ns.bad + [s ~ (': ' ~ msg if msg else ' reports a setup error')] %}
            {% endif %}
          {% endfor %}
        {% endif %}
        {{ ns.bad | join(', ') }}
      upstream_broken_live: "{{ ok and upstream_error_live != '' }}"
      upstream_fingerprint_live: "{{ upstream_error_live | md5 if upstream_error_live != '' else '' }}"
      upstream_changed_live: "{{ ok and (upstream_fingerprint_live | trim) != (previous_upstream | trim) }}"
      sources_blipping_live: >-
        {% set ns = namespace(any=false) %}
        {% for s in source_sensors %}
          {% if states(s) in ['unavailable', 'unknown'] and states[s] is not none %}
            {% if (now() - states[s].last_changed).total_seconds() < upstream_debounce_seconds %}
              {% set ns.any = true %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {{ ns.any }}
      sources_settling_live: >-
        {% set ns = namespace(latest=none, blind=false) %}
        {% for s in source_sensors %}
          {% set st = states(s) %}
          {% set bt = state_attr(s, 'boot_time') | as_datetime(none) %}
          {% if bt is not none and (ns.latest is none or bt > ns.latest) %}
            {% set ns.latest = bt %}
          {% elif bt is none and states[s] is not none and st not in ['unavailable', 'unknown', 'setup_error'] and state_attr(s, 'ok') != false %}
            {% set ns.blind = true %}
          {% endif %}
        {% endfor %}
        {{ ns.blind or (ns.latest is not none and (now() - ns.latest).total_seconds() < upstream_debounce_seconds) }}

  - alias: Blip and settle hold, judged live after any refresh, stop while a source is briefly unavailable inside the debounce or the sources are inside their startup grace, so an untrustworthy flagged list cannot disturb the to-do memory or fire false alerts
    if:
      - condition: template
        value_template: "{{ sources_blipping_live or sources_settling_live }}"
    then:
      - alias: Log that this run is held for a blip
        if:
          - condition: template
            value_template: "{{ debug_enabled }}"
        then:
          - action: system_log.write
            continue_on_error: true
            data:
              level: info
              logger: sentinel_notify
              message: >-
                Sentinel Notify v{{ version }} | mode: {{ family_mode }} | trigger: {{ trigger.id }} | live hold: {{ 'a source is unavailable inside the debounce' if sources_blipping_live else 'the sources are inside their startup grace after the refresh' }}, holding the list and notifications | flagged now: {{ flagged_count }}
      - stop: A source is blipping or freshly rebooted (judged live, after any refresh); the list and notifications are held so an untrustworthy flagged list cannot disturb the pre-blip state.

  - alias: Read the to-do memory, both open and acknowledged items
    action: todo.get_items
    target:
      entity_id: "{{ todo_list }}"
    data:
      status:
        - needs_action
        - completed
    response_variable: todo_raw

  - alias: Diff what the Sentinels flag now against the to-do memory
    variables:
      todo_all: >-
        {{ todo_raw[todo_list]['items'] if todo_raw is defined and todo_list in todo_raw and 'items' in todo_raw[todo_list] else [] }}
      known_items: >-
        {% set ns = namespace(items=[]) %}
        {% for it in todo_all %}
          {% set desc = it.description | default('') %}
          {% if desc is string and desc.startswith('sn:') %}
            {% set parts = desc[3:].split('|') %}
            {% set ns.items = ns.items + [{
              'uid': it.uid | default(''),
              'status': it.status | default('needs_action'),
              'summary': it.summary | default(''),
              'entity_id': parts[0],
              'kind': parts[1] if parts | length > 1 else '',
              'since': parts[2] if parts | length > 2 else ''
            }] %}
          {% endif %}
        {% endfor %}
        {{ ns.items }}
      known_open_ids: "{{ known_items | selectattr('status', 'eq', 'needs_action') | map(attribute='entity_id') | list }}"
      known_acked_ids: "{{ known_items | selectattr('status', 'eq', 'completed') | map(attribute='entity_id') | list }}"
      known_ids: "{{ known_open_ids + known_acked_ids }}"
      current_ids: "{{ flagged_render | map(attribute='entity_id') | list }}"
      additions: >-
        {% set ns = namespace(items=[]) %}
        {% for d in flagged_render %}
          {% if d.entity_id not in known_ids %}
            {% set ns.items = ns.items + [d] %}
          {% endif %}
        {% endfor %}
        {{ ns.items }}
      kind_changed: >-
        {% set ns = namespace(items=[]) %}
        {% for d in flagged_render %}
          {% if d.entity_id in known_open_ids %}
            {% set k = (known_items | selectattr('entity_id', 'eq', d.entity_id) | selectattr('status', 'eq', 'needs_action') | list | first) %}
            {% if k.kind != d.kind %}
              {% set ns.items = ns.items + [{'uid': k.uid, 'line': d.line, 'entity_id': d.entity_id, 'kind': d.kind, 'since': now().isoformat()}] %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {{ ns.items }}
      silent_updates: >-
        {% set ns = namespace(items=[]) %}
        {% for d in flagged_render %}
          {% if d.entity_id in known_acked_ids %}
            {% set k = (known_items | selectattr('entity_id', 'eq', d.entity_id) | selectattr('status', 'eq', 'completed') | list | first) %}
            {% if k.kind != d.kind or k.summary != d.line %}
              {% set ns.items = ns.items + [{'uid': k.uid, 'line': d.line, 'entity_id': d.entity_id, 'kind': d.kind, 'since': k.since if k.since else now().isoformat()}] %}
            {% endif %}
          {% elif d.entity_id in known_open_ids %}
            {% set k = (known_items | selectattr('entity_id', 'eq', d.entity_id) | selectattr('status', 'eq', 'needs_action') | list | first) %}
            {% if k.kind == d.kind and k.summary != d.line %}
              {% set ns.items = ns.items + [{'uid': k.uid, 'line': d.line, 'entity_id': d.entity_id, 'kind': d.kind, 'since': k.since if k.since else now().isoformat()}] %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {{ ns.items }}
      recovered: >-
        {% set ns = namespace(items=[]) %}
        {% for k in known_items %}
          {% if k.entity_id not in current_ids %}
            {% set ns.items = ns.items + [k] %}
          {% endif %}
        {% endfor %}
        {{ ns.items }}
      new_count: "{{ (additions | length) + (kind_changed | length) }}"
      has_new: "{{ (additions | length) + (kind_changed | length) > 0 }}"
      list_dirty: "{{ (additions | length) + (kind_changed | length) + (silent_updates | length) + (recovered | length) > 0 }}"
      open_report: "{{ flagged_render | rejectattr('entity_id', 'in', known_acked_ids) | list }}"
      open_count: "{{ open_report | length }}"
      acked_open_count: "{{ known_acked_ids | select('in', current_ids) | list | length }}"

  - alias: Apply the diff to the list, add new items, update changed ones, remove recovered ones; foreign items are never touched, and quiet hours never gates list maintenance
    if:
      - condition: template
        value_template: "{{ list_dirty }}"
    then:
      - alias: Add newly flagged items
        if:
          - condition: template
            value_template: "{{ additions | length > 0 }}"
        then:
          - repeat:
              for_each: "{{ additions }}"
              sequence:
                - action: todo.add_item
                  continue_on_error: true
                  target:
                    entity_id: "{{ todo_list }}"
                  data:
                    item: "{{ repeat.item.line }}"
                    description: "sn:{{ repeat.item.entity_id }}|{{ repeat.item.kind }}|{{ now().isoformat() }}"
                    due_datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
      - alias: Update open items whose reason changed (these also notify)
        if:
          - condition: template
            value_template: "{{ kind_changed | length > 0 }}"
        then:
          - repeat:
              for_each: "{{ kind_changed }}"
              sequence:
                - action: todo.update_item
                  continue_on_error: true
                  target:
                    entity_id: "{{ todo_list }}"
                  data:
                    item: "{{ repeat.item.uid }}"
                    rename: "{{ repeat.item.line }}"
                    description: "sn:{{ repeat.item.entity_id }}|{{ repeat.item.kind }}|{{ repeat.item.since }}"
      - alias: Silently refresh acknowledged items and stale text, no notification
        if:
          - condition: template
            value_template: "{{ silent_updates | length > 0 }}"
        then:
          - repeat:
              for_each: "{{ silent_updates }}"
              sequence:
                - action: todo.update_item
                  continue_on_error: true
                  target:
                    entity_id: "{{ todo_list }}"
                  data:
                    item: "{{ repeat.item.uid }}"
                    rename: "{{ repeat.item.line }}"
                    description: "sn:{{ repeat.item.entity_id }}|{{ repeat.item.kind }}|{{ repeat.item.since }}"
      - alias: Remove recovered items, deletion not completion, the checkmark belongs to the user
        if:
          - condition: template
            value_template: "{{ recovered | length > 0 }}"
        then:
          - repeat:
              for_each: "{{ recovered }}"
              sequence:
                - action: todo.remove_item
                  continue_on_error: true
                  target:
                    entity_id: "{{ todo_list }}"
                  data:
                    item: "{{ repeat.item.uid }}"

  - alias: Work out the reminder duty, what to notify this run, the new held flag, and the helper value
    variables:
      today_iso: "{{ now().date().isoformat() }}"
      reminder_due: >-
        {{ daily_reminder_mode != 'none'
           and now().strftime('%H:%M:%S') >= daily_reminder_time
           and previous_reminder_date != today_iso }}
      is_reminder: "{{ reminder_due }}"
      is_all_clear: "{{ reminder_due and daily_reminder_mode == 'daily' and flagged_count | int == 0 }}"
      overnight_items: >-
        {% if daily_reminder_mode != 'overnight' or not quiet_hours_enabled %}
          {{ [] }}
        {% else %}
          {% set end_t = today_at(quiet_hours_end) %}
          {% set w_end = end_t if now() >= end_t else end_t - timedelta(days=1) %}
          {% set s_shift = (w_end.date() - now().date()).days %}
          {% set s_cand = today_at(quiet_hours_start) + timedelta(days=s_shift) %}
          {% set w_start = s_cand if s_cand < w_end else s_cand - timedelta(days=1) %}
          {% set ns = namespace(items=[]) %}
          {% for d in open_report %}
            {% if d.entity_id in known_open_ids %}
              {% set k = (known_items | selectattr('entity_id', 'eq', d.entity_id) | selectattr('status', 'eq', 'needs_action') | list | first) %}
              {% set since_dt = k.since | as_datetime(none) %}
              {% if since_dt is not none and w_start <= since_dt and since_dt < w_end %}
                {% set ns.items = ns.items + [d] %}
              {% endif %}
            {% endif %}
          {% endfor %}
          {{ ns.items }}
        {% endif %}
      overnight_sends: >-
        {{ reminder_due and daily_reminder_mode == 'overnight'
           and previous_held | string == '1' and overnight_items | length > 0 }}
      reminder_daily_sends: "{{ reminder_due and daily_reminder_mode == 'daily' and open_count | int > 0 }}"
      reminder_sends_flagged: "{{ reminder_daily_sends or overnight_sends }}"
      event_should_notify: "{{ has_new }}"
      should_push: "{{ event_should_notify or reminder_sends_flagged }}"
      upstream_should_notify: "{{ upstream_changed_live or (reminder_due and upstream_broken_live) }}"
      held_new: >-
        {%- if reminder_due and daily_reminder_mode == 'overnight' -%}0{%- elif has_new and in_quiet_hours -%}1{%- elif has_new -%}0{%- else -%}{{ previous_held }}{%- endif -%}
      reminder_date_new: "{{ today_iso if reminder_due else previous_reminder_date }}"
      memory_needs_write: "{{ upstream_changed_live or (held_new | string | trim) != (previous_held | string | trim) or reminder_due }}"
      stored_value: >-
        u={{ upstream_fingerprint_live }}|h={{ held_new | string | trim }}|r={{ reminder_date_new }}|t={{ now().isoformat() }}
      report_title: >-
        {% if family_mode == 'battery' %}
          Battery Sentinel: {{ open_count }} {{ 'battery' if open_count | int == 1 else 'batteries' }} to check
        {% elif family_mode == 'entity' %}
          Entity Sentinel: {{ open_count }} {{ 'entity' if open_count | int == 1 else 'entities' }} gone quiet
        {% else %}
          Sentinel report
        {% endif %}
      report_body: >-
        {{ open_report | map(attribute='line') | list | join('\n') }}{% if acked_open_count | int > 0 %}{{ '\n' }}({{ acked_open_count }} more acknowledged){% endif %}
      new_title: >-
        {% if family_mode == 'battery' %}
          Battery Sentinel: {{ new_count }} new {{ 'battery' if new_count | int == 1 else 'batteries' }} to check
        {% elif family_mode == 'entity' %}
          Entity Sentinel: {{ new_count }} {{ 'entity' if new_count | int == 1 else 'entities' }} newly quiet
        {% else %}
          Sentinel report
        {% endif %}
      new_body: >-
        {% set new_lines = (additions | map(attribute='line') | list) + (kind_changed | map(attribute='line') | list) %}
        {{ new_lines | sort | join('\n') }}{% if open_count | int > new_count | int %}{{ '\n' }}Also open: {{ open_count | int - new_count | int }} more{% endif %}
      overnight_deliver: >-
        {% set new_ids = (additions | map(attribute='entity_id') | list) + (kind_changed | map(attribute='entity_id') | list) %}
        {% set win_ids = overnight_items | map(attribute='entity_id') | list %}
        {% set ns = namespace(items=[]) %}
        {% for d in open_report %}
          {% if d.entity_id in win_ids or (has_new and d.entity_id in new_ids) %}
            {% set ns.items = ns.items + [d] %}
          {% endif %}
        {% endfor %}
        {{ ns.items }}
      overnight_count: "{{ overnight_deliver | length }}"
      overnight_title: >-
        {% if family_mode == 'battery' %}
          Battery Sentinel: {{ overnight_count }} {{ 'battery' if overnight_count | int == 1 else 'batteries' }} went low overnight
        {% elif family_mode == 'entity' %}
          Entity Sentinel: {{ overnight_count }} {{ 'entity' if overnight_count | int == 1 else 'entities' }} went quiet overnight
        {% else %}
          Sentinel report
        {% endif %}
      overnight_body: >-
        {{ overnight_deliver | map(attribute='line') | list | join('\n') }}{% if open_count | int > overnight_count | int %}{{ '\n' }}Also open: {{ open_count | int - overnight_count | int }} more{% endif %}
      push_title: "{{ report_title if reminder_daily_sends else (overnight_title if overnight_sends else new_title) }}"
      push_body: "{{ report_body if reminder_daily_sends else (overnight_body if overnight_sends else new_body) }}"

  - alias: Persist the helper when the broken-Sentinel state, the held flag, or the reminder date actually changed
    if:
      - condition: template
        value_template: "{{ memory_needs_write }}"
    then:
      - action: input_text.set_value
        continue_on_error: true
        data:
          value: "{{ stored_value | trim }}"
        target:
          entity_id: !input memory_helper

  - alias: Broken-Sentinel notification, its own card, change-detected, does not block the report
    if:
      - condition: template
        value_template: "{{ upstream_broken_live }}"
    then:
      - alias: Notify that a source Sentinel is not working
        if:
          - condition: template
            value_template: "{{ upstream_should_notify }}"
        then:
          - alias: Persistent card for the broken Sentinel
            if:
              - condition: template
                value_template: "{{ persistent_enabled }}"
            then:
              - action: persistent_notification.create
                continue_on_error: true
                data:
                  notification_id: "{{ notification_tag }}_upstream"
                  title: Sentinel not working
                  message: >-
                    A source Sentinel is reporting a problem and is not monitoring. Fix it, then this clears. Detail: {{ upstream_error_live }}
          - alias: Push for the broken Sentinel; high pierces quiet hours, normal waits, a reminder run delivers to both
            if:
              - condition: template
                value_template: "{{ push_plan | length > 0 }}"
            then:
              - repeat:
                  for_each: "{{ push_plan }}"
                  sequence:
                    - alias: Push to this target only if high priority, outside quiet hours, or a reminder run; continue_on_error makes a dead target non-fatal
                      if:
                        - condition: template
                          value_template: "{{ repeat.item.priority == 'high' or not in_quiet_hours or is_reminder }}"
                      then:
                        - action: "{{ repeat.item.target }}"
                          continue_on_error: true
                          data:
                            title: Sentinel not working
                            message: >-
                              A source Sentinel is reporting a problem and is not monitoring. Detail: {{ upstream_error_live }}
                            data:
                              tag: "{{ notification_tag }}_upstream"
                              priority: >-
                                {{ 'high' if repeat.item.priority == 'high' else 'normal' }}
                              ttl: >-
                                {{ 0 if repeat.item.priority == 'high' else 3600 }}
                              channel: >-
                                {{ 'alarm_stream' if repeat.item.priority == 'high' else 'default' }}
                              importance: >-
                                {{ 'high' if repeat.item.priority == 'high' else 'default' }}
                              push:
                                interruption-level: >-
                                  {{ 'time-sensitive' if repeat.item.priority == 'high' else 'active' }}

  - alias: Dismiss the broken-Sentinel card once all source Sentinels are healthy again
    if:
      - condition: template
        value_template: "{{ persistent_enabled and not upstream_broken_live }}"
    then:
      - action: persistent_notification.dismiss
        continue_on_error: true
        data:
          notification_id: "{{ notification_tag }}_upstream"

  - alias: Dismiss the report card whenever nothing is open, unless the all-clear should show
    if:
      - condition: template
        value_template: "{{ persistent_enabled and open_count | int == 0 and not is_all_clear }}"
    then:
      - action: persistent_notification.dismiss
        continue_on_error: true
        data:
          notification_id: "{{ notification_tag }}"

  - alias: Daily-summary all-clear when nothing is flagged at all; a persistent card plus a push to high-priority targets only
    if:
      - condition: template
        value_template: "{{ is_all_clear }}"
    then:
      - alias: Persistent all-clear card
        if:
          - condition: template
            value_template: "{{ persistent_enabled }}"
        then:
          - action: persistent_notification.create
            continue_on_error: true
            data:
              notification_id: "{{ notification_tag }}"
              title: >-
                {% if family_mode == 'battery' %}Battery Sentinel: all clear{% elif family_mode == 'entity' %}Entity Sentinel: all clear{% else %}Sentinel: all clear{% endif %}
              message: >-
                {% if family_mode == 'battery' %}All monitored batteries OK.{% elif family_mode == 'entity' %}All monitored entities reporting.{% else %}All monitored entities OK.{% endif %}
      - alias: Push the all-clear to high-priority targets only; an all-clear is not urgent, so it goes at normal delivery settings
        if:
          - condition: template
            value_template: "{{ push_plan | selectattr('priority', 'eq', 'high') | list | length > 0 }}"
        then:
          - repeat:
              for_each: "{{ push_plan | selectattr('priority', 'eq', 'high') | list }}"
              sequence:
                - alias: Push the all-clear to this high-priority target; continue_on_error makes a dead target non-fatal
                  action: "{{ repeat.item.target }}"
                  continue_on_error: true
                  data:
                    title: >-
                      {% if family_mode == 'battery' %}Battery Sentinel: all clear{% elif family_mode == 'entity' %}Entity Sentinel: all clear{% else %}Sentinel: all clear{% endif %}
                    message: >-
                      {% if family_mode == 'battery' %}All monitored batteries OK.{% elif family_mode == 'entity' %}All monitored entities reporting.{% else %}All monitored entities OK.{% endif %}
                    data:
                      tag: "{{ notification_tag }}"
                      priority: normal
                      ttl: 3600
                      channel: default
                      importance: default
                      push:
                        interruption-level: active

  - alias: Update the report card with the current open items whenever the list changed or a notification goes out
    if:
      - condition: template
        value_template: "{{ persistent_enabled and open_count | int > 0 and (list_dirty or should_push) }}"
    then:
      - action: persistent_notification.create
        continue_on_error: true
        data:
          notification_id: "{{ notification_tag }}"
          title: "{{ report_title | trim }}"
          message: "{{ report_body }}"

  - alias: Push what this run decided; new items on an event run, the full open set on a reminder run; high pierces quiet hours, normal waits, a reminder run delivers to both
    if:
      - condition: template
        value_template: "{{ should_push and push_plan | length > 0 }}"
    then:
      - repeat:
          for_each: "{{ push_plan }}"
          sequence:
            - alias: Push to this target only if high priority, outside quiet hours, or a reminder run; continue_on_error makes a dead target non-fatal
              if:
                - condition: template
                  value_template: "{{ repeat.item.priority == 'high' or not in_quiet_hours or is_reminder }}"
              then:
                - action: "{{ repeat.item.target }}"
                  continue_on_error: true
                  data:
                    title: "{{ push_title | trim }}"
                    message: "{{ push_body }}"
                    data:
                      tag: "{{ notification_tag }}"
                      priority: >-
                        {{ 'high' if repeat.item.priority == 'high' else 'normal' }}
                      ttl: >-
                        {{ 0 if repeat.item.priority == 'high' else 3600 }}
                      channel: >-
                        {{ 'alarm_stream' if repeat.item.priority == 'high' else 'default' }}
                      importance: >-
                        {{ 'high' if repeat.item.priority == 'high' else 'default' }}
                      push:
                        interruption-level: >-
                          {{ 'time-sensitive' if repeat.item.priority == 'high' else 'active' }}

  - alias: Log the result
    if:
      - condition: template
        value_template: "{{ debug_enabled }}"
    then:
      - action: system_log.write
        continue_on_error: true
        data:
          level: info
          logger: sentinel_notify
          message: >-
            Sentinel Notify v{{ version }} | mode: {{ family_mode }} | trigger: {{ trigger.id }} | flagged: {{ flagged_count }} | open: {{ open_count }} | acked: {{ acked_open_count }} | additions: {{ additions | length }} | kind_changed: {{ kind_changed | length }} | silent_updates: {{ silent_updates | length }} | recovered: {{ recovered | length }} | notify: {{ should_push }} ({{ 'daily' if reminder_daily_sends else 'overnight' if overnight_sends else 'new' if event_should_notify else 'none' }}) | reminder_due: {{ reminder_due }} | overnight_window: {{ overnight_items | length }} | all_clear: {{ is_all_clear }} | held_prev: {{ previous_held }} | held_new: {{ held_new | string | trim }} | upstream_broken(live): {{ upstream_broken_live }} | upstream_notify: {{ upstream_should_notify }} | quiet: {{ in_quiet_hours }} | targets: {{ push_plan | length }} (high {{ high_priority_targets | length }}, normal {{ normal_priority_targets | length }})
