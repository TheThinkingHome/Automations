    1.0.0-alpha.7.2
  author: James Lander (xeazy.com)
  domain: automation
  homeassistant:
    min_version: 2024.10.0
  source_url: https://github.com/TheThinkingHome/Automations/blob/main/blueprints/automation/sentinel_notify.yaml
  input:
    mode_section:
      name: Mode
      icon: mdi:shape-outline
      description: Choose which Sentinel family this companion watches. One family per instance.
      input:
        family_mode:
          name: Sentinel family
          description: >-
            Battery watches Battery Sentinel sensors and reports low batteries.
            Entity watches Entity Sentinel sensors and reports entities that have
            gone quiet. Pick one. If you run both Sentinels, build two copies of
            this companion.
          default: battery
          selector:
            select:
              options:
                - label: Battery (report low batteries)
                  value: battery
                - label: Entity (report entities gone quiet)
                  value: entity

    source_section:
      name: Sensors to Watch
      icon: mdi:radar
      description: The Sentinel sensors this companion reads. Pick sensors of the family you chose above.
      input:
        source_sensors:
          name: Sentinel sensors
          description: >-
            One or more Sentinel sensors of the chosen family. Their flagged
            devices are combined into one list, so a single notification covers
            all of them. Pointing at the wrong family yields a setup error.
          selector:
            entity:
              filter:
                - domain: sensor
              multiple: true
        memory_helper:
          name: Memory helper (input_text)
          description: >-
            REQUIRED. An input_text helper this companion uses to remember what it
            last reported, so it only notifies on a change. Create one first
            (Settings, Devices & Services, Helpers, Create Helper, Text) and select
            it here. CRITICAL: every copy of this companion must have its OWN
            dedicated helper. Two copies sharing one helper will overwrite each
            other's memory and cross-fire endless notifications. One helper per copy.
          selector:
            entity:
              filter:
                - domain: input_text
              multiple: false

    battery_section:
      name: Battery Settings
      icon: mdi:battery-alert
      description: Fill this in only if the mode above is Battery. Ignored for Entity.
      collapsed: true
      input:
        battery_report_offline:
          name: Also report offline batteries
          description: >-
            When on, batteries that are currently unavailable or unknown (the
            sensor's unavailable_entities) are reported alongside the low ones. Off
            by default, so you hear only about low batteries.
          default: false
          selector:
            boolean: {}

    notify_section:
      name: Notification Targets and Style
      icon: mdi:bell-ring
      description: How and where to send. Shared by both families.
      input:
        high_priority_targets:
          name: High-priority push targets
          description: >-
            The mobile_app notify ACTIONS that should receive HIGH-priority pushes,
            one per line, each in the form notify.mobile_app_your_phone. High
            priority bypasses Do Not Disturb (an alarm sound on Android, a
            time-sensitive alert on iOS) AND pierces quiet hours: a high-priority
            target is pushed the moment something is flagged, day or night. Use the
            ACTION name (notify.mobile_app_...), NOT the notify entity
            (notify.your_phone): only the action carries the priority and sound
            options. Find the exact name in Settings, Developer tools, Actions,
            search mobile_app. Leave empty for no high-priority pushes.
          default: []
          selector:
            text:
              multiple: true
              multiline: false
        normal_priority_targets:
          name: Normal-priority push targets
          description: >-
            The mobile_app notify ACTIONS that should receive NORMAL-priority pushes,
            one per line, same notify.mobile_app_your_phone form. Normal priority is
            standard delivery AND respects quiet hours: a normal-priority target is
            held during the quiet window; use the Daily Reminder's overnight mode to
            be told in the morning about a change that was held. A target listed in
            both lists is treated as high (pushed once, at high priority). Leave
            empty for no normal-priority pushes.
          default: []
          selector:
            text:
              multiple: true
              multiline: false
        persistent_enabled:
          name: Create a persistent notification
          description: >-
            When on, also creates or updates a persistent notification in the Home
            Assistant UI, replaced in place each time so it never stacks.
          default: true
          selector:
            boolean: {}
        notification_tag:
          name: Notification tag
          description: >-
            The tag used to replace this companion's push in place rather than
            stacking new ones. Leave the default unless you run several copies
            pushing to the same device, in which case give each a distinct tag.
          default: sentinel_notify
          selector:
            text: {}

    quiet_hours_section:
      name: Quiet Hours
      icon: mdi:sleep
      description: An optional daily window during which phone pushes to normal-priority targets are held back. The persistent card still updates. Pair it with the Daily Reminder's overnight mode to hear in the morning about a change held overnight. Off by default.
      collapsed: true
      input:
        quiet_hours_enabled:
          name: Enable quiet hours
          description: >-
            When on, phone pushes to normal-priority targets (both the normal alert
            and the broken-Sentinel alert) are held during the window below;
            high-priority targets are still pushed. The persistent notification
            still updates silently and the change-detection memory still tracks, so
            nothing is lost; only the push waits. Nothing fires when the window
            ends: to hear in the morning about a change that was held overnight,
            set the Daily Reminder below to its overnight mode, with a time at or
            after the quiet-hours end. With the reminder set to none, a change held
            overnight reaches normal-priority targets only on the next change. When
            off, pushes go out as soon as something changes, at any hour.
          default: false
          selector:
            boolean: {}
        quiet_hours_start:
          name: Quiet hours start
          description: >-
            When the quiet window begins. For example 22:00:00 for 10 in the
            evening. A window whose start is later than its end is treated as
            crossing midnight.
          default: "22:00:00"
          selector:
            time: {}
        quiet_hours_end:
          name: Quiet hours end
          description: >-
            When the quiet window ends. Nothing fires at this time; it only defines
            the window. For example 08:00:00 for 8 in the morning.
          default: "08:00:00"
          selector:
            time: {}

    reminder_section:
      name: Daily Reminder
      icon: mdi:calendar-clock
      description: An optional once-a-day scheduled send at a time you set. Off by default.
      collapsed: true
      input:
        daily_reminder_mode:
          name: Daily reminder mode
          description: >-
            What the once-a-day send at the time below does. NONE: nothing
            scheduled ever fires; you are notified only on a change. OVERNIGHT
            CHANGES: fires only when a change occurred during your quiet hours, and
            lists everything currently flagged; a quiet night stays silent.
            Requires quiet hours to be enabled (with quiet hours off nothing is
            ever held, so this behaves as none), and the time below should be at or
            after the quiet-hours end. DAILY SUMMARY: fires every day; the flagged
            list when something needs attention, or an all-clear when nothing does.
            The all-clear goes to the persistent card and to high-priority targets
            only, at normal delivery settings, never to normal-priority targets. In
            either active mode the send reuses the same tag, so it refreshes the
            existing card rather than stacking, delivers to normal-priority targets
            even if the time falls inside quiet hours, and re-raises the
            broken-Sentinel alert if a source is still broken. It never disturbs
            change detection.
          default: none
          selector:
            select:
              options:
                - label: None (notify only on change)
                  value: none
                - label: Overnight changes (only if something changed during quiet hours)
                  value: overnight
                - label: Daily summary (every day, all-clear when nothing is flagged)
                  value: daily
        daily_reminder_time:
          name: Reminder time
          description: >-
            The time of day the reminder fires, when the mode above is not none.
            For the overnight mode, set it at or after the quiet-hours end. For
            example 08:00:00 for 8 in the morning.
          default: "08:00:00"
          selector:
            time: {}

    advanced_section:
      name: Advanced
      icon: mdi:tune
      description: Broken-Sentinel timing, optional active refresh, and diagnostics. The defaults suit most systems.
      collapsed: true
      input:
        upstream_debounce_seconds:
          name: Broken-Sentinel debounce (seconds)
          description: >-
            How long a source Sentinel must stay unavailable or unknown before it is
            reported as not working. This rides out a Home Assistant restart, when a
            source briefly goes unavailable as the system cycles, so a normal reboot
            does not fire a false "Sentinel not working" alert. 240 (four minutes) is
            a starting point that clears a normal restart; it is in the same spirit as
            the startup grace the Sentinel sensors use. Lower it for a faster
            broken-Sentinel alert, at the risk of a restart occasionally tripping it.
            Raise it if an unstable system still trips it during reboots. A source in
            setup_error, reporting ok:false, or genuinely missing is reported
            immediately regardless; only the unavailable/unknown case is debounced.
          default: 240
          selector:
            number:
              min: 0
              max: 3600
              step: 10
              unit_of_measurement: seconds
              mode: box
        source_refresh_button:
          name: Source refresh button (optional)
          description: >-
            Optional. An input_button that re-evaluates your source Sentinels, the
            same button you set as the refresh_button on Battery or Entity Sentinel
            (one shared button refreshes a whole family). When set and a source reads
            unavailable, this companion presses it and waits briefly for the state to
            recover before deciding, so a source that had only gone stale is confirmed
            healthy in seconds rather than at its next scheduled scan. Leave it unset
            and nothing is pressed; the debounce above still handles restarts.
          default: ""
          selector:
            entity:
              filter:
                - domain: input_button
              multiple: false
        source_refresh_timeout:
          name: Source refresh timeout (seconds)
          description: >-
            The most time to wait for sources to recover after pressing the refresh
            button above. The wait ends the instant every source is healthy, so a fast
            system returns in a second or two; this cap only matters on a slow hub with
            a large mesh that needs longer to re-evaluate. Raise it if your sources
            take longer than this to report back after a refresh. Ignored when no
            refresh button is set.
          default: 15
          selector:
            number:
              min: 1
              max: 120
              step: 1
              unit_of_measurement: seconds
              mode: box
        debug_enabled:
          name: Debug logging
          description: >-
            When on, writes one diagnostic line to the system log each check,
            carrying the version, mode, current fingerprint, and whether it
            notified. Requires a logger entry at info level to appear.
          default: false
          selector:
            boolean: {}

mode: single
max_exceeded: silent

variables:
  version: 1.0.0-alpha.7.2
  family_mode: !input family_mode
  source_sensors: !input source_sensors
  memory_helper: !input memory_helper
  battery_report_offline: !input battery_report_offline
  high_priority_targets: !input high_priority_targets
  normal_priority_targets: !input normal_priority_targets
  persistent_enabled: !input persistent_enabled
  notification_tag: !input notification_tag
  quiet_hours_enabled: !input quiet_hours_enabled
  quiet_hours_start: !input quiet_hours_start
  quiet_hours_end: !input quiet_hours_end
  daily_reminder_mode: !input daily_reminder_mode
  daily_reminder_time: !input daily_reminder_time
  upstream_debounce_seconds: !input upstream_debounce_seconds
  source_refresh_button: !input source_refresh_button
  source_refresh_timeout: !input source_refresh_timeout
  debug_enabled: !input debug_enabled

  in_quiet_hours: >-
    {% if not quiet_hours_enabled %}
      {{ false }}
    {% else %}
      {% set n = now().strftime('%H:%M:%S') %}
      {% set s = quiet_hours_start %}
      {% set e = quiet_hours_end %}
      {% if s == e %}
        {{ false }}
      {% elif s < e %}
        {{ s <= n and n < e }}
      {% else %}
        {{ n >= s or n < e }}
      {% endif %}
    {% endif %}

  push_plan: >-
    {%- set ns = namespace(plan=[], seen=[]) -%}
    {%- for t in high_priority_targets -%}
      {%- if t not in ns.seen -%}
        {%- set ns.plan = ns.plan + [{'target': t, 'priority': 'high'}] -%}
        {%- set ns.seen = ns.seen + [t] -%}
      {%- endif -%}
    {%- endfor -%}
    {%- for t in normal_priority_targets -%}
      {%- if t not in ns.seen -%}
        {%- set ns.plan = ns.plan + [{'target': t, 'priority': 'normal'}] -%}
        {%- set ns.seen = ns.seen + [t] -%}
      {%- endif -%}
    {%- endfor -%}
    {{ ns.plan }}

  refresh_button_set: >-
    {{ source_refresh_button not in [none, ''] }}

  sources_settling: >-
    {% set ns = namespace(latest=none) %}
    {% for s in source_sensors %}
      {% set bt = state_attr(s, 'boot_time') | as_datetime(none) %}
      {% if bt is not none and (ns.latest is none or bt > ns.latest) %}
        {% set ns.latest = bt %}
      {% endif %}
    {% endfor %}
    {{ ns.latest is not none and (now() - ns.latest).total_seconds() < upstream_debounce_seconds }}

  any_source_unavailable: >-
    {% set ns = namespace(any=false) %}
    {% for s in source_sensors %}
      {% if states(s) in ['unavailable', 'unknown'] %}
        {% set ns.any = true %}
      {% endif %}
    {% endfor %}
    {{ ns.any }}

  any_source_blipping: >-
    {% set ns = namespace(any=false) %}
    {% for s in source_sensors %}
      {% if states(s) in ['unavailable', 'unknown'] and states[s] is not none %}
        {% if (now() - states[s].last_changed).total_seconds() < upstream_debounce_seconds %}
          {% set ns.any = true %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ ns.any }}

  setup_error: >-
    {% set ns = namespace(err='') %}
    {% if source_sensors | length == 0 %}
      {% set ns.err = 'No source sensors selected. Pick one or more Sentinel sensors of the chosen family.' %}
    {% elif memory_helper in [none, ''] %}
      {% set ns.err = 'No memory helper selected. Create an input_text helper and select it.' %}
    {% elif states[memory_helper] is none %}
      {% set ns.err = 'Memory helper ' ~ memory_helper ~ ' does not exist. It may have been deleted or renamed. Re-create it (or select another) and re-save this automation.' %}
    {% else %}
      {% for s in source_sensors %}
        {% if states(s) not in ['unavailable', 'unknown'] and state_attr(s, 'devices') is none and state_attr(s, 'total_monitored') is none %}
          {% set ns.err = 'Sensor ' ~ s ~ ' does not look like a Sentinel sensor (no devices or total_monitored attribute). Check the sensor and the chosen family.' %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ ns.err }}

  ok: "{{ setup_error == '' }}"

  upstream_error: >-
    {% set ns = namespace(bad=[]) %}
    {% if ok %}
      {% for s in source_sensors %}
        {% if states(s) in ['unavailable', 'unknown'] %}
          {% set elapsed = (now() - states[s].last_changed).total_seconds() if states[s] is not none else 999999 %}
          {% if elapsed >= upstream_debounce_seconds %}
            {% set ns.bad = ns.bad + [s ~ ' is ' ~ states(s)] %}
          {% endif %}
        {% elif states(s) == 'setup_error' or state_attr(s, 'ok') == false %}
          {% set msg = state_attr(s, 'error') | default('') %}
          {% set ns.bad = ns.bad + [s ~ (': ' ~ msg if msg else ' reports a setup error')] %}
        {% endif %}
      {% endfor %}
    {% endif %}
    {{ ns.bad | join(', ') }}

  upstream_broken: "{{ ok and upstream_error != '' }}"

  flagged_items: >-
    {% set ns = namespace(items=[]) %}
    {% if ok and family_mode == 'battery' %}
      {% for s in source_sensors %}
        {% for d in (state_attr(s, 'devices') or []) %}
          {% set ns.items = ns.items + [{
            'entity_id': d.entity_id,
            'name': d.name,
            'area': d.area,
            'level': d.level,
            'battery_type': d.battery_type | default(''),
            'reason': '',
            'age': '',
            'kind': 'low'
          }] %}
        {% endfor %}
        {% if battery_report_offline %}
          {% for u in (state_attr(s, 'unavailable_entities') or []) %}
            {% set ns.items = ns.items + [{
              'entity_id': u.entity_id,
              'name': u.name,
              'area': u.area,
              'level': none,
              'battery_type': '',
              'reason': '',
              'age': '',
              'kind': 'offline'
            }] %}
          {% endfor %}
        {% endif %}
      {% endfor %}
    {% elif ok and family_mode == 'entity' %}
      {% for s in source_sensors %}
        {% for d in (state_attr(s, 'devices') or []) %}
          {% set ns.items = ns.items + [{
            'entity_id': d.entity_id,
            'name': d.name,
            'area': d.area,
            'level': none,
            'battery_type': '',
            'reason': d.reason | default('unavailable'),
            'age': d.age | default(''),
            'kind': d.reason | default('unavailable')
          }] %}
        {% endfor %}
      {% endfor %}
    {% endif %}
    {{ ns.items }}

  flagged_items_unique: >-
    {% if family_mode == 'entity' %}
      {% set severe_reasons = ['unavailable', 'unknown', 'missing', 'never_reported'] %}
      {% set severe_ids = flagged_items | selectattr('kind', 'in', severe_reasons)
                          | map(attribute='entity_id') | list %}
    {% else %}
      {% set severe_ids = flagged_items | selectattr('kind', 'eq', 'offline')
                          | map(attribute='entity_id') | list %}
    {% endif %}
    {% set ns = namespace(items=[], seen=[]) %}
    {% for d in flagged_items %}
      {% if d.entity_id not in ns.seen %}
        {% set ns.seen = ns.seen + [d.entity_id] %}
        {% if family_mode == 'entity' %}
          {% if d.entity_id in severe_ids and d.kind not in ['unavailable', 'unknown', 'missing', 'never_reported'] %}
            {% set sev = (flagged_items | selectattr('entity_id', 'eq', d.entity_id)
                          | selectattr('kind', 'in', ['unavailable', 'unknown', 'missing', 'never_reported'])
                          | list | first) %}
            {% set ns.items = ns.items + [sev] %}
          {% else %}
            {% set ns.items = ns.items + [d] %}
          {% endif %}
        {% else %}
          {% if d.entity_id in severe_ids and d.kind != 'offline' %}
            {% set ns.items = ns.items + [{
              'entity_id': d.entity_id,
              'name': d.name,
              'area': d.area,
              'level': none,
              'battery_type': '',
              'reason': '',
              'age': '',
              'kind': 'offline'
            }] %}
          {% else %}
            {% set ns.items = ns.items + [d] %}
          {% endif %}
        {% endif %}
      {% endif %}
    {% endfor %}
    {{ ns.items }}

  fingerprint_keys: >-
    {% set ns = namespace(keys=[]) %}
    {% for d in flagged_items_unique %}
      {% set ns.keys = ns.keys + [d.entity_id ~ '|' ~ d.kind] %}
    {% endfor %}
    {{ ns.keys | sort }}

  fingerprint_plain: "{{ fingerprint_keys | join(',') }}"

  fingerprint: "{{ fingerprint_plain | md5 if fingerprint_plain != '' else '' }}"
  upstream_fingerprint: "{{ upstream_error | md5 if upstream_error != '' else '' }}"

  stored_raw: "{{ states(memory_helper) }}"
  stored_parts: >-
    {% set ns = namespace(b='', u='', h='', t='') %}
    {% for seg in stored_raw.split('|') %}
      {% if seg.startswith('b=') %}{% set ns.b = seg[2:] %}
      {% elif seg.startswith('u=') %}{% set ns.u = seg[2:] %}
      {% elif seg.startswith('h=') %}{% set ns.h = seg[2:] %}
      {% elif seg.startswith('t=') %}{% set ns.t = seg[2:] %}
      {% endif %}
    {% endfor %}
    {{ {'b': ns.b, 'u': ns.u, 'h': ns.h, 't': ns.t} }}
  previous_fingerprint: "{{ stored_parts.b }}"
  previous_upstream: "{{ stored_parts.u }}"
  previous_held: "{{ '1' if stored_parts.h == '1' else '0' }}"
  previous_notified_iso: "{{ stored_parts.t }}"

  changed: "{{ ok and (fingerprint | trim) != (previous_fingerprint | trim) }}"

  flagged_count: "{{ flagged_items_unique | length }}"

  title: >-
    {% if family_mode == 'battery' %}
      Battery Sentinel: {{ flagged_count }} {{ 'battery' if flagged_count | int == 1 else 'batteries' }} to check
    {% elif family_mode == 'entity' %}
      Entity Sentinel: {{ flagged_count }} {{ 'entity' if flagged_count | int == 1 else 'entities' }} gone quiet
    {% else %}
      Sentinel report
    {% endif %}

  body: >-
    {% set lines = namespace(items=[]) %}
    {% for d in flagged_items_unique | sort(attribute='name') %}
      {% set nm = d.name | default('Unknown') %}
      {% set ar = d.area | default('') %}
      {% set suffix = (' - ' ~ ar) if ar not in [none, '', 'Unassigned'] else '' %}
      {% if family_mode == 'entity' %}
        {% set rs = d.reason | default('unavailable') %}
        {% set ag = d.age | default('') %}
        {% set detail = rs ~ ((', ' ~ ag) if ag not in [none, ''] else '') %}
        {% set line = nm ~ ' (' ~ detail ~ ')' ~ suffix %}
      {% else %}
        {% set lvl = d.level | default(none) %}
        {% set has_pct = lvl is not none and lvl not in ['unknown', 'unavailable', ''] and (lvl | string | float(none)) is not none %}
        {% if d.kind == 'offline' %}
          {% set line = nm ~ ' (offline)' ~ suffix %}
        {% elif not has_pct %}
          {% set line = nm ~ ' (low)' ~ suffix %}
        {% else %}
          {% set bt = d.battery_type | default('') %}
          {% set line = nm ~ ' (' ~ (lvl | float | round(0) | int) ~ '%' ~ ((', ' ~ bt) if bt else '') ~ ')' ~ suffix %}
        {% endif %}
      {% endif %}
      {% set lines.items = lines.items + [line] %}
    {% endfor %}
    {{ lines.items | join('\n') }}

trigger:
  - trigger: homeassistant
    event: start
    id: ha_start
    alias: Re-evaluate when Home Assistant starts
  - trigger: state
    entity_id: !input source_sensors
    id: source_change
    alias: Re-evaluate when a watched sensor changes
  - trigger: state
    entity_id: !input source_sensors
    to:
      - unavailable
      - unknown
    for:
      seconds: !input upstream_debounce_seconds
    id: source_broken
    alias: A source has stayed unavailable for the full debounce, wake up and report it broken
  - trigger: time
    at: !input daily_reminder_time
    id: daily_reminder
    alias: Scheduled daily send at the configured time, active when the reminder mode is not none

condition:
  - alias: For a source-sensor trigger, run only if the monitored content actually changed (ignore attribute-only churn like a refreshed evaluation timestamp). Other triggers always pass.
    condition: template
    value_template: >-
      {% if trigger.id != 'source_change'
            or trigger.from_state is none
            or trigger.to_state is none %}
        {{ true }}
      {% else %}
        {% set f = trigger.from_state %}
        {% set t = trigger.to_state %}
        {% set f_dev = f.attributes.get('devices', none) %}
        {% set t_dev = t.attributes.get('devices', none) %}
        {% set f_un = f.attributes.get('unavailable_entities', none) if battery_report_offline else none %}
        {% set t_un = t.attributes.get('unavailable_entities', none) if battery_report_offline else none %}
        {{ f.state != t.state or f_dev != t_dev or f_un != t_un }}
      {% endif %}

action:
  - alias: Log the check
    if:
      - condition: template
        value_template: "{{ debug_enabled }}"
    then:
      - action: system_log.write
        continue_on_error: true
        data:
          level: info
          logger: sentinel_notify
          message: >-
            Sentinel Notify v{{ version }} | mode: {{ family_mode }} | trigger: {{ trigger.id }} | ok: {{ ok }}{% if not ok %} | ERROR: {{ setup_error }}{% endif %} | flagged: {{ flagged_count }} | changed: {{ changed }} | quiet: {{ in_quiet_hours }} | reminder_mode: {{ daily_reminder_mode }} | held: {{ previous_held }} | settling: {{ sources_settling }} | any_unavail: {{ any_source_unavailable }} | blipping: {{ any_source_blipping }} | refresh_set: {{ refresh_button_set }} | debounce: {{ upstream_debounce_seconds }}s | upstream(frozen): {{ upstream_error if upstream_error else 'none' }} | fingerprint: {{ fingerprint | trim }} | previous: {{ previous_fingerprint | trim }}

  - alias: Stop if setup error
    if:
      - condition: template
        value_template: "{{ not ok }}"
    then:
      - stop: Setup error, see the debug log and the README.

  - alias: Ride out the restart, hold memory and notifications while the source Sentinels settle after a reboot
    if:
      - condition: template
        value_template: "{{ sources_settling }}"
    then:
      - alias: Log that this run is held for settling
        if:
          - condition: template
            value_template: "{{ debug_enabled }}"
        then:
          - action: system_log.write
            continue_on_error: true
            data:
              level: info
              logger: sentinel_notify
              message: >-
                Sentinel Notify v{{ version }} | mode: {{ family_mode }} | trigger: {{ trigger.id }} | settling: sources rebooted within the last {{ upstream_debounce_seconds }}s, holding memory and notifications until they settle | flagged now: {{ flagged_count }} | memory kept: {{ previous_fingerprint | trim }}
      - stop: Sources settling after a restart; memory and notifications held so the pre-restart state survives the reboot.

  - alias: Active refresh, press the source refresh button and wait for recovery, only when a source is blipping (unavailable inside the debounce, a recovery candidate) and a button is configured; a source already broken past the debounce is never pressed or waited for
    if:
      - condition: template
        value_template: "{{ any_source_blipping and refresh_button_set }}"
    then:
      - alias: Log that we are refreshing
        if:
          - condition: template
            value_template: "{{ debug_enabled }}"
        then:
          - action: system_log.write
            continue_on_error: true
            data:
              level: info
              logger: sentinel_notify
              message: >-
                Sentinel Notify v{{ version }} | mode: {{ family_mode }} | refresh: pressing {{ source_refresh_button }}, waiting up to {{ source_refresh_timeout }}s for sources to recover
      - alias: Press the source refresh button (only reached when refresh_button_set is true, so the target is always a real button)
        action: input_button.press
        continue_on_error: true
        target:
          entity_id: "{{ source_refresh_button }}"
      - alias: Wait for every source to leave the unavailable/unknown state, bounded by the timeout
        wait_template: >-
          {% set ns = namespace(any=false) %}
          {% for s in source_sensors %}
            {% if states(s) in ['unavailable', 'unknown'] %}
              {% set ns.any = true %}
            {% endif %}
          {% endfor %}
          {{ not ns.any }}
        timeout:
          seconds: !input source_refresh_timeout
        continue_on_timeout: true
      - alias: Log the refresh outcome
        if:
          - condition: template
            value_template: "{{ debug_enabled }}"
        then:
          - action: system_log.write
            continue_on_error: true
            data:
              level: info
              logger: sentinel_notify
              message: >-
                Sentinel Notify v{{ version }} | mode: {{ family_mode }} | refresh: {{ 'sources recovered' if wait.completed else 'timed out, sources still unavailable' }} | waited: {{ (source_refresh_timeout - wait.remaining) | round(1) }}s

  - alias: Recompute the broken-Sentinel decision live, so it reflects any recovery from the refresh above (top-level variables were frozen at trigger time)
    variables:
      upstream_error_live: >-
        {% set ns = namespace(bad=[]) %}
        {% if ok %}
          {% for s in source_sensors %}
            {% if states(s) in ['unavailable', 'unknown'] %}
              {% set elapsed = (now() - states[s].last_changed).total_seconds() if states[s] is not none else 999999 %}
              {% if elapsed >= upstream_debounce_seconds %}
                {% set ns.bad = ns.bad + [s ~ ' is ' ~ states(s)] %}
              {% endif %}
            {% elif states(s) == 'setup_error' or state_attr(s, 'ok') == false %}
              {% set msg = state_attr(s, 'error') | default('') %}
              {% set ns.bad = ns.bad + [s ~ (': ' ~ msg if msg else ' reports a setup error')] %}
            {% endif %}
          {% endfor %}
        {% endif %}
        {{ ns.bad | join(', ') }}
      upstream_broken_live: "{{ ok and upstream_error_live != '' }}"
      upstream_fingerprint_live: "{{ upstream_error_live | md5 if upstream_error_live != '' else '' }}"
      upstream_changed_live: "{{ ok and (upstream_fingerprint_live | trim) != (previous_upstream | trim) }}"
      sources_blipping_live: >-
        {% set ns = namespace(any=false) %}
        {% for s in source_sensors %}
          {% if states(s) in ['unavailable', 'unknown'] and states[s] is not none %}
            {% if (now() - states[s].last_changed).total_seconds() < upstream_debounce_seconds %}
              {% set ns.any = true %}
            {% endif %}
          {% endif %}
        {% endfor %}
        {{ ns.any }}

  - alias: Log the live upstream state after any refresh
    if:
      - condition: template
        value_template: "{{ debug_enabled }}"
    then:
      - action: system_log.write
        continue_on_error: true
        data:
          level: info
          logger: sentinel_notify
          message: >-
            Sentinel Notify v{{ version }} | mode: {{ family_mode }} | upstream(live): {{ upstream_error_live if upstream_error_live else 'none' }} | upstream_broken(live): {{ upstream_broken_live }} | upstream_changed(live): {{ upstream_changed_live }} | blipping(live): {{ sources_blipping_live }} | previous_upstream: {{ previous_upstream | trim }}

  - alias: Blip hold, stop while a source is briefly unavailable inside the debounce, so an incomplete flagged list cannot wipe the memory or fire false alerts; the source_broken trigger re-runs at the debounce if it stays down, and a recovery re-runs via its own state change
    if:
      - condition: template
        value_template: "{{ sources_blipping_live }}"
    then:
      - alias: Log that this run is held for a blip
        if:
          - condition: template
            value_template: "{{ debug_enabled }}"
        then:
          - action: system_log.write
            continue_on_error: true
            data:
              level: info
              logger: sentinel_notify
              message: >-
                Sentinel Notify v{{ version }} | mode: {{ family_mode }} | trigger: {{ trigger.id }} | blip: a source is unavailable but inside the {{ upstream_debounce_seconds }}s debounce, holding memory and notifications until it recovers or is declared broken | flagged now: {{ flagged_count }} | memory kept: {{ previous_fingerprint | trim }}
      - stop: A source is unavailable but still inside the debounce; memory and notifications held so a brief blip cannot wipe the pre-blip state.

  - alias: Work out what to notify this run, the new held flag, and the memory value
    variables:
      is_reminder: "{{ trigger.id == 'daily_reminder' and daily_reminder_mode != 'none' }}"
      is_all_clear: "{{ is_reminder and daily_reminder_mode == 'daily' and flagged_count | int == 0 }}"
      reminder_sends_flagged: >-
        {{ is_reminder and flagged_count | int > 0
           and (daily_reminder_mode == 'daily'
                or (daily_reminder_mode == 'overnight' and previous_held | string == '1')) }}
      battery_should_notify: "{{ changed or reminder_sends_flagged }}"
      upstream_should_notify: "{{ upstream_changed_live or (is_reminder and upstream_broken_live) }}"
      held_new: >-
        {%- if is_reminder and daily_reminder_mode == 'overnight' -%}0{%- elif changed and in_quiet_hours -%}1{%- elif changed -%}0{%- else -%}{{ previous_held }}{%- endif -%}
      memory_needs_write: "{{ changed or upstream_changed_live or (held_new | string | trim) != (previous_held | string | trim) }}"
      stored_value: >-
        b={{ fingerprint }}|u={{ upstream_fingerprint_live }}|h={{ held_new | string | trim }}|t={{ now().isoformat() }}

  - alias: Persist the memory when the fingerprints or the held flag actually changed
    if:
      - condition: template
        value_template: "{{ memory_needs_write }}"
    then:
      - action: input_text.set_value
        continue_on_error: true
        data:
          value: "{{ stored_value | trim }}"
        target:
          entity_id: !input memory_helper

  - alias: Broken-Sentinel notification, its own card, change-detected, does not block batteries
    if:
      - condition: template
        value_template: "{{ upstream_broken_live }}"
    then:
      - alias: Notify that a source Sentinel is not working
        if:
          - condition: template
            value_template: "{{ upstream_should_notify }}"
        then:
          - alias: Persistent card for the broken Sentinel
            if:
              - condition: template
                value_template: "{{ persistent_enabled }}"
            then:
              - action: persistent_notification.create
                continue_on_error: true
                data:
                  notification_id: "{{ notification_tag }}_upstream"
                  title: Sentinel not working
                  message: >-
                    A source Sentinel is reporting a problem and is not monitoring. Fix it, then this clears. Detail: {{ upstream_error_live }}
          - alias: Push for the broken Sentinel; high pierces quiet hours, normal waits, a reminder run delivers to both
            if:
              - condition: template
                value_template: "{{ push_plan | length > 0 }}"
            then:
              - repeat:
                  for_each: "{{ push_plan }}"
                  sequence:
                    - alias: Push to this target only if high priority, outside quiet hours, or a reminder run; continue_on_error makes a dead target non-fatal
                      if:
                        - condition: template
                          value_template: "{{ repeat.item.priority == 'high' or not in_quiet_hours or is_reminder }}"
                      then:
                        - action: "{{ repeat.item.target }}"
                          continue_on_error: true
                          data:
                            title: Sentinel not working
                            message: >-
                              A source Sentinel is reporting a problem and is not monitoring. Detail: {{ upstream_error_live }}
                            data:
                              tag: "{{ notification_tag }}_upstream"
                              priority: >-
                                {{ 'high' if repeat.item.priority == 'high' else 'normal' }}
                              ttl: >-
                                {{ 0 if repeat.item.priority == 'high' else 3600 }}
                              channel: >-
                                {{ 'alarm_stream' if repeat.item.priority == 'high' else 'default' }}
                              importance: >-
                                {{ 'high' if repeat.item.priority == 'high' else 'default' }}
                              push:
                                interruption-level: >-
                                  {{ 'time-sensitive' if repeat.item.priority == 'high' else 'active' }}

  - alias: Dismiss the broken-Sentinel card once all source Sentinels are healthy again
    if:
      - condition: template
        value_template: "{{ persistent_enabled and not upstream_broken_live }}"
    then:
      - action: persistent_notification.dismiss
        continue_on_error: true
        data:
          notification_id: "{{ notification_tag }}_upstream"

  - alias: Dismiss the battery card whenever nothing is flagged, unless the all-clear should show
    if:
      - condition: template
        value_template: "{{ persistent_enabled and flagged_count | int == 0 and not is_all_clear }}"
    then:
      - action: persistent_notification.dismiss
        continue_on_error: true
        data:
          notification_id: "{{ notification_tag }}"

  - alias: Daily-summary all-clear when the fleet is clean; a persistent card plus a push to high-priority targets only
    if:
      - condition: template
        value_template: "{{ is_all_clear }}"
    then:
      - alias: Persistent all-clear card
        if:
          - condition: template
            value_template: "{{ persistent_enabled }}"
        then:
          - action: persistent_notification.create
            continue_on_error: true
            data:
              notification_id: "{{ notification_tag }}"
              title: >-
                {% if family_mode == 'battery' %}Battery Sentinel: all clear{% elif family_mode == 'entity' %}Entity Sentinel: all clear{% else %}Sentinel: all clear{% endif %}
              message: >-
                {% if family_mode == 'battery' %}All monitored batteries OK.{% elif family_mode == 'entity' %}All monitored entities reporting.{% else %}All monitored entities OK.{% endif %}
      - alias: Push the all-clear to high-priority targets only; an all-clear is not urgent, so it goes at normal delivery settings
        if:
          - condition: template
            value_template: "{{ push_plan | selectattr('priority', 'eq', 'high') | list | length > 0 }}"
        then:
          - repeat:
              for_each: "{{ push_plan | selectattr('priority', 'eq', 'high') | list }}"
              sequence:
                - alias: Push the all-clear to this high-priority target; continue_on_error makes a dead target non-fatal
                  action: "{{ repeat.item.target }}"
                  continue_on_error: true
                  data:
                    title: >-
                      {% if family_mode == 'battery' %}Battery Sentinel: all clear{% elif family_mode == 'entity' %}Entity Sentinel: all clear{% else %}Sentinel: all clear{% endif %}
                    message: >-
                      {% if family_mode == 'battery' %}All monitored batteries OK.{% elif family_mode == 'entity' %}All monitored entities reporting.{% else %}All monitored entities OK.{% endif %}
                    data:
                      tag: "{{ notification_tag }}"
                      priority: normal
                      ttl: 3600
                      channel: default
                      importance: default
                      push:
                        interruption-level: active

  - alias: Battery notification, runs independently of any broken Sentinel
    if:
      - condition: template
        value_template: "{{ battery_should_notify }}"
    then:
      - alias: Create or update the persistent notification
        if:
          - condition: template
            value_template: "{{ persistent_enabled and flagged_count | int > 0 }}"
        then:
          - action: persistent_notification.create
            continue_on_error: true
            data:
              notification_id: "{{ notification_tag }}"
              title: "{{ title | trim }}"
              message: "{{ body }}"

      - alias: Push notifications; high pierces quiet hours, normal waits, a reminder run delivers to both
        if:
          - condition: template
            value_template: "{{ push_plan | length > 0 and flagged_count | int > 0 }}"
        then:
          - repeat:
              for_each: "{{ push_plan }}"
              sequence:
                - alias: Push to this target only if high priority, outside quiet hours, or a reminder run; continue_on_error makes a dead target non-fatal
                  if:
                    - condition: template
                      value_template: "{{ repeat.item.priority == 'high' or not in_quiet_hours or is_reminder }}"
                  then:
                    - action: "{{ repeat.item.target }}"
                      continue_on_error: true
                      data:
                        title: "{{ title | trim }}"
                        message: "{{ body }}"
                        data:
                          tag: "{{ notification_tag }}"
                          priority: >-
                            {{ 'high' if repeat.item.priority == 'high' else 'normal' }}
                          ttl: >-
                            {{ 0 if repeat.item.priority == 'high' else 3600 }}
                          channel: >-
                            {{ 'alarm_stream' if repeat.item.priority == 'high' else 'default' }}
                          importance: >-
                            {{ 'high' if repeat.item.priority == 'high' else 'default' }}
                          push:
                            interruption-level: >-
                              {{ 'time-sensitive' if repeat.item.priority == 'high' else 'active' }}

  - alias: Log the result
    if:
      - condition: template
        value_template: "{{ debug_enabled }}"
    then:
      - action: system_log.write
        continue_on_error: true
        data:
          level: info
          logger: sentinel_notify
          message: >-
            Sentinel Notify v{{ version }} | mode: {{ family_mode }} | trigger: {{ trigger.id }} | flagged: {{ flagged_count }} | battery_notify: {{ battery_should_notify }} | reminder: {{ is_reminder }} ({{ daily_reminder_mode }}) | all_clear: {{ is_all_clear }} | held_prev: {{ previous_held }} | held_new: {{ held_new | trim }} | upstream_broken(live): {{ upstream_broken_live }} | upstream_notify: {{ upstream_should_notify }} | quiet: {{ in_quiet_hours }} | targets: {{ push_plan | length }} (high {{ high_priority_targets | length }}, normal {{ normal_priority_targets | length }})
