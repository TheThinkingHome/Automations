# Sentinel Notify - a Home Assistant automation blueprint from The Thinking Home (xeazy.com)
#   Article: https://xeazy.com/battery-entity-sentinel-blueprints/
#
# Sentinel Notify is the notification companion to the Sentinel sensors. It does
# nothing on its own: it reads a Battery Sentinel or an Entity Sentinel and turns
# its rich output into change-aware notifications, by two independent streams:
#
#   THE ALERT (normal). Reads the source sensors' "devices" list and reports what is
#       flagged, low batteries with percentage, type, and area in Battery mode, or
#       entities gone quiet with reason and age in Entity mode. It fires only when
#       the flagged SET changes, judged by a sorted, md5-hashed fingerprint, so it
#       does not notify every cycle. Several sensors of one family combine into one
#       report, and a device reached by two overlapping sensors is de-duped to one
#       entry (offline wins over low, a genuinely-gone reason wins over frozen).
#   THE BROKEN-SENTINEL ALERT. A second, independent stream on its own card and its
#       own memory slot. It fires when a source Sentinel is itself not working,
#       setup_error, ok:false, or the sensor gone unavailable/unknown, so a silently
#       dead Sentinel cannot leave you thinking all is well. It rides alongside the
#       normal alert rather than suppressing it, so the healthy sensors still report.
#
# Scope: one Sentinel FAMILY per instance. Set the mode to Battery or Entity and
#   point it at sensors of that family; pointing at the wrong family is a setup
#   error. Several sensors of the chosen family combine into a single report. To
#   cover both families, build two copies, one in each mode, each with its OWN
#   memory helper (a shared helper cross-fires endless notifications).
#
# Triggering: event-driven, no polling. It re-evaluates at Home Assistant start, when
#   a watched sensor changes, when a watched sensor has been unavailable for the full
#   debounce (a dedicated for: trigger, so a dead source is reported on time rather
#   than at the next unrelated event), and at the optional daily reminder time. The
#   normal alert fires on a CHANGE; the daily reminder sends the current set, not a
#   diff, according to its mode (see the reminder-modes design choice below).
#
# DESIGN CHOICE (one family per instance): the change-detection engine works across
# families, but the wording, item shape, and sensible defaults differ enough between
# batteries (sparse, slow) and entities (dense, twitchy) that one instance per family
# keeps each configuration and its notifications clean.
#
# DESIGN CHOICE (memory): change-detection has to remember what was last reported
# across restarts. The only UI-creatable, restart-surviving store is an input_text
# (capped at 255 characters). That cap is not a constraint: the companion stores two
# md5 fingerprints (one for the alert, one for the broken-Sentinel state), a
# one-character held flag, plus a timestamp, as b={hash}|u={hash}|h={0|1}|t={iso}.
# Hashing both fingerprints before storage keeps the value short regardless of fleet
# size and means no device name or error text (and no stray delimiter) can land in
# the stored value and corrupt the parse. Persistent notifications cannot be read
# back from templates since HA 2023.6, and a shell or file store is too much to ask
# of a non-advanced user, so input_text is the store.
#
# DESIGN CHOICE (broken-Sentinel debounce): a source Sentinel goes unavailable for a
# minute or two during any Home Assistant restart, as the template entity is unloaded
# and reloaded. Without a guard, the broken-Sentinel stream fires a false "Sentinel
# not working" alert on every reboot, piercing quiet hours to a high-priority phone at
# night. The fix is a debounce on the unavailable/unknown branch only: a source is
# reported broken solely when it has been unavailable for at least
# upstream_debounce_seconds (default 240), measured from the source's own last_changed.
# A restart recovers well inside that window and never fires; a genuinely dead source
# stays unavailable past it and fires correctly. setup_error and ok:false are NOT
# debounced, they are persistent misconfigurations a reboot neither causes nor cures,
# so they still fire immediately. A truly missing source (states[s] is none, deleted
# or a typo) is treated as long-gone and flags immediately, not as a restart. The
# debounce alone would leave a hole: a source dying mid-day is evaluated once at the
# transition (elapsed zero, inside the window) and then never re-checked, because a
# stuck-unavailable sensor produces no further state changes; the alert would wait
# for the next unrelated trigger, up to the next day's reminder time. So a dedicated
# state trigger (to unavailable/unknown, for: the same debounce) wakes the run at the
# exact moment a source has been down for the full window. It never fires during a
# normal reboot, which recovers inside the window.
#
# DESIGN CHOICE (settle hold on the normal stream): the debounce above guards the
# broken-Sentinel stream, but a restart also disturbs the NORMAL stream: inside their
# startup grace the source Sentinels report an empty flagged list, and trusting it
# wipes the change-detection memory, turning the re-detection of already-known
# entities into false pushes. So while any source's boot_time is within
# upstream_debounce_seconds of now, the whole run is held: no memory write, no
# notification, no card change. The pre-restart memory survives, the re-detected set
# compares equal, and the reboot passes silently. A genuinely new failure during the
# window is delayed at most the settle time, mirroring the grace the sensors
# themselves apply. The held flag survives the hold too, so a change held during
# quiet hours before a reboot is still delivered by the overnight reminder after it.
#
# DESIGN CHOICE (blip hold on the normal stream): the settle hold above keys on
# boot_time, which only moves on a Home Assistant restart. A mid-day blip, a source
# going unavailable for a minute because Z2M restarted or the template reloaded, does
# not move boot_time, yet it has the same destructive effect: an unavailable source
# has no attributes, the flagged list collapses, changed fires, and the memory is
# wiped, so the recovery minutes later re-announces known items as new failures. So a
# run is also HELD, no memory write, no notification, no card change, while any
# source is unavailable/unknown but still INSIDE the debounce window, judged live
# after the optional refresh so a recovery during the wait releases the hold in the
# same run. Once a source has been down past the debounce it is declared broken and
# the run proceeds: the broken-Sentinel alert fires and the healthy sources still
# report, so a dead monitor never silences the working ones. ACCEPTED LIMIT: after an
# outage LONGER than the debounce, the dead source's items leave the fingerprint, so
# its recovery re-announces them; distinguishing that needs per-source memory, which
# arrives with the raw detection list planned for a later release. A missing source
# (states[s] is none) is long-gone, never a blip, and does not hold the run.
#
# DESIGN CHOICE (optional active source refresh): when a source reads unavailable, the
# companion can press that source's own refresh button (the same input_button the
# Sentinel sensors expose) to make the sources re-evaluate at once, then wait briefly
# for the state to recover before deciding. If the source had actually recovered and
# was only stale, this confirms it in seconds instead of waiting for the next scheduled
# scan; if it is genuinely broken, the wait times out and the debounced broken-Sentinel
# alert proceeds. The wait is bounded: it ends the instant every source is healthy, and
# is capped at source_refresh_timeout (default 15) so a slow hub on a large mesh gets
# the time it needs while a fast system returns in a second or two. The button is
# OPTIONAL (unset by default, an empty string); left unset, nothing is pressed and the debounce
# alone handles restarts. Because a run that waits holds the single instance busy, the
# wait is only ever entered when a source is unavailable INSIDE the debounce window (a
# blip, a candidate for recovery) AND a button is configured, and it is bounded. A
# source already down past the debounce is declared broken and is never pressed or
# waited for again, so a permanently dead source cannot tax every future run with the
# full timeout; the press-and-wait exists to catch a stale-but-alive source, which by
# definition is one still inside the window. After the wait, the broken-Sentinel decision is recomputed LIVE (top-level
# variables are frozen at trigger time and would be stale post-press), so the alert
# reflects the post-refresh reality; the normal alert path is unchanged and self-corrects
# on its own re-trigger.
#
# DESIGN CHOICE (quiet hours and per-device priority): priority is set per device by
# which list it is in, high_priority_targets or normal_priority_targets. A HIGH target
# pierces quiet hours (pushed whenever something is flagged, day or night); a NORMAL
# target respects quiet hours (held during the window). The gate is one per-entry
# test, push if the entry is high OR we are outside quiet hours OR this run is the
# daily reminder, so the rules fall out of a single expression. Quiet hours never
# gates the persistent card or the memory write, so state tracking survives the night
# and the only thing held back is the sound on a normal-priority phone. Nothing fires
# at the END of the window anymore: delivery of a change that was held overnight is
# the job of the daily reminder's OVERNIGHT mode, driven by the held flag (see the
# reminder-modes design choice below). The in_quiet_hours test compares the wall
# clock as a zero-padded HH:MM:SS string (which sorts chronologically),
# start-inclusive and end-exclusive, and treats a window whose start is later than
# its end as crossing midnight. A target in both lists is deduped to high.
#
# DESIGN CHOICE (daily reminder modes and the held flag): earlier releases carried two
# scheduled sends, the daily reminder and a separate re-send at the quiet-hours end
# time. They overlapped in purpose, could both fire in one morning, and the quiet-end
# push re-sent long-known items every day just because the window closed, reading as a
# mystery alert. Both are now ONE scheduled send, the daily reminder, with a three-way
# mode:
#   NONE (default): nothing scheduled ever fires; pure change detection.
#   OVERNIGHT CHANGES: fires at the reminder time only when a change occurred during
#       the quiet window, and lists the FULL currently flagged set (the memory stores
#       hashes, not items, so a true overnight-only diff waits for the raw detection
#       list planned for a later release). Silent when the night was quiet. Driven by
#       the held flag: h=1 is written when a change fires inside quiet hours (the
#       moment normal targets are skipped), h=0 when a change is delivered live
#       outside the window (nothing is held anymore), and the overnight reminder run
#       itself clears the flag. Requires quiet hours; with quiet hours off the flag is
#       never set and the mode degrades to none.
#   DAILY SUMMARY: fires at the reminder time every day. Flagged items go out on the
#       normal priority plan; a clean fleet sends an all-clear instead, as a
#       persistent card plus a push to HIGH-priority targets only, at normal delivery
#       settings (an all-clear is by definition not urgent), never to normal targets.
#       A high-priority phone in this mode gets exactly one guaranteed daily touch.
# In every mode the reminder send is EXEMPT from the quiet-hours gate: the user chose
# that time explicitly, so a reminder time set inside the window still delivers to
# normal targets rather than silently reaching only the high list. In both active
# modes the reminder also re-raises the broken-Sentinel alert if a source is still
# broken. The reminder never disturbs change detection: the fingerprints are written
# only on a real change; the reminder run touches only the held flag.
#
# THE ACTION FLOW: documented here, in the header. Unlike the Sentinel sensors there
# is no single result: engine; the work is the variables block plus the action steps,
# which run top to bottom in this order:
#
#   1. Compute. The variables block builds setup_error/ok (including a deleted
#      memory helper), the upstream (broken) state WITH the debounce applied, the
#      blip state (unavailable inside the debounce), the flagged list, the de-duped
#      list, the fingerprints, the previous values (including the held flag) read
#      back from the memory helper, and in_quiet_hours.
#   2. Log the check (debug only), then stop if setup_error.
#   3. Active refresh (optional). If any source is BLIPPING (unavailable inside the
#      debounce) and a refresh button is configured, press it and wait for recovery,
#      bounded by the timeout. A source already broken past the debounce is not
#      pressed or waited for.
#   4. Recompute the upstream decision and the blip state LIVE, so they reflect any
#      recovery from the refresh (the frozen top-level values were computed before
#      the press).
#   5. Blip hold. If a source is still blipping after the refresh, stop: no memory
#      write, no notification, no card change. The source_broken trigger re-runs at
#      the debounce if it stays down; a recovery re-runs via its own state change.
#   6. Decide. Work out the reminder run and its mode, the all-clear case,
#      battery_should_notify and upstream_should_notify (a change, or a reminder-mode
#      send), the new held flag, and whether memory needs writing.
#   7. Persist. Write the memory when the fingerprints or the held flag actually
#      changed. Not gated by quiet hours, so state tracking survives the night.
#   8. Broken-Sentinel stream. Raise its card and push it to the plan: high targets
#      always, normal targets outside quiet hours or on a reminder run. Dismiss the
#      card once every source is healthy again.
#   9. Normal stream. Dismiss the card when nothing is flagged (unless the
#      daily-summary all-clear should show, in which case post the persistent
#      all-clear card and push it to high-priority targets only); otherwise raise the
#      card and push it to the plan: high targets always, normal targets outside
#      quiet hours or on a reminder run.
#  10. Log the result (debug only).
#
# Changelog:
#   1.0.0-alpha.7.2 - Four hardening fixes from an external code review (Gemini) plus
#           an adversarial simulation pass (sn_brutal.py), all additive, no input
#           changes.
#           (1) DEBOUNCE BLACK HOLE. A source dying mid-day was evaluated once at the
#           transition (elapsed zero, inside the debounce) and then never re-checked:
#           a stuck-unavailable sensor produces no further state changes and no timer
#           existed, so the broken-Sentinel alert waited for the next unrelated
#           trigger, up to 18 hours in a quiet single-source setup. A new state
#           trigger (to unavailable/unknown, for: the debounce, id source_broken)
#           wakes the run at the exact expiry. It cannot fire during a normal reboot,
#           which recovers inside the window.
#           (2) BLIP HOLD. A mid-day source blip (Z2M restart, template reload)
#           collapsed the flagged list, wiped the memory, and re-announced known items
#           as new on recovery, the reboot bug's twin outside the settle hold's
#           boot_time coverage. A run is now held, like the settle hold, while any
#           source is unavailable inside the debounce, judged LIVE after the optional
#           refresh. Past the debounce the source is declared broken and the run
#           proceeds with the healthy sources. Accepted limit: an outage longer than
#           the debounce still re-announces that source's items on recovery;
#           per-source memory arrives with the raw detection list in a later release.
#           (3) DEAD-WEIGHT REFRESH. The refresh press-and-wait previously ran
#           whenever ANY source was unavailable, so one permanently dead source taxed
#           every future run with the full timeout (and, under mode single, dropped
#           triggers arriving during the wait). The gate is now blipping-only:
#           unavailable AND inside the debounce. A source declared broken is never
#           pressed or waited for again.
#           (4) DELETED MEMORY HELPER. Deleting the helper after setup left
#           setup_error empty while every write failed silently under
#           continue_on_error, so change detection compared against empty memory and
#           re-notified known items on every qualifying trigger. setup_error now
#           checks states[memory_helper] is none and fails loud with a clear message.
#           The check uses the states[] form deliberately: a freshly created helper
#           reads 'unknown' from states() and must remain valid.
#           (5) HELD-FLAG NATIVE TYPING (found by the fix-proof harness, present in
#           7.1 since release). Home Assistant renders script variables with native
#           typing, so a template producing "0" or "1" yields an INTEGER, not a
#           string. previous_held and held_new therefore arrived as ints, the
#           overnight mode's previous_held == '1' comparison was int-vs-string and
#           always false (overnight delivery silently never fired), and the held
#           comparison inside memory_needs_write mismatched the same way (memory was
#           rewritten on every run, timestamp churn only). All held-flag comparisons
#           and the stored h= segment now pass through | string, so the logic is
#           type-robust whichever form the renderer hands over. Anyone who ran 7.1
#           in overnight mode never received an overnight delivery; 7.2 corrects it
#           with no input change.
#   1.0.0-alpha.7.1 - One scheduled send instead of two. The daily reminder and the
#           quiet-hours-end re-send overlapped in purpose and could both fire in one
#           morning; the quiet-end push also re-sent long-known items every day just
#           because the window closed, reading as an undocumented mystery alert. The
#           quiet-hours-end TRIGGER is removed (the end time still defines the window;
#           nothing fires at it) and the daily reminder becomes a three-way MODE
#           select replacing two booleans: NONE (default, pure change detection),
#           OVERNIGHT CHANGES (fires at the reminder time only when a change occurred
#           during the quiet window, listing the full currently flagged set; silent
#           after a quiet night; degrades to none when quiet hours is off), and DAILY
#           SUMMARY (fires every day; the flagged list when something needs attention,
#           or an all-clear when nothing does, sent as a persistent card plus a push
#           to high-priority targets only, at normal delivery settings). The overnight
#           mode is driven by a new held flag in the memory, whose format is now
#           b={hash}|u={hash}|h={0|1}|t={iso}: h=1 is written when a change fires
#           inside quiet hours, h=0 when a change is delivered live outside the
#           window, and the overnight reminder run clears it. An old helper value
#           without h= parses as not-held, so the upgrade needs no manual reset. The
#           reminder send is now exempt from the quiet-hours gate, so a reminder time
#           set inside the window still delivers to normal-priority targets. The
#           separate all-clear toggle is absorbed into the daily-summary mode.
#           BREAKING INPUT CHANGE: daily_reminder_enabled and all_clear_enabled are
#           replaced by daily_reminder_mode; an existing automation must be re-saved
#           with the new field set. Acceptable while pre-release alpha, precedent
#           from alpha.5.
#   1.0.0-alpha.7 - Ride out the restart on the NORMAL alert stream. During a Home
#           Assistant reboot the source Sentinels report an empty flagged list while
#           inside their startup grace. Previously Sentinel Notify trusted that empty
#           list, overwrote its memory helper with "nothing flagged", and then treated
#           the re-detection of the same entities minutes later as brand-new failures,
#           producing false pushes after every reboot (seen live 2026-07-03: memory
#           wiped at ha_start 03:32, false pushes at 04:00 and 04:30 for entities known
#           since before the reboot). Now a run is HELD, no memory write, no
#           notification, no card change, while any source Sentinel's boot_time is
#           within upstream_debounce_seconds (the same Advanced input the
#           broken-Sentinel debounce uses, default 240). The pre-restart memory
#           survives the reboot, so when the same entities are re-detected they compare
#           equal and stay silent; a genuinely new failure is delayed at most the
#           settle window. Reads the boot_time attribute the Sentinels already expose,
#           so no new input is needed. Additive, non-breaking.
#   1.0.0-alpha.6.1 - Housekeeping. The optional source refresh button now defaults to an
#           empty string instead of the placeholder input_button.none. That placeholder was a
#           real entity name that does not exist, so a validator such as Spook flagged the
#           automation for referencing a missing entity whenever no refresh button was set. The
#           press action now targets the button through its variable and is reached only when a
#           button is actually configured, so no phantom entity is named anywhere. No behavior
#           change: an unset button still presses nothing and the debounce alone handles restarts.
#   1.0.0-alpha.6 - Two features that stop reboot false alarms on the broken-Sentinel
#           stream, both additive and non-breaking.
#           (1) BROKEN-SENTINEL DEBOUNCE. A source Sentinel goes unavailable for a
#           minute or two during any Home Assistant restart. Previously the
#           broken-Sentinel stream fired a false "Sentinel not working" alert on every
#           reboot, and a high-priority target pierced quiet hours to a phone overnight.
#           The unavailable/unknown branch of the broken-Sentinel check is now
#           debounced: a source is reported not working only when it has been
#           unavailable for at least upstream_debounce_seconds (new Advanced input,
#           default 240, measured from the source's own last_changed). A restart
#           recovers inside that window and never fires; a genuinely dead source stays
#           unavailable past it and fires correctly. setup_error and ok:false are NOT
#           debounced (a reboot neither causes nor cures them) and still fire at once. A
#           missing source (deleted or a typo) is treated as long-gone and flags
#           immediately. This shifts the timing of an existing alert; it changes no
#           saved input, so an existing automation keeps working and simply gets quiet
#           reboots.
#           (2) OPTIONAL ACTIVE SOURCE REFRESH. A new optional source_refresh_button
#           input (unset by default). When set and a source reads unavailable,
#           the companion presses that button (the same input_button the Sentinel
#           sensors expose, one shared button refreshes a whole family) and waits for
#           the state to recover before deciding, so a source that had only gone stale
#           is confirmed healthy in seconds rather than at the next scheduled scan. The
#           wait ends the moment every source is healthy and is capped at
#           source_refresh_timeout (new Advanced input, default 15) so a slow hub on a
#           large mesh gets the time it needs while a fast system returns at once. Left
#           unset, nothing is pressed and the debounce alone handles restarts. After the
#           refresh the broken-Sentinel decision is recomputed live so it reflects the
#           recovery; the normal alert path is untouched. Added tuning fields to the
#           debug log (any-source-unavailable, refresh-button-set, the debounce value,
#           the live upstream state, and the refresh wait outcome).
#   1.0.0-alpha.5 - Three features in one release.
#           (1) QUIET HOURS. An optional daily window during which NORMAL-priority pushes
#           are held; HIGH-priority pushes pierce the window and go through immediately.
#           Persistent notifications and the change-detection memory still update through
#           the window, so the UI card stays accurate and no state is lost. At the
#           quiet-hours END time the automation wakes and re-sends the CURRENT persisting
#           condition to BOTH lists (the same "what is flagged now" logic the daily reminder
#           uses, not a diff): a high target that already got the alert live sees a refreshed
#           card under the same tag, a normal target that was held gets it for the first time.
#           A problem raised overnight is delivered in the morning, one that self-cleared is
#           not, and a partially-cleared list reports only what remains. The window is
#           start-inclusive and end-exclusive and handles a window that crosses midnight.
#           Independent of the daily reminder; both can run. Off by default.
#           (2) PER-DEVICE PRIORITY. The single push-target list and the global priority
#           selector are replaced by two lists, high_priority_targets and
#           normal_priority_targets. Priority is now per device: a phone on the high list
#           gets high-priority pushes that pierce quiet hours, a phone on the normal list
#           gets normal-priority pushes that respect quiet hours. A target in both lists is
#           treated as high (pushed once). Both lists feed both alert streams (the normal
#           alert and the broken-Sentinel alert) at the device's own priority. The "low"
#           (silent) option is removed; the floor is now normal. This is a breaking input
#           change, acceptable because the blueprint is pre-release alpha. The
#           change-detection engine, memory format, dedup, and message builders are untouched.
#           (3) DAILY ALL-CLEAR. An optional persistent-only all-clear, off by default. On
#           the daily reminder, when nothing is flagged, it posts an "all clear" card under
#           the same tag, so a clean fleet shows reassurance rather than no card, and a card
#           left from an overnight alert is overwritten by the all-clear once things recover.
#           It never pushes to a phone, so there is no quiet-hours interaction and it cannot
#           wake anyone. It fires only on the daily reminder (not on a change, not at
#           quiet-hours end), requires the daily reminder and a persistent notification to be
#           on, and is worded per family.
#   1.0.0-alpha.4 - Cleanup, no behavior change. Removed two redundant if-true wrappers
#           that guarded each push action inside the repeat loops; continue_on_error on
#           the action already makes a dead target non-fatal, so the action is now called
#           directly. Fixed a stray double apostrophe in the memory-helper description
#           (other''s rendered literally in the folded description block; now reads other's).
#   1.0.0-alpha.3 - Fixed push targets. The selector previously offered the new notify
#           ENTITY (notify.your_phone), which cannot be called as an action and triggered
#           an "unknown action" error on real systems. It now takes the mobile_app notify
#           ACTION name (notify.mobile_app_your_phone) as text, the form that carries the
#           full priority/sound/Do-Not-Disturb payload this companion sends. The modern
#           notify.send_message action cannot carry that payload (message and title only),
#           so the per-action call is correct until Home Assistant's entity schema gains
#           rich-data support. Also dropped a now-meaningless per-target availability check
#           (a service name has no state); continue_on_error already makes a dead target
#           non-fatal. Found on live hardware; the simulation suite never exercised real
#           action dispatch.
#   1.0.0-alpha.2 - Added the ENTITY family. Entity mode reads one or more Entity Sentinel
#           sensors and reports the entities that have gone quiet, by name, with the reason
#           (unavailable, frozen, missing, never_reported) and how long since each last
#           reported, and the area. Title reads "Entity Sentinel: N entities gone quiet".
#           When two overlapping Entity Sentinels flag the same entity, a genuinely-gone
#           reason (unavailable, unknown, missing, never_reported) wins over frozen. The
#           change-detection engine, memory, dedup, and delivery are shared with Battery.
#           Also in this release: removed the minute-based check interval and the
#           elapsed-time re-remind; change-detection is now purely event-driven (re-evaluates
#           when a watched sensor changes, and at Home Assistant start, with no idle polling),
#           and an OPTIONAL daily reminder at a configurable time of day re-sends the current
#           report if anything is still flagged (and re-raises the broken-Sentinel card if a
#           source is still broken), reusing the same tag so it replaces any existing card in
#           place. Off by default.
#   1.0.0-alpha.1 - Initial build. Battery mode: reads one or more Battery Sentinel
#           sensors and reports low batteries (and optionally offline ones) by name
#           with percentage, battery type, and area; a binary low-battery sensor, which
#           has no percentage, is reported without one. Notifies ONLY when the flagged
#           set changes, using a sorted, md5-hashed fingerprint stored in one input_text
#           helper, so it does not notify every cycle; the sort makes it order
#           independent. A device reported by two overlapping-scope sensors is
#           de-duplicated to one entry, offline winning over low. A second, independent
#           change-detected stream raises a separate "Sentinel not working" alert (its
#           own tag) when a source Sentinel is in setup_error, reports ok:false, or goes
#           unavailable or unknown, without suppressing the battery alerts from the
#           healthy sensors. Memory is two hashed slots in one helper, stored as
#           b={hash}|u={hash}|t={iso}, so no error text or stray delimiter can corrupt
#           the stored value. Push to any number of mobile devices and/or a persistent
#           notification, tag-replaced in place; priority scales iOS interruption-level
#           and Android channel/importance/ttl. Loud setup errors for a wrong-family
#           sensor or a missing helper. (Entity mode was added in alpha.2.) Versioning from here: patch
#           alpha.N while iterating before any live testing; it graduates to 1.0.0-beta
#           once proven on hardware, then 1.0.0 stable.
blueprint:
  name: Sentinel Notify (Alpha)
  description: |
    # Sentinel Notify (Alpha)

    *Turns a Battery Sentinel or Entity Sentinel into smart, change-aware notifications.*

    A free blueprint from **The Thinking Home** at [xeazy.com](https://xeazy.com).

    - 📖 [Read the article](https://xeazy.com/battery-entity-sentinel-blueprints/) - the design and worked examples.
    - 📄 [Read the README](https://github.com/TheThinkingHome/Automations/blob/main/blueprints/automation/sentinel_notify.md) - setup, parameters, and the change-detection behavior.
    - 🔋 [Battery Sentinel](https://github.com/TheThinkingHome/Automations/blob/main/blueprints/template/battery_sentinel.md) - the sensor that counts low batteries.
    - 📡 [Entity Sentinel](https://github.com/TheThinkingHome/Automations/blob/main/blueprints/template/entity_sentinel.md) - the sensor that catches entities gone quiet.
    - 💬 [Discuss in the community](https://xeazy.com/logbook/) - the forum thread for these blueprints.
    - ⭐ [More blueprints](https://github.com/TheThinkingHome/Automations) - on GitHub.

    ---

    This is a COMPANION to the Sentinel sensor blueprints. It does nothing on its own: build a **Battery Sentinel** or **Entity Sentinel** first (each makes a sensor), then build this to notify from it. The two source blueprints are linked above.

    Reads the rich attributes a Sentinel exposes and notifies you about what is actually wrong, by name, with the detail, not just a count. It notifies only when the situation changes, so it does not flood you every cycle.

    ## How it works

    Set the mode to Battery or Entity and point it at sensors of that family. When a watched sensor changes, it builds a sorted fingerprint of what the Sentinel is flagging and compares it to what it last reported, stored in a required input_text helper. If the set changed, it sends a notification listing everything currently flagged; if not, it stays quiet. There is no polling; it reacts to the sensor. Several sensors of one family combine into a single report. The notification uses a tag, so even when it fires it replaces the previous one in place rather than stacking.

    An optional daily reminder, off by default, sends once a day at a time you set, in one of two modes. Overnight changes fires only when something changed during your quiet hours, listing everything currently flagged, so a quiet night stays silent. Daily summary fires every day: the flagged list when something needs attention, or an all-clear when nothing does (the all-clear goes to the UI card and to high-priority devices only). Either mode reuses the same tag, so it refreshes the existing card rather than stacking.

    Optional quiet hours, off by default, hold phone pushes to normal-priority devices during a window you set, for example overnight. The persistent card still updates silently, so nothing is lost; only the push waits. To hear in the morning about a change that was held overnight, set the daily reminder to overnight mode with a time at or after the end of the window.

    The broken-Sentinel alert (raised when a source Sentinel itself is not working) rides out a Home Assistant restart: a source that goes unavailable during a reboot is only reported once it has been unavailable longer than a debounce you can set in Advanced (default four minutes), so a normal restart no longer fires a false "Sentinel not working" alert. A source that dies mid-day is reported the moment the debounce elapses, and a brief blip cannot wipe the change-detection memory or re-announce items you already know about. Optionally, point it at your Sentinels' refresh button and a source reading unavailable is prompted to re-evaluate and confirm recovery in seconds; a source already declared broken is not repeatedly interrogated.

    Send by push to two lists of mobile devices, a high-priority list and a normal-priority list, and/or as a persistent notification in the Home Assistant UI. Priority is per device: high-priority devices get an attention-grabbing alert that pierces quiet hours, normal-priority devices get standard delivery that respects quiet hours. A device in both lists is treated as high.

    This companion watches ONE family per instance. If you run both Sentinels, build two copies, one in each mode.

    An optional debug switch, off by default, writes one diagnostic line to the system log on each check, for use while setting it up.

    This is an alpha, under active development and not yet hardware-tested. It requires one input_text helper, which you create first and select below. See the README.

