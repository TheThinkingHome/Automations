#
# Battery Sentinel - a Home Assistant template blueprint from The Thinking Home (xeazy.com)
# Full write-up, worked examples, and directions:
# https://xeazy.com/battery-sentinel-blueprint/
#
# Changelog:
#   1.0.0-alpha - Initial build. Under active testing on a live system;
#           increments to 1.0.0-beta, then 1.0.0, once it runs complete in
#           place.
#           Creates one trigger-based template sensor that classifies every
#           monitored battery device into low, silent, or ok, and exposes the
#           problem devices as structured attributes for other automations,
#           dashboards, and notifications to read.
#           Low: a battery percentage at or below the threshold, or a binary
#           battery sensor reading on. A value-hysteresis band holds a flagged
#           device low until it climbs above the threshold plus a margin, so a
#           device hovering at the threshold does not flap. Reads the sensor's
#           own previous attributes through this.attributes to decide whether a
#           near-band device holds or clears.
#           Silent: a device that has not reported within a lookback window,
#           judged once a day at a configured hour and latched until the next
#           daily boundary. This spares devices that legitimately report only
#           once a day, and it catches the device that freezes at its last
#           value without ever going unavailable, which a plain unavailable
#           check misses.
#           Monitor mode selects what the state counts: low only, silent only,
#           or both. Include and exclude each accept entities, areas, devices,
#           or labels, with exclude winning; an empty include watches every
#           battery device-class entity. Percentage and binary battery sensors
#           are supported; voltage is staged in the classifier for a later
#           build but not yet active. Evaluation cadence is hour-based,
#           defaulting to every two hours.

blueprint:
  name: Battery Sentinel (Alpha)
  description: |
    # Battery Sentinel (Alpha)

    *One sensor that watches every battery device in the house, for the ones running low and the ones that quietly stopped reporting.*

    A free blueprint from **The Thinking Home** at [xeazy.com](https://xeazy.com).

    - 📖 [Read the article](https://xeazy.com/battery-sentinel-blueprint/) - the design and worked examples.
    - 📄 [Read the README](https://github.com/TheThinkingHome/Automations/blob/main/blueprints/template/battery_sentinel.md) - import instructions, parameters, and attribute reference.
    - 💬 [Discuss in the community](https://xeazy.com/logbook/) - the forum thread for this blueprint.
    - ⭐ [More blueprints](https://github.com/TheThinkingHome/Automations) - on GitHub.

    ---

    1.0.0-alpha build. Under active testing on a live system.

    Creates one trigger-based template sensor whose state is a count of battery devices needing attention. It classifies every monitored battery device into low, silent, or ok, and exposes the problem devices as structured attributes other automations, dashboards, and notifications can read.

    ## How it works

    Low means a battery percentage at or below a threshold, or a binary battery sensor reading on. A value-hysteresis band keeps a device that hovers at the threshold from flapping in and out of the low list: a flagged device stays low until it climbs above the threshold plus a margin.

    Silent means a device that has not reported within a lookback window, judged once a day at a chosen hour rather than continuously, so devices that legitimately report only once a day are not flagged every day. Silent catches the device that freezes at its last value without ever going unavailable, which a plain unavailable check misses.

    The monitor mode chooses what the state counts: low only, silent only, or both. Because this is a template blueprint, build it more than once, one sensor per purpose.

    ## Companion blueprint

    A companion automation blueprint, **Battery Sentinel Companion**, is coming. It reads this sensor and turns it into notifications and to-do entries for anyone who wants a turnkey consumer rather than writing their own.

    License: GPL-3.0-or-later. Copyright (C) 2026 James Lander, The Thinking Home ([xeazy.com](https://xeazy.com)).
  author: James Lander (xeazy.com)
  domain: template
  source_url: https://github.com/TheThinkingHome/Automations/blob/main/blueprints/template/battery_sentinel.yaml
  homeassistant:
    min_version: 2026.5.4
  input:
    monitor_settings:
      name: Monitor mode
      icon: mdi:battery-heart-variant
      input:
        monitor_mode:
          name: What to count
          description: 'Low counts battery devices below the percentage threshold.
            Silent counts battery devices that stopped reporting. Both counts either.
            Build the blueprint more than once for separate single-purpose sensors.

            '
          default: both
          selector:
            select:
              options:
              - label: Low battery only
                value: low
              - label: Silent (stopped reporting) only
                value: silent
              - label: Both low and silent
                value: both
              sort: false
              custom_value: false
              multiple: false
    low_settings:
      name: Low battery detection
      icon: mdi:battery-low
      input:
        low_threshold:
          name: Low battery threshold
          description: A battery percentage at or below this counts as low. Binary
            battery sensors reading on always count as low regardless of this value.
          default: 20
          selector:
            number:
              min: 1.0
              max: 100.0
              step: 1.0
              unit_of_measurement: '%'
              mode: slider
        low_clear_margin:
          name: Hysteresis clear margin
          description: 'A device already flagged low stays low until it climbs above
            the threshold plus this margin. Stops devices hovering at the threshold
            from flapping. Batteries do not recover on their own, so a flagged device
            clears only when a fresh cell pushes it well past the threshold.

            '
          default: 2
          selector:
            number:
              min: 0.0
              max: 25.0
              step: 1.0
              unit_of_measurement: '%'
              mode: slider
    silent_settings:
      name: Silent detection
      icon: mdi:battery-off-outline
      input:
        silent_report_hour:
          name: Daily check hour
          description: 'The hour of day the silent check is judged, 0 to 23. Silence
            is evaluated once per day at this hour rather than continuously, so a device
            that reports once a day is not flagged for the hours it is quiet.

            '
          default: 8
          selector:
            number:
              min: 0.0
              max: 23.0
              step: 1.0
              mode: slider
        silent_lookback_hours:
          name: Silent lookback window
          description: 'How many hours back from the daily check hour a device must
            have reported to count as alive. A once-a-day reporter needs a window wide
            enough to absorb timing drift. Raise this if normal daily reporters keep
            getting flagged.

            '
          default: 24
          selector:
            number:
              min: 1.0
              max: 168.0
              step: 1.0
              unit_of_measurement: hours
              mode: box
    scope_settings:
      name: Which devices to watch
      icon: mdi:select-group
      input:
        include_target:
          name: Include
          description: 'Devices, areas, entities, or labels to watch. Leave empty
            to watch every entity with a battery device class automatically. Set a
            label here to watch only the devices you tag.

            '
          default: {}
          selector:
            target: {}
        exclude_target:
          name: Exclude
          description: 'Devices, areas, entities, or labels to leave out. Exclude always
            wins over include. Use it to drop phones, tablets, or a device you are
            letting run down on purpose.

            '
          default: {}
          selector:
            target: {}
    cadence_settings:
      name: Evaluation cadence
      icon: mdi:timer-sync-outline
      input:
        scan_interval:
          name: Re-evaluation interval
          description: 'How often the sensor re-scans. Every 2 hours is plenty for
            batteries and light on the system. Tighten it if you want the low list
            to react faster.

            '
          default: '/2'
          selector:
            select:
              options:
              - label: Every hour
                value: '/1'
              - label: Every 2 hours
                value: '/2'
              - label: Every 3 hours
                value: '/3'
              - label: Every 4 hours
                value: '/4'
              - label: Every 6 hours
                value: '/6'
              - label: Every 12 hours
                value: '/12'
              sort: false
              custom_value: false
              multiple: false
    naming_settings:
      name: Sensor identity
      icon: mdi:tag-outline
      input:
        sensor_name:
          name: Sensor name
          description: The name for the sensor this blueprint creates.
          default: Battery Sentinel
          selector:
            text:
              multiple: false
              multiline: false
        unique_id:
          name: Unique ID
          description: 'A unique id so the sensor is registered and you can rename
            it or place it in an area from the interface. Make it distinct for every
            sensor you build, for example battery_sentinel_low.

            '
          selector:
            text:
              multiple: false
              multiline: false
variables:
  monitor_mode: !input monitor_mode
  low_threshold: !input low_threshold
  low_clear_margin: !input low_clear_margin
  silent_report_hour: !input silent_report_hour
  silent_lookback_hours: !input silent_lookback_hours
  include_target: !input include_target
  exclude_target: !input exclude_target
  result: >-
    {%- set mode = monitor_mode -%}
    {%- set thr = low_threshold | float(20) -%}
    {%- set margin = low_clear_margin | float(2) -%}
    {%- set lookback = silent_lookback_hours | float(24) -%}
    {%- set rpt_hour = silent_report_hour | int(8) -%}
    {%- set prev = this.attributes if this is defined and this.attributes is defined else {} -%}
    {%- set inc = include_target -%}
    {%- set ns = namespace(ents=[]) -%}
    {%- if inc is mapping and (inc.entity_id is defined or inc.device_id is defined or inc.area_id is defined or inc.label_id is defined) -%}
      {%- if inc.entity_id is defined -%}
        {%- set elist = inc.entity_id if (inc.entity_id is iterable and inc.entity_id is not string) else [inc.entity_id] -%}
        {%- set ns.ents = ns.ents + elist -%}
      {%- endif -%}
      {%- if inc.device_id is defined -%}
        {%- set dlist = inc.device_id if (inc.device_id is iterable and inc.device_id is not string) else [inc.device_id] -%}
        {%- for d in dlist -%}{%- set ns.ents = ns.ents + device_entities(d) -%}{%- endfor -%}
      {%- endif -%}
      {%- if inc.area_id is defined -%}
        {%- set alist = inc.area_id if (inc.area_id is iterable and inc.area_id is not string) else [inc.area_id] -%}
        {%- for a in alist -%}{%- set ns.ents = ns.ents + area_entities(a) -%}{%- endfor -%}
      {%- endif -%}
      {%- if inc.label_id is defined -%}
        {%- set llist = inc.label_id if (inc.label_id is iterable and inc.label_id is not string) else [inc.label_id] -%}
        {%- for l in llist -%}{%- set ns.ents = ns.ents + label_entities(l) -%}{%- endfor -%}
      {%- endif -%}
    {%- else -%}
      {%- set ns.ents = (states.sensor | selectattr('attributes.device_class', 'defined') | selectattr('attributes.device_class', 'eq', 'battery') | map(attribute='entity_id') | list)
                      + (states.binary_sensor | selectattr('attributes.device_class', 'defined') | selectattr('attributes.device_class', 'eq', 'battery') | map(attribute='entity_id') | list) -%}
    {%- endif -%}
    {%- set exc = exclude_target -%}
    {%- set xns = namespace(ents=[]) -%}
    {%- if exc is mapping -%}
      {%- if exc.entity_id is defined -%}
        {%- set elist = exc.entity_id if (exc.entity_id is iterable and exc.entity_id is not string) else [exc.entity_id] -%}
        {%- set xns.ents = xns.ents + elist -%}
      {%- endif -%}
      {%- if exc.device_id is defined -%}
        {%- set dlist = exc.device_id if (exc.device_id is iterable and exc.device_id is not string) else [exc.device_id] -%}
        {%- for d in dlist -%}{%- set xns.ents = xns.ents + device_entities(d) -%}{%- endfor -%}
      {%- endif -%}
      {%- if exc.area_id is defined -%}
        {%- set alist = exc.area_id if (exc.area_id is iterable and exc.area_id is not string) else [exc.area_id] -%}
        {%- for a in alist -%}{%- set xns.ents = xns.ents + area_entities(a) -%}{%- endfor -%}
      {%- endif -%}
      {%- if exc.label_id is defined -%}
        {%- set llist = exc.label_id if (exc.label_id is iterable and exc.label_id is not string) else [exc.label_id] -%}
        {%- for l in llist -%}{%- set xns.ents = xns.ents + label_entities(l) -%}{%- endfor -%}
      {%- endif -%}
    {%- endif -%}
    {%- set monitored = ns.ents | unique | reject('in', xns.ents) | list -%}
    {%- set prev_low_ids = (prev.get('low', []) | map(attribute='entity_id') | list) if prev else [] -%}
    {%- set low_ns = namespace(items=[]) -%}
    {%- if mode in ['low', 'both'] -%}
      {%- for eid in monitored -%}
        {%- set st = states(eid) -%}
        {%- if eid.startswith('binary_sensor.') and st == 'on' -%}
          {%- set low_ns.items = low_ns.items + [{
            'name': (device_attr(device_id(eid), 'name') or state_attr(eid, 'friendly_name') or eid),
            'entity_id': eid,
            'area': (area_name(eid) or 'Unassigned'),
            'level': none,
            'battery_type': (state_attr(eid, 'battery_type') or '')
          }] -%}
        {%- elif st is not none and st not in ['unavailable', 'unknown', 'none'] and st | is_number -%}
          {%- set val = st | float -%}
          {%- set was_low = eid in prev_low_ids -%}
          {%- set is_low = (val < (thr + margin)) if was_low else (val <= thr) -%}
          {%- if is_low -%}
            {%- set low_ns.items = low_ns.items + [{
              'name': (device_attr(device_id(eid), 'name') or state_attr(eid, 'friendly_name') or eid),
              'entity_id': eid,
              'area': (area_name(eid) or 'Unassigned'),
              'level': val,
              'battery_type': (state_attr(eid, 'battery_type') or '')
            }] -%}
          {%- endif -%}
        {%- endif -%}
      {%- endfor -%}
    {%- endif -%}
    {%- set today_str = now().strftime('%Y-%m-%d') -%}
    {%- set boundary = now().replace(hour=rpt_hour, minute=0, second=0, microsecond=0) -%}
    {%- set prev_eval_date = prev.get('silent_eval_date', '') -%}
    {%- set do_silent = (mode in ['silent', 'both']) and (now() >= boundary) and (prev_eval_date != today_str) -%}
    {%- set sns = namespace(items=[]) -%}
    {%- if do_silent -%}
      {%- for eid in monitored -%}
        {%- set sobj = states[eid] if states[eid] is not none else none -%}
        {%- if sobj is not none and sobj.last_reported is not none -%}
          {%- set age_h = (now() - sobj.last_reported).total_seconds() / 3600 -%}
          {%- if age_h > lookback -%}
            {%- set sns.items = sns.items + [{
              'name': (device_attr(device_id(eid), 'name') or state_attr(eid, 'friendly_name') or eid),
              'entity_id': eid,
              'area': (area_name(eid) or 'Unassigned'),
              'last_seen': sobj.last_reported.isoformat(),
              'age': relative_time(sobj.last_reported),
              'battery_type': (state_attr(eid, 'battery_type') or '')
            }] -%}
          {%- endif -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set silent_list = sns.items -%}
      {%- set silent_date = today_str -%}
    {%- else -%}
      {%- set silent_list = prev.get('silent', []) if (mode in ['silent', 'both']) else [] -%}
      {%- set silent_date = prev_eval_date -%}
    {%- endif -%}
    {%- set low_list = low_ns.items -%}
    {%- set low_count = low_list | length -%}
    {%- set silent_count = silent_list | length -%}
    {%- set state_val = low_count if mode == 'low' else silent_count if mode == 'silent' else (low_count + silent_count) -%}
    {{
      {
        'state': state_val,
        'mode': mode,
        'total_monitored': monitored | length,
        'last_evaluated': now().isoformat(),
        'low_count': low_count,
        'silent_count': silent_count,
        'low': low_list,
        'silent': silent_list,
        'silent_eval_date': silent_date
      } | tojson
    }}
trigger:
- trigger: time_pattern
  hours: !input scan_interval
  minutes: '0'
- trigger: homeassistant
  event: start
sensor:
- name: !input sensor_name
  unique_id: !input unique_id
  state: '{{ (result | from_json).state }}'
  icon: '{{ ''mdi:battery-alert'' if (result | from_json).state | int(0) > 0 else ''mdi:battery-check'' }}'
  attributes:
    monitor_mode: '{{ (result | from_json).mode }}'
    total_monitored: '{{ (result | from_json).total_monitored }}'
    last_evaluated: '{{ (result | from_json).last_evaluated }}'
    low_count: '{{ (result | from_json).low_count }}'
    silent_count: '{{ (result | from_json).silent_count }}'
    low: '{{ (result | from_json).low }}'
    silent: '{{ (result | from_json).silent }}'
    silent_eval_date: '{{ (result | from_json).silent_eval_date }}'
