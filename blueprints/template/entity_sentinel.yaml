# Entity Sentinel - a Home Assistant template blueprint from The Thinking Home (xeazy.com)
#   Article: https://xeazy.com/battery-entity-sentinel-blueprint/
#
# Entity Sentinel watches the entities you name and flags any that have gone quiet,
# by either of two checks, chosen automatically per entity:
#
#   UNAVAILABLE (entity level). The named entity's own state is unavailable or
#       unknown, held past a debounce. Universal; the only signal for devices with
#       no advancing timestamp. The "since" time is the entity's last_changed (when
#       it entered the bad state), read live, so no stored state is needed and a
#       restart cannot lose it. Debounce is arithmetic on last_changed.
#   FREEZE (device level). The device behind the named entity has not reported
#       anything within the lookback window. Judged by the freshest last_reported
#       across ALL of the device's entities, so a sticky entity in a quiet room is
#       vouched for by its livelier siblings. Reads last_reported (sent anything),
#       not last_changed (value moved), so a steady-but-live reporter is not flagged.
#
# Scope: include and exclude by entity, label, area, or device.
#   - Explicit entities and labels-on-entities are TRUSTED: watched exactly as
#     given, for both checks.
#   - Areas, devices, and labels-on-devices/areas are SWEPT: one representative
#     entity per device is chosen by a device_class priority order
#     (occupancy/motion, then door/window/opening/garage/lock, then
#     moisture/smoke/gas/carbon_monoxide, then temperature/humidity, then
#     connectivity, then battery as last resort). A device with no entity in that
#     order is skipped. Swept scopes give correct freeze but APPROXIMATE
#     unavailable (only the representative is watched); for precise unavailable,
#     name the entity or label it directly.
#   - A trusted entity always wins over its swept representative (deduped), so a
#     device that arrives by both paths is not double counted.
#   - Exclude is applied last and always wins.
#
# Triggering: a pure time_pattern on a short cadence, plus a Home Assistant start
# trigger that only latches the startup grace boot time. Both checks are caught at
# the next tick; cadence is the only latency knob.
#
# DESIGN CHOICE (startup grace): the grace window suppresses the UNAVAILABLE list
# only, NOT freeze. Rationale: a restart briefly reads the mesh as unavailable
# (a false outage the grace exists to hide), but last_reported repopulates fresh
# on restore, so freeze cannot false-fire at startup; gating it would only delay a
# true signal. If a future edge case shows freeze false-firing right after a
# restart (for example an integration that restores entities with a stale
# last_reported), revisit this and gate freeze during grace as well.
#
# DESIGN CHOICE (identity attributes): the sensor carries two constant attributes,
# sentinel_type (entity) and sentinel_version, so any consumer (a dashboard, a
# companion, a person filing a bug report) can identify what the sensor is and what
# version it runs without opening the blueprint. They are plain attributes on the
# sensor block, not threaded through the result dict, so they are present even in
# setup_error, which is exactly when support needs them. The version is defined once
# as a variable and read into both the debug line and the attribute, so a bump
# touches one runtime source instead of two.
#
# THE result: ENGINE: is documented here, in the header, rather than inline. Its
# value is a YAML block scalar whose contents are Jinja, so a # inside it is not a
# comment but literal text rendered into the output, and a Jinja {# #} comment can
# shift whitespace and corrupt the dict the template builds. So the map lives here,
# where comments are free and cannot touch the rendered result.
#
# The stages run top to bottom and each depends on the ones above it. Computed once
# per evaluation, the template returns one dict; the sensor state and every
# attribute are read out of it.
#
#   1. Clock check. Read and parse the uptime sensor. If it is missing or not a
#      timestamp, skip to the setup_error return at the bottom and do nothing else.
#   2. Grace gate. From the boot time, compute "settled" (true once past the
#      startup grace). Settled gates the unavailable check, never freeze.
#   3. Trusted set (include). Named entities and labels-on-entities go to "trusted"
#      (watched as given); devices, areas, and labels-on-devices/areas go to "swept".
#   4. Representative election. For each swept device, pick one entity to stand in,
#      by device_class priority, then primary domain, then telemetry, then any.
#   5. Exclude and subtract. Expand the exclude scope three ways (entities, devices,
#      areas), then monitored = (trusted + representatives) minus excluded. Dedupe
#      so a named entity beats its swept stand-in. Exclude always wins.
#   6. Detection loop. Per monitored entity: unavailable/unknown/missing past the
#      debounce (entity level), else freshest report across the device older than
#      the lookback is "frozen", else "never_reported".
#   7. Return. The healthy dict (count, devices, sub-counts, boot_time, settled,
#      last_evaluated), or the setup_error dict if stage 1 failed.
#
# Changelog:
#   1.0.5-beta - Added two constant identity attributes: sentinel_type (entity) and
#           sentinel_version (the running version string). They let a dashboard, a
#           companion, or a bug report identify the sensor and its version without
#           opening the blueprint, and they are present even in setup_error. The
#           version is now defined once as a variable and read into both the debug
#           line and the new attribute, so a future bump updates one runtime source
#           rather than two literals. No detection, engine, or fingerprint change.
#   1.0.4-beta - Debug log line now prints timestamps (since, last_seen, boot, and
#           last_evaluated) in local time instead of UTC. Display only: the stored
#           attributes are unchanged and remain ISO-8601 with the UTC offset, the
#           portable form any dashboard, automation, or companion reads. The log line
#           had been stamping its own wall-clock time in local while printing those
#           fields in UTC, so reading the two together miscounted an age by the UTC
#           offset. The engine, the detection logic, and the fingerprint are untouched.
#   1.0.3-beta - Exclude-by-label now expands to devices and areas, not just entities.
#           Previously a label applied to a device or an area and used in the Exclude
#           field expanded only to the entities tagged directly, so the devices and
#           areas it covered stayed watched, breaking the "exclude always wins" rule.
#           The exclude path now expands a label three ways (entities, devices, areas),
#           matching the include path and Battery Sentinel.
#   1.0.2-beta - Excluded event entities from area/device sweep election. A live
#           test surfaced an NSPanel device exposing only event and button entities;
#           the sweep fallback elected its touch event entity, which sits at unknown
#           until pressed, producing a permanent false unknown flag. Event entities
#           are never a usable liveness signal (their state is unknown-until-fired or
#           a stale last-fired timestamp), so the event domain now joins the skip
#           list. A device whose only non-diagnostic entities are events is skipped,
#           which is correct: it offers no honest liveness anchor. An event entity
#           never suppresses a real sensor when the device also exposes one.
#   1.0.1-beta - Three fixes from the pre-public adversarial review.
#           (1) Area and device sweeps no longer silently skip a device that
#           exposes no priority device_class. The representative election is now
#           tiered: a priority device_class still wins, then the device's primary
#           function domain (light, switch, lock, cover, fan, climate, and the rest),
#           then mains telemetry (power, energy), then any non-diagnostic entity, so
#           smart plugs, bulbs, and relays are caught instead of invisibly dropped.
#           A device whose only entities are configuration or diagnostic (an update
#           or number entity alone) is still skipped, as there is nothing to monitor.
#           (2) An entity that has genuinely never reported is now flagged with its
#           own reason, never_reported, instead of being mislabeled frozen, and it
#           counts with the entity-level failures rather than the device-freeze count.
#           Detection is unchanged: a never-reporting device still surfaces.
#           (3) Added an ok boolean attribute, true only when the sensor is
#           functioning and false during setup_error, so a downstream automation can
#           gate on ok rather than doing integer math on the state (int('setup_error')
#           silently evaluates to 0, which would read a broken sensor as healthy).
#   1.0.0-beta - First beta. The two-mode liveness engine: entity-level
#           unavailable/unknown/missing with a duration debounce, device-level
#           freeze against the freshest device report over a lookback, auto-routed
#           per entity. Scope by entity, label, area, or device with include and
#           exclude (exclude wins; labels expand to entities, devices, and areas on
#           both sides). Device-level dedupe so an entity reached by both an explicit
#           name and a sweep is watched once. Representative-per-device sweeping by a
#           device_class priority order. Startup grace measured from a REQUIRED
#           uptime sensor in timestamp mode, read fresh every render, so it is immune
#           to the trigger-template this-unreliability (HA #115585) and covers
#           slow-booting hubs where an early cadence tick precedes the start event. A
#           missing or non-timestamp uptime sensor yields a loud setup_error state
#           with error and uptime_status attributes; the sensor fails safe (watches
#           nothing, no false flags) and self-heals once fixed. Timezone-safe grace
#           math via epoch comparison, so a naive user-supplied uptime timestamp
#           cannot crash the template. Optional refresh button. Structured devices
#           output with reason, since, last_seen, and a human-readable age. Hardened
#           across an extensive adversarial test suite (138 cases) and proven on a
#           live system: a real power-loss outage, the device-dedupe collapse, the
#           full grace cycle off the uptime clock, and the setup_error path end to
#           end. Versioning from here: patch (1.0.1-beta) for fixes, minor
#           (1.1.0-beta) for features, major (2.0.0-beta) for breaking changes.
#
#   Alpha history (1.0.0-alpha through 1.0.0-alpha.9) is preserved in the project
#   document, not carried here.

blueprint:
  name: Entity Sentinel (Beta)
  description: |
    # Entity Sentinel (Beta)

    *One sensor that counts every critical entity that has gone quiet, the one that dropped offline and the one frozen at its last value.*

    A free blueprint from **The Thinking Home** at [xeazy.com](https://xeazy.com).

        > **Read the [Entity Sentinel README](https://github.com/TheThinkingHome/Automations/blob/main/blueprints/template/entity_sentinel.md) before you import.** This is a template sensor, not an automation, so it does not walk you through a setup form. The README has the directions and a sample `use_blueprint:` snippet to get you started. Add it to your `configuration.yaml` or a package file, a quick one-time setup either way.

    - 📖 [Read the article](https://xeazy.com/battery-entity-sentinel-blueprint/) - the design and worked examples.
    - 📄 [Read the README](https://github.com/TheThinkingHome/Automations/blob/main/blueprints/template/entity_sentinel.md) - import instructions, parameters, and attribute reference.
    - 💬 [Discuss in the community](https://xeazy.com/logbook/) - the forum thread for these blueprints.
    - ⭐ [More blueprints](https://github.com/TheThinkingHome/Automations) - on GitHub.

    ---

    Creates one trigger-based template sensor whose state is the count of watched entities that have gone quiet. Each is listed in the `devices` attribute with the reason it was flagged, for any automation, dashboard, or notification to read.

    ## How it works

    Every watched entity is judged by two checks, chosen automatically. An entity that has gone `unavailable` or `unknown` and stayed that way past a debounce is flagged at the entity level. A device that has not reported anything within a lookback window is flagged as frozen, judged by the freshest report across the whole device so a quiet sticky entity is not mistaken for a dead one.

    Scope by entity, label, area, or device, with include and exclude, and exclude always wins. Explicit entities and labels are watched precisely for both checks; areas and devices are swept to one representative entity per device, tuned for freeze. For precise unavailable coverage, name entities or use a label.

    Its companion, **Battery Sentinel**, counts the batteries running low. Build both for full coverage.

    An optional debug switch, off by default, writes one diagnostic line to the system log on each evaluation.

    This is a beta. It is an advanced blueprint: it requires the uptime integration (timestamp mode) and a startup grace period you set to cover your own boot and mesh-settle time. See the README.

    License: GPL-3.0-or-later. Copyright (C) 2026 James Lander, The Thinking Home ([xeazy.com](https://xeazy.com)).

    1.0.5-beta
  author: James Lander (xeazy.com)
  domain: template
  source_url: https://github.com/TheThinkingHome/Automations/blob/main/blueprints/template/entity_sentinel.yaml
  homeassistant:
    min_version: 2026.5.4
  input:
    detection_settings:
      name: Liveness detection
      icon: mdi:radar
      input:
        freeze_lookback:
          name: Freeze lookback
          description: 'How long a device may go without reporting anything before it
            counts as frozen. Set it a little longer than the entity''s normal
            reporting interval: minutes for an active sensor, hours or days for a
            quiet one. Judged against the freshest report across the whole device.

            '
          default:
            hours: 6
          selector:
            duration: {}
        unavailable_debounce:
          name: Unavailable debounce
          description: 'How long an entity must stay unavailable or unknown before it
            is flagged. Absorbs brief blips on flaky WiFi or cloud devices. Set to
            zero to flag the moment an entity goes unavailable.

            '
          default:
            minutes: 3
          selector:
            duration: {}
    scope_settings:
      name: Which entities to watch
      icon: mdi:select-group
      input:
        include_target:
          name: Include
          description: 'Entities, labels, areas, or devices to watch. Explicit
            entities and labels are watched precisely for both checks. Areas and
            devices are swept to one representative entity per device, tuned for
            freeze. A scope is required; there is no watch-everything default.

            '
          default: {}
          selector:
            target: {}
        exclude_target:
          name: Exclude
          description: 'Entities, labels, areas, or devices to leave out. Exclude
            always wins over include. Use it to trim a broad area sweep.

            '
          default: {}
          selector:
            target: {}
    cadence_settings:
      name: Evaluation cadence
      icon: mdi:timer-sync-outline
      input:
        scan_interval:
          name: Re-evaluation interval
          description: 'How often the sensor re-evaluates, in minutes. This is the
            only latency knob: an entity is caught within one tick. A short cadence
            keeps detection prompt.

            '
          default: /2
          selector:
            select:
              options:
              - label: Every 1
                value: /1
              - label: Every 2
                value: /2
              - label: Every 3
                value: /3
              - label: Every 5
                value: /5
              - label: Every 10
                value: /10
              - label: Every 15
                value: /15
              - label: Every 30
                value: /30
              sort: false
              custom_value: false
              multiple: false
        startup_grace_seconds:
          name: Startup grace period (seconds)
          description: 'How long after Home Assistant starts to hold the unavailable
            list empty while the system and the mesh come up, so a restart does not
            report a false outage. Measured from the uptime sensor (process start),
            so it must cover your hub''s FULL startup: boot time PLUS the time your
            Zigbee or Z-Wave mesh takes to settle, plus a margin. Watch your own
            startup and set this deliberately. A fast mini-PC may need 3 to 4
            minutes; a slower hub with Z-Wave may need 5 to 6. Freeze is not held
            (it cannot false-fire at startup). Set to 0 to disable.

            '
          default: 240
          selector:
            number:
              min: 0.0
              max: 1800.0
              step: 10.0
              unit_of_measurement: seconds
              mode: box
        uptime_sensor:
          name: Uptime sensor (required)
          description: 'REQUIRED. The Home Assistant uptime sensor, in TIMESTAMP mode
            (its state is an ISO time like 2026-06-26T14:06:56+00:00, not a number).
            The startup grace is measured from this, which is reliable across
            restarts and reloads. Add the Uptime integration if you do not have it.
            If this sensor is missing or is not a timestamp, the Sentinel reports a
            setup_error state and does nothing until it is fixed.

            '
          default: sensor.uptime
          selector:
            entity:
              filter:
              - domain:
                - sensor
                device_class:
                - timestamp
              multiple: false
        refresh_button:
          name: Manual refresh button (optional)
          description: 'An optional input_button. Press it to make the sensor
            re-evaluate immediately. It re-scans; it does not force a device to
            report. Point several Sentinel sensors at the same button to refresh
            them all with one press. Leave blank to disable.

            '
          default: input_button.none
          selector:
            entity:
              filter:
              - domain:
                - input_button
              multiple: false
    naming_settings:
      name: Sensor identity
      icon: mdi:tag-outline
      input:
        sensor_name:
          name: Sensor name
          description: The name for the sensor this blueprint creates.
          default: Entity Sentinel
          selector:
            text:
              multiple: false
              multiline: false
        unique_id:
          name: Unique ID
          description: 'A unique id so the sensor is registered and you can rename it
            or place it in an area from the interface. Make it distinct for every
            sensor you build, for example entity_sentinel.

            '
          selector:
            text:
              multiple: false
              multiline: false
    debug_settings:
      name: Debugging
      icon: mdi:bug-outline
      input:
        debug_enabled:
          name: Write a debug line to the log
          description: 'When on, the sensor writes one summary line to the system log
            each time it evaluates, naming the flagged entities and why. Leave off for
            normal use so the log stays quiet.

            '
          default: false
          selector:
            boolean: {}
variables:
  sentinel_version: 1.0.5-beta
  freeze_lookback: !input freeze_lookback
  unavailable_debounce: !input unavailable_debounce
  include_target: !input include_target
  exclude_target: !input exclude_target
  startup_grace_seconds: !input startup_grace_seconds
  uptime_sensor: !input uptime_sensor
  debug_enabled: !input debug_enabled
  result: |
    {%- set debounce_s = (timedelta(**unavailable_debounce).total_seconds() if (unavailable_debounce is mapping and unavailable_debounce) else 0) -%}
    {%- set freeze_s = (timedelta(**freeze_lookback).total_seconds() if (freeze_lookback is mapping and freeze_lookback) else 21600) -%}
    {%- set grace = startup_grace_seconds | int(120) -%}
    {%- set uptime_raw = states(uptime_sensor) -%}
    {%- set uptime_dt = uptime_raw | as_datetime(none) -%}
    {%- set uptime_ok = uptime_dt is not none -%}
    {%- if not uptime_ok -%}
      {%- if uptime_raw in ['unknown', 'unavailable', none] -%}
        {%- set uptime_status = uptime_raw if uptime_raw is not none else 'unknown' -%}
        {%- set error_msg = 'uptime_sensor ' ~ uptime_sensor ~ ' not found or unavailable (got: ' ~ uptime_status ~ '). This blueprint requires the uptime integration with the entity in timestamp mode.' -%}
      {%- else -%}
        {%- set uptime_status = uptime_raw -%}
        {%- set error_msg = 'uptime_sensor ' ~ uptime_sensor ~ ' is not a timestamp (got: ' ~ uptime_raw ~ '). Set the uptime integration to timestamp mode.' -%}
      {%- endif -%}
    {%- else -%}
      {%- set uptime_status = uptime_dt.isoformat() -%}
      {%- set error_msg = '' -%}
    {%- endif -%}
    {%- set boot_dt = uptime_dt if uptime_ok else now() -%}
    {%- set settled = uptime_ok and (as_timestamp(now()) - as_timestamp(boot_dt)) >= grace -%}
    {%- set priority = ['occupancy', 'motion', 'door', 'window', 'opening', 'garage_door', 'lock', 'moisture', 'smoke', 'gas', 'carbon_monoxide', 'temperature', 'humidity', 'connectivity', 'battery'] -%}
    {%- set inc = include_target -%}
    {%- set exc = exclude_target -%}

    {%- if uptime_ok -%}
    {%- set trusted = namespace(ents=[]) -%}
    {%- set swept = namespace(ents=[]) -%}

    {%- if inc is mapping -%}
      {%- if inc.entity_id is defined -%}
        {%- set elist = inc.entity_id if (inc.entity_id is iterable and inc.entity_id is not string) else [inc.entity_id] -%}
        {%- set trusted.ents = trusted.ents + elist -%}
      {%- endif -%}
      {%- if inc.label_id is defined -%}
        {%- set llist = inc.label_id if (inc.label_id is iterable and inc.label_id is not string) else [inc.label_id] -%}
        {%- for l in llist -%}
          {%- set trusted.ents = trusted.ents + label_entities(l) -%}
          {%- for d in label_devices(l) -%}{%- set swept.ents = swept.ents + [('device', d)] -%}{%- endfor -%}
          {%- for a in label_areas(l) -%}{%- set swept.ents = swept.ents + [('area', a)] -%}{%- endfor -%}
        {%- endfor -%}
      {%- endif -%}
      {%- if inc.device_id is defined -%}
        {%- set dlist = inc.device_id if (inc.device_id is iterable and inc.device_id is not string) else [inc.device_id] -%}
        {%- for d in dlist -%}{%- set swept.ents = swept.ents + [('device', d)] -%}{%- endfor -%}
      {%- endif -%}
      {%- if inc.area_id is defined -%}
        {%- set alist = inc.area_id if (inc.area_id is iterable and inc.area_id is not string) else [inc.area_id] -%}
        {%- for a in alist -%}{%- set swept.ents = swept.ents + [('area', a)] -%}{%- endfor -%}
      {%- endif -%}
    {%- endif -%}

    {%- set rep = namespace(ents=[]) -%}
    {%- set devset = namespace(ids=[]) -%}
    {%- for kind, ref in swept.ents -%}
      {%- if kind == 'device' -%}
        {%- if ref not in devset.ids -%}{%- set devset.ids = devset.ids + [ref] -%}{%- endif -%}
      {%- else -%}
        {%- for d in area_devices(ref) -%}
          {%- if d not in devset.ids -%}{%- set devset.ids = devset.ids + [d] -%}{%- endif -%}
        {%- endfor -%}
      {%- endif -%}
    {%- endfor -%}
    {%- set primary_domains = ['binary_sensor', 'sensor', 'light', 'switch', 'lock', 'cover', 'fan', 'climate', 'vacuum', 'lawn_mower', 'water_heater', 'humidifier', 'media_player', 'camera', 'valve', 'siren', 'device_tracker'] -%}
    {%- set telemetry_dc = ['power', 'energy', 'current', 'voltage', 'apparent_power', 'power_factor', 'illuminance'] -%}
    {%- set junk_domains = ['update', 'button', 'number', 'select', 'text', 'image', 'scene', 'configurator', 'event'] -%}
    {%- for d in devset.ids -%}
      {%- set chosen = namespace(eid=none, rank=999) -%}
      {%- set fb = namespace(primary=none, telemetry=none, any=none) -%}
      {%- for de in device_entities(d) -%}
        {%- set dom = de.split('.')[0] -%}
        {%- set dc = state_attr(de, 'device_class') -%}
        {%- set r = priority.index(dc) if dc in priority else 999 -%}
        {%- if r < chosen.rank -%}
          {%- set chosen.rank = r -%}
          {%- set chosen.eid = de -%}
        {%- endif -%}
        {%- if fb.primary is none and dom in primary_domains and dc not in telemetry_dc -%}
          {%- set fb.primary = de -%}
        {%- endif -%}
        {%- if fb.telemetry is none and dc in telemetry_dc -%}
          {%- set fb.telemetry = de -%}
        {%- endif -%}
        {%- if fb.any is none and dom not in junk_domains -%}
          {%- set fb.any = de -%}
        {%- endif -%}
      {%- endfor -%}
      {%- set elected = chosen.eid if chosen.eid is not none else (fb.primary if fb.primary is not none else (fb.telemetry if fb.telemetry is not none else fb.any)) -%}
      {%- if elected is not none -%}
        {%- set rep.ents = rep.ents + [elected] -%}
      {%- endif -%}
    {%- endfor -%}

    {%- set xset = namespace(ents=[]) -%}
    {%- if exc is mapping -%}
      {%- if exc.entity_id is defined -%}
        {%- set elist = exc.entity_id if (exc.entity_id is iterable and exc.entity_id is not string) else [exc.entity_id] -%}
        {%- set xset.ents = xset.ents + elist -%}
      {%- endif -%}
      {%- if exc.label_id is defined -%}
        {%- set llist = exc.label_id if (exc.label_id is iterable and exc.label_id is not string) else [exc.label_id] -%}
        {%- for l in llist -%}
          {%- set xset.ents = xset.ents + label_entities(l) -%}
          {%- for d in label_devices(l) -%}{%- set xset.ents = xset.ents + device_entities(d) -%}{%- endfor -%}
          {%- for a in label_areas(l) -%}{%- set xset.ents = xset.ents + area_entities(a) -%}{%- endfor -%}
        {%- endfor -%}
      {%- endif -%}
      {%- if exc.device_id is defined -%}
        {%- set dlist = exc.device_id if (exc.device_id is iterable and exc.device_id is not string) else [exc.device_id] -%}
        {%- for d in dlist -%}{%- set xset.ents = xset.ents + device_entities(d) -%}{%- endfor -%}
      {%- endif -%}
      {%- if exc.area_id is defined -%}
        {%- set alist = exc.area_id if (exc.area_id is iterable and exc.area_id is not string) else [exc.area_id] -%}
        {%- for a in alist -%}{%- set xset.ents = xset.ents + area_entities(a) -%}{%- endfor -%}
      {%- endif -%}
    {%- endif -%}

    {%- set all_trusted = trusted.ents | unique | list -%}
    {%- set trusted_devices = namespace(ids=[]) -%}
    {%- for te in all_trusted -%}
      {%- set td = device_id(te) -%}
      {%- if td is not none and td not in trusted_devices.ids -%}
        {%- set trusted_devices.ids = trusted_devices.ids + [td] -%}
      {%- endif -%}
    {%- endfor -%}
    {%- set rep_keep = namespace(ents=[]) -%}
    {%- for re in (rep.ents | unique | list) -%}
      {%- if re not in all_trusted and device_id(re) not in trusted_devices.ids -%}
        {%- set rep_keep.ents = rep_keep.ents + [re] -%}
      {%- endif -%}
    {%- endfor -%}
    {%- set rep_only = rep_keep.ents -%}
    {%- set monitored = (all_trusted + rep_only) | reject('in', xset.ents) | list -%}

    {%- set fl = namespace(items=[]) -%}
    {%- for eid in monitored -%}
      {%- set st = states(eid) -%}
      {%- set sobj = states[eid] -%}
      {%- set ename = (state_attr(eid, 'friendly_name') or (device_attr(device_id(eid), 'name') if device_id(eid) else none) or eid) -%}
      {%- set earea = (area_name(eid) or 'Unassigned') -%}
      {%- if sobj is none or st in ['unavailable', 'unknown', 'none'] -%}
        {%- set lc = sobj.last_changed if (sobj is not none and sobj.last_changed is not none) else none -%}
        {%- set bad_for = (now() - lc).total_seconds() if lc is not none else (debounce_s + 1) -%}
        {%- if settled and bad_for >= debounce_s -%}
          {%- set fl.items = fl.items + [{
            'name': ename,
            'entity_id': eid,
            'area': earea,
            'reason': ('missing' if sobj is none else st),
            'since': (lc.isoformat() if lc is not none else none),
            'last_seen': (sobj.last_reported.isoformat() if (sobj is not none and sobj.last_reported is not none) else none),
            'age': (relative_time(sobj.last_reported) if (sobj is not none and sobj.last_reported is not none) else 'unknown')
          }] -%}
        {%- endif -%}
      {%- else -%}
        {%- set did = device_id(eid) -%}
        {%- set hb = namespace(latest=none) -%}
        {%- if did is not none -%}
          {%- for de in device_entities(did) -%}
            {%- set deo = states[de] -%}
            {%- if deo is not none and deo.last_reported is not none -%}
              {%- if hb.latest is none or deo.last_reported > hb.latest -%}{%- set hb.latest = deo.last_reported -%}{%- endif -%}
            {%- endif -%}
          {%- endfor -%}
        {%- else -%}
          {%- if sobj is not none and sobj.last_reported is not none -%}{%- set hb.latest = sobj.last_reported -%}{%- endif -%}
        {%- endif -%}
        {%- if hb.latest is not none -%}
          {%- set age_s = (now() - hb.latest).total_seconds() -%}
          {%- if age_s > freeze_s -%}
            {%- set fl.items = fl.items + [{
              'name': ename,
              'entity_id': eid,
              'area': earea,
              'reason': 'frozen',
              'since': hb.latest.isoformat(),
              'last_seen': hb.latest.isoformat(),
              'age': relative_time(hb.latest)
            }] -%}
          {%- endif -%}
        {%- elif settled -%}
          {%- set fl.items = fl.items + [{
            'name': ename,
            'entity_id': eid,
            'area': earea,
            'reason': 'never_reported',
            'since': none,
            'last_seen': none,
            'age': 'never reported'
          }] -%}
        {%- endif -%}
      {%- endif -%}
    {%- endfor -%}

    {%- set flagged = fl.items -%}
    {%- endif -%}
    {%- if not uptime_ok -%}
    {{
      {
        'state': 'setup_error',
        'ok': false,
        'error': error_msg,
        'uptime_status': uptime_status,
        'total_monitored': 0,
        'devices': [],
        'unavailable_count': 0,
        'frozen_count': 0,
        'boot_time': none,
        'settled': false,
        'last_evaluated': now().isoformat()
      }
    }}
    {%- else -%}
    {{
      {
        'state': flagged | length,
        'ok': true,
        'error': '',
        'uptime_status': uptime_status,
        'total_monitored': monitored | length,
        'devices': flagged,
        'unavailable_count': (flagged | selectattr('reason', 'in', ['unavailable', 'unknown', 'missing', 'never_reported']) | list | length),
        'frozen_count': (flagged | selectattr('reason', 'eq', 'frozen') | list | length),
        'boot_time': boot_dt.isoformat(),
        'settled': settled,
        'last_evaluated': now().isoformat()
      }
    }}
    {%- endif -%}

trigger:
- trigger: time_pattern
  alias: Re-evaluate on the cadence interval
  hours: '*'
  minutes: !input scan_interval
- trigger: homeassistant
  alias: Latch the startup grace boot time on Home Assistant start
  event: start
  id: ha_start
- trigger: state
  alias: Manual refresh button press
  entity_id: !input refresh_button
  id: manual_refresh
action:
- if:
  - condition: template
    value_template: '{{ debug_enabled }}'
  then:
  - action: system_log.write
    data:
      level: info
      logger: entity_sentinel
      message: >-
        {%- macro loc(v) -%}{{ (v | as_datetime(none) | as_local).strftime('%Y-%m-%d
        %H:%M:%S') if (v | as_datetime(none)) is not none else v }}{%- endmacro -%}
        Entity Sentinel v{{ sentinel_version }} @ {{ loc(result.last_evaluated) }} | state: {{
        result.state }} | uptime_status: {{ result.uptime_status }}{% if
        result.error %} | ERROR: {{ result.error }}{% endif %} | settled: {{
        result.settled }} | boot: {{ loc(result.boot_time) }} | monitored: {{
        result.total_monitored }} | flagged: {{ result.state }} (unavailable {{
        result.unavailable_count }}, frozen {{ result.frozen_count }}){% for d in
        result.devices %} | {{ d.name }} ({{ d.entity_id }}) [{{ d.reason }}] area={{
        d.area }} age={{ d.age }} since={{ loc(d.since) }} last_seen={{ loc(d.last_seen)
        }}{% endfor %}
sensor:
- name: !input sensor_name
  unique_id: !input unique_id
  state: '{{ result.state }}'
  icon: >-
    {% if result.state == 'setup_error' %}mdi:cog-off{% elif result.state | int(0)
    > 0 %}mdi:alert-circle{% else %}mdi:check-circle-outline{% endif %}
  attributes:
    ok: '{{ result.ok }}'
    error: '{{ result.error }}'
    sentinel_type: entity
    sentinel_version: '{{ sentinel_version }}'
    uptime_status: '{{ result.uptime_status }}'
    total_monitored: '{{ result.total_monitored }}'
    devices: '{{ result.devices }}'
    unavailable_count: '{{ result.unavailable_count }}'
    frozen_count: '{{ result.frozen_count }}'
    boot_time: '{{ result.boot_time }}'
    last_evaluated: '{{ result.last_evaluated }}'
