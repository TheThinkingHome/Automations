          default:
            hours: 36
          selector:
            duration:
              enable_second: true
    tier_4_settings:
      name: Tier 4
      icon: mdi:layers-outline
      collapsed: true
      description: >-
        Leave the targets empty if you do not need this tier.
      input:
        tier_4_name:
          name: Tier 4 name
          description: The display name for this tier, carried on every flagged entry and in the per-tier counts.
          default: Tier 4
          selector:
            text:
              multiple: false
              multiline: false
        tier_4_target:
          name: Tier 4 targets
          description: >-
            Entities, labels, areas, or devices for this tier. Explicit entities
            and labels are watched precisely; areas and devices are swept to one
            representative entity per device. Empty means this tier is unused.
          default: {}
          selector:
            target: {}
        tier_4_exclude:
          name: Tier 4 exclude
          description: >-
            Entities, labels, areas, or devices to leave out of THIS tier only.
            Use it to carve a specific entity out of this tier's area or label
            sweep while another tier still watches it. The global exclude below
