          default: {}
          selector:
            target: {}
        tier_4_freeze:
          name: Tier 4 freeze lookback
          description: >-
            How long a device in this tier may go without reporting anything
            before it counts as frozen. Set it a little longer than the longest
            normal silence among this tier's devices.
          default:
            hours: 36
          selector:
            duration:
              enable_second: true
    tier_5_settings:
      name: Tier 5
      icon: mdi:layers-outline
      collapsed: true
      description: >-
        Leave the targets empty if you do not need this tier.
      input:
        tier_5_name:
          name: Tier 5 name
          description: The display name for this tier, carried on every flagged entry and in the per-tier counts.
          default: Tier 5
          selector:
            text:
              multiple: false
              multiline: false
        tier_5_target:
          name: Tier 5 targets
          description: >-
            Entities, labels, areas, or devices for this tier. Explicit entities
            and labels are watched precisely; areas and devices are swept to one
