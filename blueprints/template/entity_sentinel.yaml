            target: {}
        tier_5_exclude:
          name: Tier 5 exclude
          description: >-
            Entities, labels, areas, or devices to leave out of THIS tier only.
            Use it to carve a specific entity out of this tier's area or label
            sweep while another tier still watches it. The global exclude below
            removes from every tier; this removes from this one.
          default: {}
          selector:
            target: {}
        tier_5_freeze:
          name: Tier 5 freeze lookback
          description: >-
            How long a device in this tier may go without reporting anything
            before it counts as frozen. Set it a little longer than the longest
            normal silence among this tier's devices.
          default:
            hours: 36
          selector:
            duration:
              enable_second: true
    scope_settings:
      name: Global exclude
      icon: mdi:select-group
      input:
        exclude_target:
          name: Exclude (all tiers)
          description: >-
            Entities, labels, areas, or devices to leave out of every tier.
            Exclude always wins over any tier's include. Use it to trim a broad
            area sweep.
          default: {}
          selector:
            target: {}
    detection_settings:
      name: Liveness detection
      icon: mdi:radar
      input:
        unavailable_debounce:
          name: Unavailable debounce (all tiers)
          description: >-
            How long an entity must stay unavailable or unknown before it is
            flagged, whatever its tier. Absorbs brief blips on flaky WiFi or
            cloud devices. Set to zero to flag immediately.
          default:
            minutes: 3
          selector:
            duration:
              enable_second: true
    cadence_settings:
      name: Evaluation cadence
      icon: mdi:timer-sync-outline
      input:
        scan_interval:
          name: Re-evaluation interval
          description: >-
            How often the sensor re-evaluates, in minutes. This is the only
            latency knob: an entity is caught within one tick of its own tier's
            window expiring.
          default: /2
          selector:
            select:
              options:
                - label: Every 1
                  value: /1
                - label: Every 2
                  value: /2
                - label: Every 3
                  value: /3
                - label: Every 5
                  value: /5
                - label: Every 10
                  value: /10
                - label: Every 15
                  value: /15
                - label: Every 30
                  value: /30
              sort: false
              custom_value: false
              multiple: false
        startup_grace_seconds:
          name: Startup grace period (seconds)
          description: >-
            How long after Home Assistant starts to hold the unavailable list
            empty while the system and the mesh come up, so a restart does not
            report a false outage. Measured from the uptime sensor (process
            start), so it must cover your hub's FULL startup: boot time PLUS
            mesh settle time plus a margin. Freeze is not held (it cannot
            false-fire at startup). Set to 0 to disable.
          default: 240
          selector:
            number:
              min: 0.0
              max: 1800.0
              step: 10.0
              unit_of_measurement: seconds
              mode: box
        uptime_sensor:
          name: Uptime sensor (required)
          description: >-
            REQUIRED. The Home Assistant uptime sensor, in TIMESTAMP mode (its
            state is an ISO time, not a number). The startup grace is measured
            from this. Add the Uptime integration if you do not have it. If
            this sensor is missing or is not a timestamp, the Sentinel reports
            a setup_error state and does nothing until it is fixed.
          default: sensor.uptime
          selector:
            entity:
              filter:
                - domain:
                    - sensor
                  device_class:
                    - timestamp
              multiple: false
              reorder: false
        refresh_button:
          name: Manual refresh button (optional)
          description: >-
            An optional input_button. Press it to make the sensor re-evaluate
            immediately. It re-scans; it does not force a device to report.
            Point several Sentinel sensors at the same button to refresh them
            all with one press. Leave blank to disable.
          default: input_button.none
          selector:
            entity:
              filter:
                - domain:
                    - input_button
              multiple: false
              reorder: false
    naming_settings:
      name: Sensor identity
      icon: mdi:tag-outline
      input:
        sensor_name:
          name: Sensor name
          description: The name for the sensor this blueprint creates.
          default: Entity Sentinel
          selector:
            text:
              multiple: false
              multiline: false
        unique_id:
          name: Unique ID
          description: >-
            A unique id so the sensor is registered and you can rename it or
            place it in an area from the interface. Make it distinct for every
            sensor you build, for example entity_sentinel.
          selector:
            text:
              multiple: false
              multiline: false
    debug_settings:
      name: Debugging
      icon: mdi:bug-outline
      input:
        debug_enabled:
          name: Write a debug line to the log
          description: >-
            When on, the sensor writes one summary line to the system log each
            time it evaluates, naming each tier's counts and the flagged
            entities. Leave off for normal use.
          default: false
          selector:
            boolean: {}

variables:
  sentinel_version: 2.3.0-beta
  scan_interval: !input scan_interval
  tier_1_name: !input tier_1_name
  tier_1_target: !input tier_1_target
  tier_1_exclude: !input tier_1_exclude
  tier_1_freeze: !input tier_1_freeze
  tier_2_name: !input tier_2_name
  tier_2_target: !input tier_2_target
  tier_2_exclude: !input tier_2_exclude
  tier_2_freeze: !input tier_2_freeze
  tier_3_name: !input tier_3_name
  tier_3_target: !input tier_3_target
  tier_3_exclude: !input tier_3_exclude
  tier_3_freeze: !input tier_3_freeze
  tier_4_name: !input tier_4_name
  tier_4_target: !input tier_4_target
  tier_4_exclude: !input tier_4_exclude
  tier_4_freeze: !input tier_4_freeze
  tier_5_name: !input tier_5_name
  tier_5_target: !input tier_5_target
  tier_5_exclude: !input tier_5_exclude
  tier_5_freeze: !input tier_5_freeze
  exclude_target: !input exclude_target
  unavailable_debounce: !input unavailable_debounce
  startup_grace_seconds: !input startup_grace_seconds
  uptime_sensor: !input uptime_sensor
  debug_enabled: !input debug_enabled
  result: |
    {%- set debounce_s = (timedelta(**unavailable_debounce).total_seconds() if (unavailable_debounce is mapping and unavailable_debounce) else 0) -%}
    {%- set grace = startup_grace_seconds | int(120) -%}
    {%- set uptime_raw = states(uptime_sensor) -%}
    {%- set uptime_dt = uptime_raw | as_datetime(none) -%}
    {%- set uptime_ok = uptime_dt is not none -%}
    {%- if not uptime_ok -%}
      {%- if uptime_raw in ['unknown', 'unavailable', none] -%}
        {%- set uptime_status = uptime_raw if uptime_raw is not none else 'unknown' -%}
        {%- set error_msg = 'uptime_sensor ' ~ uptime_sensor ~ ' not found or unavailable (got: ' ~ uptime_status ~ '). This blueprint requires the uptime integration with the entity in timestamp mode.' -%}
      {%- else -%}
        {%- set uptime_status = uptime_raw -%}
        {%- set error_msg = 'uptime_sensor ' ~ uptime_sensor ~ ' is not a timestamp (got: ' ~ uptime_raw ~ '). Set the uptime integration to timestamp mode.' -%}
      {%- endif -%}
    {%- else -%}
      {%- set uptime_status = uptime_dt.isoformat() -%}
      {%- set error_msg = '' -%}
    {%- endif -%}
    {%- set boot_dt = uptime_dt if uptime_ok else now() -%}
    {%- set settled = uptime_ok and (as_timestamp(now()) - as_timestamp(boot_dt)) >= grace -%}
    {%- set priority = ['occupancy', 'motion', 'door', 'window', 'opening', 'garage_door', 'lock', 'moisture', 'smoke', 'gas', 'carbon_monoxide', 'temperature', 'humidity', 'connectivity', 'battery'] -%}
    {%- set primary_domains = ['binary_sensor', 'sensor', 'light', 'switch', 'lock', 'cover', 'fan', 'climate', 'vacuum', 'lawn_mower', 'water_heater', 'humidifier', 'media_player', 'camera', 'valve', 'siren', 'device_tracker'] -%}
    {%- set telemetry_dc = ['power', 'energy', 'current', 'voltage', 'apparent_power', 'power_factor', 'illuminance'] -%}
    {%- set junk_domains = ['update', 'button', 'number', 'select', 'text', 'image', 'scene', 'configurator', 'event'] -%}
    {%- set tier_defs = [
      {'name': tier_1_name, 'target': tier_1_target, 'exclude': tier_1_exclude, 'freeze': tier_1_freeze},
      {'name': tier_2_name, 'target': tier_2_target, 'exclude': tier_2_exclude, 'freeze': tier_2_freeze},
      {'name': tier_3_name, 'target': tier_3_target, 'exclude': tier_3_exclude, 'freeze': tier_3_freeze},
      {'name': tier_4_name, 'target': tier_4_target, 'exclude': tier_4_exclude, 'freeze': tier_4_freeze},
      {'name': tier_5_name, 'target': tier_5_target, 'exclude': tier_5_exclude, 'freeze': tier_5_freeze}
    ] -%}
    {%- if uptime_ok -%}
    {%- set exc = exclude_target -%}
    {%- set xset = namespace(ents=[]) -%}
    {%- if exc is mapping -%}
      {%- if exc.entity_id is defined -%}
        {%- set elist = exc.entity_id if (exc.entity_id is iterable and exc.entity_id is not string) else [exc.entity_id] -%}
        {%- set xset.ents = xset.ents + elist -%}
      {%- endif -%}
      {%- if exc.label_id is defined -%}
        {%- set llist = exc.label_id if (exc.label_id is iterable and exc.label_id is not string) else [exc.label_id] -%}
        {%- for l in llist -%}
          {%- set xset.ents = xset.ents + label_entities(l) -%}
          {%- for d in label_devices(l) -%}{%- set xset.ents = xset.ents + device_entities(d) -%}{%- endfor -%}
          {%- for a in label_areas(l) -%}{%- set xset.ents = xset.ents + area_entities(a) -%}{%- endfor -%}
        {%- endfor -%}
      {%- endif -%}
      {%- if exc.device_id is defined -%}
        {%- set dlist = exc.device_id if (exc.device_id is iterable and exc.device_id is not string) else [exc.device_id] -%}
        {%- for d in dlist -%}{%- set xset.ents = xset.ents + device_entities(d) -%}{%- endfor -%}
      {%- endif -%}
      {%- if exc.area_id is defined -%}
        {%- set alist = exc.area_id if (exc.area_id is iterable and exc.area_id is not string) else [exc.area_id] -%}
        {%- for a in alist -%}{%- set xset.ents = xset.ents + area_entities(a) -%}{%- endfor -%}
      {%- endif -%}
    {%- endif -%}
    {%- set acc = namespace(seen=[], tiers=[], flagged=[], monitored_total=0, tier_err=0) -%}
    {%- set fseen = namespace(ids=[]) -%}
    {%- set useen = namespace(ids=[]) -%}
    {%- for t in tier_defs -%}
      {%- set inc = t.target -%}
      {%- set active = inc is mapping and (inc.entity_id is defined or inc.label_id is defined or inc.device_id is defined or inc.area_id is defined) -%}
      {%- if active -%}
        {%- set freeze_s = (timedelta(**t.freeze).total_seconds() if (t.freeze is mapping and t.freeze) else 21600) -%}
        {%- set trusted = namespace(ents=[]) -%}
        {%- set swept = namespace(ents=[]) -%}
        {%- if inc.entity_id is defined -%}
          {%- set elist = inc.entity_id if (inc.entity_id is iterable and inc.entity_id is not string) else [inc.entity_id] -%}
          {%- set trusted.ents = trusted.ents + elist -%}
        {%- endif -%}
        {%- if inc.label_id is defined -%}
          {%- set llist = inc.label_id if (inc.label_id is iterable and inc.label_id is not string) else [inc.label_id] -%}
          {%- for l in llist -%}
            {%- set trusted.ents = trusted.ents + label_entities(l) -%}
            {%- for d in label_devices(l) -%}{%- set swept.ents = swept.ents + [('device', d)] -%}{%- endfor -%}
            {%- for a in label_areas(l) -%}{%- set swept.ents = swept.ents + [('area', a)] -%}{%- endfor -%}
          {%- endfor -%}
        {%- endif -%}
        {%- if inc.device_id is defined -%}
          {%- set dlist = inc.device_id if (inc.device_id is iterable and inc.device_id is not string) else [inc.device_id] -%}
          {%- for d in dlist -%}{%- set swept.ents = swept.ents + [('device', d)] -%}{%- endfor -%}
        {%- endif -%}
        {%- if inc.area_id is defined -%}
          {%- set alist = inc.area_id if (inc.area_id is iterable and inc.area_id is not string) else [inc.area_id] -%}
          {%- for a in alist -%}{%- set swept.ents = swept.ents + [('area', a)] -%}{%- endfor -%}
        {%- endif -%}
        {%- set rep = namespace(ents=[]) -%}
        {%- set devset = namespace(ids=[]) -%}
        {%- for kind, ref in swept.ents -%}
          {%- if kind == 'device' -%}
            {%- if ref not in devset.ids -%}{%- set devset.ids = devset.ids + [ref] -%}{%- endif -%}
          {%- else -%}
            {%- for d in area_devices(ref) -%}
              {%- if d not in devset.ids -%}{%- set devset.ids = devset.ids + [d] -%}{%- endif -%}
            {%- endfor -%}
          {%- endif -%}
        {%- endfor -%}
        {%- for d in devset.ids -%}
          {%- set chosen = namespace(eid=none, rank=999) -%}
          {%- set fb = namespace(primary=none, telemetry=none, any=none) -%}
          {%- for de in device_entities(d) -%}
            {%- set dom = de.split('.')[0] -%}
            {%- set dc = state_attr(de, 'device_class') -%}
            {%- set r = priority.index(dc) if dc in priority else 999 -%}
            {%- if r < chosen.rank -%}
              {%- set chosen.rank = r -%}
              {%- set chosen.eid = de -%}
            {%- endif -%}
            {%- if fb.primary is none and dom in primary_domains and dc not in telemetry_dc -%}
              {%- set fb.primary = de -%}
            {%- endif -%}
            {%- if fb.telemetry is none and dc in telemetry_dc -%}
              {%- set fb.telemetry = de -%}
            {%- endif -%}
            {%- if fb.any is none and dom not in junk_domains -%}
              {%- set fb.any = de -%}
            {%- endif -%}
          {%- endfor -%}
          {%- set elected = chosen.eid if chosen.eid is not none else (fb.primary if fb.primary is not none else (fb.telemetry if fb.telemetry is not none else fb.any)) -%}
          {%- if elected is not none -%}
            {%- set rep.ents = rep.ents + [elected] -%}
          {%- endif -%}
        {%- endfor -%}
        {%- set all_trusted = trusted.ents | unique | list -%}
        {%- set trusted_devices = namespace(ids=[]) -%}
        {%- for te in all_trusted -%}
          {%- set td = device_id(te) -%}
          {%- if td is not none and td not in trusted_devices.ids -%}
            {%- set trusted_devices.ids = trusted_devices.ids + [td] -%}
          {%- endif -%}
        {%- endfor -%}
        {%- set rep_keep = namespace(ents=[]) -%}
        {%- for re in (rep.ents | unique | list) -%}
          {%- if re not in all_trusted and device_id(re) not in trusted_devices.ids -%}
            {%- set rep_keep.ents = rep_keep.ents + [re] -%}
          {%- endif -%}
        {%- endfor -%}
        {%- set texc = namespace(ents=[]) -%}
        {%- set tex = t.exclude -%}
        {%- if tex is mapping -%}
          {%- if tex.entity_id is defined -%}
            {%- set elist = tex.entity_id if (tex.entity_id is iterable and tex.entity_id is not string) else [tex.entity_id] -%}
            {%- set texc.ents = texc.ents + elist -%}
          {%- endif -%}
          {%- if tex.label_id is defined -%}
            {%- set llist = tex.label_id if (tex.label_id is iterable and tex.label_id is not string) else [tex.label_id] -%}
            {%- for l in llist -%}
              {%- set texc.ents = texc.ents + label_entities(l) -%}
              {%- for d in label_devices(l) -%}{%- set texc.ents = texc.ents + device_entities(d) -%}{%- endfor -%}
              {%- for a in label_areas(l) -%}{%- set texc.ents = texc.ents + area_entities(a) -%}{%- endfor -%}
            {%- endfor -%}
          {%- endif -%}
          {%- if tex.device_id is defined -%}
            {%- set dlist = tex.device_id if (tex.device_id is iterable and tex.device_id is not string) else [tex.device_id] -%}
            {%- for d in dlist -%}{%- set texc.ents = texc.ents + device_entities(d) -%}{%- endfor -%}
          {%- endif -%}
          {%- if tex.area_id is defined -%}
            {%- set alist = tex.area_id if (tex.area_id is iterable and tex.area_id is not string) else [tex.area_id] -%}
            {%- for a in alist -%}{%- set texc.ents = texc.ents + area_entities(a) -%}{%- endfor -%}
          {%- endif -%}
        {%- endif -%}
        {%- set pre_exclude = (all_trusted + rep_keep.ents) | reject('in', xset.ents) | list -%}
        {%- set tmon = pre_exclude | reject('in', texc.ents) | list -%}
        {%- set kept = namespace(e=[]) -%}
        {%- set dup = namespace(e=[]) -%}
        {%- for e in tmon -%}
          {%- if e in acc.seen -%}
            {%- set dup.e = dup.e + [e] -%}
          {%- else -%}
            {%- set kept.e = kept.e + [e] -%}
            {%- set acc.seen = acc.seen + [e] -%}
          {%- endif -%}
        {%- endfor -%}
        {%- set tstatus = '' -%}
        {%- set tis_error = false -%}
        {%- if dup.e | length > 0 -%}
          {%- set tstatus = 'duplicate of a lower-numbered tier: ' ~ (dup.e | sort | join(', ')) ~ '. Each entity may live in exactly one tier; remove it from this tier.' -%}
          {%- set tis_error = true -%}
        {%- elif kept.e | length == 0 and pre_exclude | length > 0 -%}
          {%- set tstatus = 'all ' ~ (pre_exclude | length) ~ ' resolved entities were removed by this tier''s exclude; nothing is being monitored.' -%}
        {%- elif kept.e | length == 0 -%}
          {%- set tstatus = 'no entities resolved from this tier''s target (nothing tagged yet?).' -%}
        {%- endif -%}
        {%- set fl = namespace(items=[]) -%}
        {%- for eid in kept.e -%}
          {%- set st = states(eid) -%}
          {%- set sobj = states[eid] -%}
          {%- set ename = (state_attr(eid, 'friendly_name') or (device_attr(device_id(eid), 'name') if device_id(eid) else none) or eid) -%}
          {%- set earea = (area_name(eid) or 'Unassigned') -%}
          {%- if sobj is none or st in ['unavailable', 'unknown', 'none'] -%}
            {%- set lc = sobj.last_changed if (sobj is not none and sobj.last_changed is not none) else none -%}
            {%- set bad_for = (now() - lc).total_seconds() if lc is not none else (debounce_s + 1) -%}
            {%- if settled and bad_for >= debounce_s -%}
              {%- set udid = device_id(eid) if sobj is not none else none -%}
              {%- set dead = namespace(all=true) -%}
              {%- if udid is not none -%}
                {%- for de in device_entities(udid) -%}
                  {%- set deo = states[de] -%}
                  {%- if deo is not none and deo.state not in ['unavailable', 'unknown', 'none'] -%}
                    {%- set dead.all = false -%}
                  {%- endif -%}
                {%- endfor -%}
              {%- else -%}
                {%- set dead.all = false -%}
              {%- endif -%}
              {%- if dead.all -%}
                {%- if udid not in useen.ids -%}
                  {%- set fl.items = fl.items + [{
                    'name': ename,
                    'entity_id': eid,
                    'area': earea,
                    'tier': t.name,
                    'reason': st,
                    'since': (lc.isoformat() if lc is not none else none),
                    'last_seen': (sobj.last_reported.isoformat() if (sobj is not none and sobj.last_reported is not none) else none),
                    'age': (relative_time(sobj.last_reported) if (sobj is not none and sobj.last_reported is not none) else 'unknown')
                  }] -%}
                  {%- set useen.ids = useen.ids + [udid] -%}
                {%- endif -%}
              {%- else -%}
                {%- set fl.items = fl.items + [{
                  'name': ename,
                  'entity_id': eid,
                  'area': earea,
                  'tier': t.name,
                  'reason': ('missing' if sobj is none else st),
                  'since': (lc.isoformat() if lc is not none else none),
                  'last_seen': (sobj.last_reported.isoformat() if (sobj is not none and sobj.last_reported is not none) else none),
                  'age': (relative_time(sobj.last_reported) if (sobj is not none and sobj.last_reported is not none) else 'unknown')
                }] -%}
              {%- endif -%}
            {%- endif -%}
          {%- else -%}
            {%- set did = device_id(eid) -%}
            {%- set hb = namespace(latest=none, truth=none) -%}
            {%- if did is not none -%}
              {%- for de in device_entities(did) -%}
                {%- set deo = states[de] -%}
                {%- if deo is not none -%}
                  {%- if (deo.attributes.device_class | default('')) == 'timestamp' and 'last_seen' in de -%}
                    {%- set ts = as_datetime(deo.state) -%}
                    {%- if ts is not none -%}
                      {%- if hb.truth is none or ts > hb.truth -%}{%- set hb.truth = ts -%}{%- endif -%}
                    {%- endif -%}
                  {%- endif -%}
                  {%- if deo.last_reported is not none -%}
                    {%- if hb.latest is none or deo.last_reported > hb.latest -%}{%- set hb.latest = deo.last_reported -%}{%- endif -%}
                  {%- endif -%}
                {%- endif -%}
              {%- endfor -%}
            {%- else -%}
              {%- if sobj is not none and sobj.last_reported is not none -%}{%- set hb.latest = sobj.last_reported -%}{%- endif -%}
            {%- endif -%}
            {%- if hb.truth is not none -%}{%- set hb.latest = hb.truth -%}{%- endif -%}
            {%- if hb.latest is not none -%}
              {%- set age_s = (now() - hb.latest).total_seconds() -%}
              {%- if age_s > freeze_s -%}
                {%- if did is none or did not in fseen.ids -%}
                  {%- set fl.items = fl.items + [{
                    'name': ename,
                    'entity_id': eid,
                    'area': earea,
                    'tier': t.name,
                    'reason': 'frozen',
                    'since': hb.latest.isoformat(),
                    'last_seen': hb.latest.isoformat(),
                    'age': relative_time(hb.latest)
                  }] -%}
                  {%- if did is not none -%}{%- set fseen.ids = fseen.ids + [did] -%}{%- endif -%}
                {%- endif -%}
              {%- endif -%}
            {%- elif settled -%}
              {%- set fl.items = fl.items + [{
                'name': ename,
                'entity_id': eid,
                'area': earea,
                'tier': t.name,
                'reason': 'never_reported',
                'since': none,
                'last_seen': none,
                'age': 'never reported'
              }] -%}
            {%- endif -%}
          {%- endif -%}
        {%- endfor -%}
        {%- set acc.flagged = acc.flagged + fl.items -%}
        {%- set acc.monitored_total = acc.monitored_total + (kept.e | length) -%}
        {%- if tis_error -%}{%- set acc.tier_err = acc.tier_err + 1 -%}{%- endif -%}
        {%- set acc.tiers = acc.tiers + [{
          'tier': t.name,
          'monitored': kept.e | length,
          'flagged': fl.items | length,
          'status': tstatus
        }] -%}
      {%- endif -%}
    {%- endfor -%}
    {%- set flagged = acc.flagged | sort(attribute='entity_id') | sort(attribute='name') | sort(attribute='area') -%}
    {%- endif -%}
    {%- if not uptime_ok -%}
    {{
      {
        'state': 'setup_error',
        'ok': false,
        'error': error_msg,
        'uptime_status': uptime_status,
        'total_monitored': 0,
        'devices': [],
        'tiers': [],
        'tier_error_count': 0,
        'unavailable_count': 0,
        'frozen_count': 0,
        'boot_time': none,
        'settled': false,
        'last_evaluated': now().isoformat()
      }
    }}
    {%- elif acc.tiers | length == 0 -%}
    {{
      {
        'state': 'setup_error',
        'ok': false,
        'error': 'No tiers configured. Give at least one tier a target (entities, a label, an area, or a device).',
        'uptime_status': uptime_status,
        'total_monitored': 0,
        'devices': [],
        'tiers': [],
        'tier_error_count': 0,
        'unavailable_count': 0,
        'frozen_count': 0,
        'boot_time': boot_dt.isoformat(),
        'settled': settled,
        'last_evaluated': now().isoformat()
      }
    }}
    {%- else -%}
    {{
      {
        'state': flagged | length,
        'ok': true,
        'error': '',
        'uptime_status': uptime_status,
        'total_monitored': acc.monitored_total,
        'devices': flagged,
        'tiers': acc.tiers,
        'tier_error_count': acc.tier_err,
        'unavailable_count': (flagged | selectattr('reason', 'in', ['unavailable', 'unknown', 'none', 'missing', 'never_reported']) | list | length),
        'frozen_count': (flagged | selectattr('reason', 'eq', 'frozen') | list | length),
        'boot_time': boot_dt.isoformat(),
        'settled': settled,
        'last_evaluated': now().isoformat()
      }
    }}
    {%- endif -%}

trigger:
  - trigger: time_pattern
    alias: Re-evaluate on the cadence interval
    hours: '*'
    minutes: !input scan_interval
  - trigger: homeassistant
    alias: Latch the startup grace boot time on Home Assistant start
    event: start
    id: ha_start
  - trigger: state
    alias: Manual refresh button press
    entity_id: !input refresh_button
    id: manual_refresh

action:
  - if:
      - condition: template
        value_template: "{{ debug_enabled }}"
    then:
      - action: system_log.write
        data:
          level: info
          logger: entity_sentinel
          message: >-
            {%- macro loc(v) -%}{{ (v | as_datetime(none) | as_local).strftime('%Y-%m-%d %H:%M:%S') if (v | as_datetime(none)) is not none else v }}{%- endmacro -%}
            Entity Sentinel v{{ sentinel_version }} @ {{ loc(result.last_evaluated) }}
            | state: {{ result.state }} | uptime_status: {{ result.uptime_status }}{% if result.error %} | ERROR: {{ result.error }}{% endif %}
            | settled: {{ result.settled }} | boot: {{ loc(result.boot_time) }}
            | monitored: {{ result.total_monitored }} | flagged: {{ result.state }} (unavailable {{ result.unavailable_count }}, frozen {{ result.frozen_count }})
            | tiers: {% for t in result.tiers %}{{ t.tier }} {{ t.flagged }}/{{ t.monitored }}{% if t.status %} [{{ t.status }}]{% endif %}{{ '' if loop.last else ', ' }}{% endfor %}
            {%- for d in result.devices %} | {{ d.name }} ({{ d.entity_id }}) [{{ d.reason }}] tier={{ d.tier }} area={{ d.area }} age={{ d.age }} since={{ loc(d.since) }} last_seen={{ loc(d.last_seen) }}{% endfor %}

sensor:
  - name: !input sensor_name
    unique_id: !input unique_id
    state: "{{ result.state }}"
    icon: >-
      {% if result.state == 'setup_error' %}mdi:cog-off{% elif result.tier_error_count | int(0) > 0 %}mdi:alert-circle-outline{% elif result.state | int(0) > 0 %}mdi:alert-circle{% else %}mdi:check-circle-outline{% endif %}
    attributes:
      ok: "{{ result.ok }}"
      error: "{{ result.error }}"
      total_monitored: "{{ result.total_monitored }}"
      unavailable_count: "{{ result.unavailable_count }}"
      frozen_count: "{{ result.frozen_count }}"
      tier_error_count: "{{ result.tier_error_count }}"
      devices: "{{ result.devices }}"
      tiers: "{{ result.tiers }}"
      sentinel_type: entity
      sentinel_version: "{{ sentinel_version }}"
      scan_interval: "{{ scan_interval }}"
      uptime_status: "{{ result.uptime_status }}"
      boot_time: "{{ result.boot_time }}"
      settled: "{{ result.settled }}"
      last_evaluated: "{{ result.last_evaluated }}"
