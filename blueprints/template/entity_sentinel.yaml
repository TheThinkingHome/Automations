# ==============================================================================
# Entity Sentinel 2.3 (Beta) - The Tiered Rebuild
# A template blueprint from The Thinking Home (xeazy.com)
# License: GPL-3.0-or-later. Copyright (C) 2026 James Lander.
# ==============================================================================
#
# One sensor, up to five tiers. Each tier carries its own targets and its own
# freeze window; the sensor evaluates every tier on one shared cadence and
# publishes one merged, tier-annotated list. This replaces the old pattern of
# one sensor per cadence class plus the Dashboard Sentinel aggregator: the
# tiers live where they always belonged, inside the detector.
#
# WHY IT WORKS (cadence vs lookback): the scan interval is only the trigger;
# the freeze math applies each entity's own tier window. A Sleepy device judged
# at 36 hours cannot false-flag on a 30-minute cadence; it is simply detected
# within one tick of its own window expiring, instead of waiting for a separate
# slow sensor's tick.
#
# DESIGN CHOICE (five hardcoded tiers): blueprint inputs cannot be dynamic
# dictionaries, so the schema carries five fixed slots (name, targets, freeze
# window each). A tier with no targets is skipped silently; unused slots never
# appear in a package file. All five empty is a loud setup error.
#
# DESIGN CHOICE (duplicates are a reported error, not a precedence puzzle):
# tier priority is 1 > 2 > 3 > 4 > 5. An entity appearing in two tiers stays
# monitored in its lowest-numbered tier; every higher-numbered tier that also
# contains it excludes it and names it in that tier's error while the tier's
# healthy entries still render. No intent-guessing; the human fixes the config.
#
# DESIGN CHOICE (per-tier validation, partial rendering): a tier's problems are
# that tier's problems. Each tier reports its own error and note in the tiers
# attribute; healthy tiers render normally. A target that resolves to zero
# entities is a note, not an error (a freshly created label with nothing tagged
# is a normal mid-setup state). The sensor-level ok stays true while any tier
# renders; only a global fault (missing uptime sensor, no tiers configured)
# is state setup_error / ok false, so a consumer like Sentinel Notify never
# drops a partially-healthy sensor. tier_error_count is the badge hook.
#
# DESIGN CHOICE (global exclude + per-tier excludes): membership is per-tier.
# The global exclude trims every tier (per-house suppression). Each tier also
# has its own exclude that trims only that tier. This is how a broad area or
# label sweep in one tier coexists with a specific entity named in a faster
# tier: exclude the entity from the sweeping tier, and the cross-tier duplicate
# error clears without removing it from the tier that should keep it. Any
# duplicate the user has NOT resolved this way stays a loud, named per-tier
# error (report and fail; the engine never silently picks a winner).
#
# DESIGN CHOICE (the contract is a superset of 1.x): same devices shape, same
# ok / error / boot_time / last_evaluated / total_monitored / counts, so
# Sentinel Notify and every dashboard card consume 2.0 unchanged. New: each
# devices entry carries tier (the display name); a tiers attribute lists
# per-tier name, monitored, flagged, and a single status string (empty when the
# tier is healthy); tier_error_count counts
# tiers currently in error. The merged list is area-then-name sorted (entity-id
# grouping), matching what Dashboard Sentinel used to hand the cards.
#
# Everything else is carried from 1.x verbatim: the label/device/area roll-up
# on both include and exclude sides, the representative-entity election for
# swept devices, the unavailable/unknown debounce (global; unavailability is
# not cadence-dependent), the freeze check judged against the freshest report
# across the whole device, the startup grace measured from the required uptime
# sensor in timestamp mode, and the loud uptime setup error.
#
# Changelog:
#   2.3.0-beta - ONE ROW PER PROBLEM. Unavailable now collapses like frozen,
#           but conditionally: when every live sibling on the device also reads
#           unavailable, unknown, or none, the whole device is the problem and
#           it appears once, represented by its highest-priority watched
#           entity. When the watched entity is down while siblings still live,
#           that is a genuinely entity-level fault and it reports per entity,
#           unchanged. missing and never_reported stay per-entity (no device
#           to consult). unavailable_count now counts rows (dead devices plus
#           individually dead entities). Also fixes the blueprint name and
#           description headings, which had lagged at 2.1.
#   2.2.0-beta - FROZEN REPORTS PER DEVICE, AND AREA-THEN-NAME ORDER. One dead
#           device carries several watched entities, and they all freeze
#           together, so the list showed the same dead device once per entity.
#           Frozen entries now collapse to one per device, represented by the
#           entity from its highest-priority tier; frozen_count now counts
#           frozen devices. Deviceless entities (groups, helpers) still stand
#           alone. unavailable, unknown, missing, and never_reported remain
#           per-entity. The devices list is now ordered by area, then name,
#           with entity_id as the deterministic tiebreak, replacing the old
#           entity-id sort.
#   2.1.1-beta - Exposes the scan_interval input as an attribute, so dashboards
#           can display the evaluation cadence. No behavior change.
#   2.1.0-beta - THE DEVICE-TRUTH FREEZE CLOCK. Freeze is now judged, where
#           available, from a device's own last-seen entity VALUE (a sibling
#           with device_class timestamp and last_seen in its entity id, as
#           Zigbee2MQTT and Z-Wave JS publish), falling back to Home
#           Assistant's last_reported metadata where no such entity exists.
#           Why: restarts and integration reconnect re-publishes reset
#           last_reported for every entity, which silently rewound the freeze
#           clock; on a system with a nightly router reboot and a
#           network-attached coordinator, every Zigbee freeze clock reset
#           every night, so a freeze window longer than the reset cadence
#           could never fire. The last-seen entity's value carries the
#           protocol's own truth through every republish. Found live:
#           two physically dead planted devices were swept as recovered at
#           the 03:30 router-reboot republish. No input or output change.
#   2.0.0-beta - Graduation to beta. The engine is unchanged from alpha.1.2;
#           the inputs and the output contract are settled from this release
#           on. Behind it: a 57-check
#           adversarial simulation suite, two external code reviews (one of which
#           surfaced a real counting bug, fixed before this release), and live
#           duty on the author's system through a week of nightly reboot cycles,
#           a real power-loss outage, and natural detections including a frozen
#           Lively-tier sensor caught at exactly its window on live hardware. The
#           one-sensor-per-window pattern and the Dashboard Sentinel aggregator
#           are superseded for new builds.
#   2.0.0-alpha.1.2 - Count bucketing fix. An entity whose state is the literal
#           string 'none' (a badly behaved custom integration quirk) was flagged
#           in devices and counted in the state, but fell into neither
#           unavailable_count nor frozen_count, so the two counts did not sum to
#           the state. 'none' now buckets into unavailable_count. Found by an
#           externally proposed test case (Gemini review round 2); reproduced,
#           fixed, and proven in the suite (57 checks).
#   2.0.0-alpha.1.1 - Attribute presentation only; no logic change. The blueprint
#           does exactly what alpha.1 did, the detection engine is untouched.
#           Three improvements to how the tiers attribute reads and how the
#           attributes are ordered: (1) each tiers entry now shows tier: <name>
#           instead of tier: <number> plus a separate name: field, one line
#           shorter per tier; (2) the old error and note fields are merged into a
#           single status string, empty when the tier is healthy, so a clean tier
#           is just tier / monitored / flagged; status also now distinguishes a
#           tier whose own exclude removed every resolved entity from a tier
#           whose target simply resolved to nothing; (3) attributes are reordered
#           so the useful summary sits at the top (ok, error, total_monitored,
#           the counts, devices, tiers) and the reference fields (versions,
#           timestamps, boot_time, settled) sit below. tier_error_count is
#           unchanged in meaning and now derives from the engine's internal
#           duplicate detection rather than string state.
#   2.0.0-alpha.1 - THE TIERED REBUILD. Up to five tiers in one sensor, each
#           with its own targets and freeze window on one shared cadence and
#           one shared unavailable debounce. Duplicates across tiers resolve
#           to the lowest-numbered tier and are reported as the higher tier's
#           error. Per-tier validation with partial rendering. Output contract
#           is a strict superset of 1.x (new: tier on each entry, the tiers
#           attribute (each entry: tier name, monitored, flagged, status),
#           tier_error_count, entity-id sorted list). BREAKING:
#           freeze_lookback and include_target are replaced by the tier slots;
#           each tier also gains its own exclude (tier_N_exclude) so a broad
#           sweep and a specific override can coexist; the global exclude_target
#           and all cadence inputs are unchanged. The 1.x line
#           is frozen stable in its own file; its changelog lives there.
# ==============================================================================
blueprint:
  name: Entity Sentinel 2.3 (Beta)
  description: |
    # Entity Sentinel 2.3 (Beta)

    *One sensor, up to five tiers: every critical entity that has gone quiet, offline or frozen, each judged by its own tier's freeze window.*

    A free blueprint from **The Thinking Home** at [xeazy.com](https://xeazy.com).

    > **Read the [Entity Sentinel README](https://github.com/TheThinkingHome/Automations/blob/main/blueprints/template/entity_sentinel.md) before you import.** This is a template sensor, not an automation, so it does not walk you through a setup form. The README has the directions and a sample `use_blueprint:` snippet.

    - 📖 [Read the article](https://xeazy.com/battery-entity-sentinel-blueprints/) - the design and worked examples.
    - 📄 [Read the README](https://github.com/TheThinkingHome/Automations/blob/main/blueprints/template/entity_sentinel.md) - import instructions, parameters, and attribute reference.
    - 💬 [Discuss in the community](https://xeazy.com/logbook/) - the forum thread for these blueprints.
    - ⭐ [More blueprints](https://github.com/TheThinkingHome/Automations) - on GitHub.

    ---

    Creates one trigger-based template sensor whose state is the count of watched entities that have gone quiet across every tier. Each is listed in the `devices` attribute with the reason and its tier, for any automation, dashboard, or notification to read.

    ## How it works

    Give each tier the entities that share a rhythm (a lively tier, a quiet tier, a sleepy tier) and a freeze window matching that rhythm. One evaluation on one cadence judges every entity against its own tier's window, so a slow device can never false-flag on a fast window, and a fast device is never stuck waiting on a slow sensor. Unavailable and unknown entities are flagged after a shared debounce, whatever their tier.

    An entity may live in exactly one tier: duplicates resolve to the lowest-numbered tier and are reported as the higher tier's error, while that tier's healthy entities keep rendering. A single global exclude trims every tier.

    This one sensor replaces the old one-sensor-per-tier pattern and the Dashboard Sentinel aggregator. Its companion, **Battery Sentinel**, counts the batteries running low; **Sentinel Notify** turns both into to-do lists and notifications, unchanged, since the output contract is a superset of 1.x.

    This is the 2.3 beta. The frozen 1.x release remains available for settled setups; see the README.

    License: GPL-3.0-or-later. Copyright (C) 2026 James Lander, The Thinking Home ([xeazy.com](https://xeazy.com)).

    2.3.0-beta
  author: James Lander (xeazy.com)
  domain: template
  source_url: https://raw.githubusercontent.com/TheThinkingHome/Automations/main/blueprints/template/entity_sentinel.yaml
  homeassistant:
    min_version: 2026.5.4
  input:
    tier_1_settings:
      name: Tier 1
      icon: mdi:layers-outline
      description: >-
        One tier of entities sharing a freeze window. A tier with no targets is skipped entirely. Duplicates resolve downward: an entity already claimed by a lower-numbered tier is excluded here and reported as this tier's error.
      input:
        tier_1_name:
          name: Tier 1 name
          description: The display name for this tier, carried on every flagged entry and in the per-tier counts. The tier you will probably rename Lively, Quiet, or Sleepy.
          default: Tier 1
          selector:
            text:
              multiple: false
              multiline: false
        tier_1_target:
          name: Tier 1 targets
          description: >-
            Entities, labels, areas, or devices for this tier. Explicit entities
            and labels are watched precisely; areas and devices are swept to one
            representative entity per device. Empty means this tier is unused.
          default: {}
          selector:
            target: {}
        tier_1_exclude:
          name: Tier 1 exclude
          description: >-
            Entities, labels, areas, or devices to leave out of THIS tier only.
            Use it to carve a specific entity out of this tier's area or label
            sweep while another tier still watches it. The global exclude below
            removes from every tier; this removes from this one.
          default: {}
          selector:
            target: {}
        tier_1_freeze:
          name: Tier 1 freeze lookback
          description: >-
            How long a device in this tier may go without reporting anything
            before it counts as frozen. Set it a little longer than the longest
            normal silence among this tier's devices.
          default:
            hours: 8
          selector:
            duration:
              enable_second: true
    tier_2_settings:
      name: Tier 2
      icon: mdi:layers-outline
      collapsed: true
      description: >-
        Leave the targets empty if you do not need this tier.
      input:
        tier_2_name:
          name: Tier 2 name
          description: The display name for this tier, carried on every flagged entry and in the per-tier counts.
          default: Tier 2
          selector:
            text:
              multiple: false
              multiline: false
        tier_2_target:
          name: Tier 2 targets
          description: >-
            Entities, labels, areas, or devices for this tier. Explicit entities
            and labels are watched precisely; areas and devices are swept to one
            representative entity per device. Empty means this tier is unused.
          default: {}
          selector:
            target: {}
        tier_2_exclude:
          name: Tier 2 exclude
          description: >-
            Entities, labels, areas, or devices to leave out of THIS tier only.
            Use it to carve a specific entity out of this tier's area or label
            sweep while another tier still watches it. The global exclude below
            removes from every tier; this removes from this one.
          default: {}
          selector:
            target: {}
        tier_2_freeze:
          name: Tier 2 freeze lookback
          description: >-
            How long a device in this tier may go without reporting anything
            before it counts as frozen. Set it a little longer than the longest
            normal silence among this tier's devices.
          default:
            hours: 16
          selector:
            duration:
              enable_second: true
    tier_3_settings:
      name: Tier 3
      icon: mdi:layers-outline
      collapsed: true
      description: >-
        Leave the targets empty if you do not need this tier.
      input:
        tier_3_name:
          name: Tier 3 name
          description: The display name for this tier, carried on every flagged entry and in the per-tier counts.
          default: Tier 3
          selector:
            text:
              multiple: false
              multiline: false
        tier_3_target:
          name: Tier 3 targets
          description: >-
            Entities, labels, areas, or devices for this tier. Explicit entities
            and labels are watched precisely; areas and devices are swept to one
            representative entity per device. Empty means this tier is unused.
          default: {}
          selector:
            target: {}
        tier_3_exclude:
          name: Tier 3 exclude
          description: >-
            Entities, labels, areas, or devices to leave out of THIS tier only.
            Use it to carve a specific entity out of this tier's area or label
            sweep while another tier still watches it. The global exclude below
            removes from every tier; this removes from this one.
          default: {}
          selector:
            target: {}
        tier_3_freeze:
          name: Tier 3 freeze lookback
          description: >-
            How long a device in this tier may go without reporting anything
            before it counts as frozen. Set it a little longer than the longest
