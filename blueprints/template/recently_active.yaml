blueprint:
  name: Recently Active
  author: James Lander (xeazy.com)
  description: >
    Recently Active (now() version). Holds an on/off source as a state for a
    chosen number of seconds after it turns off.

    It creates a binary sensor that reads "on" while the source entity is on,
    and keeps reading "on" for the linger window after the source turns off,
    worked out from the source's last-changed time. If the source goes
    unavailable or unknown, the sensor reads off.

    Changelog:
      1.0.0 - now() based linger. Three inputs: source, linger, name.
  domain: template
  source_url: https://raw.githubusercontent.com/TheThinkingHome/Automations/main/blueprints/template/recently_active.yaml
  homeassistant:
    min_version: 2026.5.4
  input:
    source_entity:
      name: Source entity
      description: The on/off entity to track (binary_sensor, switch, input_boolean, and so on).
      selector:
        entity: {}
    linger_seconds:
      name: Linger window (seconds)
      description: How long the sensor stays on after the source turns off.
      default: 60
      selector:
        number:
          min: 1
          max: 3600
          step: 1
          unit_of_measurement: seconds
          mode: box
    sensor_name:
      name: Sensor name
      description: The name for the binary sensor this blueprint creates.
      default: Recently Active
      selector:
        text: {}
variables:
  source_entity: !input source_entity
  linger_seconds: !input linger_seconds
binary_sensor:
  name: !input sensor_name
  state: >-
    {{ states(source_entity) not in ['unavailable', 'unknown']
       and (states(source_entity) == 'on'
            or (states(source_entity) == 'off'
                and (as_timestamp(now()) - as_timestamp(states[source_entity].last_changed, default=0)) <= linger_seconds)) }}
