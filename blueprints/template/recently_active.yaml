# Recently Active - a Home Assistant template blueprint from The Thinking Home (xeazy.com)
# Full write-up, worked examples, and directions:
# https://xeazy.com/how-to-use-a-home-assistant-blueprint-template-sensor-the-recently-active-sensor/
blueprint:
  name: Recently Active
  author: James Lander (xeazy.com)
  description: >
    Recently Active. Holds an on/off source as a state you can still ask about
    after the moment has passed.

    It creates a binary sensor that reads "on" while the source entity is on,
    and keeps reading "on" for a chosen number of seconds after the source
    turns off. Point it at anything that reports on or off: a door or window
    contact, a motion sensor, a switch, an input_boolean, or a power-threshold
    binary sensor.

    The linger is handled by the binary sensor's own delay_off, so the timing
    is precise and the sensor sits idle between changes instead of polling. If
    the source goes unavailable, the sensor decays to off after the linger
    rather than sticking on.

    Inputs: the source entity to watch, the linger in seconds, a name, a unique
    id so the sensor can be renamed and managed in the interface, and a device
    class for how it reads in the frontend.

    Full write-up and worked examples: https://xeazy.com/how-to-use-a-home-assistant-blueprint-template-sensor-the-recently-active-sensor/

    Changelog:
      2.0.0 - Rebuilt on delay_off instead of a now() based template, so the
        linger is timer-precise and the sensor no longer re-evaluates every
        minute. State is simply whether the source is on, and delay_off holds
        the on state for the chosen number of seconds after the source goes
        quiet. Added a unique_id input so the sensor is registered and can be
        renamed, placed in an area, and reclassified in the interface, and a
        device_class input for how it reads in the frontend.
      1.0.0 - Initial release. now() based linger, no unique_id or device_class.
  domain: template
  source_url: https://raw.githubusercontent.com/TheThinkingHome/Automations/main/blueprints/template/recently_active.yaml
  homeassistant:
    min_version: 2026.5.4
  input:
    source_entity:
      name: Source entity
      description: The on/off entity to track (binary_sensor, switch, input_boolean, and so on).
      selector:
        entity: {}
    linger_seconds:
      name: Linger window (seconds)
      description: How long the sensor keeps reading on after the source turns off.
      default: 60
      selector:
        number:
          min: 1
          max: 3600
          step: 1
          unit_of_measurement: seconds
          mode: box
    sensor_name:
      name: Sensor name
      description: The name for the binary sensor this blueprint creates.
      default: Recently Active
      selector:
        text: {}
    unique_id:
      name: Unique ID
      description: >
        A unique id so the sensor is registered and you can rename it, place it
        in an area, or change its device class from the interface. Make it
        distinct for every sensor you build, for example front_door_recently_used.
      selector:
        text: {}
    device_class:
      name: Device class
      description: >
        How the sensor reads in the frontend. Occupancy shows Detected and
        Clear, which suits most recently-active sensors. Pick another to match
        your source, or type your own.
      default: occupancy
      selector:
        select:
          custom_value: true
          options:
            - occupancy
            - presence
            - motion
            - moving
            - running
            - connectivity
            - door
            - window
            - garage_door
            - opening
            - power
            - light
            - sound
            - vibration
            - plug
variables:
  source_entity: !input source_entity
binary_sensor:
  name: !input sensor_name
  unique_id: !input unique_id
  device_class: !input device_class
  state: "{{ states(source_entity) == 'on' }}"
  delay_off: !input linger_seconds
