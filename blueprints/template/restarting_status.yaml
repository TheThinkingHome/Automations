# Restarting Status - a Home Assistant template blueprint from The Thinking Home (xeazy.com)
# Full write-up, worked examples, and directions:
# https://xeazy.com/restarting-status-template-blueprint/
#
# Changelog:
#   1.0.0 - Trigger-based template binary_sensor fires once per HA boot from
#           the homeassistant: start event (which HA fires when it
#           transitions from starting to running, after every integration
#           has finished setup). State is a literal true; auto_off flips the
#           sensor off after the configured window elapses.

blueprint:
  name: Restarting Status
  description: |
    # Restarting Status

    *A binary sensor that reads `on` during the configurable window after Home Assistant boots, then `off` once the system has been up longer than that window.*

    A free blueprint from **The Thinking Home** at [xeazy.com](https://xeazy.com).

    - 📖 [Read the article](https://xeazy.com/restarting-status-template-blueprint/) - the design and worked examples.
    - 💬 [Discuss in the community](https://xeazy.com/logbook/) - the forum thread for this blueprint.
    - ⭐ [More blueprints](https://github.com/TheThinkingHome/Automations) - on GitHub.

    ---

    Use as a reboot guard in automations, scripts, and AppDaemon apps that need to suppress activity during the HA restart window. Common cases: light automations that should not fire while entities are still settling, scene activations that should wait for HA to stabilize, security monitoring that should not trip on transient unavailable states, and power-cycle automations for offline sensors.

    ## How it works

    The blueprint produces a trigger-based template binary_sensor with one trigger: the `homeassistant: start` event. HA fires this event once per boot, when it transitions from "starting" to "running" after every integration has finished setup. On that trigger the binary_sensor state is set to `on`. The `auto_off` option then flips it back to `off` after the configured window elapses.

    Lightest-weight implementation possible: active during the restart window, then sleeps until the next HA boot.

    ## Initial state

    Trigger-based template entities start in an `unknown` state until the trigger fires for the first time. There is a window between HA boot and `homeassistant: start` firing where the sensor is `unknown` rather than `on`, typically up to a minute on a default system. Dependents should use `state == 'off'` as their release condition; `unknown` does not match `'off'`, so dependents stay blocked through the loading phase as well as through the `on` window. See the README for the full pattern and the reasoning.

    License: GPL-3.0-or-later. Copyright (C) 2026 James Lander, The Thinking Home ([xeazy.com](https://xeazy.com)).
  author: James Lander (xeazy.com)
  domain: template
  source_url: https://raw.githubusercontent.com/TheThinkingHome/Automations/main/blueprints/template/restarting_status.yaml

  homeassistant:
    min_version: 2024.6.0

  input:
    restart_window_seconds:
      name: Restart Window
      description: >-
        How many seconds after `homeassistant: start` fires that the system
        is considered to be still settling. The binary_sensor is `on` during
        this window and `off` afterwards. Default 60 seconds, which covers
        residual settling on most systems (Z2M republishing device states,
        MQTT reconnects, presence sensors finding their occupants). Raise
        for slower systems, lower for faster ones.
      default: 60
      selector:
        number:
          min: 15
          max: 300
          step: 5
          unit_of_measurement: seconds
          mode: box

trigger:
  - alias: Home Assistant start event
    trigger: homeassistant
    event: start

binary_sensor:
  - name: Restarting Status
    unique_id: restarting_status_blueprint_v1
    state: "{{ true }}"
    auto_off:
      seconds: !input restart_window_seconds
