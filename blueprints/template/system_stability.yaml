#
# System Stability - a Home Assistant template blueprint from The Thinking Home (xeazy.com)
# Full write-up, worked examples, and directions:
# https://xeazy.com/system-stability-template-blueprint/
#
# Changelog:
#   1.1.0 - Two-trigger rewrite. Trigger-based template binary_sensor now
#           fires from two HA events: homeassistant: shutdown (sets state
#           to off) and homeassistant: start (sets state to true, with
#           delay_on holding the on transition for the configured settling
#           window). The shutdown-then-start pattern ensures a real
#           off-to-on state change every boot, so delay_on engages
#           reliably. A single trigger could not guarantee this because
#           HA's RestoreEntity preserves entity state across restarts.
#           Attribute set rewritten: stability_delay_seconds, triggered_by
#           (id of the most recent trigger to fire), last_shutdown_at
#           (timestamp of the most recent shutdown trigger fire, preserved
#           through start fires), last_stable_at (projected stable moment
#           computed as now() + delay on the most recent start trigger
#           fire, preserved through shutdown fires). trigger_fired_at
#           removed since the two new timestamps replace its utility.
#   1.0.0 - Initial release. Trigger-based template binary_sensor fires
#           once per HA boot from the homeassistant: start event. State
#           template evaluates to true; delay_on holds the on transition
#           for the configured settling window before the sensor reports
#           on (stable). Two diagnostic attributes are populated on
#           trigger fire: stability_delay_seconds and trigger_fired_at.
#           Superseded by 1.1.0 because RestoreEntity preserves state
#           across restarts, leaving delay_on with no transition to engage
#           on, so the settling window never ran from the second boot
#           onward.

blueprint:
  name: System Stability
  description: |
    # System Stability

    *A binary sensor that reads `on` once Home Assistant has fully settled after a restart, and `unknown` while the system is still coming up.*

    A free blueprint from **The Thinking Home** at [xeazy.com](https://xeazy.com).

    - 📖 [Read the article](https://xeazy.com/system-stability-template-blueprint/) - the design and worked examples.
    - 💬 [Discuss in the community](https://xeazy.com/logbook/) - the forum thread for this blueprint.
    - ⭐ [More blueprints](https://github.com/TheThinkingHome/Automations) - on GitHub.

    ---

    Use as a precondition in automations, scripts, and AppDaemon apps that should only run when the system is fully stable. Common cases: light automations that should not fire while entities are still settling, scene activations that should wait for HA to stabilize, security monitoring that should not trip on transient unavailable states, and power-cycle automations for offline sensors.

    ## How it works

    The blueprint produces a trigger-based template binary_sensor with two triggers: the `homeassistant: shutdown` event and the `homeassistant: start` event. On shutdown, the state template returns false and the sensor reads `off`; that off state persists to disk as part of HA's normal state-restore mechanism. On the next HA start, the entity is restored as `off`, the start trigger fires, the state template returns true, and the sensor transitions `off → on`. The `delay_on` option holds that transition for the configured number of seconds.

    The two-trigger pattern is necessary because HA's `RestoreEntity` preserves trigger-based template binary_sensor state across HA restarts. A single trigger that always sets the state to true would find the sensor already on after a restart (restored from the previous session) and `delay_on` would have no state change to engage on. By explicitly setting the state to off on shutdown, the off-to-on transition on the next boot is guaranteed real.

    ## Initial state

    The sensor reads `unknown` only between the moment the blueprint instance is first created and the next HA shutdown-restart cycle. After the first cycle, the entity is always either `on` (stable) or `off` (settling or shut down).

    The correct pattern for dependents is to use `state == 'on'` as their precondition to proceed. Neither `unknown` nor `off` match `'on'`, so dependents stay blocked through first-run unknown and through the settling window on every subsequent restart. See the README for the full pattern and the reasoning.

    License: GPL-3.0-or-later. Copyright (C) 2026 James Lander, The Thinking Home ([xeazy.com](https://xeazy.com)).
  author: James Lander (xeazy.com)
  domain: template
  source_url: https://raw.githubusercontent.com/TheThinkingHome/Automations/main/blueprints/template/system_stability.yaml

  homeassistant:
    min_version: 2024.6.0

  input:
    stability_delay_seconds:
      name: Stability Delay
      description: >-
        How many seconds after `homeassistant: start` fires before the
        sensor transitions to `on` (stable). This is the residual settling
        window: Z2M republishing device states, MQTT reconnects, presence
        sensors finding their occupants. Default 60 seconds, which covers
        residual settling on most systems. Raise for slower systems, lower
        for faster ones.
      default: 60
      selector:
        number:
          min: 15
          max: 300
          step: 5
          unit_of_measurement: seconds
          mode: box

trigger:
  - alias: Home Assistant shutdown event
    trigger: homeassistant
    event: shutdown
    id: shutdown
  - alias: Home Assistant start event
    trigger: homeassistant
    event: start
    id: start

variables:
  delay_seconds: !input stability_delay_seconds

binary_sensor:
  - name: System Stable
    unique_id: system_stable_blueprint_v1
    state: "{{ trigger.id == 'start' }}"
    delay_on:
      seconds: !input stability_delay_seconds
    attributes:
      stability_delay_seconds: !input stability_delay_seconds
      triggered_by: "{{ trigger.id }}"
      last_shutdown_at: >-
        {% if trigger.id == 'shutdown' %}
          {{ now().isoformat() }}
        {% else %}
          {{ this.attributes.last_shutdown_at | default(None) }}
        {% endif %}
      last_stable_at: >-
        {% if trigger.id == 'start' %}
          {{ (now() + timedelta(seconds=delay_seconds)).isoformat() }}
        {% else %}
          {{ this.attributes.last_stable_at | default(None) }}
        {% endif %}
