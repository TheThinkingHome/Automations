# System Stability - a Home Assistant template blueprint from The Thinking Home (xeazy.com)
# Full write-up, worked examples, and directions:
# https://xeazy.com/system-stability-template-blueprint/
#
# Changelog:
#   1.0.0 - Trigger-based template binary_sensor fires once per HA boot from
#           the homeassistant: start event (which HA fires when it
#           transitions from starting to running, after every integration
#           has finished setup). State template evaluates to true; delay_on
#           holds the on transition for the configured settling window
#           before the sensor reports on (stable).

blueprint:
  name: System Stability
  description: |
    # System Stability

    *A binary sensor that reads `on` once Home Assistant has fully settled after a restart, and `unknown` while the system is still coming up.*

    A free blueprint from **The Thinking Home** at [xeazy.com](https://xeazy.com).

    - 📖 [Read the article](https://xeazy.com/system-stability-template-blueprint/) - the design and worked examples.
    - 💬 [Discuss in the community](https://xeazy.com/logbook/) - the forum thread for this blueprint.
    - ⭐ [More blueprints](https://github.com/TheThinkingHome/Automations) - on GitHub.

    ---

    Use as a precondition in automations, scripts, and AppDaemon apps that should only run when the system is fully stable. Common cases: light automations that should not fire while entities are still settling, scene activations that should wait for HA to stabilize, security monitoring that should not trip on transient unavailable states, and power-cycle automations for offline sensors.

    ## How it works

    The blueprint produces a trigger-based template binary_sensor with one trigger: the `homeassistant: start` event. HA fires this event once per boot, when it transitions from "starting" to "running" after every integration has finished setup. On that trigger the state template evaluates to `true`, and the `delay_on` option holds the on transition for the configured number of seconds before the sensor actually transitions to `on`.

    The sensor's lifecycle per boot is a single transition: `unknown` to `on`. There is no "off" state during normal operation; the sensor is `unknown` until the gate clears, and `on` for the rest of the session.

    ## Initial state

    Trigger-based template entities start in an `unknown` state until the trigger fires AND the `delay_on` window elapses. There is a window between HA boot and `homeassistant: start` firing where the sensor is `unknown` (typically up to a minute on a default system), then a further `delay_on` window during which the sensor is still `unknown` while residual settling happens. Only after both elapse does the sensor read `on`.

    The correct pattern for dependents is to use `state == 'on'` as their precondition to proceed. `unknown` does not match `'on'`, so dependents stay blocked through both the loading phase and the settling window. See the README for the full pattern and the reasoning.

    License: GPL-3.0-or-later. Copyright (C) 2026 James Lander, The Thinking Home ([xeazy.com](https://xeazy.com)).
  author: James Lander (xeazy.com)
  domain: template
  source_url: https://raw.githubusercontent.com/TheThinkingHome/Automations/main/blueprints/template/system_stability.yaml

  homeassistant:
    min_version: 2024.6.0

  input:
    stability_delay_seconds:
      name: Stability Delay
      description: >-
        How many seconds after `homeassistant: start` fires before the
        sensor transitions to `on` (stable). This is the residual settling
        window: Z2M republishing device states, MQTT reconnects, presence
        sensors finding their occupants. Default 60 seconds, which covers
        residual settling on most systems. Raise for slower systems, lower
        for faster ones.
      default: 60
      selector:
        number:
          min: 15
          max: 300
          step: 5
          unit_of_measurement: seconds
          mode: box

trigger:
  - alias: Home Assistant start event
    trigger: homeassistant
    event: start

binary_sensor:
  - name: System Stable
    unique_id: system_stable_blueprint_v1
    state: "{{ true }}"
    delay_on:
      seconds: !input stability_delay_seconds
