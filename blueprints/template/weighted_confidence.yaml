#
# Weighted Confidence - a Home Assistant template blueprint from The Thinking Home (xeazy.com)
# Full write-up, worked examples, and directions:
# https://xeazy.com/weighted-confidence-a-home-assistant-weighted-sensor-now-a-blueprint/
#
# Changelog:
#   1.0.0 - Initial stable release. The sensor adds up the weight of every
#           signal currently agreeing, divides by the weight of every signal
#           currently in play, and turns on when that share reaches the
#           configured threshold. Five operators determine how each signal
#           is judged: equals and not_equals against a single value or list
#           of values (text comparison); above, below, and between against
#           a number (numeric comparison). A per-signal unavailable policy
#           controls what happens when an entity goes missing: drop
#           (default; signal steps aside, lowering the bar to clear), agree
#           (counts as agreeing, useful for devices that drop offline when
#           off), or disagree (counts against the score). The required flag
#           promotes any signal to a hard gate that vetoes the result when
#           it does not agree; required paired with unavailable: disagree
#           extends the veto to cover entities whose state cannot be
#           confirmed, so a gate fails closed rather than dropping out.
#           Exposes six attributes for tuning: confidence (agreeing share
#           as a percentage), score (raw agree-over-total tally), threshold
#           (the input echoed back), contributing (names of agreeing
#           signals), not_met (names of available-but-not-agreeing signals),
#           and unavailable (entities currently missing). Verified across
#           the original home it was written for and through beta-cycle bug
#           fixes that closed two silent failure modes: string coercion for
#           numeric list matching under equals and not_equals, and required
#           bound-field validation for above, below, and between operators.
#           Beta-cycle history (1.0.0-beta through 1.1.1-beta) archived in
#           the project document.
#
# DEVELOPER NOTE: The signal evaluation logic in this blueprint is replicated
# five times -- once in the binary_sensor state, and once each in the
# confidence, score, contributing, and not_met attributes. Home Assistant
# template entities do not allow variables to be shared between the state block
# and the attributes blocks, so the evaluation loop must be inlined in each
# template that needs it. If you change the operator logic, the unavailable
# policy, or add a new operator, you MUST apply the change in all five places.
# The unavailable attribute is the one exception; it only lists entities, so
# its loop is much simpler.
blueprint:
  name: Weighted Confidence
  author: James Lander (xeazy.com)
  description: |
    # Weighted Confidence

    *Infers a fuzzy state from many signals at once, each carrying its own weight, and turns on when enough of them agree.*

    A free blueprint from **The Thinking Home** at [xeazy.com](https://xeazy.com).

    - 📖 [Read the article](https://xeazy.com/weighted-confidence-a-home-assistant-weighted-sensor-now-a-blueprint/) - the design and worked examples.
    - 💬 [Discuss in the community](https://xeazy.com/logbook/d/37-a-home-assistant-weighted-sensor-now-a-blueprint) - the forum thread for this blueprint.
    - ⭐ [More blueprints](https://github.com/TheThinkingHome/Automations) - on GitHub.

    ---

    Creates a binary sensor that adds up the weight of every signal currently agreeing, divides by the weight of every signal currently in play, and turns on when that share reaches your threshold. Each signal in your list names an entity, a weight, and a rule for what counts as agreement; the rule can be a text match, a numeric comparison, or a range. A `required` flag promotes any signal to a hard gate that vetoes the result when it does not agree.

    Time-based conditions live in the signals you feed in, not in this blueprint. For "the door has been shut for ten minutes," point a Recently Active sensor at the door and hand its result in as a signal here.
  domain: template
  source_url: https://raw.githubusercontent.com/TheThinkingHome/Automations/main/blueprints/template/weighted_confidence.yaml
  homeassistant:
    min_version: 2026.5.4
  input:
    signals:
      name: Signals
      description: >
        A list of signals to weigh. Each item needs an entity and a weight, and
        may set operator, state, value, low, high, unavailable, required, and
        name. See the blueprint description for the full field list. Example:
          - entity: binary_sensor.front_door_recently_used
            state: "off"
            weight: 4
            required: true
            name: Door settled
          - entity: sensor.battery_state
            operator: not_equals
            state: "Not Charging"
            weight: 1
          - entity: sensor.living_room_lux
            operator: below
            value: 5
            weight: 2
          - entity: media_player.tv
            state: "off"
            unavailable: agree
            weight: 2
      selector:
        object: {}
    threshold_percent:
      name: Threshold (percent)
      description: >
        The share of currently available weight that must agree before the
        sensor turns on.
      default: 80
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: box
    sensor_name:
      name: Sensor name
      description: The name for the binary sensor this blueprint creates.
      default: Weighted Confidence
      selector:
        text: {}
    unique_id:
      name: Unique ID
      description: >
        A unique id so the sensor is registered and you can rename it, place it
        in an area, or change its device class from the interface. Make it
        distinct for every sensor you build, for example bedtime_detected.
      selector:
        text: {}
    device_class:
      name: Device class
      description: >
        How the sensor reads in the frontend. Occupancy shows Detected and
        Clear. Pick another to suit what the sensor means, or type your own.
      default: occupancy
      selector:
        select:
          custom_value: true
          options:
            - occupancy
            - presence
            - motion
            - running
            - connectivity
            - safety
            - problem
            - power
            - light
            - sound
            - moving
            - plug
variables:
  signals: !input signals
  threshold_percent: !input threshold_percent
binary_sensor:
  name: !input sensor_name
  unique_id: !input unique_id
  device_class: !input device_class
  state: '{% set ns = namespace(total=0, agree=0, veto=false) %} {% for s in signals
    %} {% set cur = states(s.entity) %} {% set w = s.weight | int(1) %} {% if cur
    in [''unavailable'', ''unknown''] %} {% set policy = s.unavailable | default(''drop'')
    %} {% if policy == ''agree'' %}{% set ns.total = ns.total + w %}{% set ns.agree
    = ns.agree + w %}{% elif policy == ''disagree'' %}{% set ns.total = ns.total +
    w %}{% if s.required | default(false) %}{% set ns.veto = true %}{% endif %}{%
    endif %} {% else %} {% set op = s.operator | default(''equals'') %} {% set match
    = s.state | default(''on'') %} {% set num = cur | float(none) %} {% if op == ''not_equals''
    %}{% set met = (cur not in (match | map(''string'') | list)) if (match is iterable
    and match is not string) else (cur != match | string) %} {% elif op == ''above''
    %}{% set met = s.value is defined and num is not none and num > (s.value | float(0))
    %} {% elif op == ''below'' %}{% set met = s.value is defined and num is not none
    and num < (s.value | float(0)) %} {% elif op == ''between'' %}{% set met = s.low
    is defined and s.high is defined and num is not none and num >= (s.low | float(0))
    and num <= (s.high | float(0)) %} {% else %}{% set met = (cur in (match | map(''string'')
    | list)) if (match is iterable and match is not string) else (cur == match | string)
    %}{% endif %} {% set ns.total = ns.total + w %} {% if met %}{% set ns.agree =
    ns.agree + w %}{% endif %} {% if (s.required | default(false)) and not met %}{%
    set ns.veto = true %}{% endif %} {% endif %} {% endfor %} {{ false if ns.veto
    else (ns.agree >= (ns.total * (threshold_percent | float / 100)) if ns.total >
    0 else false) }}'
  attributes:
    confidence: '{% set ns = namespace(total=0, agree=0) %} {% for s in signals %}
      {% set cur = states(s.entity) %} {% set w = s.weight | int(1) %} {% if cur in
      [''unavailable'', ''unknown''] %} {% set policy = s.unavailable | default(''drop'')
      %} {% if policy == ''agree'' %}{% set ns.total = ns.total + w %}{% set ns.agree
      = ns.agree + w %}{% elif policy == ''disagree'' %}{% set ns.total = ns.total
      + w %}{% endif %} {% else %} {% set op = s.operator | default(''equals'') %}
      {% set match = s.state | default(''on'') %} {% set num = cur | float(none) %}
      {% if op == ''not_equals'' %}{% set met = (cur not in (match | map(''string'')
      | list)) if (match is iterable and match is not string) else (cur != match |
      string) %} {% elif op == ''above'' %}{% set met = s.value is defined and num
      is not none and num > (s.value | float(0)) %} {% elif op == ''below'' %}{% set
      met = s.value is defined and num is not none and num < (s.value | float(0))
      %} {% elif op == ''between'' %}{% set met = s.low is defined and s.high is defined
      and num is not none and num >= (s.low | float(0)) and num <= (s.high | float(0))
      %} {% else %}{% set met = (cur in (match | map(''string'') | list)) if (match
      is iterable and match is not string) else (cur == match | string) %}{% endif
      %} {% set ns.total = ns.total + w %} {% if met %}{% set ns.agree = ns.agree
      + w %}{% endif %} {% endif %} {% endfor %} {{ (ns.agree / ns.total * 100) |
      round(1) if ns.total > 0 else 0 }}'
    score: '{% set ns = namespace(total=0, agree=0) %} {% for s in signals %} {% set
      cur = states(s.entity) %} {% set w = s.weight | int(1) %} {% if cur in [''unavailable'',
      ''unknown''] %} {% set policy = s.unavailable | default(''drop'') %} {% if policy
      == ''agree'' %}{% set ns.total = ns.total + w %}{% set ns.agree = ns.agree +
      w %}{% elif policy == ''disagree'' %}{% set ns.total = ns.total + w %}{% endif
      %} {% else %} {% set op = s.operator | default(''equals'') %} {% set match =
      s.state | default(''on'') %} {% set num = cur | float(none) %} {% if op == ''not_equals''
      %}{% set met = (cur not in (match | map(''string'') | list)) if (match is iterable
      and match is not string) else (cur != match | string) %} {% elif op == ''above''
      %}{% set met = s.value is defined and num is not none and num > (s.value | float(0))
      %} {% elif op == ''below'' %}{% set met = s.value is defined and num is not
      none and num < (s.value | float(0)) %} {% elif op == ''between'' %}{% set met
      = s.low is defined and s.high is defined and num is not none and num >= (s.low
      | float(0)) and num <= (s.high | float(0)) %} {% else %}{% set met = (cur in
      (match | map(''string'') | list)) if (match is iterable and match is not string)
      else (cur == match | string) %}{% endif %} {% set ns.total = ns.total + w %}
      {% if met %}{% set ns.agree = ns.agree + w %}{% endif %} {% endif %} {% endfor
      %} {{ ns.agree ~ '' / '' ~ ns.total }}'
    threshold: '{{ threshold_percent }}%'
    contributing: '{% set ns = namespace(items=[]) %} {% for s in signals %} {% set
      cur = states(s.entity) %} {% if cur not in [''unavailable'', ''unknown''] %}
      {% set op = s.operator | default(''equals'') %} {% set match = s.state | default(''on'')
      %} {% set num = cur | float(none) %} {% if op == ''not_equals'' %}{% set met
      = (cur not in (match | map(''string'') | list)) if (match is iterable and match
      is not string) else (cur != match | string) %} {% elif op == ''above'' %}{%
      set met = s.value is defined and num is not none and num > (s.value | float(0))
      %} {% elif op == ''below'' %}{% set met = s.value is defined and num is not
      none and num < (s.value | float(0)) %} {% elif op == ''between'' %}{% set met
      = s.low is defined and s.high is defined and num is not none and num >= (s.low
      | float(0)) and num <= (s.high | float(0)) %} {% else %}{% set met = (cur in
      (match | map(''string'') | list)) if (match is iterable and match is not string)
      else (cur == match | string) %}{% endif %} {% if met %}{% set ns.items = ns.items
      + [s.name | default(s.entity)] %}{% endif %} {% endif %} {% endfor %} {{ ns.items
      }}'
    not_met: '{% set ns = namespace(items=[]) %} {% for s in signals %} {% set cur
      = states(s.entity) %} {% if cur not in [''unavailable'', ''unknown''] %} {%
      set op = s.operator | default(''equals'') %} {% set match = s.state | default(''on'')
      %} {% set num = cur | float(none) %} {% if op == ''not_equals'' %}{% set met
      = (cur not in (match | map(''string'') | list)) if (match is iterable and match
      is not string) else (cur != match | string) %} {% elif op == ''above'' %}{%
      set met = s.value is defined and num is not none and num > (s.value | float(0))
      %} {% elif op == ''below'' %}{% set met = s.value is defined and num is not
      none and num < (s.value | float(0)) %} {% elif op == ''between'' %}{% set met
      = s.low is defined and s.high is defined and num is not none and num >= (s.low
      | float(0)) and num <= (s.high | float(0)) %} {% else %}{% set met = (cur in
      (match | map(''string'') | list)) if (match is iterable and match is not string)
      else (cur == match | string) %}{% endif %} {% if not met %}{% set ns.items =
      ns.items + [s.name | default(s.entity)] %}{% endif %} {% endif %} {% endfor
      %} {{ ns.items }}'
    unavailable: '{% set ns = namespace(items=[]) %} {% for s in signals %} {% if
      states(s.entity) in [''unavailable'', ''unknown''] %} {% set ns.items = ns.items
      + [s.entity] %} {% endif %} {% endfor %} {{ ns.items }}'
