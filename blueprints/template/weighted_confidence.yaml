# Weighted Confidence - a Home Assistant template blueprint from The Thinking Home (xeazy.com)
# Full write-up, worked examples, and directions:
# https://xeazy.com/REPLACE-WITH-ARTICLE-SLUG/
blueprint:
  name: Weighted Confidence
  author: James Lander (xeazy.com)
  description: >
    Weighted Confidence. Infers a fuzzy state from many signals, each carrying
    its own weight, and flips on when enough weight agrees.

    You give it a list of signals. Each signal names an entity, a weight, and
    the state that counts as agreement (defaults to "on"). The sensor adds up
    the weight of every signal that currently agrees, divides by the weight of
    every signal that is currently available, and turns on when that share
    reaches your threshold. Signals that are unavailable or unknown drop out of
    both sides of that fraction, so a dead sensor lowers the bar rather than
    sinking the score.

    Mark a signal as required to make it a hard gate: if a required signal is
    available and does not agree, the result is off no matter how much other
    weight is in favour.

    Time-based conditions live in the signals you feed it, not here. For "the
    door has been shut for ten minutes," point a Recently Active sensor at the
    door and hand its result to this one as a signal.

    Inputs: the list of signals, the threshold percentage, a name, a unique id,
    and a device class for how it reads in the frontend.

    Full write-up and worked examples: https://xeazy.com/REPLACE-WITH-ARTICLE-SLUG/

    Changelog:
      1.0.0 - Initial release. Percentage-of-available-weight scoring with
        per-signal weight, configurable agreement state (scalar or list),
        optional required hard gate, and unavailable drop-out. Exposes
        confidence, score, threshold, contributing, not_met, and unavailable
        attributes.
  domain: template
  source_url: https://raw.githubusercontent.com/TheThinkingHome/Automations/main/blueprints/template/weighted_confidence.yaml
  homeassistant:
    min_version: 2026.5.4
  input:
    signals:
      name: Signals
      description: >
        A list of signals to weigh. Each item needs an entity and a weight, and
        may add: state (the value that counts as agreement, default "on", may be
        a single value or a list of values), name (a label for the attributes,
        default the entity id), and required (true makes it a hard gate).
        Example:
          - entity: binary_sensor.front_door_recently_used
            state: "off"
            weight: 30
            name: Door settled
            required: true
          - entity: binary_sensor.living_room_tv
            state: "off"
            weight: 25
          - entity: binary_sensor.phone_charging
            weight: 20
      selector:
        object: {}
    threshold_percent:
      name: Threshold (percent)
      description: >
        The share of currently available weight that must agree before the
        sensor turns on.
      default: 80
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: box
    sensor_name:
      name: Sensor name
      description: The name for the binary sensor this blueprint creates.
      default: Weighted Confidence
      selector:
        text: {}
    unique_id:
      name: Unique ID
      description: >
        A unique id so the sensor is registered and you can rename it, place it
        in an area, or change its device class from the interface. Make it
        distinct for every sensor you build, for example bedtime_detected.
      selector:
        text: {}
    device_class:
      name: Device class
      description: >
        How the sensor reads in the frontend. Occupancy shows Detected and
        Clear. Pick another to suit what the sensor means, or type your own.
      default: occupancy
      selector:
        select:
          custom_value: true
          options:
            - occupancy
            - presence
            - motion
            - running
            - connectivity
            - safety
            - problem
            - power
            - light
            - sound
            - moving
            - plug
variables:
  signals: !input signals
  threshold_percent: !input threshold_percent
binary_sensor:
  name: !input sensor_name
  unique_id: !input unique_id
  device_class: !input device_class
  state: >-
    {% set ns = namespace(total=0, agree=0, veto=false) %}
    {% for s in signals %}
      {% set cur = states(s.entity) %}
      {% if cur not in ['unavailable', 'unknown'] %}
        {% set w = s.weight | int(1) %}
        {% set match = s.state | default('on') %}
        {% set met = (cur in match) if (match is iterable and match is not string) else (cur == match | string) %}
        {% set ns.total = ns.total + w %}
        {% if met %}{% set ns.agree = ns.agree + w %}{% endif %}
        {% if (s.required | default(false)) and not met %}{% set ns.veto = true %}{% endif %}
      {% endif %}
    {% endfor %}
    {{ false if ns.veto else (ns.agree >= (ns.total * (threshold_percent | float / 100)) if ns.total > 0 else false) }}
  attributes:
    confidence: >-
      {% set ns = namespace(total=0, agree=0) %}
      {% for s in signals %}
        {% set cur = states(s.entity) %}
        {% if cur not in ['unavailable', 'unknown'] %}
          {% set w = s.weight | int(1) %}
          {% set match = s.state | default('on') %}
          {% set met = (cur in match) if (match is iterable and match is not string) else (cur == match | string) %}
          {% set ns.total = ns.total + w %}
          {% if met %}{% set ns.agree = ns.agree + w %}{% endif %}
        {% endif %}
      {% endfor %}
      {{ (ns.agree / ns.total * 100) | round(1) if ns.total > 0 else 0 }}
    score: >-
      {% set ns = namespace(total=0, agree=0) %}
      {% for s in signals %}
        {% set cur = states(s.entity) %}
        {% if cur not in ['unavailable', 'unknown'] %}
          {% set w = s.weight | int(1) %}
          {% set match = s.state | default('on') %}
          {% set met = (cur in match) if (match is iterable and match is not string) else (cur == match | string) %}
          {% set ns.total = ns.total + w %}
          {% if met %}{% set ns.agree = ns.agree + w %}{% endif %}
        {% endif %}
      {% endfor %}
      {{ ns.agree ~ ' / ' ~ ns.total }}
    threshold: >-
      {{ threshold_percent }}%
    contributing: >-
      {% set ns = namespace(items=[]) %}
      {% for s in signals %}
        {% set cur = states(s.entity) %}
        {% if cur not in ['unavailable', 'unknown'] %}
          {% set match = s.state | default('on') %}
          {% set met = (cur in match) if (match is iterable and match is not string) else (cur == match | string) %}
          {% if met %}{% set ns.items = ns.items + [s.name | default(s.entity)] %}{% endif %}
        {% endif %}
      {% endfor %}
      {{ ns.items }}
    not_met: >-
      {% set ns = namespace(items=[]) %}
      {% for s in signals %}
        {% set cur = states(s.entity) %}
        {% if cur not in ['unavailable', 'unknown'] %}
          {% set match = s.state | default('on') %}
          {% set met = (cur in match) if (match is iterable and match is not string) else (cur == match | string) %}
          {% if not met %}{% set ns.items = ns.items + [s.name | default(s.entity)] %}{% endif %}
        {% endif %}
      {% endfor %}
      {{ ns.items }}
    unavailable: >-
      {% set ns = namespace(items=[]) %}
      {% for s in signals %}
        {% if states(s.entity) in ['unavailable', 'unknown'] %}
          {% set ns.items = ns.items + [s.entity] %}
        {% endif %}
      {% endfor %}
      {{ ns.items }}
