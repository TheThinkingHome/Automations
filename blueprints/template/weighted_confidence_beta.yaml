# Weighted Confidence (Beta) - a Home Assistant template blueprint from The Thinking Home (xeazy.com)
# Work in progress. The signal format may still change between beta releases.
# Full write-up, worked examples, and directions:
# https://xeazy.com/REPLACE-WITH-ARTICLE-SLUG/
blueprint:
  name: Weighted Confidence (Beta)
  author: James Lander (xeazy.com)
  description: >
    Weighted Confidence (Beta). Infers a fuzzy state from many signals, each
    carrying its own weight, and flips on when enough weight agrees.

    Work in progress. This is a public preview, and the signal format may still
    change between beta releases. Feedback is welcome on the forum.

    You give it a list of signals. Each signal names an entity and a weight, and
    decides what counts as agreement. The sensor adds up the weight of every
    signal that agrees, divides by the weight of every signal currently in play,
    and turns on when that share reaches your threshold.

    Each signal in the list accepts:
      entity   (required) the entity to read.
      weight   (required) how much it counts. Defaults to 1 if omitted.
      operator how to judge agreement: equals (default), not_equals, above,
               below, or between.
      state    for equals and not_equals: the value, or a list of values, that
               counts. Defaults to "on".
      value    for above and below: the number to compare against.
      low/high for between: the inclusive numeric range.
      unavailable  what to do when the entity is unavailable or unknown: drop
               (default, leaves it out of the maths), agree (counts its weight
               as agreeing), or disagree (counts its weight against). On a
               required signal, disagree also forces the result off while the
               signal is unavailable.
      required true makes it a hard gate. A required signal that is available
               and does not agree forces the result off, no matter the score.
               Pair it with unavailable: disagree to force off when the signal
               is unavailable too; with drop (the default) an unavailable
               required signal just drops out.
      name     a label for the attributes. Defaults to the entity id.

    Time-based conditions live in the signals you feed it, not here. For "the
    door has been shut for ten minutes," point a Recently Active sensor at the
    door and hand its result in as a signal.

    Full write-up and worked examples: https://xeazy.com/REPLACE-WITH-ARTICLE-SLUG/

    Changelog:
      1.1.0-beta - A required signal set to unavailable: disagree now vetoes
        while it is unavailable, so a required signal whose state cannot be
        confirmed forces the result off instead of silently dropping out.
        Non-required disagree is unchanged, counting against the score only.
      1.0.0-beta - Public preview. Percentage-of-available-weight scoring with
        per-signal weight, operators (equals, not_equals, above, below,
        between), a per-signal unavailable policy (drop, agree, disagree), an
        optional required hard gate, and a configurable agreement state that
        may be a single value or a list. Exposes confidence, score, threshold,
        contributing, not_met, and unavailable attributes.
  domain: template
  source_url: https://raw.githubusercontent.com/TheThinkingHome/Automations/main/blueprints/template/weighted_confidence_beta.yaml
  homeassistant:
    min_version: 2026.5.4
  input:
    signals:
      name: Signals
      description: >
        A list of signals to weigh. Each item needs an entity and a weight, and
        may set operator, state, value, low, high, unavailable, required, and
        name. See the blueprint description for the full field list. Example:
          - entity: binary_sensor.front_door_recently_used
            state: "off"
            weight: 4
            required: true
            name: Door settled
          - entity: sensor.battery_state
            operator: not_equals
            state: "Not Charging"
            weight: 1
          - entity: sensor.living_room_lux
            operator: below
            value: 5
            weight: 2
          - entity: media_player.tv
            state: "off"
            unavailable: agree
            weight: 2
      selector:
        object: {}
    threshold_percent:
      name: Threshold (percent)
      description: >
        The share of currently available weight that must agree before the
        sensor turns on.
      default: 80
      selector:
        number:
          min: 1
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: box
    sensor_name:
      name: Sensor name
      description: The name for the binary sensor this blueprint creates.
      default: Weighted Confidence
      selector:
        text: {}
    unique_id:
      name: Unique ID
      description: >
        A unique id so the sensor is registered and you can rename it, place it
        in an area, or change its device class from the interface. Make it
        distinct for every sensor you build, for example bedtime_detected.
      selector:
        text: {}
    device_class:
      name: Device class
      description: >
        How the sensor reads in the frontend. Occupancy shows Detected and
        Clear. Pick another to suit what the sensor means, or type your own.
      default: occupancy
      selector:
        select:
          custom_value: true
          options:
            - occupancy
            - presence
            - motion
            - running
            - connectivity
            - safety
            - problem
            - power
            - light
            - sound
            - moving
            - plug
variables:
  signals: !input signals
  threshold_percent: !input threshold_percent
binary_sensor:
  name: !input sensor_name
  unique_id: !input unique_id
  device_class: !input device_class
  state: >-
    {% set ns = namespace(total=0, agree=0, veto=false) %}
    {% for s in signals %}
    {% set cur = states(s.entity) %}
    {% set w = s.weight | int(1) %}
    {% if cur in ['unavailable', 'unknown'] %}
    {% set policy = s.unavailable | default('drop') %}
    {% if policy == 'agree' %}{% set ns.total = ns.total + w %}{% set ns.agree = ns.agree + w %}{% elif policy == 'disagree' %}{% set ns.total = ns.total + w %}{% if s.required | default(false) %}{% set ns.veto = true %}{% endif %}{% endif %}
    {% else %}
    {% set op = s.operator | default('equals') %}
    {% set match = s.state | default('on') %}
    {% set num = cur | float(none) %}
    {% if op == 'not_equals' %}{% set met = (cur not in match) if (match is iterable and match is not string) else (cur != match | string) %}
    {% elif op == 'above' %}{% set met = num is not none and num > (s.value | float(0)) %}
    {% elif op == 'below' %}{% set met = num is not none and num < (s.value | float(0)) %}
    {% elif op == 'between' %}{% set met = num is not none and num >= (s.low | float(0)) and num <= (s.high | float(0)) %}
    {% else %}{% set met = (cur in match) if (match is iterable and match is not string) else (cur == match | string) %}{% endif %}
    {% set ns.total = ns.total + w %}
    {% if met %}{% set ns.agree = ns.agree + w %}{% endif %}
    {% if (s.required | default(false)) and not met %}{% set ns.veto = true %}{% endif %}
    {% endif %}
    {% endfor %}
    {{ false if ns.veto else (ns.agree >= (ns.total * (threshold_percent | float / 100)) if ns.total > 0 else false) }}
  attributes:
    confidence: >-
      {% set ns = namespace(total=0, agree=0) %}
      {% for s in signals %}
      {% set cur = states(s.entity) %}
      {% set w = s.weight | int(1) %}
      {% if cur in ['unavailable', 'unknown'] %}
      {% set policy = s.unavailable | default('drop') %}
      {% if policy == 'agree' %}{% set ns.total = ns.total + w %}{% set ns.agree = ns.agree + w %}{% elif policy == 'disagree' %}{% set ns.total = ns.total + w %}{% endif %}
      {% else %}
      {% set op = s.operator | default('equals') %}
      {% set match = s.state | default('on') %}
      {% set num = cur | float(none) %}
      {% if op == 'not_equals' %}{% set met = (cur not in match) if (match is iterable and match is not string) else (cur != match | string) %}
      {% elif op == 'above' %}{% set met = num is not none and num > (s.value | float(0)) %}
      {% elif op == 'below' %}{% set met = num is not none and num < (s.value | float(0)) %}
      {% elif op == 'between' %}{% set met = num is not none and num >= (s.low | float(0)) and num <= (s.high | float(0)) %}
      {% else %}{% set met = (cur in match) if (match is iterable and match is not string) else (cur == match | string) %}{% endif %}
      {% set ns.total = ns.total + w %}
      {% if met %}{% set ns.agree = ns.agree + w %}{% endif %}
      {% endif %}
      {% endfor %}
      {{ (ns.agree / ns.total * 100) | round(1) if ns.total > 0 else 0 }}
    score: >-
      {% set ns = namespace(total=0, agree=0) %}
      {% for s in signals %}
      {% set cur = states(s.entity) %}
      {% set w = s.weight | int(1) %}
      {% if cur in ['unavailable', 'unknown'] %}
      {% set policy = s.unavailable | default('drop') %}
      {% if policy == 'agree' %}{% set ns.total = ns.total + w %}{% set ns.agree = ns.agree + w %}{% elif policy == 'disagree' %}{% set ns.total = ns.total + w %}{% endif %}
      {% else %}
      {% set op = s.operator | default('equals') %}
      {% set match = s.state | default('on') %}
      {% set num = cur | float(none) %}
      {% if op == 'not_equals' %}{% set met = (cur not in match) if (match is iterable and match is not string) else (cur != match | string) %}
      {% elif op == 'above' %}{% set met = num is not none and num > (s.value | float(0)) %}
      {% elif op == 'below' %}{% set met = num is not none and num < (s.value | float(0)) %}
      {% elif op == 'between' %}{% set met = num is not none and num >= (s.low | float(0)) and num <= (s.high | float(0)) %}
      {% else %}{% set met = (cur in match) if (match is iterable and match is not string) else (cur == match | string) %}{% endif %}
      {% set ns.total = ns.total + w %}
      {% if met %}{% set ns.agree = ns.agree + w %}{% endif %}
      {% endif %}
      {% endfor %}
      {{ ns.agree ~ ' / ' ~ ns.total }}
    threshold: >-
      {{ threshold_percent }}%
    contributing: >-
      {% set ns = namespace(items=[]) %}
      {% for s in signals %}
      {% set cur = states(s.entity) %}
      {% if cur not in ['unavailable', 'unknown'] %}
      {% set op = s.operator | default('equals') %}
      {% set match = s.state | default('on') %}
      {% set num = cur | float(none) %}
      {% if op == 'not_equals' %}{% set met = (cur not in match) if (match is iterable and match is not string) else (cur != match | string) %}
      {% elif op == 'above' %}{% set met = num is not none and num > (s.value | float(0)) %}
      {% elif op == 'below' %}{% set met = num is not none and num < (s.value | float(0)) %}
      {% elif op == 'between' %}{% set met = num is not none and num >= (s.low | float(0)) and num <= (s.high | float(0)) %}
      {% else %}{% set met = (cur in match) if (match is iterable and match is not string) else (cur == match | string) %}{% endif %}
      {% if met %}{% set ns.items = ns.items + [s.name | default(s.entity)] %}{% endif %}
      {% endif %}
      {% endfor %}
      {{ ns.items }}
    not_met: >-
      {% set ns = namespace(items=[]) %}
      {% for s in signals %}
      {% set cur = states(s.entity) %}
      {% if cur not in ['unavailable', 'unknown'] %}
      {% set op = s.operator | default('equals') %}
      {% set match = s.state | default('on') %}
      {% set num = cur | float(none) %}
      {% if op == 'not_equals' %}{% set met = (cur not in match) if (match is iterable and match is not string) else (cur != match | string) %}
      {% elif op == 'above' %}{% set met = num is not none and num > (s.value | float(0)) %}
      {% elif op == 'below' %}{% set met = num is not none and num < (s.value | float(0)) %}
      {% elif op == 'between' %}{% set met = num is not none and num >= (s.low | float(0)) and num <= (s.high | float(0)) %}
      {% else %}{% set met = (cur in match) if (match is iterable and match is not string) else (cur == match | string) %}{% endif %}
      {% if not met %}{% set ns.items = ns.items + [s.name | default(s.entity)] %}{% endif %}
      {% endif %}
      {% endfor %}
      {{ ns.items }}
    unavailable: >-
      {% set ns = namespace(items=[]) %}
      {% for s in signals %}
      {% if states(s.entity) in ['unavailable', 'unknown'] %}
      {% set ns.items = ns.items + [s.entity] %}
      {% endif %}
      {% endfor %}
      {{ ns.items }}
