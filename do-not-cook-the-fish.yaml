alias: Do Not Cook the Fish
description: >-
  A real-world example of the gated trigger problem solved with the symmetrical
  fix. Every gate that can block the action also fires the automation. Every
  trigger re-checks state when fired.
 
  This automation manages dining room and living room shades based on outdoor
  lux. The fish on the dining room table are the primary concern. The
  west-facing dining room turns into a solar oven in the afternoon and the
  fishbowl heats up if the shades stay open. The shades cannot fully close
  when a window is open because the wind would damage them. The TV in the
  living room creates glare on a lower lux threshold than heat does. The
  automation only runs after 11 AM because morning low-angle sun is handled
  manually.
 
  Read this file alongside the article: Why Your Home Assistant Automation
  Triggers But Does Not Run: The Gated Trigger Problem.
  https://xeazy.com/why-your-home-assistant-automation-triggers-but-does-not-run/ 
 
  TRIGGERS:
 
  Lux thresholds (state triggers expressed as templates):
    - close_62_sun: outdoor lux > 3400 for 3 min. Bright sun, TV off.
    - close_15_sun: outdoor lux > 4100 for 3 min. Intense sun, TV off.
    - close_62_tv: outdoor lux > 2000 for 3 min. Moderate light, TV on.
    - close_15_tv: outdoor lux > 2800 for 3 min. Brighter light, TV on.
    - open_blinds: outdoor lux < 2500 for 20 min. Sunset, open back up.
 
  Gate-as-trigger (the symmetrical fix in practice):
    - tv_on: TV transitions from off (unavailable) to on. Re-evaluate lux.
    - tv_off: TV transitions to off. Re-evaluate lux.
    - window_closed: either dining window transitions to closed. Re-eval.
    - living_window_closed: either living window transitions to closed.
    - startup_11am: the 11 AM time gate opens. Re-evaluate everything.
 
  GATES (top-level conditions):
 
    - Only After 11 AM: time gate. Blocks the automation before 11 AM.
    - Not Manually Disabled: an input_boolean that lets the user disable
      the automation without removing it.
    - Only Active During Day or Evening Scene: a scene input_select that
      blocks the automation during Sleep or Away scenes.
 
  All three top-level gates are checked on every trigger. If any gate is
  closed, the automation halts. The startup_11am trigger exists specifically
  because the time gate opening is itself a gate-open event that the symmetric
  fix demands.
 
  ACTION BRANCHES:
 
  The action body is a choose block with seven branches. Each branch matches
  on a specific trigger or set of triggers and re-evaluates the current state
  of the world before acting.
 
    1. Sun close_62_sun: TV off, dining shades > 70%, close dining to 62%.
    2. Sun close_15_sun: TV off, dining shades > 20%, close dining to 15%
       and living to 62%.
    3. TV close_62_tv: TV on, dining shades > 70%, close dining and living
       to 62%.
    4. TV close_15_tv: TV on, dining shades > 20%, close dining to 15% and
       living to 62%.
    5. Sun Setting open_blinds: lux below open threshold for 20 min, home
       is occupied, open dining shades to 100%.
    6. TV Turned On re-eval: TV just turned on. Re-evaluate current lux
       and set shades to whatever position is correct for TV-on state.
    7. TV Turned Off re-eval: TV just turned off. Re-evaluate current lux
       and set shades to whatever position is correct for TV-off state.
    8. Dining Window Closed or 11 AM re-eval: a dining window just closed
       or the 11 AM time gate just opened. Re-evaluate lux and TV state and
       set both dining and living shades accordingly.
    9. Living Window Closed re-eval: a living window just closed.
       Re-evaluate lux and TV state. Set living shades only. Dining shades
       are governed by the dining branch and are not touched here.
 
  Each re-evaluation branch (branches 6 through 9) contains its own nested
  choose block that handles every lux-and-TV-state combination, including a
  default open-to-100% case when lux is below the open threshold. The default
  case is what fixes the stuck-at-62% bug where re-evaluation events fired
  after sunset but had no open case, leaving shades at their last closed
  position indefinitely.
 
  TV STATE NOTE: this automation was built against an LG WebOS TV which
  reports as 'unavailable' when off. There is no explicit off state. The TV
  is considered on when its state is anything other than unavailable. Adapt
  to your TV's reported states if different.
 
  LUX THRESHOLDS: tuned for Loja, Ecuador at 7° south latitude and 2100 m
  elevation. The equatorial sun at altitude produces lux values that differ
  significantly from northern latitudes. Your thresholds will differ.
 
  Changelog:
    - 1.6.0 - Added living room window close re-evaluation. Two new state
        triggers on living room window contacts going to off, sharing id:
        living_window_closed. New re-evaluation branch in choose: that
        gates on both living windows closed and sets living shades only.
        Dining shades remain untouched in the new branch because dining
        shades are governed independently by the dining branch.
    - 1.5.0 - Added open-to-100% default case to all re-evaluation branches
        (TV Turned On, TV Turned Off, Window Closed or 11 AM). When lux is
        below lux_open (2500) at re-evaluation time, dining shades open to
        100% immediately. Fixes stuck-at-62% bug when re-evaluation fires
        after sunset with no open case.
    - 1.4.0 - Added 11 AM startup trigger and re-evaluation branch. Added
        window_closed trigger and re-evaluation branch.
    - 1.3.0 - Added tv_on and tv_off triggers with immediate lux re-evaluation.
    - 1.2.0 - Fixed TV state checks throughout.
    - 1.1.0 - Migrated covers to guarded entities.
    - 1.0.0 - Initial release.
 
triggers:
  - alias: Sun — Close Dining to 62%
    value_template: "{{ states('sensor.outdoor_lux') | float(0) > 3400 }}"
    for:
      minutes: 3
    id: close_62_sun
    trigger: template
  - alias: Sun — Close Dining to 15%
    value_template: "{{ states('sensor.outdoor_lux') | float(0) > 4100 }}"
    for:
      minutes: 3
    id: close_15_sun
    trigger: template
  - alias: TV — Close Dining and Living to 62%
    value_template: "{{ states('sensor.outdoor_lux') | float(0) > 2000 }}"
    for:
      minutes: 3
    id: close_62_tv
    trigger: template
  - alias: TV — Close Dining to 15% Living to 62%
    value_template: "{{ states('sensor.outdoor_lux') | float(0) > 2800 }}"
    for:
      minutes: 3
    id: close_15_tv
    trigger: template
  - alias: Sun Setting — Open Dining Shades
    value_template: "{{ states('sensor.outdoor_lux') | float(0) < 2500 }}"
    for:
      minutes: 20
    id: open_blinds
    trigger: template
  - alias: TV Turned On
    entity_id: media_player.living_room_tv
    from: unavailable
    id: tv_on
    trigger: state
  - alias: TV Turned Off
    entity_id: media_player.living_room_tv
    to: unavailable
    id: tv_off
    trigger: state
  - alias: Dining Room Window Closed — Left
    entity_id: binary_sensor.window_dining_room_left
    to: "off"
    id: window_closed
    trigger: state
  - alias: Dining Room Window Closed — Right
    entity_id: binary_sensor.window_dining_room_right
    to: "off"
    id: window_closed
    trigger: state
  - alias: Living Room Window Closed — Left
    entity_id: binary_sensor.window_living_room_left
    to: "off"
    id: living_window_closed
    trigger: state
  - alias: Living Room Window Closed — Right
    entity_id: binary_sensor.window_living_room_right
    to: "off"
    id: living_window_closed
    trigger: state
  - alias: 11 AM Startup Gate
    at: "11:00:00"
    id: startup_11am
    trigger: time
conditions:
  - alias: Only After 11 AM
    condition: not
    conditions:
      - condition: time
        before: "11:00:00"
  - alias: Not Manually Disabled
    condition: state
    entity_id: input_boolean.disable_dining_room_shades
    state: "off"
  - alias: Only Active During Day or Evening Scene
    condition: template
    value_template: "{{ states('input_select.scene') in ['Day', 'Evening'] }}"
actions:
  - choose:
      - alias: Sun — Set Dining to 62%
        conditions:
          - condition: trigger
            id: close_62_sun
          - alias: TV is Off
            condition: template
            value_template: "{{ is_state(tv_entity, 'unavailable') }}"
          - alias: Shades Above 70%
            condition: template
            value_template: "{{ state_attr(dining_shades, 'current_position') | int(default=100) > 70 }}"
        sequence:
          - alias: Close Dining Shades to 62%
            action: cover.set_cover_position
            target:
              entity_id: "{{ dining_shades }}"
            data:
              position: 62
      - alias: Sun — Set Dining to 15% Living to 62%
        conditions:
          - condition: trigger
            id: close_15_sun
          - alias: TV is Off
            condition: template
            value_template: "{{ is_state(tv_entity, 'unavailable') }}"
          - alias: Shades Above 20%
            condition: template
            value_template: "{{ state_attr(dining_shades, 'current_position') | int(default=100) > 20 }}"
        sequence:
          - alias: Close Dining Shades to 15%
            action: cover.set_cover_position
            target:
              entity_id: "{{ dining_shades }}"
            data:
              position: 15
          - alias: Close Living Shades to 62%
            action: cover.set_cover_position
            target:
              entity_id: "{{ living_shades }}"
            data:
              position: 62
      - alias: TV On — Set Dining and Living to 62%
        conditions:
          - condition: trigger
            id: close_62_tv
          - alias: TV is On
            condition: template
            value_template: "{{ not is_state(tv_entity, 'unavailable') }}"
          - alias: Dining Shades Above 70%
            condition: template
            value_template: "{{ state_attr(dining_shades, 'current_position') | int(default=100) > 70 }}"
        sequence:
          - alias: Close Dining Shades to 62%
            action: cover.set_cover_position
            target:
              entity_id: "{{ dining_shades }}"
            data:
              position: 62
          - alias: Close Living Shades to 62%
            action: cover.set_cover_position
            target:
              entity_id: "{{ living_shades }}"
            data:
              position: 62
      - alias: TV On — Set Dining to 15% Living to 62%
        conditions:
          - condition: trigger
            id: close_15_tv
          - alias: TV is On
            condition: template
            value_template: "{{ not is_state(tv_entity, 'unavailable') }}"
          - alias: Dining Shades Above 20%
            condition: template
            value_template: "{{ state_attr(dining_shades, 'current_position') | int(default=100) > 20 }}"
        sequence:
          - alias: Close Dining Shades to 15%
            action: cover.set_cover_position
            target:
              entity_id: "{{ dining_shades }}"
            data:
              position: 15
          - alias: Close Living Shades to 62%
            action: cover.set_cover_position
            target:
              entity_id: "{{ living_shades }}"
            data:
              position: 62
      - alias: Sun Setting — Open Dining Shades
        conditions:
          - condition: trigger
            id: open_blinds
          - alias: Home is Occupied
            condition: state
            entity_id: input_boolean.home
            state: "on"
        sequence:
          - alias: Open Dining Shades to 100%
            action: cover.set_cover_position
            target:
              entity_id: "{{ dining_shades }}"
            data:
              position: 100
      - alias: TV Turned On — Re-evaluate Lux and Set Shades
        conditions:
          - condition: trigger
            id: tv_on
        sequence:
          - choose:
              - alias: Lux Above TV Close-15 Threshold — Dining 15% Living 62%
                conditions:
                  - condition: template
                    value_template: "{{ states('sensor.outdoor_lux') | float(0) > 2800 }}"
                sequence:
                  - alias: Close Dining Shades to 15%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ dining_shades }}"
                    data:
                      position: 15
                  - alias: Close Living Shades to 62%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ living_shades }}"
                    data:
                      position: 62
              - alias: Lux Above TV Close-62 Threshold — Dining 62% Living 62%
                conditions:
                  - condition: template
                    value_template: "{{ states('sensor.outdoor_lux') | float(0) > 2000 }}"
                sequence:
                  - alias: Close Dining Shades to 62%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ dining_shades }}"
                    data:
                      position: 62
                  - alias: Close Living Shades to 62%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ living_shades }}"
                    data:
                      position: 62
            default:
              - alias: Open Dining Shades to 100%
                action: cover.set_cover_position
                target:
                  entity_id: "{{ dining_shades }}"
                data:
                  position: 100
      - alias: TV Turned Off — Re-evaluate Lux and Set Shades
        conditions:
          - condition: trigger
            id: tv_off
        sequence:
          - choose:
              - alias: Lux Above Sun Close-15 Threshold — Dining 15% Living 62%
                conditions:
                  - condition: template
                    value_template: "{{ states('sensor.outdoor_lux') | float(0) > 4100 }}"
                sequence:
                  - alias: Close Dining Shades to 15%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ dining_shades }}"
                    data:
                      position: 15
                  - alias: Close Living Shades to 62%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ living_shades }}"
                    data:
                      position: 62
              - alias: Lux Above Sun Close-62 Threshold — Dining 62%
                conditions:
                  - condition: template
                    value_template: "{{ states('sensor.outdoor_lux') | float(0) > 3400 }}"
                sequence:
                  - alias: Close Dining Shades to 62%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ dining_shades }}"
                    data:
                      position: 62
            default:
              - alias: Open Dining Shades to 100%
                action: cover.set_cover_position
                target:
                  entity_id: "{{ dining_shades }}"
                data:
                  position: 100
      - alias: Dining Window Closed or 11 AM — Re-evaluate Lux and Set Shades
        conditions:
          - condition: trigger
            id:
              - window_closed
              - startup_11am
          - alias: Both Dining Windows Closed
            condition: template
            value_template: "{{ is_state(window_dining_left, 'off') and is_state(window_dining_right, 'off') }}"
        sequence:
          - choose:
              - alias: TV On — Lux Above TV Close-15 — Dining 15% Living 62%
                conditions:
                  - condition: template
                    value_template: "{{ not is_state(tv_entity, 'unavailable') and states('sensor.outdoor_lux') | float(0) > 2800 }}"
                sequence:
                  - alias: Close Dining Shades to 15%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ dining_shades }}"
                    data:
                      position: 15
                  - alias: Close Living Shades to 62%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ living_shades }}"
                    data:
                      position: 62
              - alias: TV On — Lux Above TV Close-62 — Dining 62% Living 62%
                conditions:
                  - condition: template
                    value_template: "{{ not is_state(tv_entity, 'unavailable') and states('sensor.outdoor_lux') | float(0) > 2000 }}"
                sequence:
                  - alias: Close Dining Shades to 62%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ dining_shades }}"
                    data:
                      position: 62
                  - alias: Close Living Shades to 62%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ living_shades }}"
                    data:
                      position: 62
              - alias: TV Off — Lux Above Sun Close-15 — Dining 15% Living 62%
                conditions:
                  - condition: template
                    value_template: "{{ is_state(tv_entity, 'unavailable') and states('sensor.outdoor_lux') | float(0) > 4100 }}"
                sequence:
                  - alias: Close Dining Shades to 15%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ dining_shades }}"
                    data:
                      position: 15
                  - alias: Close Living Shades to 62%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ living_shades }}"
                    data:
                      position: 62
              - alias: TV Off — Lux Above Sun Close-62 — Dining 62%
                conditions:
                  - condition: template
                    value_template: "{{ is_state(tv_entity, 'unavailable') and states('sensor.outdoor_lux') | float(0) > 3400 }}"
                sequence:
                  - alias: Close Dining Shades to 62%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ dining_shades }}"
                    data:
                      position: 62
            default:
              - alias: Open Dining Shades to 100%
                action: cover.set_cover_position
                target:
                  entity_id: "{{ dining_shades }}"
                data:
                  position: 100
      - alias: Living Window Closed — Re-evaluate Lux and Set Living Shades
        conditions:
          - condition: trigger
            id: living_window_closed
          - alias: Both Living Windows Closed
            condition: template
            value_template: "{{ is_state(window_living_left, 'off') and is_state(window_living_right, 'off') }}"
        sequence:
          - choose:
              - alias: TV On — Lux Above TV Close-62 — Living 62%
                conditions:
                  - condition: template
                    value_template: "{{ not is_state(tv_entity, 'unavailable') and states('sensor.outdoor_lux') | float(0) > 2000 }}"
                sequence:
                  - alias: Close Living Shades to 62%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ living_shades }}"
                    data:
                      position: 62
              - alias: TV Off — Lux Above Sun Close-15 — Living 62%
                conditions:
                  - condition: template
                    value_template: "{{ is_state(tv_entity, 'unavailable') and states('sensor.outdoor_lux') | float(0) > 4100 }}"
                sequence:
                  - alias: Close Living Shades to 62%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ living_shades }}"
                    data:
                      position: 62
            default:
              - alias: Open Living Shades to 100%
                action: cover.set_cover_position
                target:
                  entity_id: "{{ living_shades }}"
                data:
                  position: 100
variables:
  tv_entity: media_player.living_room_tv
  dining_shades: cover.dining_shades
  living_shades: cover.living_shades
  window_dining_left: binary_sensor.window_dining_room_left
  window_dining_right: binary_sensor.window_dining_room_right
  window_living_left: binary_sensor.window_living_room_left
  window_living_right: binary_sensor.window_living_room_right
mode: restart
