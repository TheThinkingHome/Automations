# Do Not Cook the Fish - a Home Assistant automation from The Thinking Home (xeazy.com)
# A worked example of the gated trigger problem and its symmetrical fix.
# Full write-up: https://xeazy.com/why-your-home-assistant-automation-triggers-but-does-not-run/
#
# Changelog:
#   1.6.0 - Added living room window close re-evaluation. Two new state triggers
#           on the living room window contacts going to off, sharing id
#           living_window_closed. New branch gates on both living windows closed
#           and sets living shades only. Dining shades remain untouched there,
#           since they are governed independently by the dining branch.
#   1.5.0 - Added open-to-100% default case to all re-evaluation branches (TV on,
#           TV off, window closed or 11 AM). When lux is below lux_open (2500) at
#           re-evaluation, dining shades open to 100% immediately. Fixes the
#           stuck-at-62% bug when re-evaluation fired after sunset with no open
#           case.
#   1.4.0 - Added 11 AM startup trigger and re-evaluation branch. Added
#           window_closed trigger and re-evaluation branch.
#   1.3.0 - Added tv_on and tv_off triggers with immediate lux re-evaluation.
#   1.2.0 - Fixed TV state checks throughout.
#   1.1.0 - Migrated covers to guarded entities.
#   1.0.0 - Initial release.
alias: Do Not Cook the Fish
description: >-
  A worked example of the gated trigger problem and its symmetrical fix: every
  gate that can block the action also fires the automation, and every trigger
  re-checks the full state when it runs, so the shades never get stuck in the
  wrong position.

  It manages dining and living room shades from outdoor lux, TV state, and open
  windows. The west-facing dining room turns into a solar oven in the afternoon,
  and the fish on the table are the reason it exists. The shades cannot fully
  close while a window is open, since wind would damage them, and the TV adds
  glare at a lower lux threshold than heat does. The automation runs only after
  11 AM, since morning low-angle sun is handled manually.

  Full write-up: https://xeazy.com/why-your-home-assistant-automation-triggers-but-does-not-run/

  TV state note: built against an LG WebOS TV, which reports as unavailable when
  off and has no explicit off state. The TV is treated as on when its state is
  anything other than unavailable. Adapt to your own TV's reported states.

  Lux thresholds: tuned for Loja, Ecuador at 7 degrees south and 2100 m
  elevation. The equatorial sun at altitude gives very different lux values from
  northern latitudes, so your thresholds will differ.

  License: GPL-3.0-or-later. Copyright (C) 2026 James Lander, The Thinking
  Home (https://xeazy.com).
triggers:
  - alias: Sun — Close Dining to 62%
    value_template: "{{ states('sensor.outdoor_lux') | float(0) > 3400 }}"
    for:
      minutes: 3
    id: close_62_sun
    trigger: template
  - alias: Sun — Close Dining to 15%
    value_template: "{{ states('sensor.outdoor_lux') | float(0) > 4100 }}"
    for:
      minutes: 3
    id: close_15_sun
    trigger: template
  - alias: TV — Close Dining and Living to 62%
    value_template: "{{ states('sensor.outdoor_lux') | float(0) > 2000 }}"
    for:
      minutes: 3
    id: close_62_tv
    trigger: template
  - alias: TV — Close Dining to 15% Living to 62%
    value_template: "{{ states('sensor.outdoor_lux') | float(0) > 2800 }}"
    for:
      minutes: 3
    id: close_15_tv
    trigger: template
  - alias: Sun Setting — Open Dining Shades
    value_template: "{{ states('sensor.outdoor_lux') | float(0) < 2500 }}"
    for:
      minutes: 20
    id: open_blinds
    trigger: template
  - alias: TV Turned On
    entity_id: media_player.living_room_tv
    from: unavailable
    id: tv_on
    trigger: state
  - alias: TV Turned Off
    entity_id: media_player.living_room_tv
    to: unavailable
    id: tv_off
    trigger: state
  - alias: Dining Room Window Closed — Left
    entity_id: binary_sensor.window_dining_room_left
    to: "off"
    id: window_closed
    trigger: state
  - alias: Dining Room Window Closed — Right
    entity_id: binary_sensor.window_dining_room_right
    to: "off"
    id: window_closed
    trigger: state
  - alias: Living Room Window Closed — Left
    entity_id: binary_sensor.window_living_room_left
    to: "off"
    id: living_window_closed
    trigger: state
  - alias: Living Room Window Closed — Right
    entity_id: binary_sensor.window_living_room_right
    to: "off"
    id: living_window_closed
    trigger: state
  - alias: 11 AM Startup Gate
    at: "11:00:00"
    id: startup_11am
    trigger: time
conditions:
  - alias: Only After 11 AM
    condition: not
    conditions:
      - condition: time
        before: "11:00:00"
  - alias: Not Manually Disabled
    condition: state
    entity_id: input_boolean.disable_dining_room_shades
    state: "off"
  - alias: Only Active During Day or Evening Scene
    condition: template
    value_template: "{{ states('input_select.scene') in ['Day', 'Evening'] }}"
actions:
  - choose:
      - alias: Sun — Set Dining to 62%
        conditions:
          - condition: trigger
            id: close_62_sun
          - alias: TV is Off
            condition: template
            value_template: "{{ is_state(tv_entity, 'unavailable') }}"
          - alias: Shades Above 70%
            condition: template
            value_template: "{{ state_attr(dining_shades, 'current_position') | int(default=100) > 70 }}"
        sequence:
          - alias: Close Dining Shades to 62%
            action: cover.set_cover_position
            target:
              entity_id: "{{ dining_shades }}"
            data:
              position: 62
      - alias: Sun — Set Dining to 15% Living to 62%
        conditions:
          - condition: trigger
            id: close_15_sun
          - alias: TV is Off
            condition: template
            value_template: "{{ is_state(tv_entity, 'unavailable') }}"
          - alias: Shades Above 20%
            condition: template
            value_template: "{{ state_attr(dining_shades, 'current_position') | int(default=100) > 20 }}"
        sequence:
          - alias: Close Dining Shades to 15%
            action: cover.set_cover_position
            target:
              entity_id: "{{ dining_shades }}"
            data:
              position: 15
          - alias: Close Living Shades to 62%
            action: cover.set_cover_position
            target:
              entity_id: "{{ living_shades }}"
            data:
              position: 62
      - alias: TV On — Set Dining and Living to 62%
        conditions:
          - condition: trigger
            id: close_62_tv
          - alias: TV is On
            condition: template
            value_template: "{{ not is_state(tv_entity, 'unavailable') }}"
          - alias: Dining Shades Above 70%
            condition: template
            value_template: "{{ state_attr(dining_shades, 'current_position') | int(default=100) > 70 }}"
        sequence:
          - alias: Close Dining Shades to 62%
            action: cover.set_cover_position
            target:
              entity_id: "{{ dining_shades }}"
            data:
              position: 62
          - alias: Close Living Shades to 62%
            action: cover.set_cover_position
            target:
              entity_id: "{{ living_shades }}"
            data:
              position: 62
      - alias: TV On — Set Dining to 15% Living to 62%
        conditions:
          - condition: trigger
            id: close_15_tv
          - alias: TV is On
            condition: template
            value_template: "{{ not is_state(tv_entity, 'unavailable') }}"
          - alias: Dining Shades Above 20%
            condition: template
            value_template: "{{ state_attr(dining_shades, 'current_position') | int(default=100) > 20 }}"
        sequence:
          - alias: Close Dining Shades to 15%
            action: cover.set_cover_position
            target:
              entity_id: "{{ dining_shades }}"
            data:
              position: 15
          - alias: Close Living Shades to 62%
            action: cover.set_cover_position
            target:
              entity_id: "{{ living_shades }}"
            data:
              position: 62
      - alias: Sun Setting — Open Dining Shades
        conditions:
          - condition: trigger
            id: open_blinds
          - alias: Home is Occupied
            condition: state
            entity_id: input_boolean.home
            state: "on"
        sequence:
          - alias: Open Dining Shades to 100%
            action: cover.set_cover_position
            target:
              entity_id: "{{ dining_shades }}"
            data:
              position: 100
      - alias: TV Turned On — Re-evaluate Lux and Set Shades
        conditions:
          - condition: trigger
            id: tv_on
        sequence:
          - choose:
              - alias: Lux Above TV Close-15 Threshold — Dining 15% Living 62%
                conditions:
                  - condition: template
                    value_template: "{{ states('sensor.outdoor_lux') | float(0) > 2800 }}"
                sequence:
                  - alias: Close Dining Shades to 15%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ dining_shades }}"
                    data:
                      position: 15
                  - alias: Close Living Shades to 62%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ living_shades }}"
                    data:
                      position: 62
              - alias: Lux Above TV Close-62 Threshold — Dining 62% Living 62%
                conditions:
                  - condition: template
                    value_template: "{{ states('sensor.outdoor_lux') | float(0) > 2000 }}"
                sequence:
                  - alias: Close Dining Shades to 62%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ dining_shades }}"
                    data:
                      position: 62
                  - alias: Close Living Shades to 62%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ living_shades }}"
                    data:
                      position: 62
            default:
              - alias: Open Dining Shades to 100%
                action: cover.set_cover_position
                target:
                  entity_id: "{{ dining_shades }}"
                data:
                  position: 100
      - alias: TV Turned Off — Re-evaluate Lux and Set Shades
        conditions:
          - condition: trigger
            id: tv_off
        sequence:
          - choose:
              - alias: Lux Above Sun Close-15 Threshold — Dining 15% Living 62%
                conditions:
                  - condition: template
                    value_template: "{{ states('sensor.outdoor_lux') | float(0) > 4100 }}"
                sequence:
                  - alias: Close Dining Shades to 15%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ dining_shades }}"
                    data:
                      position: 15
                  - alias: Close Living Shades to 62%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ living_shades }}"
                    data:
                      position: 62
              - alias: Lux Above Sun Close-62 Threshold — Dining 62%
                conditions:
                  - condition: template
                    value_template: "{{ states('sensor.outdoor_lux') | float(0) > 3400 }}"
                sequence:
                  - alias: Close Dining Shades to 62%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ dining_shades }}"
                    data:
                      position: 62
            default:
              - alias: Open Dining Shades to 100%
                action: cover.set_cover_position
                target:
                  entity_id: "{{ dining_shades }}"
                data:
                  position: 100
      - alias: Dining Window Closed or 11 AM — Re-evaluate Lux and Set Shades
        conditions:
          - condition: trigger
            id:
              - window_closed
              - startup_11am
          - alias: Both Dining Windows Closed
            condition: template
            value_template: "{{ is_state(window_dining_left, 'off') and is_state(window_dining_right, 'off') }}"
        sequence:
          - choose:
              - alias: TV On — Lux Above TV Close-15 — Dining 15% Living 62%
                conditions:
                  - condition: template
                    value_template: "{{ not is_state(tv_entity, 'unavailable') and states('sensor.outdoor_lux') | float(0) > 2800 }}"
                sequence:
                  - alias: Close Dining Shades to 15%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ dining_shades }}"
                    data:
                      position: 15
                  - alias: Close Living Shades to 62%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ living_shades }}"
                    data:
                      position: 62
              - alias: TV On — Lux Above TV Close-62 — Dining 62% Living 62%
                conditions:
                  - condition: template
                    value_template: "{{ not is_state(tv_entity, 'unavailable') and states('sensor.outdoor_lux') | float(0) > 2000 }}"
                sequence:
                  - alias: Close Dining Shades to 62%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ dining_shades }}"
                    data:
                      position: 62
                  - alias: Close Living Shades to 62%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ living_shades }}"
                    data:
                      position: 62
              - alias: TV Off — Lux Above Sun Close-15 — Dining 15% Living 62%
                conditions:
                  - condition: template
                    value_template: "{{ is_state(tv_entity, 'unavailable') and states('sensor.outdoor_lux') | float(0) > 4100 }}"
                sequence:
                  - alias: Close Dining Shades to 15%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ dining_shades }}"
                    data:
                      position: 15
                  - alias: Close Living Shades to 62%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ living_shades }}"
                    data:
                      position: 62
              - alias: TV Off — Lux Above Sun Close-62 — Dining 62%
                conditions:
                  - condition: template
                    value_template: "{{ is_state(tv_entity, 'unavailable') and states('sensor.outdoor_lux') | float(0) > 3400 }}"
                sequence:
                  - alias: Close Dining Shades to 62%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ dining_shades }}"
                    data:
                      position: 62
            default:
              - alias: Open Dining Shades to 100%
                action: cover.set_cover_position
                target:
                  entity_id: "{{ dining_shades }}"
                data:
                  position: 100
      - alias: Living Window Closed — Re-evaluate Lux and Set Living Shades
        conditions:
          - condition: trigger
            id: living_window_closed
          - alias: Both Living Windows Closed
            condition: template
            value_template: "{{ is_state(window_living_left, 'off') and is_state(window_living_right, 'off') }}"
        sequence:
          - choose:
              - alias: TV On — Lux Above TV Close-62 — Living 62%
                conditions:
                  - condition: template
                    value_template: "{{ not is_state(tv_entity, 'unavailable') and states('sensor.outdoor_lux') | float(0) > 2000 }}"
                sequence:
                  - alias: Close Living Shades to 62%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ living_shades }}"
                    data:
                      position: 62
              - alias: TV Off — Lux Above Sun Close-15 — Living 62%
                conditions:
                  - condition: template
                    value_template: "{{ is_state(tv_entity, 'unavailable') and states('sensor.outdoor_lux') | float(0) > 4100 }}"
                sequence:
                  - alias: Close Living Shades to 62%
                    action: cover.set_cover_position
                    target:
                      entity_id: "{{ living_shades }}"
                    data:
                      position: 62
            default:
              - alias: Open Living Shades to 100%
                action: cover.set_cover_position
                target:
                  entity_id: "{{ living_shades }}"
                data:
                  position: 100
variables:
  tv_entity: media_player.living_room_tv
  dining_shades: cover.dining_shades
  living_shades: cover.living_shades
  window_dining_left: binary_sensor.window_dining_room_left
  window_dining_right: binary_sensor.window_dining_room_right
  window_living_left: binary_sensor.window_living_room_left
  window_living_right: binary_sensor.window_living_room_right
mode: restart
