#
# Package: Gate Garage Guard  (Public Reference Version)
# File: config/packages/gate_garage_guard.yaml
# Version: 1.0.0  (public reference, derived from the live v1.5.x system)
#
# Changelog:
#   1.0.0 - First public reference release. Anonymized and simplified from the
#           author's live package. The presence-based arrival and departure
#           automations, the dual contact sensor health ledger, and other
#           site-specific logic are removed so this file is a clean starting
#           point rather than a drop-in.
# =============================================================================
#
# WHAT THIS IS
#   A Home Assistant package that turns a "blind" 433MHz gate relay into a
#   state-aware cover entity. A bare relay just clicks - it has no idea whether
#   the gate is open, closed, or stuck. This package adds the missing
#   intelligence: it checks the gate's real position before acting, fires the
#   relay, waits for the gate to travel, and verifies the result. It also
#   filters a noisy vibration sensor so wind and passing trucks do not get
#   mistaken for tampering.
#
# IMPORTANT - READ THIS
#   This is NOT the live file running on the author's system. It has been
#   anonymized and simplified for publication. The author's working version
#   includes presence-based arrival/departure automations, a dual contact
#   sensor "health ledger" that quarantines unreliable sensors, and other
#   site-specific logic that depends on entities you would not have. All of
#   that has been stripped out so this file is a clean starting point you can
#   actually adapt. Treat it as a reference, not a drop-in.
#
# WHAT YOU NEED TO PROVIDE (hard dependencies)
#   This package will not function until these three entities exist and the
#   IDs below are updated to match yours:
#
#     switch.gate_relay
#         The relay that pulses the gate remote. (Author uses a Sonoff 4CH Pro
#         flashed with Tasmota in "inching" mode for a 1-second pulse.)
#
#     binary_sensor.gate_contact
#         A contact sensor on the gate. 'on' = open, 'off' = closed.
#
#     binary_sensor.gate_vibration
#         A vibration sensor on the gate, used for tamper detection. 'on' when
#         it detects movement/vibration.
#
#   If you only want the open/close state awareness and do not care about
#   tamper detection, you can delete the three vibration-related template
#   entities and ignore binary_sensor.gate_vibration entirely. The cover entity
#   does not depend on it.
#
# ONE TUNABLE WORTH KNOWING
#   The actuation logic waits 15 seconds for the gate to finish traveling
#   before it checks the result. The author's gate takes about 12 seconds.
#   If your gate is faster or slower, change the delay in
#   script.gate_garage_package_actuate_and_verify.
#
# THE ONE WEAK POINT - THE CONTACT SENSOR
#   This package trusts binary_sensor.gate_contact completely. The cover
#   entity's reported state is just a reading of that sensor, and the manager
#   script's "is the gate already open/closed?" check depends on it being
#   honest. That is fine when the sensor works. But if the contact sensor
#   fails or freezes, the system does not just go dark - it can behave
#   backwards. A frozen sensor stuck on "closed" will make the manager refuse
#   a "close" command (it thinks the gate is already closed) while happily
#   running an "open" command on a gate that is physically already open. The
#   verified path is only as honest as the sensor feeding it.
#
#   For exactly that situation, this package keeps one deliberate escape
#   hatch: script.gate_garage_package_resync_click. It bypasses every check
#   and just pulses the relay once. It is the manual blind toggle you fall
#   back to when the contact sensor has failed and you still need to operate
#   the gate before you can fix the hardware. The author's full system handles
#   sensor failure automatically with a second contact sensor and a health
#   ledger; that is out of scope here and covered in the follow-up.
# =============================================================================


# =============================================================================
# 1. INPUTS
# Two text helpers that drive the dashboard: a live status line and a latched
# error message that persists until the next command clears it.
# =============================================================================
input_text:
  gate_garage_package_status_message:
    name: Gate Garage Package Status Message
    icon: mdi:message-text-clock
    initial: "System Ready"

  gate_garage_package_error_latch:
    name: Gate Garage Package Error Memory
    icon: mdi:alert-circle
    initial: "Clear"


# =============================================================================
# 2. TEMPLATES
# The cover entity, the dashboard error display, and the vibration filter.
# =============================================================================
template:

  # ---------------------------------------------------------------------------
  # Error Display
  # A single dashboard sensor that shows either the current latched error or
  # "Clear". It also reports if the relay itself has gone unavailable, which is
  # the most common real-world failure (the relay lost power or fell off the
  # network). Defaults are defensive so the sensor never renders as "unknown".
  # ---------------------------------------------------------------------------
  - sensor:
      - name: "Gate Garage Package Error Display"
        unique_id: sensor_gate_garage_package_error_display
        icon: mdi:alert-box
        state: >-
          {% set logic_error = states('input_text.gate_garage_package_error_latch') | default('Clear', true) %}
          {% set switch_status = states('switch.gate_relay') | default('unknown', true) %}

          {# Coerce any empty / null-ish latch value back to a clean "Clear" #}
          {% set logic_error = 'Clear' if logic_error in ['unavailable', 'unknown', 'None', 'none', ''] else logic_error %}
          {% set switch_unavailable = switch_status in ['unavailable', 'unknown'] %}

          {%- if switch_unavailable -%}
            Relay Unavailable
          {%- elif logic_error != 'Clear' -%}
            {{ logic_error }}
          {%- else -%}
            Clear
          {%- endif -%}

  # ---------------------------------------------------------------------------
  # Vibration Guarded
  # The raw vibration sensor, but it only reports "on" after the vibration has
  # been continuous for 5 seconds. A single bump (a slammed car door, a gust)
  # never gets through. This is the first noise filter.
  # ---------------------------------------------------------------------------
  - binary_sensor:
      - name: "Gate Garage Package Vibration Guarded"
        unique_id: binary_sensor_gate_garage_package_vibration_guarded
        device_class: vibration
        state: >-
          {{ is_state('binary_sensor.gate_vibration', 'on') }}
        delay_on: 5

  # ---------------------------------------------------------------------------
  # Vibration Smart
  # The "is this real" verdict. It turns on when the guarded sensor confirms a
  # sustained vibration, or when a fresh vibration started within the last 15
  # seconds. It auto-clears after 15 seconds so it represents a recent event,
  # not a stuck state. This is what you put on a dashboard or trigger security
  # automations from.
  # ---------------------------------------------------------------------------
  - trigger:
      - trigger: state
        entity_id: binary_sensor.gate_vibration
        to: "on"
      - trigger: homeassistant
        event: start
    binary_sensor:
      - name: "Gate Garage Package Vibration Smart"
        unique_id: binary_sensor_gate_garage_package_vibration_smart
        device_class: vibration
        icon: mdi:vibrate
        state: >-
          {% if trigger.platform == 'homeassistant' %}
            false
          {% else %}
            {% set duration_sensor = 'binary_sensor.gate_garage_package_vibration_guarded' %}
            {% if is_state(duration_sensor, 'on') %}
              true
            {% elif trigger.from_state is defined and
                    (now() - trigger.from_state.last_changed).total_seconds() < 15 %}
              true
            {% else %}
              false
            {% endif %}
          {% endif %}
        auto_off: 15

  # ---------------------------------------------------------------------------
  # Last Vibration Time
  # Timestamp of the last confirmed (filtered) vibration event. Useful on a
  # dashboard so you can see at a glance when the gate was last disturbed.
  # ---------------------------------------------------------------------------
  - trigger:
      - trigger: state
        entity_id: binary_sensor.gate_garage_package_vibration_smart
        to: "on"
    sensor:
      - name: "Gate Garage Package Last Vibration Time"
        unique_id: sensor_gate_garage_package_last_vibration_time
        icon: mdi:clock-alert
        state: "{{ now().strftime('%d-%m %H:%M') }}"

  # ---------------------------------------------------------------------------
  # Last Opened Time
  # Timestamp of the last time the gate contact sensor reported "open".
  # ---------------------------------------------------------------------------
  - trigger:
      - trigger: state
        entity_id: binary_sensor.gate_contact
        to: "on"
    sensor:
      - name: "Gate Garage Package Last Opened Time"
        unique_id: sensor_gate_garage_package_last_opened_time
        icon: mdi:clock-outline
        state: "{{ now().strftime('%d-%m %H:%M') }}"

  # ---------------------------------------------------------------------------
  # The Cover Entity
  # This is the only thing you interact with. It reads the gate's real position
  # from the contact sensor and routes open/close commands through the manager
  # script, which checks state before acting. Put this on your dashboard
  # instead of the bare relay switch.
  #
  # Note: there is intentionally no stop_cover. A sliding/swing gate opener
  # cannot reliably stop mid-travel from a single button pulse, so offering a
  # stop button would be misleading.
  # ---------------------------------------------------------------------------
  - cover:
      - name: "Gate Garage Package Guarded"
        unique_id: cover_gate_garage_package_guarded
        device_class: gate

        state: >-
          {{ 'open' if is_state('binary_sensor.gate_contact', 'on') else 'closed' }}

        availability: >-
          {{ states('switch.gate_relay') not in ['unavailable', 'unknown'] }}

        open_cover:
          - action: script.gate_garage_package_manager
            data:
              command: 'open'

        close_cover:
          - action: script.gate_garage_package_manager
            data:
              command: 'close'


# =============================================================================
# 3. SCRIPTS
# The decision-making layer. The manager decides what to do; the actuation
# script does it and verifies the result.
# =============================================================================
script:

  # ---------------------------------------------------------------------------
  # Manager
  # The decision maker. Takes a command (open / close / toggle), checks the
  # gate's current state, and only actuates if the gate is not already in the
  # requested position. This is what prevents the classic "blind toggle" bug
  # where you press open but the gate was already open, so it closes instead.
  # ---------------------------------------------------------------------------
  gate_garage_package_manager:
    alias: "Gate Garage Package Manager Logic"
    icon: mdi:gate-arrow-right
    description: "Checks gate state, then routes open/close/toggle to the actuation script."
    fields:
      command:
        description: "The desired action: open, close, or toggle"
        example: "close"
    sequence:
      - alias: Clear the previous error
        action: input_text.set_value
        continue_on_error: true
        target:
          entity_id: input_text.gate_garage_package_error_latch
        data:
          value: "Clear"

      - alias: Set status to processing
        action: input_text.set_value
        continue_on_error: true
        target:
          entity_id: input_text.gate_garage_package_status_message
        data:
          value: "Processing {{ command }}..."

      - alias: Route the command
        choose:
          - alias: Close command
            conditions:
              - condition: template
                value_template: "{{ command == 'close' }}"
            sequence:
              - if:
                  - condition: template
                    value_template: "{{ is_state('cover.gate_garage_package_guarded', 'closed') }}"
                then:
                  - action: input_text.set_value
                    continue_on_error: true
                    target:
                      entity_id: input_text.gate_garage_package_status_message
                    data:
                      value: "Ignored: Already Closed"
                  - stop: "Gate is already closed."
                else:
                  - action: script.gate_garage_package_actuate_and_verify
                    data:
                      target_state: 'off'
                      direction: 'close'

          - alias: Open command
            conditions:
              - condition: template
                value_template: "{{ command == 'open' }}"
            sequence:
              - if:
                  - condition: template
                    value_template: "{{ is_state('cover.gate_garage_package_guarded', 'open') }}"
                then:
                  - action: input_text.set_value
                    continue_on_error: true
                    target:
                      entity_id: input_text.gate_garage_package_status_message
                    data:
                      value: "Ignored: Already Open"
                  - stop: "Gate is already open."
                else:
                  - action: script.gate_garage_package_actuate_and_verify
                    data:
                      target_state: 'on'
                      direction: 'open'

          - alias: Toggle command
            conditions:
              - condition: template
                value_template: "{{ command == 'toggle' }}"
            sequence:
              - if:
                  - condition: template
                    value_template: "{{ is_state('cover.gate_garage_package_guarded', 'closed') }}"
                then:
                  - action: script.gate_garage_package_actuate_and_verify
                    data:
                      target_state: 'on'
                      direction: 'open'
                else:
                  - action: script.gate_garage_package_actuate_and_verify
                    data:
                      target_state: 'off'
                      direction: 'close'

  # ---------------------------------------------------------------------------
  # Actuate and Verify
  # Fires the relay, waits for the gate to finish traveling, then checks the
  # contact sensor. If the sensor reached the requested state, it reports
  # success. If not, it latches an error and the dashboard shows it.
  #
  # The 15-second delay is the one value you may need to tune. The author's
  # gate takes ~12 seconds end to end; 15 gives a small margin.
  # ---------------------------------------------------------------------------
  gate_garage_package_actuate_and_verify:
    alias: "Gate Garage Package Actuation"
    description: "Fires the relay, waits for travel, and verifies the contact sensor reached the target state."
    fields:
      target_state:
        description: "Contact sensor state to wait for: on = open, off = closed"
      direction:
        description: "Human-readable direction for logs and messages: open / close"
    sequence:
      - alias: Announce actuation
        action: input_text.set_value
        continue_on_error: true
        target:
          entity_id: input_text.gate_garage_package_status_message
        data:
          value: "Actuating: {{ direction | title }}ing..."

      - alias: Fire the relay
        action: switch.turn_on
        continue_on_error: true
        target:
          entity_id: switch.gate_relay

      - alias: Wait for the gate to finish traveling
        delay: "00:00:15"

      - alias: Verify the result
        choose:
          - alias: Sensor reached the target state
            conditions:
              - condition: template
                value_template: "{{ states('binary_sensor.gate_contact') == target_state }}"
            sequence:
              - action: input_text.set_value
                continue_on_error: true
                target:
                  entity_id: input_text.gate_garage_package_status_message
                data:
                  value: "Success: Gate {{ direction | title }}ed"
        default:
          - alias: Sensor did not reach the target state
            action: input_text.set_value
            continue_on_error: true
            target:
              entity_id: input_text.gate_garage_package_status_message
            data:
              value: "Failed: Gate did not {{ direction }}"
          - action: input_text.set_value
            continue_on_error: true
            target:
              entity_id: input_text.gate_garage_package_error_latch
            data:
              value: "Error: {{ direction | title }} Failed - sensor did not confirm"
          - action: system_log.write
            continue_on_error: true
            data:
              level: warning
              message: >-
                [Gate Garage Guard] Commanded gate to {{ direction }}, but
                binary_sensor.gate_contact did not reach '{{ target_state }}'
                after the travel delay.

  # ---------------------------------------------------------------------------
  # Resync (Blind Click)
  # The deliberate escape hatch for a failed contact sensor.
  #
  # Everything else in this package routes through the manager script, and the
  # manager only trusts itself as far as it can trust binary_sensor.gate_contact.
  # When that sensor fails or freezes, the verified open/close path becomes
  # unreliable: the cover entity reports a stale state and the manager's "is it
  # already open/closed?" check can refuse a valid command or run a backwards
  # one. (See "THE ONE WEAK POINT" in the file header.)
  #
  # This script exists for exactly that case. It bypasses every check and every
  # bit of state logic and simply pulses the relay once. It is the manual blind
  # toggle - the same thing the original 433MHz remote does - that still works
  # when the smart layer cannot be trusted. Use it to operate the gate while a
  # failed sensor is waiting to be repaired or replaced. It is not part of
  # normal operation; it is the thing you reach for when the sensor has let you
  # down and you still need to get through the gate.
  # ---------------------------------------------------------------------------
  gate_garage_package_resync_click:
    alias: "Gate Garage Package Resync (Blind Click)"
    icon: mdi:sync-alert
    description: >-
      Emergency manual pulse. Bypasses all checks and fires the relay once. Use
      this when the contact sensor has failed and the verified open/close path
      can no longer be trusted.
    sequence:
      - alias: Announce the resync
        action: input_text.set_value
        continue_on_error: true
        target:
          entity_id: input_text.gate_garage_package_status_message
        data:
          value: "Manual Resync Executed"
      - alias: Pulse the relay
        action: switch.turn_on
        continue_on_error: true
        target:
          entity_id: switch.gate_relay
      - alias: Log it
        action: system_log.write
        continue_on_error: true
        data:
          level: warning
          message: "[Gate Garage Guard] Manual Resync (Blind Click) executed by user."
