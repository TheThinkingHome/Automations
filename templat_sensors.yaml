# Bedtime Detected - Weighted Confidence Sensor - The Thinking Home (xeazy.com)
# Version: 1.2.0
#
# NOTE: This is the original hand-coded weighted confidence sensor. The same
# approach is now available as a reusable Home Assistant blueprint, which is
# the easier way to build a sensor like this for your own home:
#   Blueprint: https://github.com/TheThinkingHome/Automations/blob/main/blueprints/template/weighted_confidence.md
#   Article:   https://xeazy.com/weighted-confidence-a-home-assistant-weighted-sensor-now-a-blueprint/
#
# This template creates a binary_sensor that uses a weighted scoring system to
# infer a complex state like "Bedtime." This is more reliable than relying on a
# single trigger, as it can tolerate one or more conditions not being met.
#
# How it works:
# 1. A list of conditions is defined in the `conditions` variable. Each
#    condition is a tuple containing the check (true/false) and its weight.
# 2. The sensor calculates a `total_weight` based on all conditions whose
#    entities are currently available.
# 3. It then calculates a `true_weight` based on the conditions that are met.
# 4. The sensor's state becomes 'on' if the `true_weight` meets a defined
#    percentage (e.g., 80%) of the `total_weight`.
# 5. An override is included to immediately set the sensor to 'false' if the
#    bedroom door is open, regardless of other conditions.
# 6. Detailed attributes are provided for debugging, showing the confidence
#    score and a list of which conditions passed.
#
# To customize, simply add, remove, or edit the tuples in the `conditions`
# list within each template block. The entity names used below are generic
# placeholders; replace them with the entities from your own home.
# -------------------------------------------------------------------------------------
- name: "Bedtime Detected"
  unique_id: bedtime_detected
  state: >-
    {% if is_state('binary_sensor.bedroom_door', 'on') %}
      false {# Master door open overrides all other conditions #}
    {% else %}
      {% set conditions = [
        (is_state('input_select.scene', ['Sleep', 'Wake']), 2) if states('input_select.scene') not in ['unavailable', 'unknown'] else (None, 0),
        ((is_state('binary_sensor.bedroom_door', 'off') and (as_timestamp(utcnow()) - as_timestamp(states.binary_sensor.bedroom_door.last_changed, default=0) > 600)), 4) if states('binary_sensor.bedroom_door') not in ['unavailable', 'unknown'] else (None, 0),
        (is_state('binary_sensor.bedroom_balcony_door', 'off'), 1) if states('binary_sensor.bedroom_balcony_door') not in ['unavailable', 'unknown'] else (None, 0),
        (is_state('binary_sensor.phone_1_is_charging', 'on'), 3) if states('binary_sensor.phone_1_is_charging') not in ['unavailable', 'unknown'] else (None, 0),
        ((is_state('sensor.watch_battery_state', 'discharging') == False), 3) if states('sensor.watch_battery_state') not in ['unavailable', 'unknown'] else (None, 0),
        ((is_state('sensor.phone_2_battery_state', 'Not Charging') == False), 1) if states('sensor.phone_2_battery_state') not in ['unavailable', 'unknown'] else (None, 0),
        (is_state('switch.night_light', 'off'), 3) if states('switch.night_light') not in ['unavailable', 'unknown'] else (None, 0),
        (is_state('binary_sensor.common_area_presence', 'off'), 1) if states('binary_sensor.common_area_presence') not in ['unavailable', 'unknown'] else (None, 0),
        (is_state('media_player.living_room_tv', 'off'), 2) if states('media_player.living_room_tv') not in ['unavailable', 'unknown'] else (None, 0)
      ] %}
      {% set valid_conditions = conditions | selectattr('0', '!=', None) | list %}
      {% set total_weight = valid_conditions | map(attribute='1') | sum %}
      {% set true_weight = valid_conditions | selectattr('0', 'equalto', true) | map(attribute='1') | sum %}
      {{ true_weight >= (total_weight * 0.80) if total_weight > 0 else false }}
    {% endif %}
  device_class: occupancy
  attributes:
    confidence: >-
      {% set conditions = [
        (is_state('input_select.scene', ['Sleep', 'Wake']), 2) if states('input_select.scene') not in ['unavailable', 'unknown'] else (None, 0),
        ((is_state('binary_sensor.bedroom_door', 'off') and (as_timestamp(utcnow()) - as_timestamp(states.binary_sensor.bedroom_door.last_changed, default=0) > 600)), 4) if states('binary_sensor.bedroom_door') not in ['unavailable', 'unknown'] else (None, 0),
        (is_state('binary_sensor.bedroom_balcony_door', 'off'), 1) if states('binary_sensor.bedroom_balcony_door') not in ['unavailable', 'unknown'] else (None, 0),
        (is_state('binary_sensor.phone_1_is_charging', 'on'), 3) if states('binary_sensor.phone_1_is_charging') not in ['unavailable', 'unknown'] else (None, 0),
        ((is_state('sensor.watch_battery_state', 'discharging') == False), 3) if states('sensor.watch_battery_state') not in ['unavailable', 'unknown'] else (None, 0),
        ((is_state('sensor.phone_2_battery_state', 'Not Charging') == False), 1) if states('sensor.phone_2_battery_state') not in ['unavailable', 'unknown'] else (None, 0),
        (is_state('switch.night_light', 'off'), 3) if states('switch.night_light') not in ['unavailable', 'unknown'] else (None, 0),
        (is_state('binary_sensor.common_area_presence', 'off'), 1) if states('binary_sensor.common_area_presence') not in ['unavailable', 'unknown'] else (None, 0),
        (is_state('media_player.living_room_tv', 'off'), 2) if states('media_player.living_room_tv') not in ['unavailable', 'unknown'] else (None, 0)
      ] %}
      {% set valid_conditions = conditions | selectattr('0', '!=', None) | list %}
      {% set total_weight = valid_conditions | map(attribute='1') | sum %}
      {% set true_weight = valid_conditions | selectattr('0', 'equalto', true) | map(attribute='1') | sum %}
      {{ ((true_weight / total_weight * 100) | round(2) | string) + '%' if total_weight > 0 else '0%' }}
    conditions_met: >-
      {% set conditions = [
        ('Scene is Sleep or Wake', 2) if states('input_select.scene') not in ['unavailable', 'unknown'] and is_state('input_select.scene', ['Sleep', 'Wake']) else (None, 0),
        ('Bedroom door closed for 10 minutes', 4) if states('binary_sensor.bedroom_door') not in ['unavailable', 'unknown'] and is_state('binary_sensor.bedroom_door', 'off') and (as_timestamp(utcnow()) - as_timestamp(states.binary_sensor.bedroom_door.last_changed, default=0) > 600) else (None, 0),
        ('Bedroom balcony door Closed', 1) if states('binary_sensor.bedroom_balcony_door') not in ['unavailable', 'unknown'] and is_state('binary_sensor.bedroom_balcony_door', 'off') else (None, 0),
        ('Phone 1 Charging', 3) if states('binary_sensor.phone_1_is_charging') not in ['unavailable', 'unknown'] and is_state('binary_sensor.phone_1_is_charging', 'on') else (None, 0),
        ('Watch Charging', 3) if states('sensor.watch_battery_state') not in ['unavailable', 'unknown'] and (is_state('sensor.watch_battery_state', 'discharging') == False) else (None, 0),
        ('Phone 2 Charging', 1) if states('sensor.phone_2_battery_state') not in ['unavailable', 'unknown'] and (is_state('sensor.phone_2_battery_state', 'Not Charging') == False) else (None, 0),
        ('Night light Off', 3) if states('switch.night_light') not in ['unavailable', 'unknown'] and is_state('switch.night_light', 'off') else (None, 0),
        ('Common area presence Clear', 1) if states('binary_sensor.common_area_presence') not in ['unavailable', 'unknown'] and is_state('binary_sensor.common_area_presence', 'off') else (None, 0),
        ('Living room TV Off', 2) if states('media_player.living_room_tv') not in ['unavailable', 'unknown'] and is_state('media_player.living_room_tv', 'off') else (None, 0)
      ] %}
      {{ conditions | selectattr('0', '!=', None) | map(attribute='0') | list }}
